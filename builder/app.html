  defs.forEach(([type,ico,uik,fb])=>{
    picker.appendChild(el("button",{class:"pick", onclick:()=>{
      node.blocks.splice(atIndex,0,newBlock(type)); markDirty(); renderEditor();
    }},[ el("span",{class:"ico",text:ico}), el("span",{text:T(uik,fb)}) ]));
  });
  wrap.appendChild(trigger); wrap.appendChild(picker);
  return wrap;
}

/* ============================================================================
   BLOCK EDITOR ①  PARA
============================================================================ */
const SPOT_COLORS = [null,"FF0000","00B0F0","16A34A","D97706","7C3AED"];
// "Default color" resets the run color WITHOUT touching bold/italic. (removeFormat
// would strip b/i too, so we re-apply the body text color instead.)
const BODY_DEFAULT_COLOR = "000000";

// One contenteditable holding several <p> paragraphs. Enter -> a new <p> (a new
// para block, a real <w:p> on export); Shift+Enter -> <br> (soft line break).
// Both go through the browser so native Ctrl+Z undo keeps working. A single
// toolbar above reflects the formatting at the caret.
const BULLET_GLYPH = String.fromCharCode(0x2022);  // bullet dot; source stays ASCII
function makeProseP(b){
  const p = el("p",{class:"pp"});
  const html = runsToHtml(b.runs);
  p.innerHTML = html || "<br>";   // an empty <p> needs a <br> to stay focusable
  if (b.list){ p.dataset.list = b.list; p.classList.add(b.list==="bullet"?"li-bullet":"li-number"); }
  return p;
}
function elToBlock(pEl){
  const runs = htmlToRuns(pEl);
  // a lone browser-inserted "bogus" <br> in an empty paragraph -> empty run
  if (runs.length===1 && runs[0].t==="\n" && !(pEl.textContent||"").trim()) runs[0].t="";
  const list = (pEl.dataset && pEl.dataset.list) ? pEl.dataset.list : null;
  return { type:"para", runs, list };
}
function proseToBlocks(editor){
  const blocks = []; let buf = null;
  const flush = ()=>{ if (buf){ blocks.push(elToBlock(buf)); buf=null; } };
  editor.childNodes.forEach(ch=>{
    if (ch.nodeType===1 && (ch.tagName==="P"||ch.tagName==="DIV")){
      flush(); blocks.push(elToBlock(ch));
    } else {                       // stray top-level text/inline -> own paragraph
      if (!buf) buf = document.createElement("p");
      buf.appendChild(ch.cloneNode(true));
    }
  });
  flush();
  if (!blocks.length) blocks.push({ type:"para", runs:[{t:""}], list:null });
  return blocks;
}

function buildProseEditor(host, node, seg){
  const tb = el("div",{class:"mini-toolbar prose-toolbar"});
  const editor = el("div",{class:"rich multi", contenteditable:"true", spellcheck:"false"});
  seg.blocks.forEach(b=> editor.appendChild(makeProseP(b)));
  if (!editor.childNodes.length) editor.appendChild(makeProseP({runs:[{t:""}]}));

  // `owned` = the exact contiguous run of blocks this editor represents, so
  // serialize replaces just that slice of node.blocks (length may change).
  let owned = seg.blocks.slice();
  const serialize = ()=>{
    const blocks = proseToBlocks(editor);
    let start = node.blocks.indexOf(owned[0]);
    if (start < 0) start = Math.min(seg.start, node.blocks.length);
    node.blocks.splice(start, owned.length, ...blocks);
    owned = blocks;
    seg.blocks = blocks;   // keep seg live so renderProseCard's drop target stays valid
    markDirty();
  };

  const mk = (label, title, cmd) => el("button",{class:"mt-btn", title, html:label,
    onmousedown:(e)=>{ e.preventDefault(); document.execCommand(cmd,false,null); editor.focus(); serialize(); refresh(); }});
  const bBtn = mk("<b>B</b>", T("para.bold","Bold"), "bold");
  const iBtn = mk("<i>I</i>", T("para.italic","Italic"), "italic");
  tb.appendChild(bBtn); tb.appendChild(iBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  const bulletBtn = el("button",{class:"mt-btn", title:T("para.bullet","Bullet list"), html:BULLET_GLYPH,
    onmousedown:(e)=>{ e.preventDefault(); toggleList("bullet"); }});
  const numBtn = el("button",{class:"mt-btn", title:T("para.number","Numbered list"), html:"1.",
    onmousedown:(e)=>{ e.preventDefault(); toggleList("number"); }});
  tb.appendChild(bulletBtn); tb.appendChild(numBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  SPOT_COLORS.forEach(c=>{
    const sw = el("span",{class:"swatch", title: c?("#"+c):T("para.color_default","Default color"),
      style:{background: c?("#"+c):"linear-gradient(135deg,#fff 45%,#cbd5e1 50%,#fff 55%)"},
      onmousedown:(e)=>{ e.preventDefault();
        document.execCommand("foreColor", false, "#"+(c||BODY_DEFAULT_COLOR));
        editor.focus(); serialize(); refresh(); }});
    tb.appendChild(sw);
  });

  // top-level <p> containing the caret (for list state + list toggling)
  const currentP = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return null;
    let n = sel.anchorNode;
    while (n && n!==editor){ if (n.parentNode===editor) return n; n = n.parentNode; }
    return null;
  };
  const selInEditor = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return false;
    let n = sel.anchorNode; while (n){ if (n===editor) return true; n = n.parentNode; }
    return false;
  };
  const toggleList = (kind)=>{
    const p = currentP(); if (!p) return;
    const next = p.dataset.list===kind ? "" : kind;
    p.dataset.list = next;
    p.classList.toggle("li-bullet", next==="bullet");
    p.classList.toggle("li-number", next==="number");
    editor.focus(); serialize(); refresh();
  };
  const refresh = ()=>{
    if (!selInEditor()) return;
    bBtn.classList.toggle("on", document.queryCommandState("bold"));
    iBtn.classList.toggle("on", document.queryCommandState("italic"));
    const lst = (currentP()||{dataset:{}}).dataset.list || "";
    bulletBtn.classList.toggle("on", lst==="bullet");
    numBtn.classList.toggle("on", lst==="number");
  };

  editor.addEventListener("input", serialize);
  editor.addEventListener("keyup", refresh);
  editor.addEventListener("mouseup", refresh);
  editor.addEventListener("focus", ()=>{
    try{ document.execCommand("defaultParagraphSeparator", false, "p"); }catch(_){}
    refresh();
  });
  editor.addEventListener("blur", ()=>{ serialize(); saveProject(true); });
  // sanitize paste -> plain text (strip foreign styles/structure)
  editor.addEventListener("paste",(e)=>{
    e.preventDefault();
    const txt = (e.clipboardData||window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, txt);
    serialize();
  });

  host.appendChild(tb); host.appendChild(editor);
}

// runs[] -> plain text (concatenate run text; drops marks). Tolerates a legacy
// `text` block by accepting either shape via blockPlainText().
function runsToPlain(runs){ return (runs||[]).map(r=>r&&r.t||"").join(""); }
function blockPlainText(b){
  if (!b) return "";
  if (Array.isArray(b.runs)) return runsToPlain(b.runs);
  return b.text!=null ? String(b.text) : "";
}
// runs[] -> HTML (b/i/color marks). A soft break (\n) inside a run renders as
// <br> so it survives the contenteditable round-trip (a bare \n would collapse).
function runsToHtml(runs){
  if (!runs || !runs.length) return "";
  return runs.map(r=>{
    let t = escapeHtml(r.t||"");
    if (!t) return "";
    t = t.replace(/\n/g,"<br>");
    if (r.color) t = `<span style="color:#${r.color}">${t}</span>`;
    if (r.i) t = `<i>${t}</i>`;
    if (r.b) t = `<b>${t}</b>`;
    return t;
  }).join("") || "";
}
// contenteditable HTML -> runs[] (walk text nodes, track b/i/color)
function htmlToRuns(rich){
  const runs = [];
  const push = (text, st)=>{
    if (!text) return;
    const last = runs[runs.length-1];
    const r = { t:text };
    if (st.b) r.b=true; if (st.i) r.i=true; if (st.color) r.color=st.color;
    if (last && !!last.b===!!r.b && !!last.i===!!r.i && (last.color||null)===(r.color||null)){
      last.t += text;
    } else runs.push(r);
  };
  const walkNode = (node, st)=>{
    node.childNodes.forEach(ch=>{
      if (ch.nodeType===3){ push(ch.nodeValue.replace(/ /g," "), st); return; }
      if (ch.nodeType!==1) return;
      const tag = ch.tagName.toLowerCase();
      const ns = { b:st.b, i:st.i, color:st.color };
      if (tag==="b"||tag==="strong") ns.b=true;
      if (tag==="i"||tag==="em") ns.i=true;
      const col = colorFromStyle(ch.getAttribute("style")||"") || colorFromAttr(ch);
      if (col) ns.color=col;
      if (tag==="br"){ push("\n", st); return; }
      if (tag==="div"||tag==="p"){ if (runs.length) push("\n", st); }
      walkNode(ch, ns);
    });
  };
  walkNode(rich, {b:false,i:false,color:null});
  // collapse to at least one run
  const cleaned = runs.filter(r=>r.t!=="");
  return cleaned.length ? cleaned : [{t:""}];
}
function colorFromStyle(style){
  const m = /color:\s*([^;]+)/i.exec(style); if(!m) return null;
  return cssColorToHex(m[1].trim());
}
function colorFromAttr(node){ const c = node.getAttribute && node.getAttribute("color"); return c?cssColorToHex(c):null; }
function cssColorToHex(c){
  c = c.trim();
  let m = /^#([0-9a-f]{6})$/i.exec(c); if (m) return m[1].toUpperCase();
  m = /^#([0-9a-f]{3})$/i.exec(c); if (m) return (m[1][0]+m[1][0]+m[1][1]+m[1][1]+m[1][2]+m[1][2]).toUpperCase();
  m = /rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i.exec(c);
  if (m){ return [m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,"0")).join("").toUpperCase(); }
  return null;
}
function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ============================================================================
   BLOCK EDITOR ②  IMAGE
============================================================================ */
function editImage(host, block, node){
  const drop = el("div",{class:"img-drop", tabindex:"0"});
  const renderPrev = ()=>{
    drop.innerHTML="";
    if (block.file){
      const img = el("img",{class:"img-prev", src: imgUrl(block.file), alt:block.caption||""});
      img.onerror = ()=>{ drop.innerHTML=""; drop.appendChild(el("div",{text:block.file})); };
      drop.appendChild(img);
    } else {
      drop.appendChild(el("div",{text:T("image.placeholder","Click to focus, then Ctrl+V a screenshot")}));
      drop.appendChild(el("div",{style:{fontSize:"12px",marginTop:"6px"}, text:T("image.or_paste","or paste an image from the clipboard")}));
    }
  };
  drop.addEventListener("focus",()=>drop.classList.add("focused"));
  drop.addEventListener("blur",()=>drop.classList.remove("focused"));
  drop.addEventListener("click",()=>drop.focus());
  drop.addEventListener("paste",(e)=>handleImagePaste(e, block, node, renderPrev));
  renderPrev();
  host.appendChild(drop);

  const row = el("div",{class:"field-row"});
  row.appendChild(el("label",{text:T("image.caption","Caption")}));
  row.appendChild(el("input",{class:"ti grow", value:block.caption||"", placeholder:T("image.caption_ph","Caption (number added automatically)"),
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  host.appendChild(row);
  host.appendChild(buildSizePresets(block));
}
function imgUrl(file){ return file + "?dir=" + encodeURIComponent(App.dir||"") + "&_t=" + Date.now(); }

// Intent presets (full/half/small) that set block.width_cm; an Advanced toggle
// exposes the exact cm. The engine caps height automatically, so there is no
// height field. Reused by both image and image-grid blocks (width_cm is the
// grid's total width there).
function buildSizePresets(block){
  const outer = el("div",{});
  const row = el("div",{class:"field-row"});
  row.appendChild(el("label",{text:T("image.size","Size")}));
  const group = el("div",{class:"img-presets"});
  const adv = el("div",{class:"img-presets", style:{display:"none", marginTop:"6px"}});
  const btns = {};
  const setActive = (key)=>{ for (const k in btns) btns[k].classList.toggle("on", k===key); };

  [["full","image.size.full","Full width"],["half","image.size.half","Half"],
   ["small","image.size.small","Small"]].forEach(([key,uik,fb])=>{
    const b = el("button",{class:"preset-btn", text:T(uik,fb), onclick:()=>{
      block.width_cm = IMG_PRESETS[key]; block.size = key;
      setActive(key); advInput.value = block.width_cm; adv.style.display="none";
      markDirty(); saveProject(true);
    }});
    btns[key] = b; group.appendChild(b);
  });
  const advBtn = el("button",{class:"preset-btn", text:T("image.size.custom","Custom"),
    onclick:()=>{ adv.style.display = adv.style.display==="none"?"flex":"none"; }});
  group.appendChild(advBtn);
  row.appendChild(group);

  const advInput = el("input",{class:"ti num", type:"number", step:"0.5", min:"1",
    value: block.width_cm!=null?block.width_cm:IMG_PRESETS.full,
    oninput:(e)=>{ block.width_cm = parseFloat(e.target.value)||IMG_PRESETS.full; block.size="custom"; setActive(null); markDirty(); },
    onblur:()=>saveProject(true)});
  adv.appendChild(el("label",{text:T("image.width","Width (cm)")}));
  adv.appendChild(advInput);

  outer.appendChild(row); outer.appendChild(adv);
  const cur = imgPresetOf(block.width_cm);
  if (cur==="custom"){ setActive(null); adv.style.display="flex"; } else setActive(cur);
  return outer;
}

async function handleImagePaste(e, block, node, renderPrev){
  const items = (e.clipboardData||{}).items || [];
  for (const it of items){
    if (it.type && it.type.indexOf("image")===0){
      e.preventDefault();
      const file = it.getAsFile();
      const b64 = await fileToB64(file);
      const section = sectionOf(node.id);
      try{
        setStatus("saving", T("status.uploading","Uploading image…"));
        const r = await api("POST","/api/image",{query:{dir:App.dir, section},
          json:{ png_b64:b64, section }});
        block.file = r.file; markDirty(); renderPrev();
        setStatus("saved", T("status.image_added","Image added"));
        saveProject(true);
      }catch(err){ setStatus("err","image failed"); toast("Image upload failed: "+err.message, true); }
      return;
    }
  }
}
function fileToB64(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(",")[1]||"");
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

/* ============================================================================
   BLOCK EDITOR ⑤  IMAGE GRID  (several images in a borderless grid, one number)
============================================================================ */
function editImageGrid(host, block, node){
  block.items = Array.isArray(block.items) ? block.items : [];
  block.cols = block.cols || 2;

  const grid = el("div",{class:"imgrid"});
  const renderGrid = ()=>{
    grid.style.gridTemplateColumns = "repeat("+(block.cols||2)+", 1fr)";
    grid.innerHTML="";
    block.items.forEach((it, i)=>{
      const cell = el("div",{class:"cellimg"});
      const img = el("img",{src: imgUrl(it.file), alt:""});
      img.onerror = ()=>{ cell.innerHTML=""; cell.appendChild(el("div",{style:{fontSize:"11px"}, text:it.file})); };
      cell.appendChild(img);
      cell.appendChild(el("button",{class:"icon-btn danger rm", text:"✕", title:T("action.delete","Delete"),
        onclick:()=>{ block.items.splice(i,1); markDirty(); renderGrid(); saveProject(true); }}));
      grid.appendChild(cell);
    });
    const add = el("div",{class:"imgrid-add", tabindex:"0", text:T("imagegrid.add","Click, then Ctrl+V an image")});
    add.addEventListener("focus",()=>add.classList.add("focused"));
    add.addEventListener("blur",()=>add.classList.remove("focused"));
    add.addEventListener("click",()=>add.focus());
    add.addEventListener("paste",(e)=>handleGridPaste(e, block, node, renderGrid));
    grid.appendChild(add);
  };
  renderGrid();
  host.appendChild(grid);

  const ctl = el("div",{class:"field-row"});
  ctl.appendChild(el("label",{text:T("imagegrid.cols","Columns")}));
  const colsSel = el("select",{class:"ti", style:{width:"70px"},
    onchange:(e)=>{ block.cols = parseInt(e.target.value)||2; markDirty(); renderGrid(); saveProject(true); }});
  [2,3].forEach(c=>{ const o = el("option",{value:c, text:String(c)}); if ((block.cols||2)===c) o.selected=true; colsSel.appendChild(o); });
  ctl.appendChild(colsSel);
  const subWrap = el("label",{class:"chk"});
  const subCb = el("input",{type:"checkbox",
    onchange:(e)=>{ block.sub_captions = e.target.checked; markDirty(); saveProject(true); }});
  if (block.sub_captions) subCb.checked = true;
  subWrap.appendChild(subCb);
  subWrap.appendChild(el("span",{text:T("imagegrid.sub","Sub-labels (a)(b)(c)")}));
  ctl.appendChild(subWrap);
  host.appendChild(ctl);

  const cap = el("div",{class:"field-row"});
  cap.appendChild(el("label",{text:T("image.caption","Caption")}));
  cap.appendChild(el("input",{class:"ti grow", value:block.caption||"", placeholder:T("image.caption_ph","Caption (number added automatically)"),
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  host.appendChild(cap);
  host.appendChild(buildSizePresets(block));
}

async function handleGridPaste(e, block, node, renderGrid){
  const items = (e.clipboardData||{}).items || [];
  for (const it of items){
    if (it.type && it.type.indexOf("image")===0){
      const file = it.getAsFile();
      if (!file) continue;
      e.preventDefault();
      const section = sectionOf(node.id);
      try{
        setStatus("saving", T("status.uploading","Uploading image..."));
        const b64 = await fileToB64(file);
        const r = await api("POST","/api/image",{query:{dir:App.dir, section},
          json:{ png_b64:b64, section }});
        block.items.push({ file:r.file }); markDirty(); renderGrid();
        setStatus("saved", T("status.image_added","Image added"));
        saveProject(true);
      }catch(err){ setStatus("err","image failed"); toast(T("toast.image_failed","Image upload failed: ")+err.message, true); }
      return;
    }
  }
}
// owning chapter number ("4") for image filename section
function sectionOf(id){
  const p = nodePath(id); return p ? p.split(".")[0] : "0";
}

/* ============================================================================
   BLOCK EDITOR ④  FREE TABLE
============================================================================ */
function editTable(host, block){
  block.rows = block.rows && block.rows.length ? block.rows : [["",""],["",""]];
  block.header_rows = block.header_rows ?? 1;

  const tools = el("div",{class:"grid-tools"});
  const mkBtn=(t,fn)=>el("button",{class:"sm-btn",text:t,onclick:fn});
  tools.appendChild(mkBtn("+ "+T("table.row","Row"), ()=>{ block.rows.push(new Array(colCount(block)).fill("")); markDirty(); rebuild(); }));
  tools.appendChild(mkBtn("+ "+T("table.col","Col"), ()=>{ block.rows.forEach(r=>r.push("")); if(block.col_w) block.col_w.push(2); markDirty(); rebuild(); }));
  tools.appendChild(mkBtn("− "+T("table.row","Row"), ()=>{ if(block.rows.length>1){ block.rows.pop(); markDirty(); rebuild(); } }));
  tools.appendChild(mkBtn("− "+T("table.col","Col"), ()=>{ if(colCount(block)>1){ block.rows.forEach(r=>r.pop()); if(block.col_w) block.col_w.pop(); markDirty(); rebuild(); } }));
  tools.appendChild(el("span",{class:"mt-sep"}));
  tools.appendChild(el("label",{style:{color:"var(--muted)",fontSize:"13px"}, text:T("table.header_rows","Header rows:")}));
  const hdrInput = el("input",{class:"ti num", type:"number", min:"0", value:block.header_rows, style:{width:"64px"},
    oninput:(e)=>{ block.header_rows=Math.max(0,parseInt(e.target.value)||0); markDirty();
      restyleHeaderRows(ctx, block); }});
  tools.appendChild(hdrInput);

  const wrap = el("div",{class:"grid-wrap"});
  const capRow = el("div",{class:"field-row"});
  capRow.appendChild(el("label",{text:T("table.caption","Caption")}));
  capRow.appendChild(el("input",{class:"ti grow", value:block.caption||"", placeholder:T("table.caption_ph","Caption (number added automatically)"),
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));

  const rebuild = ()=>{
    wrap.innerHTML="";
    const tbl = el("table",{class:"grid"});
    ctx.reg.clear();
    block.rows.forEach((row, ri)=>{
      const tr = el("tr",{class: ri<block.header_rows?"hdr":""});
      row.forEach((val, ci)=>{
        const cellDiv = el("div",{class:"cell", text:val});   // NOTE: not contenteditable in select mode
        const td = el("td",{},[cellDiv]);
        regCell(ctx, {
          r:ri, c:ci, type:"text", el:cellDiv,
          read: ()=> block.rows[ri][ci] ?? "",
          write:(s)=>{ block.rows[ri][ci] = s; cellDiv.textContent = s; },
        });
        tr.appendChild(td);
      });
      tbl.appendChild(tr);
    });
    wrap.appendChild(tbl);
    ctx.table = tbl; tbl.classList.add("gi-grid");
    restoreFocusAfterRender(ctx);
  };

  const ctx = makeGridContext({
    block, host:wrap,
    rows:()=>block.rows.length, cols:()=>colCount(block),
    rerender:()=>rebuild(), kind:"free",
  });
  rebuild();
  host.appendChild(capRow);
  host.appendChild(tools);
  host.appendChild(wrap);
}
function colCount(block){ return block.rows.reduce((m,r)=>Math.max(m,r.length),0); }
// toggle the .hdr class on existing rows without a full rebuild (preserves caret/selection)
function restyleHeaderRows(ctx, block){
  if (!ctx.table) return;
  ctx.table.querySelectorAll("tr").forEach((tr, i)=>{
    tr.classList.toggle("hdr", i < (block.header_rows||0));
  });
}
function parseTSV(txt){
  return txt.replace(/\r/g,"").replace(/\n$/,"").split("\n").map(l=>l.split("\t"));
}

/* ============================================================================
   BLOCK EDITOR ③  DATATABLE (compliance)
============================================================================ */
// fixed (non-axis) column count of the compliance grid:
// cat,item,unit,kind,limit,spec,spec_mtm[0..2]
const DT_FIXED_COLS = 9;
function editDatatable(host, block){
  block.data = block.data || blankComplianceData();
  // `data` is re-synced from block.data on every rebuild because undo replaces
  // the whole block.data object (gridUndo -> ctx.block.data = snap.data).
  let data = block.data;
  const cfg = App.config.compliance || {};
  const defaultAxes = cfg.axis_labels || ["MIN","TYP","MAX","NTWC"];
  // stage presets are config-driven (neutral fallback); used for quick-add + the stage dropdown
  const stagePresets = (cfg.stages && cfg.stages.length) ? cfg.stages : ["S1","S2"];

  // caption + spec name
  const top = el("div",{class:"field-row"});
  top.appendChild(el("label",{text:T("table.caption","Caption")}));
  top.appendChild(el("input",{class:"ti grow", value:block.caption||"",
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  top.appendChild(el("label",{text:T("datatable.spec_name","Spec name")}));
  top.appendChild(el("input",{class:"ti", value:data.spec_name||"", style:{width:"160px"},
    oninput:(e)=>{ data.spec_name=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  host.appendChild(top);

  // import row
  const importRow = el("div",{class:"grid-tools"});
  const fileInput = el("input",{type:"file", accept:".xlsx", style:{display:"none"},
    onchange:(e)=>importXlsxCompliance(e.target.files[0], block)});
  importRow.appendChild(el("button",{class:"sm-btn", text:T("datatable.import_xlsx","Import xlsx"), onclick:()=>fileInput.click()}));
  importRow.appendChild(fileInput);
  importRow.appendChild(el("span",{style:{color:"var(--muted)",fontSize:"12px"}, text:T("datatable.paste_hint","Tip: select a metric cell and Ctrl+V an Excel region")}));
  host.appendChild(importRow);

  /* ----- groups / axes management ----- */
  const simSec = el("div",{class:"dt-section"});
  simSec.appendChild(el("div",{class:"dt-sh"},[ document.createTextNode(T("datatable.groups","Simulation groups / axes")) ]));
  const simBd = el("div",{class:"dt-bd"});
  // move an array element left/right (no-drag reorder fallback, decision 9)
  const moveInArr = (arr, i, dir)=>{ const j=i+dir; if(j<0||j>=arr.length) return false;
    const [m]=arr.splice(i,1); arr.splice(j,0,m); return true; };

  // ---- drag-reorder wirers (mirror wireBlockDrag; snapshot BEFORE the reorder) ----
  // Sim GROUP drag (reorders data.sims). Scoped to this block via the closure.
  let simGroupDragSrc=null;
  function wireSimGroupDrag(chip, si){
    chip.addEventListener("dragstart",(e)=>{ simGroupDragSrc=si; chip.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; });
    chip.addEventListener("dragend",()=>{ chip.classList.remove("dragging"); simGroupDragSrc=null;
      simBd.querySelectorAll(".sim-chip.dragover").forEach(c=>c.classList.remove("dragover")); });
    chip.addEventListener("dragover",(e)=>{ if(simGroupDragSrc!=null && simGroupDragSrc!==si){ e.preventDefault();
      chip.classList.add("dragover"); }});
    chip.addEventListener("dragleave",()=>chip.classList.remove("dragover"));
    chip.addEventListener("drop",(e)=>{
      e.preventDefault(); chip.classList.remove("dragover");
      if (simGroupDragSrc==null || simGroupDragSrc===si) return;
      snapshot(ctx);
      const [g]=data.sims.splice(simGroupDragSrc,1); data.sims.splice(si,0,g);
      markDirty(); redrawSims(); rebuildMetrics();
    });
  }
  // AXIS drag within a single group. stopPropagation keeps it from also firing the
  // enclosing group drag; constrained to the same group (axisDragSrc.si===si).
  let axisDragSrc=null; // {si, ai}
  function wireAxisDrag(aChip, si, ai){
    aChip.addEventListener("dragstart",(e)=>{ axisDragSrc={si,ai}; aChip.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; e.stopPropagation(); });
    aChip.addEventListener("dragend",()=>{ aChip.classList.remove("dragging"); axisDragSrc=null;
      simBd.querySelectorAll(".axis-chip.dragover").forEach(c=>c.classList.remove("dragover")); });
    aChip.addEventListener("dragover",(e)=>{ if(axisDragSrc && axisDragSrc.si===si && axisDragSrc.ai!==ai){
      e.preventDefault(); e.stopPropagation(); aChip.classList.add("dragover"); }});
    aChip.addEventListener("dragleave",()=>aChip.classList.remove("dragover"));
    aChip.addEventListener("drop",(e)=>{
      e.preventDefault(); e.stopPropagation(); aChip.classList.remove("dragover");
      if (!axisDragSrc || axisDragSrc.si!==si || axisDragSrc.ai===ai) return;
      snapshot(ctx);
      const ax=data.sims[si].axes; const [m]=ax.splice(axisDragSrc.ai,1); ax.splice(ai,0,m);
      markDirty(); redrawSims(); rebuildMetrics();
    });
  }
  // metric ROW drag (reorders data.rows). Called per-<tr> in rebuildMetrics.
  let metricDragSrc=null;
  function wireMetricRowDrag(tr, ri){
    tr.addEventListener("dragstart",(e)=>{ metricDragSrc=ri; tr.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; });
    tr.addEventListener("dragend",()=>{ tr.classList.remove("dragging"); metricDragSrc=null;
      metricWrap.querySelectorAll("tr.dragover").forEach(t=>t.classList.remove("dragover")); });
    tr.addEventListener("dragover",(e)=>{ if(metricDragSrc!=null && metricDragSrc!==ri){ e.preventDefault();
      tr.classList.add("dragover"); }});
    tr.addEventListener("dragleave",()=>tr.classList.remove("dragover"));
    tr.addEventListener("drop",(e)=>{
      e.preventDefault(); tr.classList.remove("dragover");
      if (metricDragSrc==null || metricDragSrc===ri) return;
      snapshot(ctx);
      const [m]=data.rows.splice(metricDragSrc,1); data.rows.splice(ri,0,m);
      markDirty(); rebuildMetrics(); validate(); focusCellAt(ctx, ri, 0);
    });
  }
  const addGroup = (stage)=>{
    const st = stage!=null ? stage : (stagePresets[0]||"");
    snapshot(ctx);                                          // undo BEFORE adding a group (decision 7)
    data.sims.push({ key:uniqueSimKey(data.sims, st), title:"", stage:st, axes:defaultAxes.slice() });
    markDirty(); redrawSims(); rebuildMetrics();
  };
  const redrawSims = ()=>{
    simBd.innerHTML="";
    const chips = el("div",{class:"chip-list"});
    data.sims.forEach((s, si)=>{
      const chip = el("div",{class:"sim-chip"});
      // drag handle toggles draggable only while the handle is grabbed (matches block-card pattern)
      const gHandle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
      gHandle.addEventListener("mousedown",()=>chip.setAttribute("draggable","true"));
      chip.addEventListener("dragend",()=>chip.setAttribute("draggable","false"));
      chip.appendChild(gHandle);
      wireSimGroupDrag(chip, si);
      // group reorder (left/right) — no-drag fallback; snapshot BEFORE reorder (decision 7)
      const gLeft = el("button",{class:"x-mini", title:T("grid.move_up","Move up"), text:"‹",
        onclick:()=>{ snapshot(ctx); if(moveInArr(data.sims,si,-1)){ markDirty(); redrawSims(); rebuildMetrics(); } }});
      const gRight = el("button",{class:"x-mini", title:T("grid.move_down","Move down"), text:"›",
        onclick:()=>{ snapshot(ctx); if(moveInArr(data.sims,si,1)){ markDirty(); redrawSims(); rebuildMetrics(); } }});
      if (si===0) gLeft.disabled=true;
      if (si===data.sims.length-1) gRight.disabled=true;
      chip.appendChild(gLeft); chip.appendChild(gRight);
      // stage select — key is assigned ONCE at creation and kept stable (decision 10)
      const stageSel = el("select",{class:"ti", style:{padding:"2px 4px"},
        onchange:(e)=>{ s.stage=e.target.value; markDirty(); }});
      const stageOpts = stagePresets.slice();
      if (s.stage && stageOpts.indexOf(s.stage)<0) stageOpts.unshift(s.stage); // keep custom value
      stageOpts.forEach(st=>{
        const o=el("option",{value:st,text:st}); if((s.stage||"")===st) o.selected=true; stageSel.appendChild(o);
      });
      chip.appendChild(stageSel);
      chip.appendChild(el("input",{class:"ti", value:s.title||"", placeholder:T("datatable.group_title","group title"),
        style:{width:"120px",padding:"2px 6px"}, oninput:(e)=>{ s.title=e.target.value; markDirty(); }}));
      // axes (reorderable via left/right buttons)
      const axBox = el("span",{class:"chip-list"});
      (s.axes=s.axes||defaultAxes.slice()).forEach((ax, ai)=>{
        const aChip = el("span",{class:"axis-chip", draggable:"false"});
        const aHandle = el("span",{class:"drag-handle", style:{fontSize:"11px"}, text:"⠿",
          title:T("block.drag","Drag to reorder")});
        aHandle.addEventListener("mousedown",()=>aChip.setAttribute("draggable","true"));
        aChip.addEventListener("dragend",()=>aChip.setAttribute("draggable","false"));
        aChip.appendChild(aHandle);
        aChip.appendChild(el("button",{class:"x-mini", title:T("grid.move_up","Move up"), text:"‹",
          onclick:()=>{ snapshot(ctx); if(moveInArr(s.axes,ai,-1)){ markDirty(); redrawSims(); rebuildMetrics(); } }}));
        aChip.appendChild(document.createTextNode(ax));
        aChip.appendChild(el("button",{class:"x-mini", title:T("grid.move_down","Move down"), text:"›",
          onclick:()=>{ snapshot(ctx); if(moveInArr(s.axes,ai,1)){ markDirty(); redrawSims(); rebuildMetrics(); } }}));
        aChip.appendChild(el("button",{class:"x-mini", text:"×", title:T("action.delete","Delete"),
          onclick:()=>{ snapshot(ctx); s.axes.splice(ai,1); markDirty(); redrawSims(); rebuildMetrics(); }}));
        wireAxisDrag(aChip, si, ai);
        axBox.appendChild(aChip);
      });
      const addAx = el("button",{class:"x-mini", title:T("datatable.add_axis","Add axis"), text:"+",
        onclick:()=> addAxisTo(s)});
      axBox.appendChild(addAx);
      chip.appendChild(axBox);
      chip.appendChild(el("button",{class:"x-mini", title:T("action.delete","Delete"), text:"🗑",
        onclick:()=>{ snapshot(ctx); data.sims.splice(si,1); markDirty(); redrawSims(); rebuildMetrics(); }}));
      chips.appendChild(chip);
    });
    simBd.appendChild(chips);
    const addG = el("div",{class:"grid-tools"});
    // quick-add buttons: one per configured stage preset, plus a generic "group"
    stagePresets.forEach(st=>{
      addG.appendChild(el("button",{class:"sm-btn", text:"+ "+st, onclick:()=>addGroup(st)}));
    });
    addG.appendChild(el("button",{class:"sm-btn", text:"+ "+T("datatable.group","Group"),
      onclick:()=>addGroup(null)}));
    simBd.appendChild(addG);
  };
  // add an axis via modalPrompt (replaces native prompt, decision 12), guarding the
  // 2nd non-MTM axis that would silently overwrite sim_ntwc (decision 11).
  const addAxisTo = (s)=>{
    modalPrompt(T("datatable.add_axis","Add axis"),
      T("datatable.axis_name","Axis label (e.g. NTWC)"), "", (nm)=>{
        if (nm==null) return;
        nm = nm.trim(); if (!nm) return;
        if (!isMtmAxis(nm) && nonMtmAxisCount(s) >= 1){
          // TODO: real fix is a model migration (sim_ntwc -> per-axis scalar map)
          // coordinated with engine.py/tables.py; until then block to avoid data loss.
          toast(T("grid.one_extra_axis","Only one extra axis per group is supported"), true);
          return;
        }
        snapshot(ctx);
        s.axes.push(nm); markDirty(); redrawSims(); rebuildMetrics();
      });
  };
  simSec.appendChild(simBd);
  host.appendChild(simSec);

  /* ----- metric grid ----- */
  const legend = el("div",{class:"legend"},[
    el("span",{html:'<span class="sw" style="background:#fef2f2;outline:2px solid #dc2626;outline-offset:-2px"></span>'+T("datatable.legend_flag","out-of-spec (auto red-flag)")}),
  ]);
  host.appendChild(legend);
  const metricWrap = el("div",{class:"grid-wrap dt-grid"});
  host.appendChild(metricWrap);

  // shared select/copy/paste/fill/undo context for the metric grid.
  // rows() = metric row count; cols() = fixed cols + flat sim-axis count.
  const ctx = makeGridContext({
    block, host:metricWrap, kind:"compliance",
    rows:()=> data.rows.length,
    cols:()=> DT_FIXED_COLS + data.sims.reduce((n,s)=>n+(s.axes||[]).length,0),
    // re-sync `data` after an undo swaps block.data, then rebuild BOTH layers so the
    // group/axis chip strip and its index-bound handlers match the restored data.
    rerender:()=>{ data = block.data; redrawSims(); rebuildMetrics(); },
  });

  // add-row controls
  const rowTools = el("div",{class:"grid-tools"});
  rowTools.appendChild(el("button",{class:"sm-btn", text:"+ "+T("datatable.metric","Metric row"),
    onclick:()=>{ snapshot(ctx); data.rows.push(newComplianceRow()); markDirty(); rebuildMetrics(); }}));
  host.appendChild(rowTools);

  let flags = {}; // rowIndex -> [axisIndex...] (flat index across sims)
  const validate = debounce(async ()=>{
    try{
      const r = await api("POST","/api/validate-compliance",{json:{data}});
      flags = r.flags || {}; paintFlags();
    }catch(_){ /* preview best-effort */ }
  }, 400);

  function paintFlags(){
    metricWrap.querySelectorAll(".axis-val").forEach(td=>td.classList.remove("flagcell"));
    Object.keys(flags).forEach(ri=>{
      (flags[ri]||[]).forEach(ai=>{
        const cell = metricWrap.querySelector(`[data-r="${ri}"][data-flatax="${ai}"]`);
        if (cell) cell.classList.add("flagcell");
      });
    });
  }

  // structural ops on metric rows (mirror block-card actions). Each snapshots
  // BEFORE mutating so a mis-op is undoable, then rebuilds + restores focus.
  function rowStruct(ri, op){
    snapshot(ctx);
    if (op==="delete"){ data.rows.splice(ri,1); }
    else if (op==="above"){ data.rows.splice(ri,0,newComplianceRow()); }
    else if (op==="below"){ data.rows.splice(ri+1,0,newComplianceRow()); }
    else if (op==="up"){ if(ri<=0) return; const [m]=data.rows.splice(ri,1); data.rows.splice(ri-1,0,m); }
    else if (op==="down"){ if(ri>=data.rows.length-1) return; const [m]=data.rows.splice(ri,1); data.rows.splice(ri+1,0,m); }
    markDirty(); rebuildMetrics(); validate();
  }

  function rebuildMetrics(){
    data = block.data;                       // re-sync after a possible undo swap
    metricWrap.innerHTML="";
    ctx.reg.clear();
    const tbl = el("table",{class:"grid"});
    // header rows: group titles, then axis labels
    const flatAxes = []; // {si, ai, label}
    data.sims.forEach((s, si)=> (s.axes||[]).forEach((ax, ai)=> flatAxes.push({si, ai, label:ax})));

    const thead = el("thead");
    const hr1 = el("tr",{class:"hdr"});
    hr1.appendChild(el("th",{}));                                  // row-actions column
    hr1.appendChild(el("th",{html:T("datatable.col.cat","Category")}));
    hr1.appendChild(el("th",{html:T("datatable.col.item","Item")}));
    hr1.appendChild(el("th",{html:T("datatable.col.unit","Unit")}));
    hr1.appendChild(el("th",{html:T("datatable.col.kind","Kind")}));
    hr1.appendChild(el("th",{html:T("datatable.col.limit","Limit")}));
    hr1.appendChild(el("th",{html:T("datatable.col.spec","Spec")}));
    hr1.appendChild(el("th",{html:T("datatable.col.spec_mtm","Spec MIN/TYP/MAX"), colspan:3}));
    data.sims.forEach(s=> hr1.appendChild(el("th",{text:(s.title||s.stage||s.key||"sim"), colspan:(s.axes||[]).length})));
    thead.appendChild(hr1);

    const hr2 = el("tr",{class:"hdr"});
    ["","","","","","",""].forEach(()=>hr2.appendChild(el("th",{})));   // actions + 6 fixed
    ["MIN","TYP","MAX"].forEach(x=>hr2.appendChild(el("th",{text:x})));
    flatAxes.forEach(fa=> hr2.appendChild(el("th",{text:fa.label})));
    thead.appendChild(hr2);
    tbl.appendChild(thead);

    const tbody = el("tbody");
    data.rows.forEach((row, ri)=>{
      const tr = el("tr",{});
      const actTd = rowActionsCell(ri, data.rows.length, rowStruct);     // not a grid cell
      // row drag handle (toggles draggable only while grabbed; mirrors block-card)
      const rowHandle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
      rowHandle.addEventListener("mousedown",()=>tr.setAttribute("draggable","true"));
      tr.addEventListener("dragend",()=>tr.setAttribute("draggable","false"));
      actTd.insertBefore(rowHandle, actTd.firstChild);
      tr.appendChild(actTd);
      wireMetricRowDrag(tr, ri);
      // fixed columns 0..8 (column index = factory arg `c`)
      tr.appendChild(textCell(ctx, row,"cat",  ri, 0));
      tr.appendChild(textCell(ctx, row,"item", ri, 1));
      tr.appendChild(textCell(ctx, row,"unit", ri, 2));
      tr.appendChild(selectCell(ctx, row, ri, 3, "kind", false,
        ["common_setting","module_setting","tb","result"], "result", ()=>validate()));
      tr.appendChild(selectCell(ctx, row, ri, 4, "limit", true,
        ["le","ge","range"], null, ()=>validate()));
      tr.appendChild(numCell(ctx, row,"spec", ri, 5, ()=>validate()));
      [0,1,2].forEach(k=> tr.appendChild(numArrCell(ctx, row,"spec_mtm", k, ri, DT_FIXED_COLS-3+k, ()=>validate())));
      // sim axes (flat) — map axis label to sim_mtm[0..2] or sim_ntwc
      let flat=0;
      data.sims.forEach((s, si)=>{
        (s.axes||[]).forEach((ax, ai)=>{
          tr.appendChild(simAxisCell(ctx, row, ax, ri, flat, DT_FIXED_COLS+flat, ()=>validate()));
          flat++;
        });
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    metricWrap.appendChild(tbl);
    ctx.table = tbl; tbl.classList.add("gi-grid");
    freezeLeadCols(tbl);                    // pin actions/Category/Item after layout
    paintFlags();
    restoreFocusAfterRender(ctx);
  }

  redrawSims();
  rebuildMetrics();
  validate();
}

// per-row structural actions (delete / insert above-below / move up-down).
// This is a chrome column, NOT a grid cell — no adapter is registered for it.
function rowActionsCell(ri, total, rowStruct){
  const td = el("td",{class:"row-actions", style:{padding:"2px"}});
  const b = (txt, key, k, disabled)=> el("button",{class:"icon-btn"+(key==="delete"?" danger":""),
    title:T(k, txt), text:txt, disabled:disabled?"":null, onclick:()=>rowStruct(ri,key)});
  td.appendChild(b("↑","up","grid.move_up", ri===0));
  td.appendChild(b("↓","down","grid.move_down", ri===total-1));
  td.appendChild(b("⊕","below","grid.insert_row_below", false));
  td.appendChild(b("⊝","above","grid.insert_row_above", false));
  td.appendChild(b("✕","delete","grid.delete_row", false));
  return td;
}

// Freeze the leading identity columns (row-actions / Category / Item) so a row
// stays identifiable when scrolled right to far sim values. Auto table layout
// makes column widths content-driven, so CSS can't know each column's offset —
// measure them from the (per-column) second header row and pin sticky `left`.
const GI_FREEZE_N = 3;
// re-pin on resize so the measured offsets don't go stale (registered once)
let GI_FREEZE_RESIZE = false;
function ensureFreezeResizeHandler(){
  if (GI_FREEZE_RESIZE) return; GI_FREEZE_RESIZE = true;
  window.addEventListener("resize", debounce(()=>{
    document.querySelectorAll(".grid-wrap.dt-grid table.grid").forEach(freezeLeadCols);
  }, 150));
}
function freezeLeadCols(tbl){
  ensureFreezeResizeHandler();
  const head = tbl.tHead; if(!head || !head.rows.length) return;
  const ref = head.rows[head.rows.length-1];          // hr2: exactly one cell per leaf column
  const lefts=[]; let acc=0;
  for(let i=0;i<GI_FREEZE_N;i++){
    if(!ref.cells[i]) return;                          // fewer columns than the freeze count: skip
    lefts.push(acc); acc += ref.cells[i].getBoundingClientRect().width;
  }
  if(acc<=0) return;                                   // not laid out / hidden: don't pin to 0
  for(const tr of tbl.rows){
    for(let i=0;i<GI_FREEZE_N;i++){
      const c = tr.cells[i]; if(!c) continue;
      c.classList.add("gi-freeze");
      c.style.left = lefts[i] + "px";
      if(i===GI_FREEZE_N-1) c.classList.add("gi-freeze-edge");
    }
  }
}

/* ---- compliance typed cell factories (register shared-layer adapters) ------ */
// Each returns a <td> and registers a {r,c,type,el,read,write} adapter so the
// shared select/copy/paste/fill layer can drive it via read()/write(str).

// plain text cell bound to row[key]
function textCell(ctx, row, key, ri, c){
  const cell = el("div",{class:"cell", text:row[key]||""});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"text", el:cell,
    read:()=> row[key] || "",
    write:(s)=>{ row[key]=s; cell.textContent=s; markDirty(); } });
  return td;
}
// numeric cell bound to row[key]; flags non-numeric input but keeps the raw text
function numCell(ctx, row, key, ri, c, after){
  const cell = el("div",{class:"cell", text:fmtNum(row[key])});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"number", el:cell,
    read:()=> fmtNum(row[key]),
    write:(s)=>{ const v=parseNum(s); row[key]=v; cell.textContent = s==="" ? "" : s; flagNumber(cell, v); markDirty(); after&&after(); } });
  return td;
}
// numeric cell bound to row[key][idx] (e.g. spec_mtm)
function numArrCell(ctx, row, key, idx, ri, c, after){
  row[key] = row[key] || [null,null,null];
  const cell = el("div",{class:"cell", text:fmtNum(row[key][idx])});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"number", el:cell,
    read:()=> fmtNum(row[key][idx]),
    write:(s)=>{ row[key]=row[key]||[null,null,null]; const v=parseNum(s); row[key][idx]=v; cell.textContent = s==="" ? "" : s; flagNumber(cell, v); markDirty(); after&&after(); } });
  return td;
}
// a sim axis cell: MIN/TYP/MAX -> sim_mtm[0..2]; every OTHER axis -> sim_ntwc.
// TODO: sim_ntwc is a single scalar, so 2+ non-MTM axes would overwrite each
// other. Real fix is a model migration (sim_ntwc -> per-axis scalar map) in
// engine.py/tables.py; until then addAxisTo()/paste block a 2nd non-MTM axis.
function simAxisCell(ctx, row, axisLabel, ri, flatIdx, c, after){
  const mtmIdx = MTM_AXES[String(axisLabel).toUpperCase()];
  const get = ()=> (mtmIdx!=null) ? (row.sim_mtm||[])[mtmIdx] : row.sim_ntwc;
  const set = (v)=>{ if (mtmIdx!=null){ row.sim_mtm=row.sim_mtm||[null,null,null]; row.sim_mtm[mtmIdx]=v; } else row.sim_ntwc=v; };
  const cell = el("div",{class:"cell", text:fmtAxis(get())});
  const td = el("td",{class:"axis-val", "data-r":ri, "data-flatax":flatIdx},[cell]);
  regCell(ctx, { r:ri, c, type:"axis", el:cell,
    read:()=> fmtAxis(get()),
    write:(s)=>{ const v=parseAxis(s); set(v); cell.textContent = s==="" ? "" : s;
      // an axis value is valid if empty, a number, or a value(CORNER) tuple
      cell.classList.toggle("cell-invalid", !(v===null || typeof v==="number" || Array.isArray(v)));
      if (typeof v==="string") cell.title=T("cell.invalid_number","Not a valid number"); else cell.removeAttribute("title");
      markDirty(); after&&after(); } });
  return td;
}
// select cell bound to row[key]; the typed write() matches the pasted string
// against the allowed option values and refuses to store garbage (decision 5).
function selectCell(ctx, row, ri, c, key, allowEmpty, options, fallback, after){
  const sel = el("select",{class:"cell", style:{border:"0",width:"100%"},
    onchange:(e)=>{ row[key] = e.target.value || (allowEmpty?null:fallback); markDirty(); after&&after(); }});
  if (allowEmpty) sel.appendChild(el("option",{value:"",text:"—"}));
  options.forEach(v=>{ const o=el("option",{value:v,text:v}); if((row[key]||"")===v) o.selected=true; sel.appendChild(o); });
  const td = el("td",{},[sel]);
  regCell(ctx, { r:ri, c, type:"select", el:sel,
    read:()=> row[key]==null ? "" : String(row[key]),
    write:(s)=>{
      const t=(s||"").trim();
      if (t==="" && allowEmpty){ row[key]=null; sel.value=""; cell_flag(sel,false); }
      else if (options.indexOf(t)>=0){ row[key]=t; sel.value=t; cell_flag(sel,false); }
      else { cell_flag(sel,true); return; }      // no match: leave unchanged, flag
      markDirty(); after&&after();
    } });
  return td;
}
function cell_flag(elm, bad){
  elm.classList.toggle("cell-invalid", bad);
  if (bad) elm.title=T("cell.invalid_number","Value not allowed"); else elm.removeAttribute("title");
}
// flag a numeric cell whose parsed value is non-numeric (kept raw so user can fix)
function flagNumber(cell, v){
  const bad = (typeof v==="string");   // parseNum returns the raw string on failure
  cell.classList.toggle("cell-invalid", bad);
  if (bad) cell.title=T("cell.invalid_number","Not a valid number"); else cell.removeAttribute("title");
}
function fmtNum(v){ return (v===null||v===undefined||v==="") ? "" : String(v); }
function parseNum(t){ t=(t||"").trim(); if(t==="") return null; const n=Number(t); return isNaN(n)?t:n; }
function fmtAxis(v){
  if (v===null||v===undefined) return "";
  if (Array.isArray(v)) return v[0] + "(" + v[1] + ")";
  return String(v);
}
// parse "value(CORNER)" -> [value,"CORNER"]; plain -> scalar
function parseAxis(t){
  t=(t||"").trim(); if(t==="") return null;
  const m = /^(.*?)\s*\(\s*([^)]+?)\s*\)\s*$/.exec(t);
  if (m){ const num=Number(m[1]); return [ isNaN(num)?m[1].trim():num, m[2].trim() ]; }
  const n=Number(t); return isNaN(n)?t:n;
}

async function importXlsxCompliance(file, block){
  if (!file) return;
  try{
    const b64 = await fileToB64(file);
    const r = await api("POST","/api/import-xlsx",{json:{xlsx_b64:b64, mode:"compliance"}});
    if (r && r.recognized === false){
      // No compliance header band found: do NOT clobber a table the user already
      // filled. Keep current data and tell them why nothing happened.
      toast(T("toast.xlsx_unrecognized","No compliance table recognized in that file — existing data kept."), true);
      return;
    }
    if (r.data){
      block.data = r.data;
      // GUARD: the model stores a single scalar (sim_ntwc) per row for non-MTM axes,
      // so a group with >1 non-MTM axis would silently clobber. Trim extras on import.
      // TODO: real fix is a model migration (sim_ntwc -> per-axis) in engine.py/tables.py.
      let trimmed=false;
      (block.data.sims||[]).forEach(s=>{
        let seenExtra=false;
        s.axes=(s.axes||[]).filter(a=>{
          if (isMtmAxis(a)) return true;
          if (seenExtra){ trimmed=true; return false; }
          seenExtra=true; return true;
        });
      });
      if (trimmed) toast(T("grid.one_extra_axis","Only one extra axis per group is supported"), true);
      markDirty(); renderEditor(); toast(T("toast.imported","Imported"));
    }
  }catch(e){ toast("Import failed: "+e.message, true); }
}

/* ============================================================================
   GRID INTERACTION LAYER (shared)
   A generic select-vs-edit / copy-paste-fill / undo layer that both grids opt
   into via a small per-grid registry of typed cell adapters. The layer touches
   the data model ONLY through adapter.read()/adapter.write(str); this is what
   lets the SAME code serve the free table (string cells) and (later) the
   compliance grid (typed number/axis/select cells).
============================================================================ */
const RC = (r,c)=> r+","+c;
const GI_MAX_ROWS = 2000, GI_MAX_COLS = 64;
// drag-select state shared via the active ctx so ONE global mouseup serves every
// grid (grids are rebuilt on each editor render; a per-grid window listener would leak).
let GI_ACTIVE_CTX = null;
window.addEventListener("mouseup",()=>{ if(GI_ACTIVE_CTX){ GI_ACTIVE_CTX._mouseDown=false; GI_ACTIVE_CTX=null; } });

function makeGridContext({block, host, rows, cols, rerender, kind}){
  // kind: "free" | "compliance"  (drives paste column behavior)
  const ctx = {
    block, kind,
    host,                       // stable element events are delegated to (not replaced on render)
    table:null,                 // the <table class="grid"> element (reset each render)
    rows, cols,                 // () => integer current dimensions
    rerender,                   // () => void  (existing rebuild / rebuildMetrics)
    reg:new Map(),              // "r,c" -> adapter
    anchor:null, focus:null,    // {r,c}
    selected:new Set(),         // "r,c"
    editing:null,               // adapter currently in edit mode, or null
    _undo:[],                   // stack of snapshots (small N)
    _clip:"",                   // local clipboard fallback (TSV)
  };
  host.__giCtx = ctx;            // lets a global key handler resolve the ctx from the focused host
  wireGridEvents(ctx);
  return ctx;
}
function regCell(ctx, adapter){
  ctx.reg.set(RC(adapter.r,adapter.c), adapter);
  adapter.el.__gi = ctx; adapter.el.__rc = [adapter.r,adapter.c];
}
function adapterAt(ctx, r, c){ return ctx.reg.get(RC(r,c)) || null; }

/* ---- event wiring (one delegated set per grid) ---------------------------- */
function wireGridEvents(ctx){
  const host = ctx.host;
  ctx._mouseDown = false;

  host.addEventListener("mousedown",(e)=>{
    const cell = e.target.closest(".cell"); if(!cell || cell.__gi!==ctx) return;
    const [r,c]=cell.__rc;
    const ad = adapterAt(ctx,r,c); if(!ad) return;
    if (ctx.editing && ctx.editing!==ad) commitEdit(ctx);   // leaving an edited cell commits
    if (ad.type==="select"){ setFocus(ctx,r,c,false); return; } // let native dropdown work
    if (ctx.editing===ad) return;                           // already editing this cell: native caret
    e.preventDefault();                                     // select mode: suppress native caret/drag
    ctx._mouseDown=true; GI_ACTIVE_CTX=ctx;
    if (e.shiftKey){ extendTo(ctx,r,c); }                   // shift-click extends from anchor
    else { setAnchor(ctx,r,c); }                            // new anchor + collapse
  });
  host.addEventListener("mouseover",(e)=>{
    if(!ctx._mouseDown) return;
    const cell=e.target.closest(".cell"); if(!cell||cell.__gi!==ctx) return;
    const [r,c]=cell.__rc; extendTo(ctx,r,c);               // drag-select extends focus
  });

  host.addEventListener("dblclick",(e)=>{
    const cell=e.target.closest(".cell"); if(!cell||cell.__gi!==ctx) return;
    const ad=adapterAt(ctx, cell.__rc[0], cell.__rc[1]);
    if (ad && ad.type!=="select") enterEdit(ctx, ad, /*keepText*/true);
  });

  host.addEventListener("paste",(e)=>{
    if (ctx.editing) return;                  // editing a single cell: cell-level handler does plain text
    e.preventDefault();
    const txt=(e.clipboardData||window.clipboardData).getData("text/plain") || ctx._clip || "";
    gridPasteTSV(ctx, txt);
  });

  host.tabIndex = -1;                          // focusable so it receives keys in select mode
  host.addEventListener("keydown",(e)=> onGridKey(ctx,e));
}

/* ---- focus / anchor / selection primitives -------------------------------- */
function clampRC(ctx,r,c){
  return [Math.max(0,Math.min(r,ctx.rows()-1)), Math.max(0,Math.min(c,ctx.cols()-1))];
}
function setAnchor(ctx,r,c){ [r,c]=clampRC(ctx,r,c); ctx.anchor={r,c}; ctx.focus={r,c}; recomputeSelection(ctx); }
function setFocus(ctx,r,c,keepAnchor){ [r,c]=clampRC(ctx,r,c); ctx.focus={r,c}; if(!keepAnchor) ctx.anchor={r,c}; recomputeSelection(ctx); }
function extendTo(ctx,r,c){ [r,c]=clampRC(ctx,r,c); if(!ctx.anchor) ctx.anchor={r,c}; ctx.focus={r,c}; recomputeSelection(ctx); }

function selRect(ctx){
  const a=ctx.anchor, f=ctx.focus; if(!a||!f) return null;
  return { r0:Math.min(a.r,f.r), r1:Math.max(a.r,f.r), c0:Math.min(a.c,f.c), c1:Math.max(a.c,f.c) };
}
function recomputeSelection(ctx){
  ctx.selected.clear();
  const R=selRect(ctx);
  if(R){ for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++) ctx.selected.add(RC(r,c)); }
  paintSelection(ctx);
}
function paintSelection(ctx){
  ctx.reg.forEach((ad,key)=>{
    ad.el.classList.toggle("cell-selected", ctx.selected.has(key) && ctx.selected.size>1);
    ad.el.classList.toggle("cell-focus", !!ctx.focus && ad.r===ctx.focus.r && ad.c===ctx.focus.c);
  });
  // keep host focused so keystrokes route here while in select mode — but never
  // STEAL focus on the initial render (no selection yet), while editing a cell,
  // or when the focused cell is a native <select> (let its dropdown keep focus).
  if (!ctx.editing && ctx.focus){
    const fad = adapterAt(ctx, ctx.focus.r, ctx.focus.c);
    if (!(fad && fad.type==="select")) ctx.host.focus({preventScroll:true});
  }
}
function selectAll(ctx){ setAnchor(ctx,0,0); ctx.focus={r:ctx.rows()-1,c:ctx.cols()-1}; recomputeSelection(ctx); }

/* ---- edit-mode transitions ------------------------------------------------ */
function enterEdit(ctx, ad, keepText){
  if (ad.type==="select") return;
  ctx.editing = ad;
  ad._pre = ad.read();                                   // for Esc revert
  ad.el.setAttribute("contenteditable","true");
  ad.el.classList.add("gi-editing");
  if (!keepText) ad.el.textContent="";                   // "type to replace"
  // plain-text paste interceptor while editing this cell (decision 14)
  if (!ad.el.__giPaste){
    ad.el.addEventListener("paste",(e)=>{
      if (!ad.el.classList.contains("gi-editing")) return;
      e.preventDefault();
      const t=(e.clipboardData||window.clipboardData).getData("text/plain");
      if (t.indexOf("\t")>=0 || t.indexOf("\n")>=0){     // multi-cell paste while editing: route to grid
        commitEdit(ctx); gridPasteTSV(ctx, t); return;
      }
      document.execCommand("insertText", false, t);
    });
    ad.el.__giPaste = true;
  }
  ad.el.focus();
  const sel=getSelection(), rng=document.createRange();
  rng.selectNodeContents(ad.el); rng.collapse(false); sel.removeAllRanges(); sel.addRange(rng);
}
function commitEdit(ctx){
  const ad=ctx.editing; if(!ad) return;
  ad.write(ad.el.textContent);                           // canonical typed write (re-validates)
  markDirty();
  ad.el.removeAttribute("contenteditable");
  ad.el.classList.remove("gi-editing");
  ctx.editing=null; saveProject(true);
}
function cancelEdit(ctx){
  const ad=ctx.editing; if(!ad) return;
  ad.write(ad._pre);                                     // REVERT to pre-edit value (decision 1)
  ad.el.removeAttribute("contenteditable");
  ad.el.classList.remove("gi-editing");
  ctx.editing=null;
}

/* ---- keyboard handler ----------------------------------------------------- */
function onGridKey(ctx, e){
  // EDIT MODE keys
  if (ctx.editing){
    if (e.key==="Escape"){ e.preventDefault(); cancelEdit(ctx); paintSelection(ctx); ctx.host.focus(); }
    else if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); commitEdit(ctx);
      const f=ctx.focus; setAnchor(ctx,f.r+1,f.c); ctx.host.focus(); }
    else if (e.key==="Tab"){ e.preventDefault(); commitEdit(ctx);
      const f=ctx.focus; setAnchor(ctx,f.r,f.c+(e.shiftKey?-1:1)); ctx.host.focus(); }
    return; // let other keys reach the contenteditable
  }
  // SELECT MODE keys
  const f=ctx.focus || {r:0,c:0};
  const move=(dr,dc,extend)=>{ e.preventDefault();
    if(extend) extendTo(ctx,f.r+dr,f.c+dc); else setAnchor(ctx,f.r+dr,f.c+dc); };
  const ctrl = e.ctrlKey||e.metaKey;

  if (ctrl && e.key.toLowerCase()==="a"){ e.preventDefault(); selectAll(ctx); return; }
  if (ctrl && e.key.toLowerCase()==="c"){ e.preventDefault(); gridCopy(ctx,false); return; }
  if (ctrl && e.key.toLowerCase()==="x"){ e.preventDefault(); gridCopy(ctx,true); return; }
  if (ctrl && e.key.toLowerCase()==="v"){ /* paste handled by paste event */ return; }
  if (ctrl && e.key.toLowerCase()==="d"){ e.preventDefault(); gridFillDown(ctx); return; }
  if (ctrl && e.key.toLowerCase()==="z"){ e.preventDefault(); e.stopPropagation(); gridUndo(ctx); return; }

  switch(e.key){
    case "ArrowUp":    return move(-1,0,e.shiftKey);
    case "ArrowDown":  return move(1,0,e.shiftKey);
    case "ArrowLeft":  return move(0,-1,e.shiftKey);
    case "ArrowRight": return move(0,1,e.shiftKey);
    case "Enter":      e.preventDefault(); return setAnchor(ctx,f.r+1,f.c);
    case "Tab":        e.preventDefault(); return setAnchor(ctx,f.r,f.c+(e.shiftKey?-1:1));
    case "F2":{ e.preventDefault(); const ad=adapterAt(ctx,f.r,f.c); if(ad) enterEdit(ctx,ad,true); return; }
    case "Delete":
    case "Backspace": e.preventDefault(); return clearSelection(ctx);
    case "Escape":    ctx.selected.clear(); paintSelection(ctx); return;
    default:
      // "type a character" -> enter edit, replacing content (decision 1)
      if (e.key.length===1 && !ctrl && !e.altKey){
        const ad=adapterAt(ctx,f.r,f.c);
        if (ad && ad.type!=="select"){
          e.preventDefault();
          enterEdit(ctx,ad,/*keepText*/false);
          ad.el.textContent=e.key;                          // seed the char deterministically
          const sel=getSelection(), rng=document.createRange();
          rng.selectNodeContents(ad.el); rng.collapse(false); sel.removeAllRanges(); sel.addRange(rng);
        }
      }
  }
}

/* ---- copy / cut ----------------------------------------------------------- */
function gridCopy(ctx, isCut){
  const R=selRect(ctx); if(!R) return;
  const lines=[];
  for(let r=R.r0;r<=R.r1;r++){
    const cells=[];
    for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); cells.push(ad?ad.read():""); }
    lines.push(cells.join("\t"));
  }
  const tsv=lines.join("\n");
  ctx._clip = tsv;                                         // local fallback (paste event prefers system clipboard)
  try{ navigator.clipboard && navigator.clipboard.writeText(tsv).catch(()=>{}); }catch(_){}
  if (isCut){
    snapshot(ctx);                                         // undo BEFORE destructive op
    for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(""); }
    markDirty(); saveProject(true);
  }
}

/* ---- paste ---------------------------------------------------------------- */
function gridPasteTSV(ctx, txt){
  if (!txt) return;
  const f = ctx.focus || {r:0,c:0};
  const matrix = parseTSV(txt);                            // reuse parseTSV
  const isSingle = matrix.length===1 && matrix[0].length===1;

  if (isSingle){                                           // single value -> write focus cell (plain text)
    snapshot(ctx);
    const ad=adapterAt(ctx,f.r,f.c); if(ad) ad.write(matrix[0][0]);
    markDirty(); saveProject(true); return;
  }

  if (ctx.kind==="free") pasteFree(ctx, f, matrix);
  else                   pasteCompliance(ctx, f, matrix);
}

function pasteFree(ctx, f, matrix){
  const block=ctx.block;
  const needRows = f.r + matrix.length;
  const maxLen = matrix.reduce((m,r)=>Math.max(m,r.length),0);
  const needCols = f.c + maxLen;
  const addRows = Math.max(0, needRows - block.rows.length);

  const apply=()=>{
    snapshot(ctx);
    // grow rows (clamped)
    while(block.rows.length < Math.min(needRows, GI_MAX_ROWS))
      block.rows.push(new Array(colCount(block)).fill(""));
    // grow cols (clamped)
    const targetCols = Math.min(needCols, GI_MAX_COLS);
    block.rows.forEach(r=>{ while(r.length<targetCols) r.push(""); });
    if (block.col_w) while(block.col_w.length<targetCols) block.col_w.push(2);
    // write
    matrix.forEach((rowVals,dr)=>{ const r=f.r+dr; if(r>=GI_MAX_ROWS) return;
      rowVals.forEach((v,dc)=>{ const c=f.c+dc; if(c>=GI_MAX_COLS) return; block.rows[r][c]=v; }); });
    markDirty(); ctx.rerender(); saveProject(true);
    if (needRows>GI_MAX_ROWS || needCols>GI_MAX_COLS)
      toast(T("grid.paste_too_large","Paste was clamped to the maximum size"), true);
  };

  if (addRows > 20)
    modalConfirm(T("grid.paste_too_large","Large paste"),
      T("grid.paste_too_large","This will add many rows. Continue?"), apply);
  else apply();
}

function pasteCompliance(ctx, f, matrix){
  // map pasted columns onto fixed typed columns (no col auto-grow); append rows only.
  const data=ctx.block.data;
  const totalCols = ctx.cols();
  let overflow=false;
  const apply=()=>{
    snapshot(ctx);
    const needRows = f.r + matrix.length;
    while(data.rows.length < needRows) data.rows.push(newComplianceRow());  // append-only
    ctx.rerender();                       // rebuild so new rows have adapters registered
    matrix.forEach((rowVals,dr)=>{
      const r=f.r+dr;
      rowVals.forEach((v,dc)=>{
        const c=f.c+dc;
        if (c>=totalCols){ overflow=true; return; }      // drop overflow columns
        const ad=adapterAt(ctx,r,c);
        if (ad) ad.write(v);                              // typed write; select/number/axis validate internally
      });
    });
    markDirty(); ctx.rerender(); saveProject(true);
    if (overflow) toast(T("grid.paste_too_large","Some pasted columns did not fit and were dropped"), true);
  };
  const addRows = (f.r + matrix.length) - data.rows.length;
  if (addRows > 20)
    modalConfirm(T("grid.paste_too_large","Large paste"),
      T("grid.paste_too_large","This will add many rows. Continue?"), apply);
  else apply();
}

/* ---- fill-down / clear ---------------------------------------------------- */
function gridFillDown(ctx){
  const R=selRect(ctx); if(!R || R.r1===R.r0) return;
  snapshot(ctx);
  for(let c=R.c0;c<=R.c1;c++){
    const src=adapterAt(ctx,R.r0,c); if(!src) continue;
    const v=src.read();
    for(let r=R.r0+1;r<=R.r1;r++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(v); }
  }
  markDirty(); ctx.rerender(); saveProject(true);
}
function clearSelection(ctx){               // Delete/Backspace
  const R=selRect(ctx); if(!R) return;
  snapshot(ctx);
  for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(""); }
  markDirty(); saveProject(true);
}

/* ---- undo (per-block, small N ring) --------------------------------------- */
function snapshotPayload(ctx){
  return ctx.kind==="free"
    ? { rows: JSON.parse(JSON.stringify(ctx.block.rows)) }
    : { data: JSON.parse(JSON.stringify(ctx.block.data)) };
}
function snapshot(ctx){
  ctx._undo.push(snapshotPayload(ctx));
  if (ctx._undo.length>20) ctx._undo.shift();
}
function gridUndo(ctx){
  const snap = ctx._undo.pop();
  if (!snap){ toast(T("action.undo","Undo")); return; }
  if (ctx.kind==="free") ctx.block.rows = snap.rows;
  else                   ctx.block.data = snap.data;
  markDirty();
  ctx.rerender();                          // re-resolves adapters; repaints via restoreFocusAfterRender
  toast(T("action.undo","Undo"));
  saveProject(true);
}

/* ---- focus re-resolution after structural rebuild ------------------------- */
function focusCellAt(ctx, r, c){
  [r,c]=clampRC(ctx,r,c);
  ctx.anchor={r,c}; ctx.focus={r,c};
  recomputeSelection(ctx);
  const ad=adapterAt(ctx,r,c);
  if (ad){ ctx.host.focus({preventScroll:true}); ad.el.scrollIntoView({block:"nearest",inline:"nearest"}); }
}
function restoreFocusAfterRender(ctx){
  // registry was just rebuilt; clamp stale focus/anchor into new bounds and repaint
  if (ctx.rows()<=0 || ctx.cols()<=0){ ctx.focus=null; ctx.anchor=null; ctx.selected.clear(); ctx.editing=null; return; }
  if (ctx.focus){ const [r,c]=clampRC(ctx,ctx.focus.r,ctx.focus.c); ctx.focus={r,c}; }
  if (ctx.anchor){ const [r,c]=clampRC(ctx,ctx.anchor.r,ctx.anchor.c); ctx.anchor={r,c}; }
  recomputeSelection(ctx);                 // rebuilds ctx.selected from the (clamped) rect, repaints
  ctx.editing=null;                        // any in-flight edit is dropped on structural rebuild
}

function syncChrome(){

  ["#btn-save","#btn-docx","#btn-pdf"].forEach(s=>{ $(s).disabled = !inEditor; });

async function goHome(){

}

function relTime(mtime){
  if (mtime==null) return "";
  let ms = (typeof mtime==="number") ? (mtime>2e10?mtime:mtime*1000) : Date.parse(mtime);
  if (isNaN(ms)) return String(mtime);
  const s = Math.max(0,(Date.now()-ms)/1000);
  if (s<60)      return T("time.just_now","just now");
  if (s<3600)    return Math.floor(s/60)+T("time.m","m ago");
  if (s<86400)   return Math.floor(s/3600)+T("time.h","h ago");
  if (s<2592000) return Math.floor(s/86400)+T("time.d","d ago");
  try{ return new Date(ms).toLocaleDateString(); }catch(_){ return String(mtime); }
}

/* ============================================================================
   TEMPLATE EDITOR (Phase 3b)
   Left: skeleton outline tree. Right: collapsible settings form + the selected
   node's body editor. Loads GET /api/template, saves PUT /api/template. The
   loaded full config is mutated in place via setPath so unknown keys round-trip
   untouched; only the curated paths below are exposed as a form.
============================================================================ */

/* ---- load flow ------------------------------------------------------------ */
async function openTemplate(tpl){
  setStatus("saving", T("status.loading","Loading..."));
  try{
    const r = await api("GET","/api/template",{query:{id: tpl.id}});
    App.view = "template";
    App.tplView = {
      id: r.id || tpl.id,
      name: r.name || tpl.name || tpl.id,
      config: r.config || {},
      skeleton: normalizeSkeleton(r.skeleton || []),
      sel: null,
      dirty: false,
      settingsOpen: true,
    };
    if (App.tplView.skeleton.length) App.tplView.sel = App.tplView.skeleton[0]._id;
    render();
    setStatus("", T("status.template_mode","Editing template"));
  }catch(e){
    setStatus("err","load failed");
    toast(T("toast.template_load_failed","Could not load template: ")+e.message, true);
  }
}

// Stamp template-local ids and normalize node shape. Unmodeled node keys are
// stashed on _passthru so a config-derived template round-trips losslessly.
function normalizeSkeleton(nodes){
  return (nodes||[]).map(n=>{
    const node = {
      _id: uid(),
      title: n.title || "",
      fixed: !!n.fixed,
      blocks: Array.isArray(n.blocks) ? n.blocks : [],
      children: normalizeSkeleton(n.children || []),
    };
    if (n.level != null) node.level = n.level;
    const passthru = {};
    Object.keys(n).forEach(k=>{
      if (!["title","fixed","blocks","children","level"].includes(k)) passthru[k]=n[k];
    });
    if (Object.keys(passthru).length) node._passthru = passthru;
    return node;
  });
}

/* ---- template-local dirty (does NOT call the project markDirty) ----------- */
function tplMarkDirty(){
  if (!App.tplView) return;
  App.tplView.dirty = true;
  setStatus("dirty", T("status.unsaved","Unsaved changes"));
  // do NOT re-render here: that would blur the input being typed in.
}

/* ---- path get/set on the config object ------------------------------------ */
// supports dotted segments and quoted keys: styles.headings.levels."1".size_pt
function splitPath(path){
  const out=[]; const re=/"([^"]+)"|([^.]+)/g; let m;
  while((m=re.exec(path))) out.push(m[1]!=null?m[1]:m[2]);
  return out;
}
function getPath(obj, path){
  const parts = splitPath(path);
  let cur = obj;
  for (const p of parts){
    if (cur==null || typeof cur!=="object") return undefined;
    cur = cur[p];
  }
  return cur;
}
function setPath(obj, path, val){
  const parts = splitPath(path);
  let cur = obj;
  for (let i=0;i<parts.length-1;i++){
    const p = parts[i];
    if (cur[p]==null || typeof cur[p]!=="object") cur[p] = {};
    cur = cur[p];
  }
  cur[parts[parts.length-1]] = val;
}

/* ---- field coercion adapters ---------------------------------------------- */
const cv = {
  text:  { get:v=> v==null?"":String(v),                          set:s=> s },
  num:   { get:v=> v==null||v===""?"":String(v),
           set:s=>{ const t=String(s).trim(); if(t==="") return undefined;
                    const n=Number(t); return isNaN(n)?undefined:n; } },
  // config stores 6-hex WITHOUT '#'; <input type=color> needs '#RRGGBB'
  color: { get:v=> v?("#"+String(v).replace(/^#/,"")):"#000000",
           set:s=> String(s).replace(/^#/,"").toUpperCase() },
  csv:   { get:v=> Array.isArray(v)?v.join(", "):(v==null?"":String(v)),
           set:s=> String(s).split(",").map(x=>x.trim()).filter(x=>x.length>0) },
};

// key, labelKey, fallback label, config path (@name = tplView.name), kind, input type.
// NOTE: compliance.row_h_pt is an OBJECT {header,data} in the real config, so we
// bind "row height" to compliance.row_h_pt.data to avoid clobbering header.
const TPL_FIELDS = [
  ["name",        "tpl.f.name",        "Template name",            "@name",                              "text",  "text"],
  ["flag_color",  "tpl.f.flag_color",  "Flag color (over-spec)",   "compliance.flag_color",              "color", "color"],
  ["hdr_fill",    "tpl.f.header_fill", "Compliance header fill",   "compliance.fills.header",            "color", "color"],
  ["comp_font",   "tpl.f.comp_font",   "Compliance font size pt",  "compliance.font_pt",                 "num",   "number"],
  ["comp_rowh",   "tpl.f.comp_rowh",   "Compliance row height pt", "compliance.row_h_pt.data",           "num",   "number"],
  ["axis_labels", "tpl.f.axis_labels", "Axis labels",              "compliance.axis_labels",             "csv",   "text"],
  ["cap_table",   "tpl.f.cap_table",   "Table caption prefix",     "caption_prefix.table",               "text",  "text"],
  ["cap_fig",     "tpl.f.cap_fig",     "Figure caption prefix",    "caption_prefix.image",               "text",  "text"],
  ["body_ascii",  "tpl.f.body_ascii",  "Body font (ascii)",        "styles.normal.ascii",                "text",  "text"],
  ["body_ea",     "tpl.f.body_ea",     "Body font (East Asian)",   "styles.normal.eastAsia",             "text",  "text"],
  ["body_size",   "tpl.f.body_size",   "Body size pt",             "styles.normal.size_pt",              "num",   "number"],
  ["h1_size",     "tpl.f.h1_size",     "Heading 1 size pt",        "styles.headings.levels.\"1\".size_pt","num",  "number"],
  ["h2_size",     "tpl.f.h2_size",     "Heading 2 size pt",        "styles.headings.levels.\"2\".size_pt","num",  "number"],
  ["secrecy",     "tpl.f.secrecy",     "Default secrecy",          "cover.secrecy_default",              "text",  "text"],
  ["toc_title",   "tpl.f.toc_title",   "TOC title",                "toc.title",                          "text",  "text"],
];

/* ---- top-level render ----------------------------------------------------- */
function renderTemplate(){
  renderSkeletonTree();
  renderTemplateRight();
}

function renderTemplateRight(){
  const host = $("#editor-inner"); host.innerHTML="";
  host.appendChild(buildTemplateToolbar());
  host.appendChild(buildSettingsPane());
  host.appendChild(buildNodeBodyPane());
}

function buildTemplateToolbar(){
  const bar = el("div",{class:"ed-header"});
  bar.appendChild(el("div",{},[
    el("h2",{class:"ed-title", text: T("template.editor","Template editor")}),
    el("div",{class:"ed-sub", text: App.tplView.id}),
  ]));
  const tools = el("div",{class:"ed-tools"});
  if (App.tplView.dirty)
    tools.appendChild(el("span",{class:"ed-sub", text:T("status.unsaved","Unsaved changes")}));

  tools.appendChild(el("button",{class:"tb-btn", text:T("home.back","Back to home"), onclick:tplBack}));
  bar.appendChild(tools);
