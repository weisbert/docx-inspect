// Image intent presets (cm). "full" ~ usable text width; the engine also caps
// height so tall portrait screenshots cannot overflow a page.
const IMG_PRESETS = { full:15.5, half:7.5, small:5.0 };
function imgPresetOf(width){
  const w = +width;
  for (const k in IMG_PRESETS){ if (Math.abs(IMG_PRESETS[k]-w) < 0.05) return k; }
  return "custom";
}
function newBlock(type){
  // Media blocks (figures / tables) carry a stable per-block id assigned once at
  // creation and never regenerated. It is the basis for the caption-number
  // bookmark (engine: bm_<id>_num) that paragraph cross-references target, so it
  // must survive edits and project saves.
  switch(type){
    // cardStart marks the first block of a text card. A freshly added text block
    // is its OWN card (never auto-merged into the text above it); paragraphs typed
    // with Enter inside a card continue it (no cardStart). See groupBlocks.
    case "para":  return { type:"para", list:null, runs:[{t:""}], cardStart:true };
    case "image": return { type:"image", id:uid(), file:"", caption:"", width_cm: IMG_PRESETS.full, size:"full" };
    case "imagegrid": return { type:"imagegrid", id:uid(), cols:2, caption:"", width_cm: IMG_PRESETS.full,
                               sub_captions:false, items:[] };
    case "table": return { type:"table", id:uid(), caption:"", header_rows:1,
                           rows:[["","",""],["","",""]], merges:[], col_w:null };
    case "datatable": return { type:"datatable", id:uid(), kind:"compliance",
        caption: T("datatable.default_caption","Compliance Table"),
        data: blankComplianceData() };
  }
}
// Media block types that get a stable id (cross-reference targets).
const MEDIA_BLOCK_TYPES = ["image","imagegrid","table","datatable"];
function isMediaBlock(b){ return b && MEDIA_BLOCK_TYPES.indexOf(b.type) >= 0; }
function blankComplianceData(){
  const cc = App.config.compliance || {};
  const axes = cc.axis_labels || ["MIN","TYP","MAX","NTWC"];
  const stage = (cc.stages && cc.stages[0]) || "";
  const sims = [];
  sims.push({ key:uniqueSimKey(sims, stage), title:"", stage, axes: axes.slice() });
  return { spec_name:"", sims, rows:[] };
}
function newComplianceRow(){
  return { cat:"", item:"", unit:"", kind:"result",
           spec:null, spec_mtm:[null,null,null], sim_mtm:[null,null,null],
           spec_ntwc:null, sim_ntwc:null, limit:null, sim_span:false };
}
// ---- table insert templates (hybrid architecture) --------------------------
// The block picker's "Table" group. Each template only PRE-FILLS one of the two
// base block types -- `table` (plain grid, no semantics) or `datatable`
// (compliance semantics) -- with a starter config. No new block type, so the
// engine / preview / editor renderers stay unchanged. New table kinds later =
// just another template entry here.
// Build compliance rows from a compact spec list. Each item is
// {cat,item,unit, kind?, limit?, spec?, spec_mtm?, spec_ntwc?, sim_span?}.
// `defaultKind` applies when an item omits kind; when `simKeys` is given a
// per-sim `sims{}` map is built (compare tables) instead of the flat sim_mtm
// schema. This generalizes the old hardcoded PVT setting-row list so the same
// code fills built-in AND config-defined table presets (WS4).
function rowsFromSpec(specList, defaultKind, simKeys){
  return (specList||[]).map(s=>{
    const row = {
      cat: s.cat||"", item: s.item||"", unit: s.unit||"",
      kind: s.kind || defaultKind,
      spec: (s.spec!=null ? s.spec : null),
      spec_mtm: Array.isArray(s.spec_mtm) ? s.spec_mtm.slice() : [null,null,null],
      spec_ntwc: (s.spec_ntwc!=null ? s.spec_ntwc : null),
      limit: (s.limit!=null ? s.limit : null),
      sim_span: !!s.sim_span,
    };
    if (simKeys && simKeys.length){
      row.sims = {};
      simKeys.forEach(k=> row.sims[k] = { mtm:[null,null,null], ntwc:null });
    } else {
      row.sim_mtm = [null,null,null]; row.sim_ntwc = null;
    }
    return row;
  });
}
// Built-in PVT condition rows -- now just a spec list fed to rowsFromSpec.
function tplSettingRowsFlat(){
  return rowsFromSpec([
    {cat:"PVT_Setting", item:"Process", unit:""},
    {cat:"PVT_Setting", item:"Temperature", unit:"℃"},
    {cat:"PVT_Setting", item:"Voltage", unit:"V"},
  ], "common_setting");
}
function tplCmpRow(cat, item, unit, kind, simKeys){
  const sims = {};
  simKeys.forEach(k=> sims[k] = { mtm:[null,null,null], ntwc:null });
  return { cat, item, unit, kind, spec:null, spec_mtm:[null,null,null], limit:null, sims };
}
// Config-defined table presets (company content lives in local template config,
// so the public engine/app stay neutral). Empty when none configured.
function configTablePresets(){
  return (App.config && Array.isArray(App.config.table_presets)) ? App.config.table_presets : [];
}
// Instantiate a `table_presets` entry into a block. `base` picks the base type:
// "plain" -> a free table (Parameter/Value style); "compliance"/"compare" -> a
// datatable whose setting_rows/result_rows come from rowsFromSpec.
function tableFromPreset(p){
  const cc = App.config.compliance || {};
  const defAxes = (cc.axis_labels || ["MIN","TYP","MAX","NTWC"]);
  const base = p.base || "compliance";
  if (base === "plain"){
    const rows = (Array.isArray(p.rows) && p.rows.length)
      ? p.rows.map(r=> Array.isArray(r) ? r.slice() : [String(r)])
      : [["",""],["",""]];
    const b = { type:"table", id:uid(), caption: p.caption||"",
             header_rows: (p.header_rows!=null ? p.header_rows : 1),
             rows, merges: Array.isArray(p.merges) ? JSON.parse(JSON.stringify(p.merges)) : [],
             col_w: p.col_w || null };
    if (p.header_fill) b.header_fill = p.header_fill;   // preset-carried header shade
    if (p.row_fills) b.row_fills = JSON.parse(JSON.stringify(p.row_fills));  // preset band fills
    if (p.row_h != null) b.row_h = (typeof p.row_h === "object")
      ? JSON.parse(JSON.stringify(p.row_h)) : p.row_h;  // preset row heights
    return b;
  }
  const specSims = (Array.isArray(p.sims) && p.sims.length)
    ? p.sims : [{title:"", stage:(cc.stages&&cc.stages[0])||"", axes: defAxes.slice()}];
  const sims = [];
  specSims.forEach(s=>{
    sims.push({ key: uniqueSimKey(sims, s.stage||""), title: s.title||"",
                stage: s.stage||"", axes: (Array.isArray(s.axes)?s.axes:defAxes).slice() });
  });
  const compare = (base === "compare") || sims.length > 1;
  const simKeys = compare ? sims.map(s=>s.key) : null;
  let rows = rowsFromSpec(p.setting_rows||[], "common_setting", simKeys)
    .concat(rowsFromSpec(p.result_rows||[], "result", simKeys));
  if (!(Array.isArray(p.result_rows) && p.result_rows.length)){
    rows.push(simKeys ? tplCmpRow("","","","result",simKeys) : newComplianceRow());
  }
  return { type:"datatable", id:uid(), kind:"compliance",
    caption: p.caption || T("datatable.default_caption","Compliance Table"),
    data: { spec_name: (p.spec_name!=null ? p.spec_name : (compare ? "" : "Spec")),
            show_spec: (p.show_spec!=null ? p.show_spec : !compare),
            sims, rows } };
}
function tableTemplate(key){
  if (key === "plain") return newBlock("table");
  const preset = configTablePresets().find(p=>p.key===key);
  if (preset) return tableFromPreset(preset);
  const cc = App.config.compliance || {};
  const axes = (cc.axis_labels || ["MIN","TYP","MAX","NTWC"]).slice();
  if (key === "compliance"){
    const sims = [{ key:"sim", title:"", stage:(cc.stages&&cc.stages[0])||"", axes: axes.slice() }];
    return { type:"datatable", id:uid(), kind:"compliance",
      caption: T("datatable.default_caption","Compliance Table"),
      data: { spec_name:"Spec", show_spec:true, sims,
              rows: tplSettingRowsFlat().concat([ newComplianceRow() ]) } };
  }
  // "compare": two sim groups, NO spec column, per-sim row values
  const simKeys = ["a","b"];
  const sims = [{ key:"a", title:"A", stage:"", axes: axes.slice() },
                { key:"b", title:"B", stage:"", axes: axes.slice() }];
  const settingCmp = tplSettingRowsFlat().map(r=> tplCmpRow(r.cat, r.item, r.unit, r.kind, simKeys));
  return { type:"datatable", id:uid(), kind:"compliance",
    caption: T("datatable.compare_caption","Comparison Table"),
    data: { spec_name:"", show_spec:false, sims,
            rows: settingCmp.concat([ tplCmpRow("","","","result", simKeys) ]) } };
}
// MIN/TYP/MAX map onto sim_mtm[0..2]; every OTHER axis collapses to the single
// scalar sim_ntwc. Until the model is migrated (see TODO at simAxisCell), a group
// may carry at most ONE non-MTM axis or values silently overwrite each other.
const MTM_AXES = {MIN:0,TYP:1,MAX:2};
function isMtmAxis(label){ return MTM_AXES[String(label||"").toUpperCase()] != null; }
function nonMtmAxisCount(sim){ return (sim.axes||[]).filter(a=>!isMtmAxis(a)).length; }
// Assign a stable, unique key at group CREATION (kept stable across stage edits).
function uniqueSimKey(sims, stage){
  const base = String(stage||"g").toLowerCase() || "g";
  const taken = new Set(sims.map(s=>s.key));
  if (!taken.has(base)) return base;
  let i=2; while(taken.has(base+i)) i++;
  return base+i;
}

/* ============================================================================
   OUTLINE TREE  (find / walk helpers)
============================================================================ */
function walk(nodes, fn, parent=null, idx=0){
  nodes.forEach((n,i)=>{ fn(n,parent,nodes,i); walk(n.children||[], fn, n); });
}
function findNode(id, nodes=App.project.outline, parent=null){
  for (let i=0;i<nodes.length;i++){
    const n = nodes[i];
    if (n.id === id) return { node:n, list:nodes, idx:i, parent };
    const r = findNode(id, n.children||[], n);
    if (r) return r;
  }
  return null;
}

// Collapse or expand every parent node in one action (D3).
function setAllCollapsed(val){
  if (!App.project) return;
  walk(App.project.outline, (n)=>{ if (n.children && n.children.length) n._collapsed = val; });
  renderTree();
}
function renderTree(){
  buildOutlineHeader();
  renderTreeBody();
}
// Build the outline header ONCE (title + collapse/expand + a filter box). If it
// were rebuilt on every renderTree it would steal focus from the filter box mid
// keystroke, so it is built lazily and reused; renderTreeBody() refreshes just
// the node list. Detected by the presence of the .tree-search input (the template
// skeleton view overwrites this header, so re-check rather than a boolean flag).
function buildOutlineHeader(){
  const head = $("#outline-head");
  if (head.querySelector(".tree-search")) return;
  head.innerHTML = "";
  const titleRow = el("div",{class:"tree-head-row"});
  titleRow.appendChild(el("span",{class:"tree-head-title", text:T("outline.title","Outline")}));
  const tools = el("span",{class:"tree-head-tools"});
  tools.appendChild(el("button",{class:"tree-tool", title:T("outline.collapse_all","Collapse all"),
    text:"⊟", onclick:(e)=>{ e.stopPropagation(); setAllCollapsed(true); }}));
  tools.appendChild(el("button",{class:"tree-tool", title:T("outline.expand_all","Expand all"),
    text:"⊞", onclick:(e)=>{ e.stopPropagation(); setAllCollapsed(false); }}));
  titleRow.appendChild(tools);
  head.appendChild(titleRow);
  const search = el("input",{class:"tree-search", type:"search",
    value: App._treeFilter || "",
    placeholder:T("outline.search","Filter sections…  (Ctrl+P to jump)"),
    oninput:(e)=>{ App._treeFilter = e.target.value.trim().toLowerCase(); renderTreeBody(); }});
  head.appendChild(search);
}
function renderTreeBody(){
  const root = $("#tree"); root.innerHTML = "";
  const f = App._treeFilter || "";
  // cover special node (hidden when a filter is active and doesn't match "cover")
  const coverShown = (!f || "cover".indexOf(f) >= 0);
  if (coverShown){
    root.appendChild(el("div", {class:"node-row cover"+(App.selId===COVER_ID?" sel":""),
        onclick:()=>selectNode(COVER_ID)}, [
      el("span",{class:"twisty leaf"}), el("span",{class:"node-title", text:T("cover.node","Cover")})
    ]));
  }
  if (!App.project) return;
  const frag = document.createDocumentFragment();
  buildNodes(App.project.outline, frag, [], 0);
  root.appendChild(frag);
  // "No sections match" only when NOTHING matched (not even the Cover row), so a
  // filter of "cover" doesn't show the Cover row AND a contradictory empty-state.
  if (f && !frag.childNodes.length && !coverShown)
    root.appendChild(el("div",{class:"tree-empty", style:{padding:"8px",color:"var(--muted)",fontSize:"12px"},
      text:T("outline.no_match","No sections match")}));
}
// A node stays visible under a filter if it -- or any descendant -- matches.
function subtreeMatches(n, f){
  if (!f) return true;
  if ((n.title||"").toLowerCase().indexOf(f) >= 0) return true;
  return (n.children||[]).some(c=>subtreeMatches(c, f));
}
function buildNodes(nodes, parentEl, numPath, depth){
  const f = App._treeFilter || "";
  nodes.forEach((n, i)=>{
    if (f && !subtreeMatches(n, f)) return;             // filtered out of view
    const num = numPath.concat(i+1).join(".");
    const hasKids = (n.children && n.children.length);
    if (n._collapsed === undefined) n._collapsed = false;
    const selfMatch = f && (n.title||"").toLowerCase().indexOf(f) >= 0;
    const expanded = hasKids && (!n._collapsed || !!f);  // a filter force-expands
    const row = el("div", {
      class:"node-row"+(App.selId===n.id?" sel":""), draggable:"true",
      "data-id":n.id,
      title:T("outline.drag_hint","Drag onto a row's middle = make it a sub-section; top/bottom edge = reorder. Right-click for copy / indent / more."),
      onclick:(e)=>{ e.stopPropagation(); selectNode(n.id); },
      oncontextmenu:(e)=>{ e.preventDefault(); selectNode(n.id); openCtx(e, n.id); },
    });
    const tw = el("span",{class:"twisty"+(hasKids?"":" leaf"),
      text: hasKids ? (expanded?"▼":"▶") : "•",
      onclick:(e)=>{ if(hasKids){ e.stopPropagation(); n._collapsed=!n._collapsed; renderTreeBody(); } }});
    row.appendChild(tw);
    row.appendChild(el("span",{class:"node-num", text:num}));
    row.appendChild(el("span",{class:"node-title"+(selfMatch?" match":""), text:n.title||T("node.untitled","(untitled)")}));
    if (n.fixed_body) row.appendChild(el("span",{class:"badge fixed", text:T("badge.fixed","fixed")}));
    if (hasDatatable(n)) row.appendChild(el("span",{class:"badge data", text:T("badge.data","data")}));
    if (n.origin==="user") row.appendChild(el("span",{class:"badge user", text:T("badge.user","new")}));
    wireDrag(row, n.id);
    parentEl.appendChild(row);
    if (expanded){
      const kidsWrap = el("div",{class:"children"});
      buildNodes(n.children, kidsWrap, numPath.concat(i+1), depth+1);
      parentEl.appendChild(kidsWrap);
    }
  });
}
function hasDatatable(n){ return (n.blocks||[]).some(b=>b.type==="datatable"); }

function selectNode(id){ App.selId = id; renderTree(); renderEditor(); }

// Ctrl+P quick jump: a filterable palette of every section. Type to narrow,
// Up/Down to move, Enter/click to jump straight to that section's editor.
function openQuickJump(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  const items = [];
  (function walkQ(nodes, path){ (nodes||[]).forEach((n,i)=>{ const num=path.concat(i+1);
    items.push({id:n.id, num:num.join("."), title:n.title||T("node.untitled","(untitled)")});
    walkQ(n.children||[], num); }); })(App.project.outline, []);
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("outline.quickjump","Jump to section")}));
  const input = el("input",{class:"ti", style:{width:"100%"},
    placeholder:T("outline.quickjump_ph","Type a section name or number…")});
  const list = el("div",{class:"qj-list", style:{maxHeight:"340px", overflow:"auto", marginTop:"8px"}});
  m.appendChild(input); m.appendChild(list);
  let filtered = items.slice(), sel = 0;
  const jump = (id)=>{ closeOverlay(); App._treeFilter="";
    { const sb=document.querySelector(".tree-search"); if(sb) sb.value=""; }  // clear the filter box too
    App.view="editor"; App.selId=id; render();
    const row = $("#tree").querySelector('[data-id="'+id+'"]');
    if (row) try{ row.scrollIntoView({block:"center"}); }catch(_){} };
  const draw = ()=>{
    list.innerHTML="";
    if (!filtered.length){ list.appendChild(el("div",{class:"qj-item", style:{color:"var(--muted)"},
      text:T("outline.no_match","No sections match")})); return; }
    filtered.forEach((it, idx)=>{
      const row = el("div",{class:"qj-item"+(idx===sel?" sel":""), onclick:()=>jump(it.id)});
      row.appendChild(el("span",{class:"qj-num", text:it.num}));
      row.appendChild(el("span",{text:it.title}));
      list.appendChild(row);
    });
  };
  input.addEventListener("input",()=>{
    const q = input.value.trim().toLowerCase();
    filtered = q ? items.filter(it=> it.title.toLowerCase().indexOf(q)>=0 || it.num.indexOf(q)>=0) : items.slice();
    sel = 0; draw();
  });
  input.addEventListener("keydown",(e)=>{
    if (e.key==="ArrowDown"){ e.preventDefault(); sel=Math.min(sel+1, filtered.length-1); draw(); }
    else if (e.key==="ArrowUp"){ e.preventDefault(); sel=Math.max(sel-1, 0); draw(); }
    else if (e.key==="Enter"){ e.preventDefault(); if(filtered[sel]) jump(filtered[sel].id); }
    else if (e.key==="Escape"){ e.preventDefault(); closeOverlay(); }
  });
  draw(); showOverlay(); setTimeout(()=>input.focus(), 30);
}

/* ---- drag reorder + re-nest (change level, cross-parent) ------------------ */
// Drop zone by vertical position in the target row: top edge = sibling BEFORE,
// bottom edge = sibling AFTER, middle = CHILD (nest one level deeper). This makes
// promote/demote and moving across parents a pure drag gesture.
let dragSrc = null, dragSrcIds = null;
function collectIds(node, set){ set.add(node.id); (node.children||[]).forEach(c=>collectIds(c,set)); return set; }
function dropModeFor(row, clientY){
  const r = row.getBoundingClientRect(); const y = clientY - r.top;
  if (y < r.height*0.30) return "before";
  if (y > r.height*0.70) return "after";
  return "child";
}
function paintDrop(row, mode){
  row.style.boxShadow = mode==="child" ? "inset 0 0 0 2px var(--accent)"
    : mode==="before" ? "inset 0 2px 0 var(--accent)" : "inset 0 -2px 0 var(--accent)";
  row.style.background = mode==="child" ? "var(--accent-soft)" : "";
}
function clearDrop(row){ row.style.boxShadow=""; row.style.background=""; }
// Move a node to a new place: mode "before"/"after" (sibling of target) or "child"
// (last child of target). Rejects dropping a node into its own subtree. Returns bool.
function moveNodeInTree(srcId, targetId, mode){
  if (!srcId || srcId===targetId) return false;
  const src = findNode(srcId), dst = findNode(targetId);
  if (!src || !dst) return false;
  if (collectIds(src.node, new Set()).has(targetId)) return false;   // no drop into own subtree
  src.list.splice(src.idx, 1);
  if (mode==="child"){
    (dst.node.children = dst.node.children || []).push(src.node);
    dst.node._collapsed = false;
  } else {
    let at = dst.list.indexOf(dst.node); if (at<0) at = dst.list.length;
    dst.list.splice(at + (mode==="after"?1:0), 0, src.node);
  }
  markDirty(); App.selId = src.node.id; renderTree(); renderEditor();
  return true;
}
function demoteNode(id){                      // make a child of the previous sibling
  const r = findNode(id); if(!r || r.idx===0) return;
  moveNodeInTree(id, r.list[r.idx-1].id, "child");
}
function promoteNode(id){                      // lift one level: sibling after the parent
  const r = findNode(id); if(!r || !r.parent) return;
  moveNodeInTree(id, r.parent.id, "after");
}
function wireDrag(row, id){
  row.addEventListener("dragstart",(e)=>{ dragSrc=id;
    const r=findNode(id); dragSrcIds = r ? collectIds(r.node, new Set()) : new Set([id]);
    e.dataTransfer.effectAllowed="move"; row.style.opacity=".4"; });
  row.addEventListener("dragend",()=>{ row.style.opacity=""; dragSrc=null; dragSrcIds=null; clearDrop(row); });
  row.addEventListener("dragover",(e)=>{
    if(!dragSrc || dragSrc===id || (dragSrcIds && dragSrcIds.has(id))) return;  // invalid target
    e.preventDefault(); paintDrop(row, dropModeFor(row, e.clientY)); });
  row.addEventListener("dragleave",()=>clearDrop(row));
  row.addEventListener("drop",(e)=>{
    e.preventDefault(); const mode = dropModeFor(row, e.clientY); clearDrop(row);
    if(!dragSrc || dragSrc===id || (dragSrcIds && dragSrcIds.has(id))) return;
    moveNodeInTree(dragSrc, id, mode);
  });
}

/* ---- context menu --------------------------------------------------------- */
function openCtx(e, id){
  const r = findNode(id); if (!r) return;
  const ctx = $("#ctx"); ctx.innerHTML="";
  const item = (label, fn, danger=false)=> el("button",{class:danger?"danger":"",
      onclick:()=>{ closeCtx(); fn(); }}, label);
  const canUp = r.idx>0, canDown = r.idx < r.list.length-1;
  ctx.appendChild(item(T("ctx.add_child","Add child"), ()=>addNode(id,"child")));
  ctx.appendChild(item(T("ctx.add_sibling","Add sibling"), ()=>addNode(id,"sibling")));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  // whole-section clipboard (copy the node + all its content/subsections)
  ctx.appendChild(item(T("ctx.copy_section","Copy section"), ()=>copySection(id)));
  ctx.appendChild(item(T("ctx.duplicate","Duplicate"), ()=>duplicateSection(id)));
  const clip = getNodeClip();
  if (clip && clip.node){
    ctx.appendChild(item(T("ctx.paste_section","Paste section (after)"), ()=>pasteSection(id,"sibling")));
    ctx.appendChild(item(T("ctx.paste_section_child","Paste section (as child)"), ()=>pasteSection(id,"child")));
  }
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.rename","Rename"), ()=>renameNode(id)));
  if (r.node.fixed_body)
    ctx.appendChild(item(T("ctx.unlock","Unlock / override"), ()=>unlockNode(id)));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  // change nesting level (drag also does this; menu is the discoverable fallback)
  const ind = item(T("ctx.indent","Indent (make sub-item)"), ()=>demoteNode(id)); if(!canUp) ind.disabled=true;
  const out = item(T("ctx.outdent","Outdent (raise a level)"), ()=>promoteNode(id)); if(!r.parent) out.disabled=true;
  ctx.appendChild(ind); ctx.appendChild(out);
  const up = item(T("ctx.move_up","Move up"), ()=>moveNode(id,-1)); if(!canUp) up.disabled=true;
  const dn = item(T("ctx.move_down","Move down"), ()=>moveNode(id,1)); if(!canDown) dn.disabled=true;
  ctx.appendChild(up); ctx.appendChild(dn);
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.delete","Delete"), ()=>deleteNode(id), true));
  ctx.style.display="block";
  const vw=window.innerWidth, vh=window.innerHeight, w=ctx.offsetWidth, h=ctx.offsetHeight;
  ctx.style.left = Math.min(e.clientX, vw-w-6)+"px";
  ctx.style.top  = Math.min(e.clientY, vh-h-6)+"px";
}
function closeCtx(){ $("#ctx").style.display="none"; }

function addNode(id, where){
  const r = findNode(id); if (!r) return;
  const n = { id: uid(), title: T("node.new","New section"), origin:"user", blocks:[newBlock("para")], children:[] };
  if (where==="child"){ (r.node.children = r.node.children||[]).push(n); r.node._collapsed=false; }
  else r.list.splice(r.idx+1, 0, n);
  markDirty(); App.selId=n.id; renderTree(); renderEditor();
}
function renameNode(id){
  const r = findNode(id); if(!r) return;
  modalPrompt(T("ctx.rename","Rename"), T("dialog.rename.msg","Section title"), r.node.title||"", (v)=>{
    if (v==null) return; r.node.title=v; markDirty(); renderTree(); if(App.selId===id) renderEditor();
  });
}
function moveNode(id, dir){
  const r = findNode(id); if(!r) return;
  const j = r.idx+dir; if (j<0 || j>=r.list.length) return;
  const [m] = r.list.splice(r.idx,1); r.list.splice(j,0,m);
  markDirty(); renderTree();
}
function deleteNode(id){
  const r = findNode(id); if(!r) return;
  const node = r.node;
  const doDel = ()=>{ r.list.splice(r.idx,1); markDirty(); if(App.selId===id) App.selId=COVER_ID;
    renderTree(); renderEditor(); toast(T("toast.deleted_undo","Deleted — Ctrl+Z to undo")); };
  // Confirm when the section carries content: a template section, or one with
  // blocks / sub-sections. An empty user section deletes silently (Ctrl+Z undoes).
  const nBlocks = (node.blocks||[]).length, nKids = (node.children||[]).length;
  if (node.origin==="template"){
    modalConfirm(T("dialog.del.title","Delete section?"),
      T("dialog.del.msg","This section comes from the standard template. Delete it? (Ctrl+Z undoes it.)"), doDel);
  } else if (nBlocks || nKids){
    modalConfirm(T("dialog.del.title","Delete section?"),
      T("dialog.del.msg_content","Delete this section with its {n} block(s) and {k} sub-section(s)? (Ctrl+Z undoes it.)")
        .replace("{n}", nBlocks).replace("{k}", nKids), doDel);
  } else doDel();
}
function unlockNode(id){
  const r = findNode(id); if(!r) return;
  modalConfirm(T("dialog.unlock.title","Unlock fixed body?"),
    T("dialog.unlock.msg","You will override the standard text with your own content blocks."), ()=>{
      delete r.node.fixed_body;
      if (!r.node.blocks || !r.node.blocks.length) r.node.blocks=[newBlock("para")];
      markDirty(); renderTree(); renderEditor();
  });
}

  }
  const type = (f.key==="date") ? "date" : "text";

    oninput:(e)=>{ meta[f.key]=e.target.value; markDirty(); },

function buildNameList(meta){
  const wrap = el("div",{class:"chip-list"});
  const redraw = ()=>{
    wrap.innerHTML="";
    (meta.reviewers||[]).forEach((nm,i)=>{
      wrap.appendChild(el("span",{class:"name-chip"},[ document.createTextNode(nm),

      onkeydown:(e)=>{ if(e.key==="Enter"&&e.target.value.trim()){ (meta.reviewers=meta.reviewers||[]).push(e.target.value.trim()); e.target.value=""; markDirty(); redraw(); } }});

function buildRevisionGrid(meta){
  meta.revisions = meta.revisions || [];
  const cols = [["ver","cover.rev.ver"],["date","cover.rev.date"],["note","cover.rev.note"],["author","cover.rev.author"]];
  const tbl = el("table",{class:"rev-table"});
