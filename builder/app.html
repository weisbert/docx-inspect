<!DOCTYPE html>
<!--
  Structured Document Builder — single-page app.
  Fully self-contained: all CSS/JS inline, ZERO CDN, zero external network.
  All requests go only to the local server (same origin).
  All user-facing labels are pulled from /api/config (ui_strings); no domain strings
  are hardcoded in this file — code/comments are neutral English.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Document Builder</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --line:#d8dce1; --line2:#e7eaee;
    --ink:#1f2430; --muted:#6b7280; --accent:#2563eb; --accent-soft:#e8f0fe;
    --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
    --radius:8px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
      "Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);background:var(--bg);overflow:hidden;
  }
  button{font:inherit;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}

  /* layout */
  #app{display:flex;flex-direction:column;height:100vh}
  #toolbar{
    display:flex;align-items:center;gap:6px;padding:8px 12px;
    background:var(--panel);border-bottom:1px solid var(--line);box-shadow:var(--shadow);
    flex:0 0 auto;flex-wrap:wrap;
  }
  .tb-sep{width:1px;height:22px;background:var(--line);margin:0 4px}
  .tb-btn{
    border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 12px;
    color:var(--ink);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .tb-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tb-btn.primary:hover{filter:brightness(1.06)}
  .tb-btn:disabled{opacity:.5;cursor:not-allowed}
  .tb-title{font-weight:650;cursor:pointer;padding:0 6px;color:var(--ink)}
  .tb-title:hover{color:var(--accent)}
  /* fixed width + right-aligned so the changing status text (Saving…/Autosaved …)
     never re-triggers the toolbar's flex-wrap -> no layout bounce on every save */
  #status{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    width:210px;flex-shrink:0;justify-content:flex-end;white-space:nowrap;overflow:hidden}
  #status-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1}
  .dot.saved{background:var(--ok)} .dot.dirty{background:var(--warn)} .dot.saving{background:var(--accent)}
  .dot.err{background:var(--danger)}

  #main{flex:1 1 auto;display:flex;min-height:0}
  #outline{
    flex:0 0 300px;background:var(--panel);border-right:1px solid var(--line);
    overflow:auto;padding:8px 6px;
  }
  #editor{flex:1 1 auto;overflow:auto;padding:18px 22px}
  #editor-inner{max-width:980px;margin:0 auto}
  #editor-inner.wide{max-width:none}     /* data tables need the full canvas */

  /* outline tree */
  .tree-head{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    padding:4px 8px 8px;display:flex;flex-direction:column;gap:6px}
  .tree-head-row{display:flex;align-items:center;gap:6px}
  .tree-head-title{flex:1}
  .tree-head-tools{display:flex;gap:2px}
  .tree-search{width:100%;box-sizing:border-box;font-size:12px;padding:4px 7px;border:1px solid var(--line);
    border-radius:6px;background:var(--panel);color:var(--ink);text-transform:none;letter-spacing:normal}
  .tree-search:focus{border-color:var(--accent);outline:none}
  .node-title.match{background:#fde68a;border-radius:3px;padding:0 2px}
  .qj-item{padding:5px 8px;cursor:pointer;border-radius:5px;display:flex;gap:8px}
  .qj-item .qj-num{color:var(--muted);min-width:44px}
  .qj-item.sel{background:var(--accent-soft)}
  .tree-tool{border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:4px;cursor:pointer;font-size:12px;line-height:1;padding:2px 5px}
  .tree-tool:hover{border-color:var(--accent);color:var(--accent)}
  .span-toggle{display:inline-flex;align-items:center;gap:1px;font-size:10px;color:var(--muted);cursor:pointer;margin-left:2px}
  .span-toggle input{margin:0;transform:scale(.85)}
  .span-toggle input:disabled{cursor:not-allowed}
  .span-toggle .span-lbl{font-size:11px;line-height:1}
  .node-row{
    display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:6px;
    cursor:pointer;user-select:none;position:relative;
  }
  .node-row:hover{background:var(--line2)}
  .node-row.sel{background:var(--accent-soft);box-shadow:inset 2px 0 0 var(--accent)}
  .node-row.cover{font-weight:600}
  .twisty{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--muted);flex:0 0 auto;font-size:10px}
  .twisty.leaf{visibility:hidden}
  .node-title{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .node-num{color:var(--muted);margin-right:5px;font-variant-numeric:tabular-nums}
  .badge{font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;flex:0 0 auto}
  .badge.fixed{background:#fef3c7;color:#92400e}
  .badge.user{background:#dcfce7;color:#166534}
  .badge.data{background:#e0e7ff;color:#3730a3}
  .children{margin-left:14px;border-left:1px dashed var(--line)}

  /* context menu */
  #ctx{position:fixed;z-index:1000;background:#fff;border:1px solid var(--line);
    border-radius:8px;box-shadow:0 8px 24px rgba(16,24,40,.18);padding:4px;min-width:180px;display:none}
  #ctx button{display:flex;width:100%;text-align:left;border:0;background:none;padding:7px 10px;
    border-radius:6px;color:var(--ink);align-items:center;gap:8px}
  #ctx button:hover{background:var(--accent-soft)}
  #ctx button.danger:hover{background:#fee2e2;color:var(--danger)}
  #ctx .ctx-sep{height:1px;background:var(--line);margin:4px 6px}

  /* editor cards */
  .ed-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .ed-title{font-size:20px;font-weight:650;margin:0}
  .ed-sub{color:var(--muted);font-size:13px;margin-top:2px}
  .ed-tools{margin-left:auto;display:flex;gap:6px;align-items:center}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:14px;box-shadow:var(--shadow);position:relative;
  }
  .card.dragover{outline:2px dashed var(--accent);outline-offset:2px}
  /* drag insertion seam: a bar in the GAP above/below the target card so it is
     clear whether the drop lands before or after it (not a whole-card highlight) */
  .card.drop-before::before, .card.drop-after::after{
    content:"";position:absolute;left:0;right:0;height:3px;border-radius:2px;
    background:var(--accent);z-index:3}
  .card.drop-before::before{top:-8px}
  .card.drop-after::after{bottom:-8px}
  .card.dragging{opacity:.5}
  .card-num{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);
    border:1px solid var(--accent);border-radius:3px;padding:0 6px;letter-spacing:.02em}
  .card-bar{
    display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--line2);
    background:#fafbfc;border-radius:var(--radius) var(--radius) 0 0;
  }
  .card-kind{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .drag-handle{cursor:grab;color:#9aa3af;padding:0 2px;font-size:15px}
  .card-actions{margin-left:auto;display:flex;gap:2px;opacity:0;transition:opacity .12s}
  .card:hover .card-actions{opacity:1}
  .icon-btn{border:0;background:none;color:var(--muted);border-radius:5px;padding:4px 7px;line-height:1}
  .icon-btn:hover{background:var(--line2);color:var(--ink)}
  .icon-btn.danger:hover{background:#fee2e2;color:var(--danger)}
  .icon-btn:disabled{opacity:.3;cursor:not-allowed}
  .card-body{padding:12px 14px}

  /* para block */
  .mini-toolbar{display:flex;gap:4px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
  .mt-btn{border:1px solid var(--line);background:#fff;border-radius:5px;padding:3px 9px;min-width:30px}
  .mt-btn:hover{background:var(--accent-soft)}
  .mt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .mt-sep{width:1px;height:18px;background:var(--line);margin:0 3px}
  .swatch{width:18px;height:18px;border-radius:4px;border:1px solid rgba(0,0,0,.15);cursor:pointer}
  .swatch.active{outline:2px solid var(--accent);outline-offset:1px}
  /* floating B/I/color toolbar shown while editing a styled table cell */
  .cell-fmt{position:fixed;z-index:50;display:none;align-items:center;gap:5px;padding:4px 7px;
    background:var(--panel,#fff);border:1px solid var(--line);border-radius:7px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .cf-btn{border:1px solid var(--line);background:#fff;border-radius:5px;padding:1px 7px;font-size:13px;min-width:24px;cursor:pointer}
  .cf-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .rich{
    min-height:42px;border:1px solid var(--line);border-radius:6px;padding:8px 10px;
    outline:none;line-height:1.55;
  }
  .rich:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .rich ul,.rich ol{margin:.2em 0 .2em 1.4em;padding:0}
  /* continuous prose editor: one box, real paragraphs */
  .prose-card .card-bar{opacity:.6}
  .rich.multi{min-height:60px}
  .rich.multi p.pp{margin:0 0 .55em 0}
  .rich.multi p.pp:last-child{margin-bottom:0}
  .rich.multi{counter-reset:linum}
  .rich.multi p.li-bullet{list-style:none;padding-left:1.5em;position:relative}
  /* per-level glyphs mirror the engine/preview: ● □ ▪ – (Tab / Shift+Tab to nest) */
  .rich.multi p.li-bullet::before{content:"\25CF";position:absolute;left:.45em;color:var(--muted);font-size:.9em}
  .rich.multi p.li-bullet[data-level="1"]::before{content:"\25A1"}
  .rich.multi p.li-bullet[data-level="2"]::before{content:"\25AA"}
  .rich.multi p.li-bullet[data-level="3"]::before{content:"\2013"}
  .rich.multi p.li-number{list-style:none;padding-left:1.9em;position:relative;counter-increment:linum}
  .rich.multi p.li-number::before{content:counter(linum) ".";position:absolute;left:.3em;color:var(--muted)}
  .rich.multi p.pp[data-level="1"]{margin-left:1.8em}
  .rich.multi p.pp[data-level="2"]{margin-left:3.6em}
  .rich.multi p.pp[data-level="3"]{margin-left:5.4em}
  /* cross-reference chip: an atomic, non-editable token in the prose editor */
  .ref-chip{display:inline-block;background:var(--accent-soft);border:1px solid var(--accent);
    color:var(--accent);border-radius:4px;padding:0 5px;margin:0 1px;font-size:.85em;
    white-space:nowrap;cursor:default;user-select:none}

  /* image block */
  .img-drop{
    border:2px dashed var(--line);border-radius:8px;min-height:120px;display:flex;
    flex-direction:column;align-items:center;justify-content:center;color:var(--muted);
    text-align:center;padding:18px;outline:none;cursor:pointer;
  }
  .img-drop:focus,.img-drop.focused{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .img-drop.dragover{border-color:var(--ok);background:var(--accent-soft);color:var(--ok);border-style:solid}
  .img-prev{max-width:100%;max-height:340px;border:1px solid var(--line);border-radius:6px;display:block}
  .img-prevwrap{position:relative;display:inline-block;max-width:100%}
  .img-prevwrap .rm{position:absolute;top:5px;right:5px;background:rgba(255,255,255,.9);border:1px solid var(--line)}
  .img-hint{font-size:11px;color:var(--muted);margin-top:8px}
  /* image-grid layout picker (up to 3x3) */
  .gl-wrap{display:inline-flex;align-items:center;gap:8px}
  .gl-picker{display:grid;grid-template-columns:repeat(3,20px);grid-auto-rows:20px;gap:3px}
  .gl-cell{border:1px solid var(--line);border-radius:3px;background:#fff;cursor:pointer}
  .gl-cell.on{background:var(--accent);border-color:var(--accent)}
  .gl-lbl{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;min-width:34px}
  .field-row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .field-row label{color:var(--muted);font-size:13px}
  .ti{border:1px solid var(--line);border-radius:6px;padding:6px 9px;outline:none}
  .ti:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .ti.grow{flex:1 1 220px}
  .ti.num{width:90px}
  /* image size presets + image grid */
  .img-presets{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .preset-btn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 10px;font-size:13px}
  .preset-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .preset-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chk{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:13px}
  .imgrid{display:grid;gap:8px;margin-bottom:4px}
  .imgrid .cellimg{border:1px solid var(--line);border-radius:6px;position:relative;background:#fafbfc;
    display:flex;align-items:center;justify-content:center;min-height:90px;overflow:hidden;padding:4px;
    cursor:pointer;outline:none}
  .imgrid .cellimg:focus,.imgrid .cellimg.focused{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .imgrid .cellimg img{max-width:100%;max-height:170px;display:block}
  .imgrid .cellimg .rm{position:absolute;top:3px;right:3px;background:rgba(255,255,255,.85)}
  .imgrid-add{border:2px dashed var(--line);border-radius:6px;min-height:90px;display:flex;
    align-items:center;justify-content:center;text-align:center;padding:8px;color:var(--muted);
    cursor:pointer;outline:none;font-size:13px}
  .imgrid-add:focus,.imgrid-add.focused{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

  /* free table grid */
  .grid-wrap{overflow:auto;border:1px solid var(--line);border-radius:6px}
  /* compliance grid: bound height so the horizontal scrollbar stays reachable
     without scrolling the whole page to the bottom of a tall table */
  .grid-wrap.dt-grid{max-height:72vh}
  /* P2.2: maximize a large grid to a full-viewport overlay (kills the double
     scrollbar for tall compliance tables); Esc or the toolbar button exits */
  .grid-wrap.dt-grid.gi-max{position:fixed;inset:12px;max-height:none;z-index:60;
    background:var(--panel);box-shadow:0 8px 40px rgba(0,0,0,.3);border-color:var(--accent)}
  body.gi-max-open{overflow:hidden}
  /* freeze the header while scrolling the metric list; collapsed borders clip
     under a sticky thead, so the bottom rule is redrawn with an inset shadow */
  .grid-wrap.dt-grid thead{position:sticky;top:0;z-index:3}
  .grid-wrap.dt-grid thead th{padding:4px 7px}
  .grid-wrap.dt-grid thead tr:last-child th{box-shadow:inset 0 -1px 0 var(--line)}
  /* freeze the leading identity columns (actions / Category / Item) on horizontal
     scroll so the row stays identifiable next to far-right sim values; the left
     offsets are measured and pinned in JS (auto table layout, content-driven widths) */
  .grid-wrap.dt-grid td.gi-freeze,.grid-wrap.dt-grid th.gi-freeze{position:sticky;z-index:2;background:var(--panel)}
  .grid-wrap.dt-grid thead th.gi-freeze{z-index:4;background:#eef1f5}
  .grid-wrap.dt-grid .gi-freeze-edge{box-shadow:inset -1px 0 0 var(--line)}
  /* the bottom-right corner cell needs both the header rule and the freeze edge */
  .grid-wrap.dt-grid thead tr:last-child th.gi-freeze-edge{box-shadow:inset -1px 0 0 var(--line),inset 0 -1px 0 var(--line)}
  /* P0 compaction: tighten the compliance grid only (dt-grid). free-grid keeps its
     own fixed widths/padding, so every rule here is scoped under .grid-wrap.dt-grid
     and wins over the shared table.grid rules by specificity. */
  .grid-wrap.dt-grid table.grid td,.grid-wrap.dt-grid table.grid th{min-width:44px}
  .grid-wrap.dt-grid table.grid td .cell,.grid-wrap.dt-grid table.grid th .cell{padding:3px 6px;min-height:20px}
  .grid-wrap.dt-grid td.axis-val:not([colspan]){max-width:120px}
  .grid-wrap.dt-grid td.axis-val .cell,.grid-wrap.dt-grid td.num-val .cell{
    overflow-wrap:anywhere;text-align:center;font-variant-numeric:tabular-nums}
  .grid-wrap.dt-grid .row-actions .icon-btn{padding:2px 3px}
  /* P1.1: structural buttons in a hover-revealed floating cluster; the actions
     column keeps only the drag handle + span toggle inline. position:relative
     anchors the cluster, but a more-specific rule keeps position:sticky when the
     column is frozen (so the pin survives). The frozen td is itself a containing
     block, so the absolute cluster tracks it on scroll either way. */
  .grid-wrap.dt-grid td.row-actions{position:relative}
  .grid-wrap.dt-grid td.row-actions.gi-freeze{position:sticky}
  .grid-wrap.dt-grid .row-act-pop{position:absolute;left:2px;top:100%;z-index:6;display:none;
    gap:1px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px;
    white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.16)}
  .grid-wrap.dt-grid td.row-actions:hover .row-act-pop{display:flex}
  /* keep the beige setting band on the frozen identity cells (the sticky bg rule
     above would otherwise repaint them --panel) */
  .grid-wrap.dt-grid td.gi-freeze.band-fill{background:var(--band-c)}
  .grid-wrap.dt-grid td.cat-repeat .cell{color:var(--muted);opacity:.45}
  table.grid{border-collapse:collapse;width:100%}
  table.grid td,table.grid th{border:1px solid var(--line);padding:0;min-width:60px;vertical-align:top}
  table.grid td .cell,table.grid th .cell{padding:5px 7px;outline:none;min-height:24px;white-space:pre-wrap}
  table.grid th{background:#eef1f5}
  table.grid tr.hdr .cell{font-weight:600}
  .cell:focus{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent)}
  /* free table only: fixed column widths so typing never re-flows the columns;
     widths come from the <colgroup> (block.col_w), long tokens wrap instead of
     widening. The compliance grid keeps its auto layout (dt-grid, not free-grid). */
  table.grid.free-grid{table-layout:fixed}
  table.grid.free-grid td,table.grid.free-grid th{position:relative}
  table.grid.free-grid td .cell,table.grid.free-grid th .cell{overflow-wrap:anywhere}
  /* draggable grip straddling each interior column border (persists to col_w) */
  .col-grip{position:absolute;top:0;right:-3px;width:6px;height:100%;z-index:6;
    cursor:col-resize;user-select:none}
  .col-grip:hover,.col-grip.active{background:var(--accent)}
  body.col-resizing,body.col-resizing *{cursor:col-resize!important;user-select:none!important}
  .grid-tools{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap;align-items:center}
  .sm-btn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 9px;font-size:13px}
  .sm-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
  /* markdown table editor panel */
  .md-wrap{margin-top:8px;border:1px solid var(--line);border-radius:6px;padding:8px;background:#fafbfc}
  .md-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .md-hint{color:var(--muted);font-size:12px}
  .md-area{width:100%;min-height:150px;box-sizing:border-box;border:1px solid var(--line);border-radius:5px;
    padding:8px;font-family:ui-monospace,Consolas,"Courier New",monospace;font-size:12.5px;line-height:1.5;
    white-space:pre;overflow:auto;resize:vertical}

  /* shared grid interaction (select vs edit) */
  table.grid.gi-grid{user-select:none;}                 /* select mode: no native text drag-select */
  table.grid.gi-grid .cell{cursor:cell;}
  table.grid.gi-grid .cell.gi-editing{cursor:text;user-select:text;background:#fff;
    box-shadow:inset 0 0 0 2px var(--accent);}
  /* paint selection/focus/invalid on the TD (not the inner div) so the highlight
     fills the full row height even for empty cells, whose div only grows to its
     content and would otherwise leave a white strip below */
  /* row_fills band: set via a CSS var + class (NOT inline background) so the
     selection rule below — higher specificity via :has() — still paints over it */
  table.grid td.band-fill{background:var(--band-c)}
  table.grid td:has(>.cell.cell-selected){background:var(--accent-soft)}
  table.grid td:has(>.cell.cell-focus){box-shadow:inset 0 0 0 2px var(--accent)}
  table.grid td:has(>.cell.cell-invalid){background:#fff7ed;box-shadow:inset 0 0 0 1px var(--warn)}

  /* structural drag-reorder (neutral accent; distinct from the red flag style) */
  table.grid tr.dragging{opacity:.5}
  table.grid tr.dragover td{box-shadow:inset 0 -2px 0 var(--accent)}
  td.row-actions{white-space:nowrap;text-align:center}
  td.row-actions .drag-handle{vertical-align:middle}
  .sim-chip.dragging{opacity:.5}
  .sim-chip.dragover{box-shadow:inset 0 0 0 2px var(--accent)}
  .axis-chip.dragover{box-shadow:inset 0 0 0 2px var(--accent)}

  /* datatable / compliance */
  .dt-section{border:1px solid var(--line2);border-radius:6px;margin-bottom:10px}
  .dt-section>.dt-sh{padding:6px 10px;font-weight:600;font-size:13px;background:#fafbfc;
    border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
  .dt-sh-toggle{cursor:pointer;user-select:none}
  .dt-sh-toggle:hover{background:#f1f4f8}
  .dt-caret{font-size:11px;color:var(--muted);width:10px;display:inline-block;text-align:center}
  .dt-sh-summary{font-weight:400;color:var(--muted);font-size:12px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .dt-section>.dt-bd{padding:10px}
  .sim-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
    border-radius:20px;padding:3px 6px 3px 10px;background:#fff}
  .axis-chip{display:inline-flex;align-items:center;gap:3px;background:var(--line2);
    border-radius:12px;padding:1px 4px 1px 8px;font-size:12px}
  .x-mini{border:0;background:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:0 3px}
  .x-mini:hover{color:var(--danger)}
  .flagcell{outline:2px solid var(--danger) !important;outline-offset:-2px;background:#fef2f2}
  .legend{display:flex;gap:14px;color:var(--muted);font-size:12px;margin:6px 0;align-items:center;flex-wrap:wrap}
  .legend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.1);vertical-align:-1px;margin-right:4px}
  .legend .val-badge{display:inline-flex;align-items:center;gap:4px;color:var(--danger);font-weight:600;border:1px solid var(--danger);border-radius:3px;padding:0 6px;background:#fef2f2}
  .legend .val-badge::before{content:"!";display:inline-block;width:13px;height:13px;line-height:13px;text-align:center;border-radius:50%;background:var(--danger);color:#fff;font-size:10px}

  /* add-block picker */
  .add-block{margin-top:6px}
  .add-trigger{border:1px dashed var(--line);background:#fff;border-radius:8px;padding:9px 14px;
    color:var(--muted);width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
  .add-trigger:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .picker{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .pick{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px 14px;
    display:flex;flex-direction:column;align-items:center;gap:4px;min-width:96px}
  .pick:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .pick .ico{font-size:20px}
  .paste-pick{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .paste-pick span:last-child{white-space:nowrap}
  /* hover-to-insert a block between two cards (floats in the inter-card gap;
     zero layout height until its picker is opened) */
  .block-list{padding-top:16px}
  .insert-wrap{position:relative}
  .insert-bar{position:absolute;left:0;right:0;top:-14px;height:14px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .12s;z-index:3}
  .insert-bar:hover,.insert-bar.open{opacity:1}
  .insert-bar::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;
    transform:translateY(-50%);background:var(--accent);opacity:.3;border-radius:2px}
  .insert-bar .ins-plus{position:relative;z-index:1;width:20px;height:20px;border-radius:50%;
    background:var(--accent);color:#fff;font-weight:700;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .insert-picker{position:relative;z-index:2;margin:0 0 12px;padding:8px;
    background:var(--panel,#fff);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}

  /* cover form */
  .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .form-grid.full{grid-template-columns:1fr}
  .ffield{display:flex;flex-direction:column;gap:4px}
  .ffield label{font-size:13px;color:var(--muted)}
  .ffield label .req{color:var(--danger);margin-left:3px}
  .ffield .ti{width:100%}
  .section-h{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.03em;margin:18px 0 4px;border-bottom:1px solid var(--line2);padding-bottom:6px}
  .rev-table{width:100%;border-collapse:collapse;margin-top:4px}
  .rev-table th,.rev-table td{border:1px solid var(--line);padding:4px}
  .rev-table th{background:#eef1f5;font-size:12px;color:var(--muted);font-weight:600}
  .rev-table td input{border:0;width:100%;padding:5px 6px;outline:none;background:none}
  .rev-table td input:focus{background:var(--accent-soft)}
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .name-chip{display:inline-flex;align-items:center;gap:5px;background:var(--line2);
    border-radius:16px;padding:3px 6px 3px 11px}

  /* modal / toast */
  #overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:2000;
    align-items:center;justify-content:center}
  #overlay.show{display:flex}
  .modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);
    width:min(440px,92vw);padding:20px}
  .modal h3{margin:0 0 6px}
  .modal p{color:var(--muted);margin:0 0 16px}
  .modal .ti{width:100%}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  /* export progress bar (determinate while rendering; indeterminate for PDF) */
  .prog-track{height:10px;border-radius:6px;background:var(--line2);overflow:hidden;margin-top:4px}
  .prog-bar{height:100%;width:0;background:var(--accent);border-radius:6px;transition:width .18s ease}
  .prog-track.indeterminate .prog-bar{width:40%;animation:prog-slide 1.1s ease-in-out infinite}
  @keyframes prog-slide{0%{margin-left:-45%}100%{margin-left:105%}}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2430;color:#fff;
    padding:10px 16px;border-radius:8px;box-shadow:var(--shadow);z-index:3000;opacity:0;
    transition:opacity .2s,transform .2s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.err{background:var(--danger)}
  /* export render-manifest panel */
  .export-summary{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;
    padding:8px 12px;color:#92400e;font-size:13px;margin:0 0 12px}
  .export-warn-list{max-height:280px;overflow-y:auto;border:1px solid var(--line);
    border-radius:6px}
  .export-warn-row{display:flex;gap:10px;padding:6px 10px;font-size:12px;
    border-bottom:1px solid var(--line2)}
  .export-warn-row:last-child{border-bottom:none}
  .export-warn-row.jumpable{cursor:pointer}
  .export-warn-row.jumpable:hover{background:var(--accent-soft)}
  .export-warn-type{flex:0 0 auto;font-weight:600;color:#b45309;white-space:nowrap}
  .export-warn-detail{flex:1 1 auto;color:#475569;word-break:break-word}
  .empty{color:var(--muted);text-align:center;padding:40px 10px}
  .ro-note{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;
    color:#92400e;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .fixed-preview{border:1px dashed var(--line);border-radius:6px;padding:12px;color:#475569;
    background:#fbfcfd;white-space:pre-wrap}
  .hidden{display:none !important}

  /* home view */
  .home{max-width:840px;margin:0 auto;padding:6px 2px}
  .home-sec{margin-bottom:28px}
  .home-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .home-head h2{font-size:16px;margin:0;font-weight:650}
  .home-head .spacer{margin-left:auto}
  .tpl-card,.proj-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--panel);box-shadow:var(--shadow)}
  .tpl-card .name,.proj-row .title{font-weight:600}
  .proj-row .meta{color:var(--muted);font-size:12px}
  .home-row-main{flex:1 1 auto;min-width:0;overflow:hidden}
  .home-row-main .sub{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .home-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
  /* sim checklist (per-project, stored in project.json -> sim_checklist) */
  .ckl{padding:14px 18px;max-width:1120px}
  .ckl-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .ckl-title{font-weight:600;font-size:15px}
  .ckl-prog{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
  .ckl-table{border-collapse:collapse;width:100%;font-size:12px}
  .ckl-table th,.ckl-table td{border:1px solid var(--border,#ddd);padding:4px 7px;text-align:left;vertical-align:top}
  .ckl-table th{background:var(--panel,#f4f4f4);font-weight:600;white-space:nowrap}
  .ckl-id{font-weight:600;white-space:nowrap}
  .ckl-wrap{max-width:280px}
  .ckl-table tr.s-done{opacity:.6}
  .ckl-chip{border:none;border-radius:10px;padding:2px 11px;font-size:11px;font-weight:600;cursor:pointer;color:#fff;white-space:nowrap}
  .ckl-chip.s-todo{background:#9aa0a6}
  .ckl-chip.s-doing{background:#e8a13a}
  .ckl-chip.s-done{background:#3fae5a}
  .ckl-note{width:150px;border:1px solid var(--border,#ddd);border-radius:4px;padding:2px 5px;font-size:11px;background:transparent;color:inherit}

  /* ---- live report preview (read-only, document-like) ---- */
  .pv-wrap{height:100%;overflow:auto;background:#e9ebef;padding:0 0 60px}
  /* In preview, make .pv-wrap the real scroll container (fill the editor pane,
     kill its padding) so the sticky top bar actually freezes instead of scrolling
     away with #editor (whose auto-height inner box broke the sticky context). */
  #editor.pv-mode{overflow:hidden;padding:0}
  #editor.pv-mode>#editor-inner{max-width:none;margin:0;height:100%}
  .pv-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  .pv-bar .pv-bar-t{font-weight:600;color:var(--muted);font-size:13px}
  .pv-bar .spacer{margin-left:auto}
  .pv-hint{color:var(--muted);font-size:12px}
  .pv-doc{max-width:830px;margin:22px auto;background:#fff;color:#111;
    box-shadow:0 1px 4px rgba(0,0,0,.18);padding:54px 64px 70px;
    font-family:"Times New Roman","SimSun",serif;font-size:15px;line-height:1.6}
  .pv-title{text-align:center;border-bottom:2px solid #111;padding-bottom:26px;margin-bottom:30px}
  .pv-title-main{font-size:26px;font-weight:700;letter-spacing:.01em;margin:14px 0 18px}
  .pv-title-meta{display:inline-block;text-align:left;color:#333;font-size:14px;line-height:1.9}
  .pv-ml-k{color:#666}
  .pv-h{font-weight:700;line-height:1.35;margin:1.3em 0 .5em;scroll-margin-top:56px}
  .pv-h1{font-size:21px;border-bottom:1px solid #bbb;padding-bottom:.2em;margin-top:1.5em}
  .pv-h2{font-size:18px} .pv-h3{font-size:16px} .pv-h4{font-size:15px}
  .pv-h5,.pv-h6{font-size:14px}
  .pv-hnum{color:#111;margin-right:.15em;font-variant-numeric:tabular-nums}
  .pv-p{margin:.45em 0;text-align:justify;text-indent:2em}
  /* list items: hanging indent so wrapped lines clear the marker; per-level nesting
     is added inline via margin-left. Overrides the body first-line indent. */
  .pv-li{margin:.25em 0;padding-left:1.6em;text-indent:-1.6em;text-align:justify}
  .pv-bullet{margin:.25em 0 .25em 0;padding-left:1.5em;text-indent:-1.1em}
  .pv-bullet::before{content:"\2022\00a0\00a0"}
  .pv-fixed{color:#888;font-style:italic;background:#f6f6f6;border:1px dashed #ccc;
    border-radius:4px;padding:8px 12px;margin:.5em 0;font-size:13px}
  .pv-fig{margin:1.1em 0;text-align:center}
  .pv-img{max-width:100%;height:auto;border:1px solid #ddd}
  /* align-items:stretch equalizes cell heights per row; each cell is a flex
     column whose image box grows and bottom-aligns its picture, so unequal
     image heights still leave the (a)(b) sub-labels on one baseline. */
  .pv-imgrid{display:grid;gap:8px;justify-items:center;align-items:stretch}
  .pv-gcell{width:100%;display:flex;flex-direction:column}
  .pv-gimg{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0}
  .pv-sub{font-size:13px;color:#444;margin-top:3px;text-align:center}
  .pv-missing{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;min-width:60%;min-height:120px;color:#b00;background:#fff5f5;
    border:2px dashed #e3a0a0;border-radius:6px;padding:18px;font-size:13px}
  .pv-missing-ic{font-size:30px;filter:grayscale(1);opacity:.6}
  .pv-cap{font-size:13px;color:#333;margin-top:7px;text-align:center}
  .pv-capnum{font-weight:700}
  .pv-tblwrap{margin:1.1em 0}
  .pv-tcap{margin:0 0 6px}
  .pv-table{border-collapse:collapse;width:100%;font-size:13.5px;line-height:1.35}
  .pv-table .pv-td{border:1px solid #888;padding:4px 7px;vertical-align:top;text-align:left;overflow-wrap:anywhere}
  .pv-table tr.pv-hdr>.pv-td,.pv-table tr.pv-hdr>th{background:#eef1f4;font-weight:700;text-align:center}
  .pv-dt{font-size:12px}
  .pv-dt .pv-td{text-align:center;vertical-align:middle;padding:2px 4px}
  .pv-dt .pv-axis{font-weight:600;white-space:nowrap}
  .pv-dt .pv-num{font-variant-numeric:tabular-nums}
  .pv-spacer{padding:0 !important}
  @media print{
    #toolbar,#outline,.pv-bar{display:none !important}
    #app,#main,#editor,#editor-inner,.pv-wrap{height:auto;overflow:visible;background:#fff}
    #editor.pv-mode{overflow:visible;padding:0}
    #editor.pv-mode>#editor-inner{height:auto}
    .pv-doc{box-shadow:none;margin:0;max-width:none;padding:0}
  }

  /* ---- notes / revision-note channel (never rendered into the Word body) ---- */
  /* Notes ride inside project.json as `notes:[{by,at,status,text}]` on the report
     (meta), on any section (node) and on any block. The engine ignores them, so
     they travel over Copy text / Apply update but never reach the document. */
  .notes-panel{border:1px solid var(--line2);border-radius:6px;background:#fbfcfe;margin:8px 0}
  .notes-panel[open]{background:#fff}
  .notes-panel.has-open{border-color:var(--warn)}
  .notes-panel>summary{list-style:none;cursor:pointer;padding:6px 10px;display:flex;
    align-items:center;gap:8px;user-select:none;color:var(--muted);font-size:13px}
  .notes-panel>summary::-webkit-details-marker{display:none}
  .notes-panel>summary:hover{color:var(--ink)}
  .notes-lbl{font-weight:600}
  .notes-badge{margin-left:auto;min-width:18px;height:18px;padding:0 6px;border-radius:9px;
    background:var(--warn);color:#fff;font-size:11px;font-weight:700;display:inline-flex;
    align-items:center;justify-content:center}
  .notes-badge.zero{background:var(--line);color:var(--muted)}
  .notes-body{padding:4px 10px 10px}
  .note-row{display:flex;gap:8px;padding:7px 0;border-top:1px solid var(--line2)}
  .note-row:first-child{border-top:none}
  .note-row.done{opacity:.55}
  .note-meta{flex:0 0 auto;display:flex;flex-direction:column;gap:3px;align-items:flex-start;min-width:74px}
  .note-by{font-size:11px;font-weight:700;padding:1px 6px;border-radius:8px;white-space:nowrap}
  .note-by.user{background:var(--accent-soft);color:var(--accent)}
  .note-by.claude{background:#ede9fe;color:#6d28d9}
  .note-at{font-size:10px;color:var(--muted)}
  .note-main{flex:1 1 auto;display:flex;flex-direction:column;gap:4px}
  .note-text{width:100%;min-height:38px;resize:vertical;border:1px solid var(--line);
    border-radius:5px;padding:5px 7px;font:inherit;line-height:1.4}
  .note-text[readonly]{background:#faf9ff;border-color:#e5e0f5;color:#3b3357}
  .note-actions{display:flex;gap:6px;align-items:center}
  .note-toggle{border:1px solid var(--line);background:#fff;border-radius:5px;padding:2px 8px;
    font-size:12px;color:var(--muted)}
  .note-toggle.open{border-color:var(--warn);color:var(--warn)}
  .note-toggle.done{border-color:var(--ok);color:var(--ok)}
  .note-add{display:flex;gap:6px;margin-top:8px}
  .note-add textarea{flex:1 1 auto;min-height:34px;resize:vertical;border:1px solid var(--line);
    border-radius:5px;padding:5px 7px;font:inherit}
  /* toolbar Notes button open-count badge */
  #btn-notes .nb-count{min-width:16px;height:16px;padding:0 5px;border-radius:8px;
    background:var(--warn);color:#fff;font-size:11px;font-weight:700;display:none;
    align-items:center;justify-content:center}
  #btn-notes.has-open .nb-count{display:inline-flex}
  /* notes overview overlay */
  .notes-ov{max-height:64vh;overflow:auto;margin:8px 0}
  .notes-ov-item{border:1px solid var(--line2);border-radius:6px;padding:8px 10px;margin-bottom:8px;cursor:pointer}
  .notes-ov-item:hover{border-color:var(--accent);background:var(--accent-soft)}
  .notes-ov-loc{font-size:12px;color:var(--muted);margin-bottom:3px}
  .notes-ov-note{display:flex;gap:8px;align-items:flex-start;padding:3px 0}
  .notes-ov-empty{color:var(--muted);padding:12px;text-align:center}
</style>
</style>

<body>
<div id="app">
  <div id="toolbar">
    <button class="tb-btn" id="btn-home" data-ui="toolbar.home">Home</button>
    <span class="tb-title" id="app-home" title="Home">Document Builder</span>
    <span class="tb-sep"></span>
    <button class="tb-btn" id="btn-open"   data-ui="toolbar.open">Open</button>
    <button class="tb-btn" id="btn-new"    data-ui="toolbar.new">New</button>
    <button class="tb-btn primary" id="btn-save" data-ui="toolbar.save">Save</button>
    <button class="tb-btn" id="btn-undo" data-ui="toolbar.undo" title="Undo (Ctrl+Z)">↶ Undo</button>
    <button class="tb-btn" id="btn-redo" data-ui="toolbar.redo" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">↷ Redo</button>
    <span class="tb-sep"></span>
    <button class="tb-btn" id="btn-docx" data-ui="toolbar.export_docx">Export Word</button>
    <button class="tb-btn" id="btn-pdf"  data-ui="toolbar.export_pdf">Export PDF</button>
    <span class="tb-sep"></span>
    <button class="tb-btn" id="btn-preview" data-ui="toolbar.preview" title="Preview the report in the browser (no file, no Word needed)">Preview</button>
    <button class="tb-btn" id="btn-checklist" data-ui="toolbar.checklist">Checklist</button>
    <button class="tb-btn" id="btn-notes" data-ui="toolbar.notes" title="All notes / revision remarks in this report (yours and Claude's) — never printed into the Word body"><span>📝 Notes</span><span class="nb-count" id="notes-count">0</span></button>
    <button class="tb-btn" id="btn-copytext" data-ui="toolbar.copytext" title="Copy the whole report as text to paste back over a text-only channel">Copy text</button>
    <button class="tb-btn" id="btn-copydiff" data-ui="toolbar.copydiff" title="Copy ONLY what changed since the last sync — a small patch to paste back, instead of the whole report">Copy diff</button>
    <div id="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">—</span>
    </div>
  </div>

  <div id="main">
    <div id="outline">
      <div class="tree-head" id="outline-head">Outline</div>
      <div id="tree"></div>
    </div>
    <div id="editor">
      <div id="editor-inner">
        <div class="empty" id="welcome">Open or create a project to begin.</div>
      </div>
    </div>
  </div>
</div>

<div id="ctx"></div>
<div id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   Structured Document Builder — frontend
   Talks to the local server only. Schema + endpoints per CONTRACT.md.
============================================================================ */

const App = {
  config: null,          // { template, skeleton, ui_strings, cover, compliance }
  ui: {},                // ui_strings (id -> label)
  project: null,         // project.json (schema v1)
  dir: null,             // current project folder (server-side path)
  selId: "__cover__",    // selected outline node id, or special cover id
  view: "home",          // "home" | "editor" | "template"
  templates: [],         // cached GET /api/templates result
  projects: [],          // cached GET /api/projects result
  tplView: null,         // {id,name,config,skeleton,sel,dirty,settingsOpen} when view==="template"
  dirty: false,
  saving: false,
  autosaveTimer: null,
  tplAutosaveTimer: null,   // debounce timer for template autosave
  tplSaving: false,        // re-entrancy guard for template saves
  // template id is not hardcoded here; it is taken from ?template= (if supplied) or
  // resolved from the server's /api/config response (config.template).
  template: new URLSearchParams(location.search).get("template") || null,
};
const COVER_ID = "__cover__";
// Twisty glyphs for the template skeleton tree. Kept ASCII in source (no new
// non-ASCII bytes); the project outline uses its own inline glyphs unchanged.
const TW_OPEN = "v", TW_CLOSED = ">", TW_LEAF = "-";

/* ---- tiny helpers --------------------------------------------------------- */
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, kids=[]) => {
  const n = document.createElement(tag);
  for (const k in props){
    if (k === "class") n.className = props[k];
    else if (k === "html") n.innerHTML = props[k];
    else if (k === "text") n.textContent = props[k];
    else if (k.startsWith("on") && typeof props[k] === "function")
      n.addEventListener(k.slice(2), props[k]);
    else if (k === "style" && typeof props[k] === "object") Object.assign(n.style, props[k]);
    else if (props[k] !== null && props[k] !== undefined) n.setAttribute(k, props[k]);
  }
  (Array.isArray(kids)?kids:[kids]).forEach(c=>{
    if (c==null) return;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return n;
};
const T = (key, fallback) => (App.ui && App.ui[key] != null) ? App.ui[key] : (fallback ?? key);
const uid = () => "n-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,7);
const debounce = (fn, ms) => { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };

function toast(msg, isErr=false){
  const t = $("#toast"); t.textContent = msg; t.className = isErr ? "show err":"show";
  clearTimeout(toast._t); toast._t = setTimeout(()=>{ t.className=""; }, 2600);
}

/* ---- HTTP ----------------------------------------------------------------- */
async function api(method, path, {query, json, raw, rawType}={}){
  let url = path;
  if (query){
    const qs = new URLSearchParams(query).toString();
    if (qs) url += (path.includes("?")?"&":"?") + qs;
  }
  const opt = { method, headers:{} };
  if (json !== undefined){ opt.headers["Content-Type"]="application/json"; opt.body = JSON.stringify(json); }
  else if (raw !== undefined){ opt.headers["Content-Type"]=rawType||"application/octet-stream"; opt.body = raw; }
  const res = await fetch(url, opt);
  const ct = res.headers.get("content-type")||"";
  const payload = ct.includes("application/json") ? await res.json().catch(()=>({})) : await res.text();
  if (!res.ok){
    const m = (payload && payload.error) ? payload.error : ("HTTP "+res.status);
    const err = new Error(m); err.status = res.status; err.payload = payload;
    throw err;
  }
  return payload;
}

/* ---- status indicator ----------------------------------------------------- */
function setStatus(state, text){
  const dot = $("#status-dot");
  dot.className = "dot " + (state||"");
  $("#status-text").textContent = text || "";
}
function markDirty(){
  if (!App.project) return;
  App.dirty = true;
  setStatus("dirty", T("status.unsaved","Unsaved changes"));
  scheduleAutosave();
  pjScheduleSnapshot();
}

/* ============================================================================
   PROJECT-LEVEL UNDO / REDO
   Coarse, whole-project snapshots (JSON of App.project) coalesced by an idle
   timer, so a burst of edits collapses into one undo step. Native Ctrl+Z still
   handles character-level undo while a text field / cell is focused; this kicks
   in for structural changes (blocks, sections, tables, moves, ...).
============================================================================ */
const PJ_UNDO_CAP = 60, PJ_IDLE_MS = 500;
function pjSnapshot(){ return App.project ? JSON.stringify(App.project) : null; }
function pjResetUndo(){
  App._undo = []; App._redo = [];
  App._lastSnap = pjSnapshot();
  if (App._undoT){ clearTimeout(App._undoT); App._undoT = null; }
  updateUndoButtons();
}
function pjScheduleSnapshot(){
  if (App._restoring || !App.project) return;
  if (App._lastSnap == null) App._lastSnap = pjSnapshot();
  if (App._undoT) clearTimeout(App._undoT);
  App._undoT = setTimeout(pjCommitSnapshot, PJ_IDLE_MS);
}
function pjCommitSnapshot(){
  App._undoT = null;
  const cur = pjSnapshot();
  if (cur == null || cur === App._lastSnap) return;
  App._undo = App._undo || []; App._undo.push(App._lastSnap);
  if (App._undo.length > PJ_UNDO_CAP) App._undo.shift();
  App._redo = [];
  App._lastSnap = cur;
  updateUndoButtons();
}
function pjCommitNow(){ if (App._undoT){ clearTimeout(App._undoT); App._undoT = null; } pjCommitSnapshot(); }
function pjRestore(json){
  App._restoring = true;
  try{
    App.project = JSON.parse(json);
    if (App.selId !== COVER_ID && !findNode(App.selId)) App.selId = COVER_ID;   // selection may be gone
    App._lastSnap = json;
    App.dirty = true;
    render();
  } finally { App._restoring = false; }
  saveProject(true);
  updateUndoButtons();
}
function projectUndo(){
  if (!App.project) return;
  flushActiveGrid(); pjCommitNow();                     // fold the in-flight burst into history
  if (!App._undo || !App._undo.length){ toast(T("toast.nothing_undo","Nothing to undo")); return; }
  App._redo = App._redo || []; App._redo.push(pjSnapshot());
  pjRestore(App._undo.pop());
}
function projectRedo(){
  if (!App.project) return;
  flushActiveGrid();
  if (App._undoT){ clearTimeout(App._undoT); App._undoT = null; }
  if (!App._redo || !App._redo.length){ toast(T("toast.nothing_redo","Nothing to redo")); return; }
  App._undo = App._undo || []; App._undo.push(pjSnapshot());
  pjRestore(App._redo.pop());
}
function updateUndoButtons(){
  const u = $("#btn-undo"), r = $("#btn-redo");
  if (u) u.disabled = !(App.project && App._undo && App._undo.length);
  if (r) r.disabled = !(App.project && App._redo && App._redo.length);
}
function isTextEditing(el){
  if (!el) return false;
  const tag = (el.tagName || "").toLowerCase();
  return tag==="input" || tag==="textarea" || el.isContentEditable===true;
}
function scheduleAutosave(){
  clearTimeout(App.autosaveTimer);
  App.autosaveTimer = setTimeout(()=>saveProject(true), 1500);
}

/* ============================================================================
   BOOTSTRAP
============================================================================ */
async function boot(){
  try{
    const q = App.template ? {template:App.template} : undefined;
    App.config = await api("GET","/api/config",{query:q});
    // resolve the active template id from the server response (never hardcoded here)
    App.template = App.config.template || App.template || "";
    App.ui = App.config.ui_strings || {};
    applyUiStrings();
  }catch(e){
    setStatus("err","config error");
    toast("Failed to load config: "+e.message, true);
    return;
  }
  setStatus("", T("status.no_project","No project open"));
  wireToolbar();
  wireGlobal();
  // Route: ?dir= opens directly into the editor; otherwise render the home view.
  const qd = new URLSearchParams(location.search).get("dir");
  if (qd){
    App.view = "editor";
    await openProject(qd);
    // openProject swallows its own errors; if nothing loaded, fall back to home.
    if (!App.project){ App.view="home"; render(); await refreshHome(); }
  } else {
    App.view = "home";
    render();
    await refreshHome();
  }
}

function applyUiStrings(){
  document.querySelectorAll("[data-ui]").forEach(n=>{
    const k = n.getAttribute("data-ui");
    if (App.ui[k] != null) n.textContent = App.ui[k];
  });
  $("#outline-head").textContent = T("outline.title","Outline");
  $("#welcome").textContent = T("status.welcome","Open or create a project to begin.");
  $("#app-home").textContent = T("app.title","Document Builder");
  $("#app-home").title = T("toolbar.home","Home");
  document.title = T("app.title","Document Builder");
}

/* ============================================================================
   PROJECT LIFECYCLE
============================================================================ */
function blankMetaFromConfig(){
  const cov = App.config.cover || {};
  const meta = { title:"", doc_no:"", version:"V1.0", secrecy: cov.secrecy_default || "",
                 author:"", date: new Date().toISOString().slice(0,10),
                 reviewers:[], approver:"", revisions:[] };
  (cov.fields||[]).forEach(f=>{
    if (f.default != null && (meta[f.key] === "" || meta[f.key] == null)) meta[f.key] = f.default;
  });
  meta.revisions = [{ ver: meta.version||"V1.0", date:"", author:"", note:"" }];
  return meta;
}
// Build an outline array from the template skeleton (assign ids, empty blocks).
function instantiateSkeleton(skel){
  return (skel||[]).map(node=>{
    const n = { id: uid(), title: node.title||"", origin:"template", blocks:[], children: instantiateSkeleton(node.children) };
    if (node.fixed_body) n.fixed_body = node.fixed_body;
    if (node.datatable){
      // seed a data-driven chapter with one empty datatable block
      n.blocks.push(newBlock("datatable"));
    }
    return n;
  });
}
function newProjectObject(){
  return { schema_version:1, template:App.template, meta: blankMetaFromConfig(),
           outline: instantiateSkeleton(App.config.skeleton) };
}

// Probe whether a project.json already lives at `dir` (best-effort: any error
// — bad path, server hiccup — resolves to false so creation still surfaces the
// real failure on the actual write).
async function projectExistsAt(dir){
  try{
    const probe = await api("GET","/api/project",{query:{dir}});
    return !!(probe && probe.meta_info && probe.meta_info.exists);
  }catch(_){ return false; }
}

async function newProject(){
  modalPrompt(T("dialog.new.title","New project"),
    T("dialog.new.msg","Enter the project folder path (absolute or under reports root)."),
    App.dir||"", async (dir)=>{
      if (!dir) return; dir=dir.trim(); if(!dir) return;
      const make = async ()=>{
        App.project = newProjectObject();
        App.dir = dir;
        App.selId = COVER_ID;
        App._savedAt = null;                      // brand-new file: first save has no baseline
        pjResetUndo();
        App.view = "editor";
        render();
        await saveProject(false);
        toast(T("toast.created","Project created"));
      };
      if (await projectExistsAt(dir)){
        modalConfirm(T("dialog.overwrite.title","Folder already has a project"),
          T("dialog.overwrite.msg","A project already exists in this folder. Creating a new one overwrites it and cannot be undone."),
          make);
      } else { make(); }
  });
}

// Imported / freshly-instantiated projects arrive without per-node ids (server
// seeds carry only {title,level,blocks,children}). The editor keys selection,
// numbering and drag on node.id, so backfill any missing id and guarantee
// blocks/children are arrays before the tree is rendered. Without this, every
// node shares id===undefined: selection cannot disambiguate and nodePath()
// collapses to the last sibling (the "12" instead of "1" symptom).
function ensureProjectIds(nodes){
  (nodes||[]).forEach(n=>{
    if (!n.id) n.id = uid();
    if (!Array.isArray(n.blocks)) n.blocks = [];
    // Backfill a stable id on any media block missing one (older projects /
    // imported seeds). Cross-references and the engine's caption bookmark
    // (bm_<id>_num) both key off this id, so it must exist before render.
    n.blocks.forEach(b=>{ if (isMediaBlock(b) && !b.id) b.id = uid(); });
    if (!Array.isArray(n.children)) n.children = [];
    ensureProjectIds(n.children);
  });
  return nodes;
}

async function openProject(dir){
  if (dir == null){
    return modalPrompt(T("dialog.open.title","Open project"),
      T("dialog.open.msg","Enter the project folder path."),
      App.dir||"", (d)=>{ if (d) openProject(d.trim()); });
  }
  setStatus("saving", T("status.loading","Loading…"));
  try{
    const r = await api("GET","/api/project",{query:{dir}});
    if (!r.project || r.project.schema_version !== 1)
      throw new Error("Unsupported or missing project (schema_version must be 1)");
    App.project = r.project;
    App.project.outline = App.project.outline || [];
    ensureProjectIds(App.project.outline);
    // Load THIS project's own template config (axis_labels, fills, ui strings) so the
    // editor matches the report's template rather than the server's global --config.
    // boot() fetched the global config before any project was known; without this a
    // project bound to a template with different axis_labels (e.g. no NTWC) would
    // render the wrong compliance columns.
    const ptpl = App.project.template;
    if (ptpl && ptpl !== App.template){
      try{
        const cfg = await api("GET","/api/config",{query:{template:ptpl}});
        if (cfg && cfg.compliance){ App.config = cfg; App.template = cfg.template || ptpl;
          App.ui = cfg.ui_strings || App.ui; applyUiStrings(); }
      }catch(e){ /* keep the global config if the per-template slice is unavailable */ }
    }
    App.dir = dir; App.selId = COVER_ID; App.dirty=false;
    App._savedAt = (r.meta_info && r.meta_info.mtime != null) ? r.meta_info.mtime : null;  // A4 baseline
    App._treeFilter = "";                       // don't carry a filter across projects
    { const sb = document.querySelector(".tree-search"); if (sb) sb.value = ""; }
    pjResetUndo();
    App.view = "editor";
    render();
    setStatus("saved", T("status.opened","Project opened"));
  }catch(e){
    setStatus("err","open failed"); toast("Open failed: "+e.message, true);
  }
}

// Deep-clone `v` dropping every object key that starts with "_" (editor-local
// UI state like node._collapsed). Used before persisting / Copy-text so internal
// keys never ride along in project.json or the pasted payload (and the payload
// stays a touch smaller). App.project itself is left untouched.
function stripInternal(v){
  if (Array.isArray(v)) return v.map(stripInternal);
  if (v && typeof v === "object"){
    const out = {};
    for (const k in v){ if (k.charAt(0) !== "_") out[k] = stripInternal(v[k]); }
    return out;
  }
  return v;
}

async function saveProject(isAuto){
  if (!App.project || !App.dir) return;
  if (App.saving){ scheduleAutosave(); return; }
  App.saving = true;
  setStatus("saving", T("status.saving","Saving…"));
  try{
    const q = {dir:App.dir};
    if (App._savedAt != null) q.saved_at = App._savedAt;   // A4 optimistic concurrency
    const r = await api("PUT","/api/project",{query:q, json:stripInternal(App.project)});
    App.dirty=false;
    if (r.saved_at != null) App._savedAt = r.saved_at;     // track the mtime we now own
    App._saveRetry = 0; clearTimeout(App._saveRetryT);     // clear any backoff
    setStatus("saved", (App.ui["status.autosaved"]||"Autosaved") + (r.saved_at?(" · "+fmtTime(r.saved_at)):""));
  }catch(e){
    if (e.status === 409){
      // A4: project.json changed on disk (another tab, or an applied update).
      // Do NOT clobber -- let the user reload the latest or overwrite explicitly.
      setStatus("err", T("status.conflict","Save conflict — file changed on disk"));
      onSaveConflict(e.payload && e.payload.saved_at);
      return;   // finally still clears App.saving
    }
    // A3/D7: keep the edits dirty and retry with exponential backoff so a
    // transient failure (server restarting after a git pull, a brief hiccup)
    // never silently loses work behind an 8px red dot. beforeunload still warns.
    App._saveRetry = Math.min((App._saveRetry||0) + 1, 6);
    const delay = Math.min(1000 * Math.pow(2, App._saveRetry - 1), 30000);
    setStatus("err", T("status.save_failed_retry","Unsaved — save failed, retrying…"));
    toast(T("toast.save_failed_retry","Save failed: {e} — retrying in {s}s (your edits are kept)")
      .replace("{e}", e.message).replace("{s}", Math.round(delay/1000)), true);
    clearTimeout(App._saveRetryT);
    App._saveRetryT = setTimeout(()=>saveProject(true), delay);
  }finally{
    App.saving=false;
  }
}
function fmtTime(s){ try{ return new Date(s).toLocaleTimeString(); }catch(_){ return s; } }

// A4 conflict resolver: project.json changed on disk since we opened it. Offer to
// reload the latest (discarding local unsaved edits) or overwrite with our copy
// (which re-PUTs with the current on-disk mtime so it goes through).
function onSaveConflict(diskMtime){
  if (App._conflictOpen) return; App._conflictOpen = true;
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("dialog.conflict.title","This report changed on disk")}));
  m.appendChild(el("p",{text:T("dialog.conflict.msg",
    "project.json was written by another tab or an applied update after you opened it here. Reload the latest (losing your unsaved edits here), or overwrite it with your version?")}));
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("dialog.conflict.reload","Reload latest"),
      onclick:()=>{ App._conflictOpen=false; closeOverlay(); openProject(App.dir); }}),
    el("button",{class:"tb-btn primary", style:{background:"var(--danger)",borderColor:"var(--danger)"},
      text:T("dialog.conflict.overwrite","Overwrite with mine"),
      onclick:async ()=>{ App._conflictOpen=false; closeOverlay();
        App._savedAt = (diskMtime!=null ? diskMtime : null); await saveProject(false); }}),
  ]));
  showOverlay();
}

async function exportProject(fmt){
  if (!App.project || !App.dir){ toast(T("toast.need_project","Open a project first"), true); return; }
  await saveProject(false);
  // If the save hit a disk conflict (409), saveProject opened the conflict modal
  // and did NOT persist; exporting now would render the STALE on-disk project and
  // drop the user's unsaved edits — so bail and let them resolve the conflict.
  if (App._conflictOpen){ return; }
  setStatus("saving", T("status.exporting","Exporting…"));
  const prog = openExportProgress(fmt);
  try{
    const r = await exportViaStream(fmt, prog);
    prog.finish(); prog.close();
    setStatus("saved", T("status.exported","Export ready"));
    toast((fmt==="pdf"?T("toast.pdf_ready","PDF ready: "):T("toast.docx_ready","Word ready: ")) + (r.out||r.abs||""));
    showExportReport(r);
  }catch(e){
    prog.close();
    setStatus("err","export failed"); toast("Export failed: "+e.message, true);
  }
}

// Stream the export and drive `prog`; return the result manifest. Falls back to
// the plain /api/export (no live progress) if streaming is unavailable, so an
// export never fails just because of the progress channel.
async function exportViaStream(fmt, prog){
  let res;
  try{
    res = await fetch("/api/export-stream?"+new URLSearchParams({dir:App.dir, fmt}), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({save_first:true})
    });
  }catch(_){ prog.busy(); return exportPlain(fmt); }
  if (!res.ok || !res.body || !res.body.getReader){ prog.busy(); return exportPlain(fmt); }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf="", result=null, errMsg=null, sawAny=false;
  for(;;){
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    let nl;
    while ((nl = buf.indexOf("\n")) >= 0){
      const line = buf.slice(0, nl).trim(); buf = buf.slice(nl+1);
      if (!line) continue;
      let msg; try{ msg = JSON.parse(line); }catch(_){ continue; }
      sawAny = true;
      if (msg.type==="progress") prog.update(msg.done, msg.total, msg.label);
      else if (msg.type==="phase") prog.phase(msg.label);
      else if (msg.type==="done") result = msg.result;
      else if (msg.type==="error") errMsg = msg.error;
    }
  }
  if (errMsg) throw new Error(errMsg);
  if (result) return result;
  if (!sawAny){ prog.busy(); return exportPlain(fmt); }   // empty stream -> fall back
  throw new Error("export stream ended without a result");
}
function exportPlain(fmt){
  return api("POST","/api/export",{query:{dir:App.dir, fmt}, json:{save_first:true}});
}

// A modal progress bar for the (potentially slow) export. Determinate while the
// engine renders block-by-block; indeterminate for the opaque Word->PDF step.
function openExportProgress(fmt){
  const m = $("#modal"); m.innerHTML = "";
  m.appendChild(el("h3",{text: fmt==="pdf"
    ? T("export.prog.title_pdf","Exporting PDF…") : T("export.prog.title_docx","Exporting Word…")}));
  const phaseLine = el("div",{class:"muted", style:{fontSize:"13px",marginBottom:"8px"},
    text:T("export.prog.starting","Starting…")});
  const track = el("div",{class:"prog-track"});
  const bar = el("div",{class:"prog-bar"});
  track.appendChild(bar);
  const pct = el("div",{class:"muted", style:{fontSize:"12px",marginTop:"6px",textAlign:"right"}, text:""});
  m.appendChild(phaseLine); m.appendChild(track); m.appendChild(pct);
  showOverlay();
  const PHASES = {
    preparing:  T("export.phase.preparing","Preparing…"),
    rendering:  T("export.phase.rendering","Rendering content…"),
    converting: T("export.phase.converting","Converting to PDF (Word)…"),
  };
  let indeterminate = false;
  const setInd = (on)=>{ indeterminate = on; track.classList.toggle("indeterminate", on); if(on) pct.textContent=""; };
  return {
    phase(label){
      phaseLine.textContent = PHASES[label] || label;
      setInd(label==="converting");            // the Word COM step is one opaque unit
    },
    update(done,total,label){
      if (indeterminate) return;
      const p = total>0 ? Math.round(100*done/total) : 0;
      bar.style.width = p+"%";
      pct.textContent = p+"%" + (label ? ("  ·  "+label) : "");
    },
    busy(label){ phaseLine.textContent = label || T("export.phase.working","Working…"); setInd(true); },
    finish(){ setInd(false); bar.style.width="100%"; },
    close(){ closeOverlay(); },
  };
}

// Export ONE table/datatable block to a .xlsx that visually mirrors the Word
// table (server builds it from this block + the template config). The live
// in-memory block is sent, so unsaved edits are included.
async function exportBlockXlsx(block){
  if (!App.dir){ toast(T("toast.need_project","Open a project first"), true); return; }
  flushActiveGrid();   // commit any in-flight grid cell so the export is current
  try{
    const r = await api("POST","/api/export-xlsx",{json:{dir:App.dir, block:stripInternal(block)}});
    downloadB64(r.xlsx_b64, r.filename,
      "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    toast(T("toast.xlsx_ready","Excel ready: ")+(r.filename||""));
  }catch(e){ toast(T("toast.xlsx_failed","Excel export failed: ")+e.message, true); }
}
// Turn a base64 payload into a browser download (Save As), no server file needed.
function downloadB64(b64, filename, mime){
  const bytes = Uint8Array.from(atob(b64||""), c=>c.charCodeAt(0));
  const url = URL.createObjectURL(new Blob([bytes], {type:mime||"application/octet-stream"}));
  const a = el("a",{href:url, download:filename||"download"});
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ if(a.parentNode) a.parentNode.removeChild(a); URL.revokeObjectURL(url); }, 0);
}

// Build human-readable lines from the export render manifest (warnings + stats).
// The engine returns warning dicts {type, detail, location?} plus a stats dict
// (total_blocks, missing_images, blocks_with_errors, row_clip_risks, ...). We
// roll the warnings up by type into a short "N images missing, M ..." summary
// and keep a full per-warning list for the detail panel.
function exportWarningSummary(stats, warnings){
  stats = stats || {}; warnings = warnings || [];
  const counts = {};
  warnings.forEach(w=>{ const t=w&&w.type||"warning"; counts[t]=(counts[t]||0)+1; });
  const flagged = warnings.reduce((n,w)=> n + (w&&w.type==="spec_out_of_range"?1:0), 0);
  // Prefer explicit stats counters where the engine provides them; fall back to
  // the per-warning tally so a new warning type still shows up.
  const get = (k)=> (stats[k]!=null ? stats[k] : (counts[k]||0));
  const parts = [];
  const missing = get("missing_images");
  if (missing) parts.push(fmtCount(missing, T("export.w_missing_one","{n} image missing"),
                                            T("export.w_missing_many","{n} images missing")));
  const clips = get("row_clip_risks");
  if (clips) parts.push(fmtCount(clips, T("export.w_clip_one","{n} clip risk"),
                                        T("export.w_clip_many","{n} clip risks")));
  const errs = get("blocks_with_errors");
  if (errs) parts.push(fmtCount(errs, T("export.w_error_one","{n} block error"),
                                       T("export.w_error_many","{n} block errors")));
  const nocap = get("blocks_without_captions");
  if (nocap) parts.push(fmtCount(nocap, T("export.w_nocap_one","{n} item without a caption"),
                                         T("export.w_nocap_many","{n} items without a caption")));
  const dangling = get("dangling_refs");
  if (dangling) parts.push(fmtCount(dangling, T("export.w_ref_one","{n} broken reference"),
                                              T("export.w_ref_many","{n} broken references")));
  const logos = get("missing_logos");
  if (logos) parts.push(fmtCount(logos, T("export.w_logo_one","{n} logo missing"),
                                        T("export.w_logo_many","{n} logos missing")));
  if (flagged) parts.push(fmtCount(flagged, T("export.w_oos_one","{n} value out of spec"),
                                            T("export.w_oos_many","{n} values out of spec")));
  return parts;
}
function fmtCount(n, one, many){ return (n===1?one:many).replace("{n}", String(n)); }

// Resolve a warning's location to a section id so the export panel can jump to it.
// content_lint locations read `section "<title>" / ...`; match the first section
// with that title (returns null when there's nothing to jump to).
function warningJumpTarget(loc){
  if (!loc || !App.project) return null;
  const m = /section "([^"]*)"/.exec(loc);
  if (!m) return null;
  let hit = null;
  walk(App.project.outline, (n)=>{ if (!hit && (n.title||"") === m[1]) hit = n; });
  return hit ? hit.id : null;
}

// After a successful export, show the render manifest. No warnings -> a quiet
// toast only (already fired by exportProject). With warnings -> a small panel
// listing the rolled-up summary and every individual warning so the user knows
// what to fix before sharing the document.
function showExportReport(r){
  if (!r || typeof r !== "object") return;
  const warnings = Array.isArray(r.warnings) ? r.warnings : [];
  const stats = r.stats || {};
  const summary = exportWarningSummary(stats, warnings);
  if (!summary.length && !warnings.length) return;  // clean export: stay quiet

  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("export.report_title","Export finished with warnings")}));
  const out = r.out || r.abs || "";
  if (out) m.appendChild(el("p",{text:(r.fmt==="pdf"?T("toast.pdf_ready","PDF ready: ")
                                                    :T("toast.docx_ready","Word ready: ")) + out}));
  if (summary.length){
    m.appendChild(el("div",{class:"export-summary", text: summary.join(", ")}));
  }
  if (warnings.length){
    const RANK = {error:0, warn:1, info:2};
    const COLOR = {error:"var(--danger)", warn:"var(--warn)", info:"var(--muted)"};
    const LABEL = {error:"ERROR", warn:"WARN", info:"INFO"};
    const sorted = warnings.slice().sort((a,b)=>
      (RANK[(a&&a.level)||"warn"]??1) - (RANK[(b&&b.level)||"warn"]??1));
    const counts = {error:0, warn:0, info:0};
    sorted.forEach(w=>{ const lv=(w&&w.level)||"warn"; counts[lv]=(counts[lv]||0)+1; });
    // level summary line (error-first) so the user sees severity at a glance
    const lvParts=[];
    if (counts.error) lvParts.push(counts.error+" error"+(counts.error>1?"s":""));
    if (counts.warn)  lvParts.push(counts.warn+" warning"+(counts.warn>1?"s":""));
    if (counts.info)  lvParts.push(counts.info+" info");
    if (lvParts.length) m.appendChild(el("div",{class:"export-levels",
      style:{fontWeight:"600", margin:"6px 0"}, text: lvParts.join("  ·  ")}));

    const list = el("div",{class:"export-warn-list"});
    // info findings are hidden by default (legitimate-but-noteworthy); a toggle
    // reveals them. If there are ONLY info findings, show them straight away.
    const onlyInfo = (counts.error + counts.warn === 0);
    const renderList = (showInfo)=>{
      list.innerHTML = "";
      sorted.forEach(w=>{
        const lv = (w&&w.level)||"warn";
        if (lv==="info" && !showInfo && !onlyInfo) return;
        const type = (w&&w.type)||"warning";
        const detail = (w&&w.detail!=null)?String(w.detail):"";
        const loc = (w&&w.location)?(" — "+w.location):"";
        const targetId = warningJumpTarget(w && w.location);
        list.appendChild(el("div",{class:"export-warn-row"+(targetId?" jumpable":""),
          title: targetId ? T("export.jump_hint","Click to open this section") : null,
          onclick: targetId ? (()=>{ closeOverlay(); App.view="editor"; App.selId=targetId; render(); }) : null},[
          el("span",{class:"export-warn-type", style:{color:COLOR[lv]||"var(--muted)", fontWeight:"600"},
            text:(LABEL[lv]||"WARN")+"  "+type}),
          el("span",{class:"export-warn-detail", text:detail+loc}),
        ]));
      });
    };
    renderList(false);
    m.appendChild(list);
    if (counts.info && !onlyInfo){
      const tog = el("button",{class:"sm-btn", style:{marginTop:"6px"},
        text:T("export.show_info","Show {n} info").replace("{n}", counts.info)});
      let shown = false;
      tog.onclick = ()=>{ shown = !shown; renderList(shown);
        tog.textContent = shown ? T("export.hide_info","Hide info")
                                 : T("export.show_info","Show {n} info").replace("{n}", counts.info); };
      m.appendChild(tog);
    }
  }
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn primary", text:T("action.close","Close"), onclick:closeOverlay}),
  ]));
  showOverlay();
}
