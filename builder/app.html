    document.createTextNode(block.caption || ""),
  ]));

  // spec group first, then one group per simulation (matches make_groups)
  const groups = [];
  if (data.show_spec !== false)   // data.show_spec===false hides the Spec group (mirrors make_groups)
    groups.push({ key:"spec", title: data.spec_name || "Spec", role:"spec", stage:null, axes: axesDefault.slice() });
  (data.sims || []).forEach(s => groups.push({
    key: s.key, title: s.title || s.key, role:"sim", stage: s.stage || null, axes:(s.axes || axesDefault).slice() }));
  const showSpec = (data.show_spec !== false) && !groups.some(g => g.role === "spec");
  const firstSim = groups.find(g => g.role === "sim");      // sim_span merges this group's first 3 axes
  const plan = dtPlan(groups, showSpec, w);

  // one cell builder for header + data: fill, bold, color, span are all explicit
  const cell = (tag, o)=>{
    const c = el(tag,{class: "pv-td" + (o.cls ? " "+o.cls : "")});
    if (o.colspan) c.setAttribute("colspan", String(o.colspan));
    if (o.rowspan) c.setAttribute("rowspan", String(o.rowspan));
    if (o.fill)  c.style.background = o.fill;
    if (o.bold)  c.style.fontWeight = "700";
    if (o.color) c.style.color = o.color;
    c.textContent = (o.text != null) ? o.text : "";
    return c;
  };

  const tbl = el("table",{class:"pv-table pv-dt"});
  const tot = plan.reduce((a,p)=>a + (Number(p.w)||0), 0) || 1;
  const cg = el("colgroup");
  plan.forEach(p => cg.appendChild(el("col",{style:{width:(100*(Number(p.w)||0)/tot)+"%"}})));
  tbl.appendChild(cg);

  // ---- header band: 3 rows, all shaded fills.header ----
  const r0 = el("tr",{class:"pv-hdr"});
  plan.forEach(p=>{
    if (p.kind === "cat")  r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Category"}));
    else if (p.kind === "item") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Item"}));
    else if (p.kind === "spec") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Spec"}));
    else if (p.kind === "unit") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Unit"}));
    else if (p.kind === "spacer") r0.appendChild(cell("th",{rowspan:3, fill:F.header, cls:"pv-spacer"}));
    else if (p.kind === "axis" && p.axis === 0)
      r0.appendChild(cell("th",{colspan:p.g.axes.length, fill:F.header, bold:true, text:p.g.title}));
  });
  tbl.appendChild(r0);

  const r1 = el("tr",{class:"pv-hdr"});           // stage row (only axis area; rest covered by rowspan)
  plan.forEach(p=>{
    if (p.kind !== "axis") return;
    if (p.g.stage){ if (p.axis === 0) r1.appendChild(cell("th",{colspan:p.g.axes.length, fill:F.header, bold:true, text:p.g.stage})); }
    else r1.appendChild(cell("th",{fill:F.header}));
  });
  tbl.appendChild(r1);

  const r2 = el("tr",{class:"pv-hdr"});           // axis labels
  plan.forEach(p=>{ if (p.kind === "axis") r2.appendChild(cell("th",{fill:F.header, bold:true, cls:"pv-axis", text:String(p.label)})); });
  tbl.appendChild(r2);

  // ---- data rows ----
  const rows = data.rows || [];
  if (!rows.length){
    wrap.appendChild(tbl);
    wrap.appendChild(el("div",{class:"pv-fixed",
      text:T("preview.empty_dt","(Compliance table has no metric rows yet.)")}));
    return wrap;
  }
  // consecutive same-category runs -> the category column vertical merge
  const catFirst = new Set(), catSpan = {};
  for (let i = 0; i < rows.length;){
    let j = i; while (j+1 < rows.length && rows[j+1].cat === rows[i].cat) j++;
    catFirst.add(i); catSpan[i] = j - i + 1; i = j + 1;
  }

  rows.forEach((row, ri)=>{
    const band  = settingKinds.has(row.kind) ? F.setting : F.result;
    const tr = el("tr",{});
    let skip = 0;   // sim_span: skip the merged-away axis cells
    plan.forEach((p)=>{
      if (p.kind === "cat"){
        if (catFirst.has(ri)) tr.appendChild(cell("td",{rowspan:catSpan[ri], fill:band, bold:true, text:row.cat||""}));
        return;   // non-first rows: covered by the rowspan above
      }
      if (skip > 0){ skip--; return; }
      if (p.kind === "item")   return void tr.appendChild(cell("td",{fill:band, text:row.item||""}));
      if (p.kind === "unit")   return void tr.appendChild(cell("td",{fill:band, text:row.unit||""}));
      if (p.kind === "spec")   return void tr.appendChild(cell("td",{fill:band, text:dtFmt(row.spec)}));
      if (p.kind === "spacer") return void tr.appendChild(cell("td",{fill:band, cls:"pv-spacer"}));
      if (p.kind === "axis"){
        // per-group sim_span: each sim group merges its OWN axes into one wide
        // cell (CDR 3->1, PDR 3->1, SEPARATELY). At a group's first axis, emit one
        // cell spanning that group's axes with its first non-null value, then skip
        // the group's remaining axes. No red flag on a spanning setting row.
        if (row.sim_span && p.role === "sim" && p.axis === 0){
          const axn = (p.g.axes || []).length;
          let gv = null;
          for (let a = 0; a < axn; a++){
            const vv = dtAxisValue(row, p.group, a);
            if (vv !== null && vv !== undefined && vv !== ""){ gv = vv; break; }
          }
          tr.appendChild(cell("td",{colspan:axn, fill:band, cls:"pv-num", text:dtFmt(gv)}));
          skip = axn - 1;
          return;
        }
        const red = (p.role === "sim" && dtFlagsFor(row, p.group).has(p.axis));
        tr.appendChild(cell("td",{fill:band, cls:"pv-num",
          text:dtFmt(dtAxisValue(row, p.group, p.axis)), color:red?flagColor:null, bold:red}));
        return;
      }
    });
    tbl.appendChild(tr);
  });

  wrap.appendChild(tbl);
  return wrap;
}

function relTime(mtime){
  if (mtime==null) return "";
  let ms = (typeof mtime==="number") ? (mtime>2e10?mtime:mtime*1000) : Date.parse(mtime);
  if (isNaN(ms)) return String(mtime);
  const s = Math.max(0,(Date.now()-ms)/1000);
  if (s<60)      return T("time.just_now","just now");
  if (s<3600)    return Math.floor(s/60)+T("time.m","m ago");
  if (s<86400)   return Math.floor(s/3600)+T("time.h","h ago");
  if (s<2592000) return Math.floor(s/86400)+T("time.d","d ago");
  try{ return new Date(ms).toLocaleDateString(); }catch(_){ return String(mtime); }
}

/* ============================================================================
   TEMPLATE EDITOR (Phase 3b)
   Left: skeleton outline tree. Right: collapsible settings form + the selected
   node's body editor. Loads GET /api/template, saves PUT /api/template. The
   loaded full config is mutated in place via setPath so unknown keys round-trip
   untouched; only the curated paths below are exposed as a form.
============================================================================ */

/* ---- load flow ------------------------------------------------------------ */
async function openTemplate(tpl){
  setStatus("saving", T("status.loading","Loading..."));
  try{
    const r = await api("GET","/api/template",{query:{id: tpl.id}});
    App.view = "template";
    App.tplView = {
      id: r.id || tpl.id,
      name: r.name || tpl.name || tpl.id,
      config: r.config || {},
      skeleton: normalizeSkeleton(r.skeleton || []),
      sel: null,
      dirty: false,
      settingsOpen: true,
    };
    if (App.tplView.skeleton.length) App.tplView.sel = App.tplView.skeleton[0]._id;
    render();
    setStatus("", T("status.template_mode","Editing template"));
  }catch(e){
    setStatus("err","load failed");
    toast(T("toast.template_load_failed","Could not load template: ")+e.message, true);
  }
}

// Stamp template-local ids and normalize node shape. Unmodeled node keys are
// stashed on _passthru so a config-derived template round-trips losslessly.
function normalizeSkeleton(nodes){
  return (nodes||[]).map(n=>{
    const node = {
      _id: uid(),
      title: n.title || "",
      fixed: !!n.fixed,
      blocks: Array.isArray(n.blocks) ? n.blocks : [],
      children: normalizeSkeleton(n.children || []),
    };
    if (n.level != null) node.level = n.level;
    const passthru = {};
    Object.keys(n).forEach(k=>{
      if (!["title","fixed","blocks","children","level"].includes(k)) passthru[k]=n[k];
    });
    if (Object.keys(passthru).length) node._passthru = passthru;
    return node;
  });
}

/* ---- template-local dirty (does NOT call the project markDirty) ----------- */
function tplMarkDirty(){
  if (!App.tplView) return;
  App.tplView.dirty = true;
  setStatus("dirty", T("status.unsaved","Unsaved changes"));
  scheduleTplAutosave();
  // do NOT re-render here: that would blur the input being typed in.
}

/* ---- path get/set on the config object ------------------------------------ */
// supports dotted segments and quoted keys: styles.headings.levels."1".size_pt
function splitPath(path){
  const out=[]; const re=/"([^"]+)"|([^.]+)/g; let m;
  while((m=re.exec(path))) out.push(m[1]!=null?m[1]:m[2]);
  return out;
}
function getPath(obj, path){
  const parts = splitPath(path);
  let cur = obj;
  for (const p of parts){
    if (cur==null || typeof cur!=="object") return undefined;
    cur = cur[p];
  }
  return cur;
}
function setPath(obj, path, val){
  const parts = splitPath(path);
  let cur = obj;
  for (let i=0;i<parts.length-1;i++){
    const p = parts[i];
    if (cur[p]==null || typeof cur[p]!=="object") cur[p] = {};
    cur = cur[p];
  }
  cur[parts[parts.length-1]] = val;
}

/* ---- field coercion adapters ---------------------------------------------- */
const cv = {
  text:  { get:v=> v==null?"":String(v),                          set:s=> s },
  num:   { get:v=> v==null||v===""?"":String(v),
           set:s=>{ const t=String(s).trim(); if(t==="") return undefined;
                    const n=Number(t); return isNaN(n)?undefined:n; } },
  // config stores 6-hex WITHOUT '#'; <input type=color> needs '#RRGGBB'
  color: { get:v=> v?("#"+String(v).replace(/^#/,"")):"#000000",
           set:s=> String(s).replace(/^#/,"").toUpperCase() },
  csv:   { get:v=> Array.isArray(v)?v.join(", "):(v==null?"":String(v)),
           set:s=> String(s).split(",").map(x=>x.trim()).filter(x=>x.length>0) },
};

// key, labelKey, fallback label, config path (@name = tplView.name), kind, input type.
// NOTE: compliance.row_h_pt is an OBJECT {header,data} in the real config, so we
// bind "row height" to compliance.row_h_pt.data to avoid clobbering header.
const TPL_FIELDS = [
  ["name",        "tpl.f.name",        "Template name",            "@name",                              "text",  "text"],
  ["flag_color",  "tpl.f.flag_color",  "Flag color (over-spec)",   "compliance.flag_color",              "color", "color"],
  ["hdr_fill",    "tpl.f.header_fill", "Compliance header fill",   "compliance.fills.header",            "color", "color"],
  ["comp_font",   "tpl.f.comp_font",   "Compliance font size pt",  "compliance.font_pt",                 "num",   "number"],
  ["comp_rowh",   "tpl.f.comp_rowh",   "Compliance row height pt", "compliance.row_h_pt.data",           "num",   "number"],
  ["axis_labels", "tpl.f.axis_labels", "Axis labels",              "compliance.axis_labels",             "csv",   "text"],
  ["cap_table",   "tpl.f.cap_table",   "Table caption prefix",     "caption_prefix.table",               "text",  "text"],
  ["cap_fig",     "tpl.f.cap_fig",     "Figure caption prefix",    "caption_prefix.image",               "text",  "text"],
  ["body_ascii",  "tpl.f.body_ascii",  "Body font (ascii)",        "styles.normal.ascii",                "text",  "text"],
  ["body_ea",     "tpl.f.body_ea",     "Body font (East Asian)",   "styles.normal.eastAsia",             "text",  "text"],
  ["body_size",   "tpl.f.body_size",   "Body size pt",             "styles.normal.size_pt",              "num",   "number"],
  ["h1_size",     "tpl.f.h1_size",     "Heading 1 size pt",        "styles.headings.levels.\"1\".size_pt","num",  "number"],
  ["h2_size",     "tpl.f.h2_size",     "Heading 2 size pt",        "styles.headings.levels.\"2\".size_pt","num",  "number"],
  ["secrecy",     "tpl.f.secrecy",     "Default secrecy",          "cover.secrecy_default",              "text",  "text"],
  ["toc_title",   "tpl.f.toc_title",   "TOC title",                "toc.title",                          "text",  "text"],
];

/* ---- top-level render ----------------------------------------------------- */
function renderTemplate(){
  renderSkeletonTree();
  renderTemplateRight();

/* ---- settings form -------------------------------------------------------- */
function buildSettingsPane(){
  const wrap = el("div",{class:"card"});
  const bar  = el("div",{class:"card-bar", style:{cursor:"pointer"},
    onclick:()=>{ App.tplView.settingsOpen=!App.tplView.settingsOpen; renderTemplateRight(); }});
  bar.appendChild(el("span",{class:"twisty", text: App.tplView.settingsOpen?TW_OPEN:TW_CLOSED}));
  bar.appendChild(el("span",{class:"card-kind", text:T("template.settings","Template settings")}));
  wrap.appendChild(bar);
  if (!App.tplView.settingsOpen) return wrap;

  const body = el("div",{class:"card-body"});
  const grid = el("div",{class:"form-grid"});
  TPL_FIELDS.forEach(f=> grid.appendChild(buildTplField(f)));
  body.appendChild(grid);
  wrap.appendChild(body);
  return wrap;
}

function buildTplField(f){
  const key=f[0], labelKey=f[1], fb=f[2], path=f[3], kind=f[4], inputType=f[5];
  const conv = cv[kind];
  const cur  = (path==="@name") ? App.tplView.name : getPath(App.tplView.config, path);
  const wrap = el("div",{class:"ffield"});
  wrap.appendChild(el("label",{text:T(labelKey, fb)}));
  const input = el("input",{class:"ti", type:inputType, value: conv.get(cur)});
  input.addEventListener("input",(e)=>{
    const v = conv.set(e.target.value);
    if (path==="@name"){ App.tplView.name = (v==null?"":v); }
    else if (v===undefined && kind==="num"){ /* leave existing; never write NaN */ }
    else setPath(App.tplView.config, path, v);
    tplMarkDirty();
  });
  wrap.appendChild(input);
  return wrap;
}

/* ---- skeleton outline tree ------------------------------------------------ */
function renderSkeletonTree(){
  $("#outline-head").textContent = T("template.skeleton","Skeleton");
  const root = $("#tree"); root.innerHTML="";
  if (!App.tplView.skeleton.length){
    root.appendChild(el("div",{class:"empty", text:T("template.skeleton_empty","No chapters. Add one below.")}));
  }
  const frag = document.createDocumentFragment();
  buildSkelNodes(App.tplView.skeleton, frag, [], 0);
  root.appendChild(frag);
  root.appendChild(el("button",{class:"sm-btn", style:{margin:"8px"},
    text:"+ "+T("template.add_chapter","Add chapter"), onclick:()=>tplAddNode(null,"root")}));
}

function buildSkelNodes(nodes, parentEl, numPath, depth){
  nodes.forEach((n,i)=>{
    const num = numPath.concat(i+1).join(".");
    const hasKids = (n.children && n.children.length);
    if (n._collapsed===undefined) n._collapsed=false;
    const row = el("div",{ class:"node-row"+(App.tplView.sel===n._id?" sel":""), draggable:"true",
      "data-id":n._id,
      onclick:(e)=>{ e.stopPropagation(); tplSelect(n._id); },
      oncontextmenu:(e)=>{ e.preventDefault(); tplSelect(n._id); openSkelCtx(e, n._id); } });
    const tw = el("span",{class:"twisty"+(hasKids?"":" leaf"),
      text: hasKids ? (n._collapsed?TW_CLOSED:TW_OPEN) : TW_LEAF,
      onclick:(e)=>{ if(hasKids){ e.stopPropagation(); n._collapsed=!n._collapsed; renderSkeletonTree(); } }});
    row.appendChild(tw);
    row.appendChild(el("span",{class:"node-num", text:num}));
    row.appendChild(el("span",{class:"node-title", text:n.title||T("node.untitled","(untitled)")}));
    row.appendChild(el("span",{class:"badge "+(n.fixed?"fixed":"user"),
      text: n.fixed?T("template.fixed","fixed"):T("template.fillable","fillable")}));
    wireSkelDrag(row, n._id);
    parentEl.appendChild(row);
    if (hasKids && !n._collapsed){
      const kids = el("div",{class:"children"});
      buildSkelNodes(n.children, kids, numPath.concat(i+1), depth+1);
      parentEl.appendChild(kids);
    }
  });
}

function tplFind(id, nodes, parent){
  nodes = nodes || App.tplView.skeleton; parent = parent || null;
  for (let i=0;i<nodes.length;i++){
    const n=nodes[i];
    if (n._id===id) return {node:n, list:nodes, idx:i, parent};
    const r=tplFind(id, n.children||[], n); if(r) return r;
  }
  return null;
}
function tplSelect(id){ App.tplView.sel=id; renderSkeletonTree(); renderTemplateRight(); }

function tplAddNode(id, where){
  const fresh = { _id:uid(), title:T("template.new_chapter","New chapter"), fixed:false, blocks:[], children:[] };
  if (where==="root"){ App.tplView.skeleton.push(fresh); }
  else {
    const r=tplFind(id); if(!r) return;
    if (where==="child"){ (r.node.children=r.node.children||[]).push(fresh); r.node._collapsed=false; }
    else r.list.splice(r.idx+1,0,fresh);
  }
  tplMarkDirty(); App.tplView.sel=fresh._id; renderSkeletonTree(); renderTemplateRight();
}
function tplRenameNode(id){
  const r=tplFind(id); if(!r) return;
  modalPrompt(T("ctx.rename","Rename"), T("dialog.rename.msg","Section title"), r.node.title||"", (v)=>{
    if (v==null) return; r.node.title=v; tplMarkDirty(); renderSkeletonTree();
    if (App.tplView.sel===id) renderTemplateRight();
  });
}
function tplMoveNode(id, dir){
  const r=tplFind(id); if(!r) return;
  const j=r.idx+dir; if(j<0||j>=r.list.length) return;
  const [m]=r.list.splice(r.idx,1); r.list.splice(j,0,m);
  tplMarkDirty(); renderSkeletonTree();
}
function tplDeleteNode(id){
  const r=tplFind(id); if(!r) return;
  modalConfirm(T("template.del.title","Delete chapter?"),
    T("template.del.msg","This removes the chapter and its children from the template skeleton."), ()=>{
      r.list.splice(r.idx,1);
      if (App.tplView.sel===id) App.tplView.sel = App.tplView.skeleton.length?App.tplView.skeleton[0]._id:null;
      tplMarkDirty(); renderSkeletonTree(); renderTemplateRight();
  });
}
function tplToggleFixed(id){
  const r=tplFind(id); if(!r) return;
  r.node.fixed = !r.node.fixed;
  if (r.node.fixed && !Array.isArray(r.node.blocks)) r.node.blocks=[];
  tplMarkDirty(); renderSkeletonTree(); renderTemplateRight();
}

/* drag-reorder (siblings only, mirrors the project outline) */
let tplDragSrc=null;
function wireSkelDrag(row, id){
  row.addEventListener("dragstart",(e)=>{ tplDragSrc=id; e.dataTransfer.effectAllowed="move"; row.style.opacity=".4"; });
  row.addEventListener("dragend",()=>{ row.style.opacity=""; tplDragSrc=null; });
  row.addEventListener("dragover",(e)=>{ if(tplDragSrc&&tplDragSrc!==id){ e.preventDefault(); row.style.boxShadow="inset 0 -2px 0 var(--accent)"; }});
  row.addEventListener("dragleave",()=>{ row.style.boxShadow=""; });
  row.addEventListener("drop",(e)=>{
    e.preventDefault(); row.style.boxShadow="";
    if (!tplDragSrc||tplDragSrc===id) return;
    const src=tplFind(tplDragSrc), dst=tplFind(id);
    if (!src||!dst||src.list!==dst.list) return;     // same-parent reorder only
    src.list.splice(src.idx,1);
    const ni=dst.list.indexOf(dst.node);
    dst.list.splice(ni+(src.idx<ni?0:1),0,src.node);
    tplMarkDirty(); renderSkeletonTree();
  });
}

/* context menu (reuses #ctx + closeCtx + the global click-to-close handler) */
function openSkelCtx(e, id){
  const r=tplFind(id); if(!r) return;
  const ctx=$("#ctx"); ctx.innerHTML="";
  const item=(label,fn,danger)=>el("button",{class:danger?"danger":"", onclick:()=>{ closeCtx(); fn(); }}, label);
  const canUp=r.idx>0, canDown=r.idx<r.list.length-1;
  ctx.appendChild(item(T("ctx.add_child","Add child"), ()=>tplAddNode(id,"child")));
  ctx.appendChild(item(T("ctx.add_sibling","Add sibling"), ()=>tplAddNode(id,"sibling")));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.rename","Rename"), ()=>tplRenameNode(id)));
  ctx.appendChild(item(r.node.fixed?T("template.make_fillable","Make fillable"):T("template.make_fixed","Make fixed"),
    ()=>tplToggleFixed(id)));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  const up=item(T("ctx.move_up","Move up"), ()=>tplMoveNode(id,-1)); if(!canUp) up.disabled=true;
  const dn=item(T("ctx.move_down","Move down"), ()=>tplMoveNode(id,1)); if(!canDown) dn.disabled=true;
  ctx.appendChild(up); ctx.appendChild(dn);
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.delete","Delete"), ()=>tplDeleteNode(id), true));
  ctx.style.display="block";
  const vw=window.innerWidth, vh=window.innerHeight, w=ctx.offsetWidth, h=ctx.offsetHeight;
  ctx.style.left=Math.min(e.clientX, vw-w-6)+"px";
  ctx.style.top =Math.min(e.clientY, vh-h-6)+"px";
}

/* ---- selected-node body editor -------------------------------------------- */
function buildNodeBodyPane(){
  const card = el("div",{class:"card"});
  const sel = App.tplView.sel ? tplFind(App.tplView.sel) : null;
  if (!sel){
    card.appendChild(el("div",{class:"card-body"},[
      el("div",{class:"empty", text:T("template.pick_node","Select a chapter to edit its body.")})]));
    return card;
  }
  const node = sel.node;

  const bar = el("div",{class:"card-bar"});
  bar.appendChild(el("span",{class:"card-kind", text: node.title || T("node.untitled","(untitled)")}));
  const tog = el("div",{class:"card-actions", style:{opacity:1}});
  tog.appendChild(el("button",{class:"sm-btn", text:T("ctx.rename","Rename"), onclick:()=>tplRenameNode(node._id)}));
  tog.appendChild(el("button",{class:"sm-btn",
    text: node.fixed?T("template.make_fillable","Make fillable"):T("template.make_fixed","Make fixed"),
    onclick:()=>tplToggleFixed(node._id)}));
  bar.appendChild(tog);

  const body = el("div",{class:"card-body"});

  else body.appendChild(el("div",{class:"ro-note"},[
        el("span",{text:T("template.fillable_note","Filled per project")})]));
  card.appendChild(body);
  return card;
}

function buildFixedBodyEditor(host, node){
  node.blocks = Array.isArray(node.blocks) ? node.blocks : [];
  node.blocks.forEach((b, i)=>{
    if (b && b.type==="para"){
      const wrap = el("div",{class:"ffield", style:{marginBottom:"8px"}});
      const ta = el("textarea",{class:"ti", style:{width:"100%",minHeight:"60px"}});
      // Canonical block model is runs[]; show their plain text, tolerate legacy
      // `text`. Editing flattens to a single unformatted run (b/i/color on an
      // edited paragraph is intentionally not preserved by this plain editor).
      ta.value = blockPlainText(b);
      ta.addEventListener("input",(e)=>{ b.runs=[{t:e.target.value}]; delete b.text; tplMarkDirty(); });
      const rm = el("button",{class:"sm-btn", style:{color:"var(--danger)",marginTop:"4px"},
        text:T("template.remove_para","Remove paragraph"),
        onclick:()=>{ node.blocks.splice(i,1); tplMarkDirty(); renderTemplateRight(); }});
      wrap.appendChild(ta); wrap.appendChild(rm);
      host.appendChild(wrap);
    } else {
      host.appendChild(el("div",{class:"ro-note"},[
        el("span",{text:T("template.readonly_block","This block type is not editable here: ")+((b&&b.type)||"?")})]));
    }
  });
  host.appendChild(el("button",{class:"add-trigger", text:"+ "+T("template.add_para","Add paragraph"),
    onclick:()=>{ node.blocks.push({type:"para", runs:[]}); tplMarkDirty(); renderTemplateRight(); }}));
}

/* ---- save / back ---------------------------------------------------------- */
function tplBack(){
  const go = ()=>{ App.tplView=null; App.view="home"; render(); refreshHome(); };
  if (App.tplView && App.tplView.dirty){
    modalConfirm(T("template.discard.title","Discard changes?"),
      T("template.discard.msg","You have unsaved template changes. Leave without saving?"), go);
  } else go();
}

// Strip editor-local keys (_id/_collapsed) and re-emit any unmodeled keys.
function serializeSkeleton(nodes){
  return (nodes||[]).map(n=>{
    const out = { title:n.title||"", fixed:!!n.fixed,
                  blocks: Array.isArray(n.blocks)?n.blocks:[],
                  children: serializeSkeleton(n.children||[]) };
    if (n.level!=null) out.level = n.level;
    if (n._passthru) Object.assign(out, n._passthru);
    return out;
  });
}

function scheduleTplAutosave(){
  clearTimeout(App.tplAutosaveTimer);
  App.tplAutosaveTimer = setTimeout(()=>persistTemplate({silent:true, stay:true}), 1500);
}
// Persist the active template via the atomic PUT /api/template, WITHOUT navigating.
// opts.silent: suppress "saving" status + failure toast (used by autosave).
// Returns true on success; callers that want the navigate-home UX do that after.
async function persistTemplate(opts){
  opts = opts || {};
  const tv = App.tplView; if (!tv) return false;
  if (App.tplSaving){ if (!opts.silent) scheduleTplAutosave(); return false; }
  App.tplSaving = true;
  if (!opts.silent) setStatus("saving", T("status.saving","Saving..."));
  try{
    const body = {
      name: tv.name,
      config: tv.config,                       // full object, unknown keys untouched
      skeleton: serializeSkeleton(tv.skeleton),
    };
    await api("PUT","/api/template",{query:{id:tv.id}, json:body});
    tv.dirty = false;
    setStatus("saved", T("status.template_saved","Template saved"));
    return true;
  }catch(e){
    setStatus("err","save failed");
    if (!opts.silent) toast(T("toast.template_save_failed","Save failed: ")+e.message, true);
    return false;
  }finally{
    App.tplSaving = false;
  }
}
async function saveTemplate(){
  if (!App.tplView) return;
  const ok = await persistTemplate({stay:true});
  if (!ok) return;
  toast(T("toast.template_saved","Template saved"));
  App.tplView=null; App.view="home"; render(); await refreshHome();
}

// Open a native file picker for one accept type; resolve the chosen File (or null).
function pickFile(accept){
  return new Promise(res=>{
    const inp = el("input",{type:"file", accept, style:{display:"none"},
      onchange:(e)=>{ const f=e.target.files[0]||null; inp.remove(); res(f); }});
    document.body.appendChild(inp); inp.click();
  });
}

/* ---- flow: paste-import a whole report (de-LLM upstream channel, WS2) ------
   The work machine's "Copy text" hands over the ENTIRE project.json as text.
   Importing it is a full replace (user version wins) -- the server backs up the
   current project first (rollback-compatible) and returns a compact structural
   diff. Bytes go clipboard/textarea -> HTTP -> disk, never through a model. */
function pasteImport(presetDir){
  const m = $("#modal"); m.innerHTML = "";
  m.appendChild(el("h3",{text:T("dialog.paste.title","Paste import (whole report)")}));
  m.appendChild(el("p",{text:T("dialog.paste.msg",
    "Paste the report text (from the work machine's Copy text) to replace the target project. The current version is backed up first; a structural diff is shown below.")}));

  const dl = el("datalist",{id:"paste-dirs"});
  (App.projects||[]).forEach(p=> dl.appendChild(el("option",{value:p.dir})));
  const dirInp = el("input",{class:"ti", list:"paste-dirs", style:{width:"100%"},
    placeholder:T("dialog.paste.dir","project folder"),
    value: presetDir || App.dir || (App.projects[0]||{}).dir || ""});
  m.appendChild(el("label",{class:"paste-lbl", text:T("dialog.paste.target","Target project folder")}));
  m.appendChild(dirInp); m.appendChild(dl);

  const ta = el("textarea",{class:"paste-ta",
    placeholder:T("dialog.paste.placeholder",'{ "schema_version": 1, ... }'),
    style:{width:"100%", height:"170px", fontFamily:"monospace", fontSize:"12px", marginTop:"8px"}});
  m.appendChild(ta);

  const result = el("div",{class:"paste-result",
    style:{marginTop:"8px", maxHeight:"230px", overflow:"auto"}});

  const readClip = el("button",{class:"sm-btn", text:T("dialog.paste.read_clip","Read clipboard"),
    onclick: async ()=>{
      try{
        const txt = await navigator.clipboard.readText();
        if (txt){ ta.value = txt; toast(T("toast.clip_read","Clipboard pasted")+" ("+txt.length+" chars)"); }
        else toast(T("toast.clip_empty","Clipboard empty"), true);
      }catch(e){ toast(T("toast.clip_denied","Clipboard read blocked -- paste manually (Ctrl+V)"), true); }
    }});
  const importBtn = el("button",{class:"tb-btn primary", text:T("dialog.paste.import","Import")});
  importBtn.onclick = async ()=>{
    const dir = dirInp.value.trim();
    const text = ta.value.trim();
    if (!dir){ toast(T("toast.paste_need_dir","Choose a target folder"), true); return; }
    if (!text){ toast(T("toast.paste_need_text","Paste the report text first"), true); return; }
    importBtn.disabled = true;
    result.innerHTML = "";
    result.appendChild(el("div",{class:"muted", text:T("dialog.paste.importing","Importing...")}));
    try{
      const r = await api("POST","/api/paste-import",{query:{dir}, raw:text, rawType:"application/json"});
      result.innerHTML = "";
      (r.warn||[]).forEach(w=> result.appendChild(
        el("div",{class:"paste-warn", style:{color:"var(--warn)", fontWeight:"600"}, text:"⚠ "+w})));
      result.appendChild(el("pre",{class:"paste-diff",
        style:{whiteSpace:"pre-wrap", fontSize:"12px", background:"var(--bg)", padding:"8px", borderRadius:"6px"},
        text: r.diff||""}));
      result.appendChild(el("div",{class:"modal-actions"},[
        el("button",{class:"tb-btn primary", text:T("dialog.paste.open","Open project"),
          onclick:()=>{ closeOverlay(); openProject(dir); }})]));
      await refreshHome();
      toast(T("toast.paste_ok","Imported")+(r.backup?(" · "+T("toast.paste_backed","backed up")):""));
    }catch(e){
      result.innerHTML = "";
      result.appendChild(el("div",{class:"paste-err", style:{color:"var(--danger)", fontWeight:"600"},
        text:T("toast.paste_failed","Import failed: ")+e.message}));
    }finally{ importBtn.disabled = false; }
  };
  m.appendChild(el("div",{class:"modal-actions"},[
    readClip, el("div",{style:{flex:"1"}}),
    el("button",{class:"sm-btn", text:T("action.close","Close"), onclick:closeOverlay}),
    importBtn,
  ]));
  m.appendChild(result);
  showOverlay(); setTimeout(()=>ta.focus(),30);
}

/* ---- flow: apply an update bundle (.zip file OR pasted base64) ------------- */
async function _applyBundle(name, b64){
  setStatus("saving", T("status.applying","Applying update..."));
  try{
    const r = await api("POST","/api/apply-update",{json:{name:name||"update.zip", zip_b64:b64}});
    const acts = r.actions || [];
    const warned = acts.filter(a=>a.warn).length;
    let msg = T("toast.update_applied","Update applied: ")+acts.length+T("toast.update_files"," file(s)");
    if (warned) msg += " ("+warned+T("toast.update_warned"," had local edits - backed up)");
    toast(msg);
    await refreshHome();
    setStatus("", T("status.no_project","No project open"));
    showApplyResult(r);
    return r;
  }catch(e){
    setStatus("err", T("status.apply_failed","apply failed"));
    toast(T("toast.apply_failed","Apply failed: ")+e.message, true);
    throw e;
  }
}
// Post-apply summary: file count, any partial failures, the "hard-refresh + reopen"
// hint (so a stale open tab doesn't autosave the pre-patch state back), and an
// Undo-last-apply button wired to the rollback endpoint.
function showApplyResult(r){
  const acts = r.actions || [], failed = r.failed || [];
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("dialog.applied.title","Update applied")}));
  m.appendChild(el("div",{text: acts.length+T("toast.update_files"," file(s)")
    + (failed.length ? (" · "+failed.length+T("dialog.applied.failed"," failed")) : "")}));
  failed.forEach(fr=> m.appendChild(el("div",{style:{color:"var(--danger)",fontSize:"12px"},
    text:"✕ "+fr.rel+": "+fr.error})));
  if (r.refresh) m.appendChild(el("p",{style:{color:"var(--warn)",marginTop:"8px"}, text:r.refresh}));
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", style:{color:"var(--danger)"}, text:T("dialog.applied.undo","Undo last apply"),
      onclick:()=>{ closeOverlay(); rollbackLastApply(); }}),
    el("button",{class:"tb-btn primary", text:T("action.close","Close"), onclick:closeOverlay}),
  ]));
  showOverlay();
}
function rollbackLastApply(){
  modalConfirm(T("dialog.undo_apply.title","Undo the last apply?"),
    T("dialog.undo_apply.msg","Restore every file to its state before the most recent apply / paste-import? A pre-rollback backup is saved first."),
    async ()=>{
      try{

        const nback = (r.restored?r.restored.length:0) + (r.deleted?r.deleted.length:0);
        toast(T("toast.rolled_back","Rolled back ")+nback+T("toast.update_files"," file(s)"));

      }catch(e){ toast(T("toast.rollback_failed","Rollback failed: ")+e.message, true); }

/* ---- flow: local auto-snapshots (browse & restore) ------------------------
   The server drops a timestamped copy of project.json into the project's
   _autosave/ on every save and before every apply / paste-import. This dialog
   lists them (newest first) and restores one; the current state is snapshotted
   first, so a restore is itself undoable. Safety net against an external update
   silently overwriting local edits. */
async function showSnapshots(dir){
  let list = [];
  try{
    const r = await api("GET","/api/autosaves",{query:{dir}});
    list = r.autosaves || [];
  }catch(e){ toast(T("toast.snap_failed","Could not load snapshots: ")+e.message, true); return; }
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("dialog.snap.title","Local snapshots — ")+dir}));
  m.appendChild(el("p",{style:{fontSize:"12px",color:"var(--muted)"},
    text:T("dialog.snap.msg","Automatic local backups of project.json (every save, and before every apply / paste-import). Restoring backs up the current state first, so it's undoable.")}));
  if(!list.length){
    m.appendChild(el("div",{class:"empty", text:T("dialog.snap.empty","No snapshots yet — one is written on the next save.")}));
  } else {
    const wrap = el("div",{style:{maxHeight:"340px",overflowY:"auto",margin:"8px 0"}});
    list.forEach(s=>{
      wrap.appendChild(el("div",{class:"proj-row"},[
        el("div",{class:"home-row-main"},[
          el("div",{class:"title", text: relTime(s.mtime)+"  ·  "+(s.reason||"save")}),
          el("div",{class:"sub", text: s.name+"  ("+Math.round((s.size||0)/1024)+" KB)"}),
        ]),
        el("div",{class:"home-actions"},[
          el("button",{class:"sm-btn", text:T("dialog.snap.restore","Restore"),
            onclick:()=>restoreSnapshot(dir, s.name)}),
        ]),
      ]));
    });
    m.appendChild(wrap);
  }
  m.appendChild(el("div",{class:"modal-actions"},[
    el("div",{style:{flex:"1"}}),
    el("button",{class:"tb-btn primary", text:T("action.close","Close"), onclick:closeOverlay}),
  ]));
  showOverlay();
}
function restoreSnapshot(dir, name){
  modalConfirm(T("dialog.snap_restore.title","Restore this snapshot?"),
    T("dialog.snap_restore.msg","Replace the current project.json with this snapshot? The current state is backed up first, so you can undo it.")+"\n\n"+name,
    async ()=>{
      try{
        await api("POST","/api/autosave-restore",{json:{dir, name}});
        toast(T("toast.snap_restored","Snapshot restored"));
        closeOverlay();
        if (App.view==="editor" && App.dir===dir){ await openProject(dir); }
        else { await refreshHome(); }

}

  m.appendChild(el("h3",{text:title}));
  m.appendChild(el("p",{text:msg}));
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"), onclick:closeOverlay}),
    el("button",{class:"tb-btn primary", style:{background:"var(--danger)",borderColor:"var(--danger)"},
      text:T("action.confirm","Confirm"), onclick:()=>{ closeOverlay(); cb(); }}),
  ]));
  showOverlay();
}
function showOverlay(){ $("#overlay").classList.add("show"); }
function closeOverlay(){ $("#overlay").classList.remove("show"); }

/* ============================================================================
   WIRING
============================================================================ */
function wireToolbar(){
  $("#btn-home").onclick = goHome;
  $("#app-home").onclick = goHome;
  $("#btn-open").onclick = ()=>openProject(null);
  $("#btn-new").onclick  = newProject;
  // route Save by current view: project editor -> saveProject, template editor -> persistTemplate (save in place)
  $("#btn-save").onclick = ()=>{ flushActiveGrid(); if (App.view === "template") persistTemplate({stay:true}); else saveProject(false); };
  $("#btn-undo").onclick = projectUndo;
  $("#btn-redo").onclick = projectRedo;
  $("#btn-docx").onclick = ()=>exportProject("docx");
  $("#btn-pdf").onclick   = ()=>exportProject("pdf");
  $("#btn-preview").onclick = enterPreview;
  $("#btn-checklist").onclick = enterChecklist;
  $("#btn-copytext").onclick = copyProjectText;
  $("#btn-copydiff").onclick = copyProjectDiff;
  $("#btn-notes").onclick = openNotesOverview;
}

/* ============================================================================
   ONE-CLICK TEXT EXPORT
   Copy the entire project (text + structure) to the clipboard as compact JSON,
   so it can be pasted back over a text-only channel (no file upload needed).
   Images are path references, not embedded bytes, so the payload stays small.
============================================================================ */
function copyProjectText(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  flushActiveGrid();   // commit any in-flight grid cell so the copy is current
  const text = JSON.stringify(stripInternal(App.project));   // drop _collapsed etc.
  const ok = ()=>toast(T("toast.copied_text","Copied report as text")+" ("+text.length+" chars)");
  try{
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(ok, ()=>fallbackCopyText(text, ok));
    } else {
      fallbackCopyText(text, ok);
    }
  }catch(_){ fallbackCopyText(text, ok); }
}
function fallbackCopyText(text, ok){
  try{
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.left = "-9999px"; ta.style.top = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const done = document.execCommand("copy");
    document.body.removeChild(ta);
    if (done){ return ok && ok(); }
  }catch(_){}
  toast(T("toast.copy_failed","Copy failed -- open project.json and copy it manually"), true);
}

/* ============================================================================
   INCREMENTAL TEXT EXPORT  ("Copy diff")
   Copy ONLY what changed since the last sync. The baseline (<project>/_baseline
   .json) is stamped whenever an update is applied / a full text is pasted in; the
   server diffs the current in-memory project against it and returns a compact
   op-diff -- a fraction of the whole report -- which the user pastes back to the
   assistant instead of Copy text. Falls back to Copy text when no baseline exists.
============================================================================ */
async function copyProjectDiff(){
  if (!App.project || !App.dir){ toast(T("toast.need_project","Open a project first"), true); return; }
  flushActiveGrid();   // commit any in-flight grid cell so the diff is current
  let r;
  try{
    r = await api("POST","/api/copy-diff",{query:{dir:App.dir}, json:stripInternal(App.project)});
  }catch(e){
    toast(T("toast.diff_failed","Copy diff failed: ")+e.message, true);
    return;
  }
  if (r.no_baseline){ showDiffNoBaseline(r.hint); return; }
  if (r.empty){ toast(T("toast.diff_empty","No changes since last sync — nothing to copy")); return; }
  const pct = Math.round(100 * r.diff_chars / Math.max(1, r.full_chars));
  // Only auto-copy when the diff is actually smaller than the whole report; if the
  // edits are spread wide enough that it isn't, let the user choose (Copy text may
  // be simpler) rather than silently putting a bigger payload on the clipboard.
  if (r.smaller){
    _copyToClipboard(r.diff_text, ()=> toast(
      T("toast.diff_copied","Copied diff")+" ("+r.diff_chars+" chars, "+pct+"% of full)"));
  }
  showDiffResult(r, pct);
}

// Shared clipboard write (navigator.clipboard, textarea fallback) -- same path as
// copyProjectText, factored so both callers behave identically.
function _copyToClipboard(text, ok){
  try{
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(ok, ()=>fallbackCopyText(text, ok));
    } else { fallbackCopyText(text, ok); }
  }catch(_){ fallbackCopyText(text, ok); }
}

// Transparency dialog: what changed + payload savings + a manual-copy fallback.
function showDiffResult(r, pct){
  const m = $("#modal"); m.innerHTML = "";
  m.appendChild(el("h3",{text:T("dialog.diff.title","Copy diff — changes since last sync")}));
  m.appendChild(el("p",{class:"muted", text: r.smaller
    ? T("dialog.diff.sub","Only the edited sections travel. Paste this to the assistant instead of the whole report — it's already on your clipboard.")
    : T("dialog.diff.sub_wide","These edits touch enough of the report (or a whole table) that the diff isn't smaller than the full text. Copy text may be simpler — or copy the diff anyway.")}));
  m.appendChild(el("div",{class:"muted", style:{fontSize:"12px", marginBottom:"6px",
      color: r.smaller ? "" : "var(--warn)"},
    text: r.diff_chars+" chars  ·  "+pct+"% of the full "+r.full_chars+"-char report"}));
  const sumBox = el("ul",{class:"diff-sum",
    style:{margin:"6px 0", paddingLeft:"18px", maxHeight:"180px", overflow:"auto", fontSize:"13px"}});
  (r.summary||[]).forEach(s=> sumBox.appendChild(el("li",{text:s})));
  if (!(r.summary||[]).length)
    sumBox.appendChild(el("li",{class:"muted", text:T("dialog.diff.none","(structural change)")}));
  m.appendChild(sumBox);
  const ta = el("textarea",{class:"paste-ta", readonly:"readonly",
    style:{width:"100%", height:"120px", fontFamily:"monospace", fontSize:"11px", marginTop:"6px"}});
  ta.value = r.diff_text;
  m.appendChild(ta);
  const actions = [
    el("button",{class:"sm-btn", text: r.smaller ? T("dialog.diff.copy_again","Copy again")
                                                 : T("dialog.diff.copy_anyway","Copy diff anyway"),
      onclick:()=>{ ta.select(); _copyToClipboard(r.diff_text, ()=>toast(T("toast.diff_copied_short","Copied diff"))); }}),
    el("div",{style:{flex:"1"}}),
  ];
  if (!r.smaller)
    actions.push(el("button",{class:"sm-btn", text:T("dialog.diff.use_copytext","Copy full text instead"),
      onclick:()=>{ closeOverlay(); copyProjectText(); }}));
  actions.push(el("button",{class:"tb-btn primary", text:T("action.close","Close"), onclick:closeOverlay}));
  m.appendChild(el("div",{class:"modal-actions"}, actions));
  showOverlay();
}

function showDiffNoBaseline(hint){
  const m = $("#modal"); m.innerHTML = "";
  m.appendChild(el("h3",{text:T("dialog.diff.nb_title","No sync baseline yet")}));
  m.appendChild(el("p",{text: hint || T("dialog.diff.nb_msg",
    "Copy diff needs a baseline — it's set the next time you 'Apply update' from the assistant. For now, use Copy text.")}));
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.close","Close"), onclick:closeOverlay}),
    el("button",{class:"tb-btn primary", text:T("dialog.diff.use_copytext","Copy full text instead"),
      onclick:()=>{ closeOverlay(); copyProjectText(); }}),
  ]));
  showOverlay();
}

function wireGlobal(){
  document.addEventListener("click",(e)=>{ if(!$("#ctx").contains(e.target)) closeCtx(); });
  document.addEventListener("scroll",closeCtx,true);
  $("#overlay").addEventListener("click",(e)=>{ if(e.target.id==="overlay") closeOverlay(); });
  // Ctrl+S manual save; Ctrl+Z routes to the focused grid's undo (grids also bind it
  // on their own host; this global guard keeps native browser undo from firing when a
  // grid cell is the active element but its host keydown did not consume the event).
  window.addEventListener("keydown",(e)=>{
    if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="s"){
      e.preventDefault();
      flushActiveGrid();   // commit any in-flight grid cell so a manual save persists it
      if (App.view === "template") persistTemplate({stay:true}); else saveProject(false);
    }
    // Ctrl+P: quick jump to a section (overrides browser print in this local app).
    if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="p" && App.view==="editor"){
      e.preventDefault(); openQuickJump(); return;
    }
    const kz = (e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z";
    const kredo = (e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==="y" || (e.shiftKey && e.key.toLowerCase()==="z"));
    if (kredo){
      if (!isTextEditing(document.activeElement)){ e.preventDefault(); projectRedo(); }
      return;
    }
    if (kz && !e.shiftKey){
      const ae = document.activeElement;
      const giCtx = (ae && ae.__giCtx) || (ae && ae.closest && (()=>{ const h=ae.closest("[tabindex]"); return h && h.__giCtx; })());
      if (giCtx && !giCtx.editing){ e.preventDefault(); gridUndo(giCtx); return; }   // grid-granular undo
      if (!isTextEditing(ae)){ e.preventDefault(); projectUndo(); }                    // else project-level
    }
  });
  // warn on unload if dirty
  window.addEventListener("beforeunload",(e)=>{ if(App.dirty || (App.tplView && App.tplView.dirty)){ e.preventDefault(); e.returnValue=""; } });
}

boot();
</script>
