function renderAll(){ renderTree(); renderEditor(); }

function renderEditor(){
  flushActiveGrid();   // M39: commit any in-flight grid edit before host.innerHTML wipes the cell
  const host = $("#editor-inner"); host.innerHTML="";
  host.classList.remove("wide");          // prose reads best narrow; widened only for data tables
  if (!App.project){ host.appendChild(el("div",{class:"empty",text:T("status.welcome","Open or create a project to begin.")})); return; }
  if (App.selId === COVER_ID){ renderCoverForm(host); return; }
  const r = findNode(App.selId);
  if (!r){ host.appendChild(el("div",{class:"empty",text:T("editor.pick","Select a section.")})); return; }
  if (hasDatatable(r.node)) host.classList.add("wide");
  renderNodeEditor(host, r.node);
}

/* ---- cover form ----------------------------------------------------------- */
function renderCoverForm(host){
  const meta = App.project.meta;
  const fields = (App.config.cover && App.config.cover.fields) || [];
  host.appendChild(el("div",{class:"ed-header"},[
    el("div",{},[ el("h2",{class:"ed-title", text:T("cover.title","Cover")}),
                  el("div",{class:"ed-sub", text:T("cover.sub","Document metadata and revision history")}) ])
  ]));

  // group fields by their physical cover table for a tidy layout
  const groups = { info:[], signature:[], revision:[], other:[] };
  fields.forEach(f=>{ (groups[f.table]||groups.other).push(f); });
  const order = [["info","cover.group.info"],["signature","cover.group.signature"],["revision","cover.group.revision"],["other","cover.group.other"]];

  order.forEach(([gk, lblKey])=>{
    const list = groups[gk]; if (!list || !list.length) return;
    host.appendChild(el("div",{class:"section-h", text:T(lblKey, gk)}));
    const grid = el("div",{class:"form-grid"});
    list.forEach(f=> grid.appendChild(coverFieldEl(f, meta)));
    host.appendChild(grid);
  });

  // revisions grid (always shown)
  host.appendChild(el("div",{class:"section-h", text:T("cover.revisions","Revisions")}));
  host.appendChild(buildRevisionGrid(meta));
}

function coverFieldEl(f, meta){
  const wrap = el("div",{class:"ffield"});
  const lab = el("label",{}, [ document.createTextNode(f.label || f.key) ]);
  if (f.required) lab.appendChild(el("span",{class:"req",text:"*"}));
  wrap.appendChild(lab);

  if (f.key === "reviewers"){
    wrap.appendChild(buildNameList(meta));
    return wrap;
  }
  const type = (f.key==="date") ? "date" : "text";
  const input = el("input",{class:"ti", type, value: meta[f.key]!=null?meta[f.key]:"",
    oninput:(e)=>{ meta[f.key]=e.target.value; markDirty(); },
    onblur:()=>saveProject(true)});
  wrap.appendChild(input);
  return wrap;
}

function buildNameList(meta){
  const wrap = el("div",{class:"chip-list"});
  const redraw = ()=>{
    wrap.innerHTML="";
    (meta.reviewers||[]).forEach((nm,i)=>{
      wrap.appendChild(el("span",{class:"name-chip"},[ document.createTextNode(nm),
        el("button",{class:"x-mini", text:"×", onclick:()=>{ meta.reviewers.splice(i,1); markDirty(); redraw(); }}) ]));
    });
    const inp = el("input",{class:"ti", style:{width:"140px"}, placeholder:T("cover.add_reviewer","add name + Enter"),
      onkeydown:(e)=>{ if(e.key==="Enter"&&e.target.value.trim()){ (meta.reviewers=meta.reviewers||[]).push(e.target.value.trim()); e.target.value=""; markDirty(); redraw(); } }});
    wrap.appendChild(inp);
  };
  redraw(); return wrap;
}

function buildRevisionGrid(meta){
  meta.revisions = meta.revisions || [];
  const cols = [["ver","cover.rev.ver"],["date","cover.rev.date"],["note","cover.rev.note"],["author","cover.rev.author"]];
  const tbl = el("table",{class:"rev-table"});
  const thead = el("tr",{});
  cols.forEach(([k,l])=> thead.appendChild(el("th",{text:T(l,k)})));
  thead.appendChild(el("th",{style:{width:"34px"}}));
  tbl.appendChild(thead);
  const body = el("tbody",{});
  const redraw = ()=>{
    body.innerHTML="";
    meta.revisions.forEach((rev,i)=>{
      const tr = el("tr",{});
      cols.forEach(([k])=>{
        const td = el("td",{});
        td.appendChild(el("input",{type:(k==="date"?"date":"text"), value:rev[k]||"",
          oninput:(e)=>{ rev[k]=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
        tr.appendChild(td);
      });
      const tdx = el("td",{});
      tdx.appendChild(el("button",{class:"x-mini", text:"×", title:T("action.delete","Delete"),
        onclick:()=>{ meta.revisions.splice(i,1); markDirty(); redraw(); }}));
      tr.appendChild(tdx);
      body.appendChild(tr);
    });
  };
  redraw();
  tbl.appendChild(body);
  const wrap = el("div",{});
  wrap.appendChild(tbl);
  wrap.appendChild(el("button",{class:"sm-btn", style:{marginTop:"8px"}, text:"+ "+T("cover.add_revision","Add revision"),
    onclick:()=>{ meta.revisions.push({ver:"",date:"",author:"",note:""}); markDirty(); redraw(); }}));
  return wrap;
}

/* ---- node (section) editor ------------------------------------------------ */
function renderNodeEditor(host, node){
  const path = nodePath(node.id);
  host.appendChild(el("div",{class:"ed-header"},[
    el("div",{},[
      el("h2",{class:"ed-title", text:(path?path+" ":"")+(node.title||T("node.untitled","(untitled)"))}),
      el("div",{class:"ed-sub", text: node.origin==="user"?T("editor.user_section","User-added section"):T("editor.template_section","Template section")})
    ]),
    el("div",{class:"ed-tools"},[
      el("button",{class:"sm-btn", text:T("ctx.rename","Rename"), onclick:()=>renameNode(node.id)})
    ])
  ]));

  // fixed-body (read-only with unlock affordance)
  if (node.fixed_body){
    host.appendChild(el("div",{class:"ro-note"},[
      el("span",{text:T("editor.fixed_note","This section uses standard fixed text from the template.")}),
      el("button",{class:"sm-btn", style:{marginLeft:"auto"}, text:T("ctx.unlock","Unlock / override"),
        onclick:()=>unlockNode(node.id)})
    ]));
    host.appendChild(el("div",{class:"fixed-preview", text:T("editor.fixed_preview","(Standard text rendered by the engine at export.)")}));
    return;
  }

  node.blocks = node.blocks || [];
  const listHost = el("div",{class:"block-list"});
  // Consecutive paragraphs render as ONE continuous rich-text editor; media
  // blocks (image/grid/table/datatable) stay standalone and split the prose
  // into separate editing regions.
  groupBlocks(node.blocks).forEach(seg=>{
    if (seg.kind==="prose") listHost.appendChild(renderProseCard(node, seg));
    else listHost.appendChild(renderBlockCard(node, seg.block, seg.idx));
  });
  host.appendChild(listHost);
  host.appendChild(buildAddBlock(node, node.blocks.length));
}

function nodePath(id){
  // compute "1.2.3" numbering by position
  let result=null;
  const rec=(nodes, prefix)=>{
    nodes.forEach((n,i)=>{
      const num = prefix.concat(i+1);
      if (n.id===id){ result=num.join("."); return; }
      rec(n.children||[], num);
    });
  };
  rec(App.project.outline, []);
  return result;
}

/* ---- block grouping (consecutive paragraphs -> one prose region) ---------- */
function groupBlocks(blocks){
  const segs = []; let cur = null;
  (blocks||[]).forEach((b, i)=>{
    if (b && b.type==="para"){
      if (!cur){ cur = { kind:"prose", start:i, blocks:[] }; segs.push(cur); }
      cur.blocks.push(b);
    } else {
      cur = null;
      segs.push({ kind:"block", idx:i, block:b });
    }
  });
  return segs;
}

/* ---- prose region card (continuous multi-paragraph editor) --------------- */
function renderProseCard(node, seg){
  const card = el("div",{class:"card prose-card"});
  // A media block dragged onto a prose run lands just before that run.
  card.addEventListener("dragover",(e)=>{ if(blockDragSrc&&blockDragSrc.node===node){ e.preventDefault(); card.classList.add("dragover"); }});
  card.addEventListener("dragleave",()=>card.classList.remove("dragover"));
  card.addEventListener("drop",(e)=>{
    e.preventDefault(); card.classList.remove("dragover");
    if (!blockDragSrc||blockDragSrc.node!==node) return;
    const from = node.blocks.indexOf(blockDragSrc.block); if (from<0) return;
    const [b] = node.blocks.splice(from,1);
    const at = node.blocks.indexOf(seg.blocks[0]);
    node.blocks.splice(at<0?node.blocks.length:at, 0, b);
    markDirty(); renderEditor();
  });

  const bar = el("div",{class:"card-bar"});
  bar.appendChild(el("span",{class:"card-kind", text:T("block.prose","Text")}));
  const actions = el("div",{class:"card-actions"});
  actions.appendChild(el("button",{class:"icon-btn", title:T("action.copy_text","Copy this text (paste in any section or project)"), text:"⧉",
    onclick:()=>copyBlocks(seg.blocks, T("block.prose","Text"))}));
  bar.appendChild(actions);
  card.appendChild(bar);

  const body = el("div",{class:"card-body"});
  buildProseEditor(body, node, seg);
  card.appendChild(body);
  return card;
}

/* ---- generic block card chrome ------------------------------------------- */
function renderBlockCard(node, block, idx){
  // Resolve the live index at action time: prose edits add/remove paragraphs and
  // shift this block's position, so a captured idx would go stale.
  const cur = ()=> node.blocks.indexOf(block);
  const card = el("div",{class:"card", draggable:"false"});
  const kindLabel = {
    para:T("block.add.para","Paragraph"), image:T("block.add.image","Image"),
    imagegrid:T("block.add.imagegrid","Image grid"),
    datatable:T("block.add.datatable","Data table"), table:T("block.add.table","Table")
  }[block.type] || block.type;

  const bar = el("div",{class:"card-bar"});
  const handle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
  handle.addEventListener("mousedown",()=>{ card.setAttribute("draggable","true"); });
  card.addEventListener("dragend",()=>{ card.setAttribute("draggable","false"); });
  bar.appendChild(handle);
  bar.appendChild(el("span",{class:"card-kind", text:kindLabel}));
  const actions = el("div",{class:"card-actions"});
  const up = el("button",{class:"icon-btn", title:T("action.up","Move up"), text:"↑", onclick:()=>moveBlock(node,cur(),-1)});
  const dn = el("button",{class:"icon-btn", title:T("action.down","Move down"), text:"↓", onclick:()=>moveBlock(node,cur(),1)});
  if (idx===0) up.disabled=true;
  if (idx===node.blocks.length-1) dn.disabled=true;
  actions.appendChild(up); actions.appendChild(dn);
  actions.appendChild(el("button",{class:"icon-btn", title:T("action.copy","Copy block (paste in any section or project)"), text:"⧉",
    onclick:()=>copyBlocks([block], kindLabel)}));
  actions.appendChild(el("button",{class:"icon-btn danger", title:T("action.delete","Delete"), text:"✕",
    onclick:()=>{
      const i=cur(); if(i<0) return;
      const del=()=>{ node.blocks.splice(i,1); markDirty(); renderEditor(); };
      // Block deletion is not undoable (the grid undo stack dies with the block)
      // and autosave persists the empty state. Guard the costly/irrecoverable ones.
      const warn = deleteBlockWarning(block);
      if (warn) modalConfirm(T("dialog.del_block.title","Delete this block?"), warn, del);
      else del();
    }}));
  bar.appendChild(actions);
  card.appendChild(bar);

  const body = el("div",{class:"card-body"});
  if (block.type==="image") editImage(body, block, node);
  else if (block.type==="imagegrid") editImageGrid(body, block, node);
  else if (block.type==="table") editTable(body, block);
  else if (block.type==="datatable") editDatatable(body, block);
  card.appendChild(body);

  wireBlockDrag(card, node, block);
  return card;
}
// Returns a confirmation message if deleting `block` would lose hard-to-recreate
// data, else null (delete silently). Images/empty blocks are cheap to re-add.
function deleteBlockWarning(block){
  if (!block) return null;
  if (block.type === "datatable"){
    const n = ((block.data && block.data.rows) || []).length;
    const base = T("dialog.del_datatable.msg","This deletes the whole compliance table and cannot be undone.");
    return n ? (base + " (" + n + (n===1?" metric row":" metric rows") + ")") : base;
  }
  if (block.type === "table"){
    const hasData = (block.rows || []).some(r => (r||[]).some(c => String(c==null?"":c).trim()));
    if (hasData) return T("dialog.del_table.msg","This deletes the table and its contents and cannot be undone.");
  }
  return null;
}
function moveBlock(node, idx, dir){
  const j=idx+dir; if (idx<0||j<0||j>=node.blocks.length) return;
  const [b]=node.blocks.splice(idx,1); node.blocks.splice(j,0,b); markDirty(); renderEditor();
}
let blockDragSrc=null;
function wireBlockDrag(card, node, block){
  card.addEventListener("dragstart",(e)=>{ blockDragSrc={node,block}; card.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
  card.addEventListener("dragend",()=>{ card.classList.remove("dragging"); blockDragSrc=null;
    document.querySelectorAll(".card.dragover").forEach(c=>c.classList.remove("dragover")); });
  card.addEventListener("dragover",(e)=>{ if(blockDragSrc&&blockDragSrc.node===node){ e.preventDefault(); card.classList.add("dragover"); }});
  card.addEventListener("dragleave",()=>card.classList.remove("dragover"));
  card.addEventListener("drop",(e)=>{
    e.preventDefault(); card.classList.remove("dragover");
    if (!blockDragSrc||blockDragSrc.node!==node) return;
    const from=node.blocks.indexOf(blockDragSrc.block);
    if (from<0 || blockDragSrc.block===block) return;
    // remove first, then resolve the target's live index -> always insert BEFORE
    // the drop target (consistent for forward and backward drags).
    const [b]=node.blocks.splice(from,1);
    let to=node.blocks.indexOf(block); if (to<0) to=node.blocks.length;
    node.blocks.splice(to,0,b); markDirty(); renderEditor();
  });
}

/* ---- add-block picker ----------------------------------------------------- */
/* ============================================================================
   BLOCK CLIPBOARD  (copy / paste blocks across sections AND projects)
   The clipboard lives in localStorage, so it survives switching projects and
   page reloads. A pasted media block gets a FRESH id (so its caption bookmark /
   cross-reference never collides with the source). When a block is pasted into a
   DIFFERENT project than it was copied from, its image bytes are re-uploaded into
   the target project in the background (best effort) so the picture comes along.
============================================================================ */
const BLOCK_CLIP_KEY = "docbuilder.blockclip.v1";
function setBlockClip(payload){
  App._blockClip = payload;                                   // in-memory mirror
  try{ localStorage.setItem(BLOCK_CLIP_KEY, JSON.stringify(payload)); }catch(_){}
}
function getBlockClip(){
  try{ const s = localStorage.getItem(BLOCK_CLIP_KEY); if (s) return JSON.parse(s); }catch(_){}
  return App._blockClip || null;                              // fallback if storage blocked
}
function blockWord(n){ return n===1 ? T("block.one","block") : T("block.many","blocks"); }

// Deep-copy the given blocks onto the clipboard. `label` is a short hint shown in
// the paste menu (e.g. "Table", "Text").
function copyBlocks(blocks, label){
  flushActiveGrid();                          // commit any in-flight grid cell first
  const clones = (blocks||[]).filter(Boolean).map(b => JSON.parse(JSON.stringify(b)));
  if (!clones.length) return;
  setBlockClip({ v:1, dir: App.dir||"", label: label||"", blocks: clones });
  renderEditor();                             // rebuild pickers so "Paste" shows up now
  toast(T("toast.block_copied","Copied")+" "+clones.length+" "+blockWord(clones.length));
}

// Clone for insertion: a new id keeps caption bookmarks / cross-refs unique.
function cloneBlockFresh(b){
  const c = JSON.parse(JSON.stringify(b));
  if (c.id) c.id = uid();
  return c;
}

function pasteBlocks(node, atIndex){
  const clip = getBlockClip();
  if (!clip || !Array.isArray(clip.blocks) || !clip.blocks.length){
    toast(T("toast.clip_empty","Nothing copied yet"), true); return;
  }
  const fresh = clip.blocks.map(cloneBlockFresh);
  const at = Math.max(0, Math.min(atIndex==null ? node.blocks.length : atIndex, node.blocks.length));
  node.blocks.splice(at, 0, ...fresh);
  markDirty(); renderEditor(); saveProject(true);
  toast(T("toast.block_pasted","Pasted")+" "+fresh.length+" "+blockWord(fresh.length));
  // cross-project paste: bring the image bytes along (best effort, async)
  if (clip.dir && App.dir && clip.dir !== App.dir){
    const imgs = fresh.filter(b => b.type==="image" || b.type==="imagegrid");
    if (imgs.length) importPastedImages(imgs, clip.dir, node);
  }
}

// Re-upload images referenced by pasted blocks from their source project into the
// current one, so a cross-project paste shows the picture, not a placeholder.
async function importPastedImages(blocks, srcDir, node){
  let changed = false, failed = 0;
  for (const b of blocks){
    try{
      if (b.type==="image" && b.file){ b.file = await reuploadImage(b.file, srcDir, node); changed = true; }
      else if (b.type==="imagegrid"){
        for (const it of (b.items||[])){ if (it && it.file){ it.file = await reuploadImage(it.file, srcDir, node); changed = true; } }
      }
    }catch(_){ failed++; }
  }
  if (changed){ markDirty(); renderEditor(); saveProject(true); }
  if (failed) toast(T("toast.img_copy_partial","Some images could not be copied across projects; paste them again"), true);
}
async function reuploadImage(file, srcDir, node){
  const resp = await fetch(file + "?dir=" + encodeURIComponent(srcDir));
  if (!resp.ok) throw new Error("src "+resp.status);
  const b64 = await fileToB64(await resp.blob());
  const section = sectionOf(node.id);
  const r = await api("POST","/api/image",{query:{dir:App.dir, section}, json:{ png_b64:b64, section }});
  return r.file;
}

/* ============================================================================
   SECTION CLIPBOARD  (copy / paste / duplicate a whole outline node)
   Deep-copies a node (title + blocks + all descendants). Pasted nodes get FRESH
   ids for every node AND media block so selection and caption bookmarks never
   collide. Clipboard is in localStorage (survives project switching); a cross-
   project paste re-uploads the subtree's images. Mirrors the block clipboard.
============================================================================ */
const NODE_CLIP_KEY = "docbuilder.nodeclip.v1";
function setNodeClip(payload){
  App._nodeClip = payload;
  try{ localStorage.setItem(NODE_CLIP_KEY, JSON.stringify(payload)); }catch(_){}
}
function getNodeClip(){
  try{ const s = localStorage.getItem(NODE_CLIP_KEY); if (s) return JSON.parse(s); }catch(_){}
  return App._nodeClip || null;
}
// Deep clone a node subtree with fresh node + media-block ids.
function cloneNodeFresh(node){
  const c = JSON.parse(JSON.stringify(node));
  (function walk(n){
    n.id = uid();
    n.origin = "user";                       // a pasted section is a new, user-owned node
    n._collapsed = false;
    (n.blocks || []).forEach(b => { if (b && b.id) b.id = uid(); });
    (n.children || []).forEach(walk);
  })(c);
  return c;
}
function collectNodeImages(node, out){
  out = out || [];
  (node.blocks || []).forEach(b => { if (b && (b.type==="image" || b.type==="imagegrid")) out.push(b); });
  (node.children || []).forEach(c => collectNodeImages(c, out));
  return out;
}
function copySection(id){
  const r = findNode(id); if (!r) return;
  flushActiveGrid();
  setNodeClip({ v:1, dir: App.dir||"", node: JSON.parse(JSON.stringify(r.node)) });
  renderTree();                              // rebuild so "Paste section" becomes available
  toast(T("toast.section_copied","Section copied (paste in any section or project)"));
}
function pasteSection(id, where){            // where: "sibling" (after id) | "child"
  const clip = getNodeClip();
  if (!clip || !clip.node){ toast(T("toast.clip_empty_section","No section copied yet"), true); return; }
  const r = findNode(id); if (!r) return;
  const fresh = cloneNodeFresh(clip.node);
  if (where==="child"){ (r.node.children = r.node.children||[]).push(fresh); r.node._collapsed=false; }
  else { r.list.splice(r.idx+1, 0, fresh); }
  markDirty(); App.selId = fresh.id; renderTree(); renderEditor(); saveProject(true);
  toast(T("toast.section_pasted","Section pasted"));
  if (clip.dir && App.dir && clip.dir !== App.dir){          // cross-project: bring images along
    const imgs = collectNodeImages(fresh);
    if (imgs.length) importPastedImages(imgs, clip.dir, fresh);
  }
}
function duplicateSection(id){               // copy + paste-as-sibling in one step
  copySection(id); pasteSection(id, "sibling");
}

function buildAddBlock(node, atIndex){
  const wrap = el("div",{class:"add-block"});
  const picker = el("div",{class:"picker hidden"});
  const trigger = el("button",{class:"add-trigger", html:"+ "+T("block.add","Add block"),
    onclick:()=>picker.classList.toggle("hidden")});
  const defs = [
    ["para","¶","block.add.para","Paragraph"],
    ["image","🖼","block.add.image","Image"],
    ["imagegrid","▤","block.add.imagegrid","Image grid"],
    ["datatable","▦","block.add.datatable","Data table"],
    ["table","⊞","block.add.table","Table"],
  ];
  defs.forEach(([type,ico,uik,fb])=>{
    picker.appendChild(el("button",{class:"pick", onclick:()=>{
      node.blocks.splice(atIndex,0,newBlock(type)); markDirty(); renderEditor();
    }},[ el("span",{class:"ico",text:ico}), el("span",{text:T(uik,fb)}) ]));
  });
  // paste entry -- only when the clipboard holds something (works cross-project)
  const clip = getBlockClip();
  if (clip && Array.isArray(clip.blocks) && clip.blocks.length){
    const lbl = T("block.paste","Paste") + ": "
              + (clip.label || (clip.blocks.length + " " + blockWord(clip.blocks.length)));
    picker.appendChild(el("button",{class:"pick paste-pick", onclick:()=> pasteBlocks(node, atIndex)},
      [ el("span",{class:"ico",text:"📋"}), el("span",{text: lbl}) ]));
  }
  wrap.appendChild(trigger); wrap.appendChild(picker);
  return wrap;
}

/* ============================================================================
   BLOCK EDITOR ①  PARA
============================================================================ */
// First swatch is an explicit Black (clearer than a "remove color" swatch that
// also renders black). Applying black sets the run color without touching b/i.
const SPOT_COLORS = ["000000","FF0000","00B0F0","16A34A","D97706","7C3AED"];
const BODY_DEFAULT_COLOR = "000000";

// One contenteditable holding several <p> paragraphs. Enter -> a new <p> (a new
// para block, a real <w:p> on export); Shift+Enter -> <br> (soft line break).
// Both go through the browser so native Ctrl+Z undo keeps working. A single
// toolbar above reflects the formatting at the caret.
const BULLET_GLYPH = String.fromCharCode(0x2022);  // bullet dot; source stays ASCII
function makeProseP(b){
  const p = el("p",{class:"pp"});
  const html = runsToHtml(b.runs);
  p.innerHTML = html || "<br>";   // an empty <p> needs a <br> to stay focusable
  if (b.list){ p.dataset.list = b.list; p.classList.add(b.list==="bullet"?"li-bullet":"li-number"); }
  if (b.level){ p.dataset.level = String(Math.max(0, Math.min(b.level|0, 8))); }
  return p;
}
function elToBlock(pEl){
  const runs = htmlToRuns(pEl);
  // a lone browser-inserted "bogus" <br> in an empty paragraph -> empty run
  if (runs.length===1 && runs[0].t==="\n" && !(pEl.textContent||"").trim()) runs[0].t="";
  const list = (pEl.dataset && pEl.dataset.list) ? pEl.dataset.list : null;
  const block = { type:"para", runs, list };
  const lvl = list && pEl.dataset && pEl.dataset.level ? (parseInt(pEl.dataset.level)||0) : 0;
  if (lvl) block.level = lvl;   // only list items carry a nesting level
  return block;
}
function proseToBlocks(editor){
  const blocks = []; let buf = null;
  const flush = ()=>{ if (buf){ blocks.push(elToBlock(buf)); buf=null; } };
  editor.childNodes.forEach(ch=>{
    if (ch.nodeType===1 && (ch.tagName==="P"||ch.tagName==="DIV")){
      flush(); blocks.push(elToBlock(ch));
    } else {                       // stray top-level text/inline -> own paragraph
      if (!buf) buf = document.createElement("p");
      buf.appendChild(ch.cloneNode(true));
    }
  });
  flush();
  if (!blocks.length) blocks.push({ type:"para", runs:[{t:""}], list:null });
  return blocks;
}

/* ---- cross-references ----------------------------------------------------- */
// A reference run is { ref:<blockId> } (no text/formatting). It targets a
// captioned figure/table by its stable block id; the engine renders it as a live
// Word REF field. The editor shows it as an atomic [Figure: caption] chip.
function refKindLabel(type){
  return String(type||"").indexOf("image")===0
    ? T("ref.figure","Figure") : T("ref.table","Table");
}
// All captioned, id-bearing media blocks across the project, in document order.
function collectRefTargets(){
  const out = [];
  if (!App.project) return out;
  walk(App.project.outline, (n)=>{
    (n.blocks||[]).forEach(b=>{
      if (isMediaBlock(b) && b.id && (b.caption||"").trim()){
        out.push({ id:b.id, kind:refKindLabel(b.type), caption:b.caption.trim() });
      }
    });
  });
  return out;
}
// Short display label for a reference chip: "[Figure: caption]" or, if the
// target is gone, a clearly-marked "[ref: missing]".
function refChipLabel(refId){
  const targets = collectRefTargets();
  for (const t of targets){
    if (t.id === refId) return "[" + t.kind + ": " + t.caption + "]";
  }
  return "[" + T("ref.missing","ref: missing") + "]";
}
// Modal: list every captioned figure/table; `onPick(id)` inserts a reference.
function openRefPicker(onPick){
  const targets = collectRefTargets();
  if (!targets.length){
    toast(T("ref.none","No captioned figures or tables to reference yet"), true);
    return;
  }
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("ref.title","Insert reference")}));
  m.appendChild(el("p",{text:T("ref.msg","Pick a figure or table to reference.")}));
  const listBox = el("div",{class:"ref-picker-list",
    style:{maxHeight:"320px",overflowY:"auto",margin:"4px 0 8px"}});
  targets.forEach(t=>{
    listBox.appendChild(el("button",{class:"sm-btn",
      style:{display:"block",width:"100%",textAlign:"left",marginBottom:"6px"},
      text:t.kind + ": " + t.caption,
      onclick:()=>{ closeOverlay(); onPick(t.id); }}));
  });
  m.appendChild(listBox);
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"), onclick:closeOverlay}),
  ]));
  showOverlay();
}

function buildProseEditor(host, node, seg){
  const tb = el("div",{class:"mini-toolbar prose-toolbar"});
  const editor = el("div",{class:"rich multi", contenteditable:"true", spellcheck:"false"});
  seg.blocks.forEach(b=> editor.appendChild(makeProseP(b)));
  if (!editor.childNodes.length) editor.appendChild(makeProseP({runs:[{t:""}]}));

  // `owned` = the exact contiguous run of blocks this editor represents, so
  // serialize replaces just that slice of node.blocks (length may change).
  let owned = seg.blocks.slice();
  const serialize = ()=>{
    const blocks = proseToBlocks(editor);
    let start = node.blocks.indexOf(owned[0]);
    if (start < 0) start = Math.min(seg.start, node.blocks.length);
    node.blocks.splice(start, owned.length, ...blocks);
    owned = blocks;
    seg.blocks = blocks;   // keep seg live so renderProseCard's drop target stays valid
    markDirty();
  };

  const mk = (label, title, cmd) => el("button",{class:"mt-btn", title, html:label,
    onmousedown:(e)=>{ e.preventDefault(); document.execCommand(cmd,false,null); editor.focus(); serialize(); refresh(); }});
  const bBtn = mk("<b>B</b>", T("para.bold","Bold"), "bold");
  const iBtn = mk("<i>I</i>", T("para.italic","Italic"), "italic");
  tb.appendChild(bBtn); tb.appendChild(iBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  const bulletBtn = el("button",{class:"mt-btn", title:T("para.bullet","Bullet list"), html:BULLET_GLYPH,
    onmousedown:(e)=>{ e.preventDefault(); toggleList("bullet"); }});
  const numBtn = el("button",{class:"mt-btn", title:T("para.number","Numbered list"), html:"1.",
    onmousedown:(e)=>{ e.preventDefault(); toggleList("number"); }});
  tb.appendChild(bulletBtn); tb.appendChild(numBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  SPOT_COLORS.forEach(c=>{
    const sw = el("span",{class:"swatch", title: c==="000000"?T("para.color_black","Black"):("#"+c),
      style:{background:"#"+c},
      onmousedown:(e)=>{ e.preventDefault();
        document.execCommand("foreColor", false, "#"+c);
        editor.focus(); serialize(); refresh(); }});
    tb.appendChild(sw);
  });
  tb.appendChild(el("span",{class:"mt-sep"}));

  // Remember the caret inside the editor so a reference can be dropped where the
  // user was typing -- opening the picker modal moves focus off the editor and
  // would otherwise collapse the live selection.
  let savedRange = null;
  const rememberRange = ()=>{
    if (!selInEditor()) return;
    const sel = window.getSelection();
    if (sel && sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
  };
  // Build an atomic, non-editable chip element for a reference run.
  const makeChip = (refId)=>{
    const span = el("span",{class:"ref-chip", contenteditable:"false",
      "data-ref":refId, text:refChipLabel(refId)});
    return span;
  };
  const insertRef = (refId)=>{
    editor.focus();
    let range = savedRange;
    if (!range){
      // no remembered caret -> append at the end of the last paragraph
      const last = editor.lastElementChild || editor;
      range = document.createRange();
      range.selectNodeContents(last);
      range.collapse(false);
    }
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    range.deleteContents();
    const chip = makeChip(refId);
    range.insertNode(chip);
    // place caret right after the chip and add a trailing space for typing
    const after = document.createTextNode(" ");
    if (chip.parentNode) chip.parentNode.insertBefore(after, chip.nextSibling);
    const r2 = document.createRange();
    r2.setStartAfter(after); r2.collapse(true);
    sel.removeAllRanges(); sel.addRange(r2);
    savedRange = r2.cloneRange();
    serialize();
  };
  const refBtn = el("button",{class:"mt-btn", title:T("para.insert_ref","Insert reference"),
    html:T("para.insert_ref_glyph","Ref"),
    onmousedown:(e)=>{ e.preventDefault(); rememberRange(); openRefPicker(insertRef); }});
  tb.appendChild(refBtn);

  // top-level <p> containing the caret (for list state + list toggling)
  const currentP = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return null;
    let n = sel.anchorNode;
    while (n && n!==editor){ if (n.parentNode===editor) return n; n = n.parentNode; }
    return null;
  };
  const selInEditor = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return false;
    let n = sel.anchorNode; while (n){ if (n===editor) return true; n = n.parentNode; }
    return false;
  };
  const toggleList = (kind)=>{
    const p = currentP(); if (!p) return;
    const next = p.dataset.list===kind ? "" : kind;
    p.dataset.list = next;
    p.classList.toggle("li-bullet", next==="bullet");
    p.classList.toggle("li-number", next==="number");
    if (!next) delete p.dataset.level;    // a plain paragraph carries no nesting level
    editor.focus(); serialize(); refresh();
  };
  // Tab / Shift+Tab nests a list item one level in/out (0..3 visualized in the editor)
  const changeLevel = (p, delta)=>{
    if (!p || !p.dataset.list) return false;
    const cur = parseInt(p.dataset.level)||0;
    const nxt = Math.max(0, Math.min(cur+delta, 8));
    if (nxt) p.dataset.level = String(nxt); else delete p.dataset.level;
    editor.focus(); serialize(); refresh();
    return true;
  };
  const refresh = ()=>{
    if (!selInEditor()) return;
    bBtn.classList.toggle("on", document.queryCommandState("bold"));
    iBtn.classList.toggle("on", document.queryCommandState("italic"));
    const lst = (currentP()||{dataset:{}}).dataset.list || "";
    bulletBtn.classList.toggle("on", lst==="bullet");
    numBtn.classList.toggle("on", lst==="number");
  };

  editor.addEventListener("keydown",(e)=>{
    if (e.key==="Tab"){
      const p = currentP();
      if (p && p.dataset.list){ e.preventDefault(); changeLevel(p, e.shiftKey ? -1 : 1); }
    }
  });
  editor.addEventListener("input", serialize);
  editor.addEventListener("keyup", ()=>{ refresh(); rememberRange(); });
  editor.addEventListener("mouseup", ()=>{ refresh(); rememberRange(); });
  editor.addEventListener("focus", ()=>{
    try{ document.execCommand("defaultParagraphSeparator", false, "p"); }catch(_){}
    refresh();
  });
  editor.addEventListener("blur", ()=>{ serialize(); saveProject(true); });
  // sanitize paste -> plain text (strip foreign styles/structure)
  editor.addEventListener("paste",(e)=>{
    e.preventDefault();
    const txt = (e.clipboardData||window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, txt);
    serialize();
  });

  host.appendChild(tb); host.appendChild(editor);
}

// runs[] -> plain text (concatenate run text; drops marks). Tolerates a legacy
// `text` block by accepting either shape via blockPlainText().
function runsToPlain(runs){ return (runs||[]).map(r=>r&&r.t||"").join(""); }
function blockPlainText(b){
  if (!b) return "";
  if (Array.isArray(b.runs)) return runsToPlain(b.runs);
  return b.text!=null ? String(b.text) : "";
}
// runs[] -> HTML (b/i/color marks). A soft break (\n) inside a run renders as
// <br> so it survives the contenteditable round-trip (a bare \n would collapse).
function runsToHtml(runs){
  if (!runs || !runs.length) return "";
  return runs.map(r=>{
    if (r && r.ref){
      // atomic, non-editable cross-reference chip
      return `<span class="ref-chip" contenteditable="false" data-ref="${escapeHtml(r.ref)}">`
        + escapeHtml(refChipLabel(r.ref)) + `</span>`;
    }
    let t = escapeHtml(r.t||"");
    if (!t) return "";
    t = t.replace(/\n/g,"<br>");
    if (r.color) t = `<span style="color:#${r.color}">${t}</span>`;
    if (r.i) t = `<i>${t}</i>`;
    if (r.b) t = `<b>${t}</b>`;
    return t;
  }).join("") || "";
}
// contenteditable HTML -> runs[] (walk text nodes, track b/i/color)
function htmlToRuns(rich){
  const runs = [];
  const push = (text, st)=>{
    if (!text) return;
    const last = runs[runs.length-1];
    const r = { t:text };
    if (st.b) r.b=true; if (st.i) r.i=true; if (st.color) r.color=st.color;
    // never merge a text run into a reference run (a ref run carries no text)
    if (last && !last.ref && !!last.b===!!r.b && !!last.i===!!r.i && (last.color||null)===(r.color||null)){
      last.t += text;
    } else runs.push(r);
  };
  const walkNode = (node, st)=>{
    node.childNodes.forEach(ch=>{
      if (ch.nodeType===3){ push(ch.nodeValue.replace(/ /g," "), st); return; }
      if (ch.nodeType!==1) return;
      // a cross-reference chip is atomic: emit a ref run, never descend into it
      if (ch.getAttribute && ch.getAttribute("data-ref")){
        runs.push({ ref: ch.getAttribute("data-ref") });
        return;
      }
      const tag = ch.tagName.toLowerCase();
      const ns = { b:st.b, i:st.i, color:st.color };
      if (tag==="b"||tag==="strong") ns.b=true;
      if (tag==="i"||tag==="em") ns.i=true;
      const col = colorFromStyle(ch.getAttribute("style")||"") || colorFromAttr(ch);
      if (col) ns.color=col;
      if (tag==="br"){ push("\n", st); return; }
      if (tag==="div"||tag==="p"){ if (runs.length) push("\n", st); }
      walkNode(ch, ns);
    });
  };
  walkNode(rich, {b:false,i:false,color:null});
  // collapse to at least one run
  const cleaned = runs.filter(r=>r.t!=="");
  return cleaned.length ? cleaned : [{t:""}];
}
function colorFromStyle(style){
  const m = /color:\s*([^;]+)/i.exec(style); if(!m) return null;
  return cssColorToHex(m[1].trim());
}
function colorFromAttr(node){ const c = node.getAttribute && node.getAttribute("color"); return c?cssColorToHex(c):null; }

/* ---- free-table cell value: plain string (simple) OR {runs:[...]} (styled) ---- */
function cellRuns(v){
  if (v && typeof v === "object" && Array.isArray(v.runs)) return v.runs.length ? v.runs : [{t:""}];
  return [{ t: v==null ? "" : String(v) }];
}
function cellText(v){ return cellRuns(v).map(r=>r.t||"").join(""); }
function cellHtml(v){ return runsToHtml(cellRuns(v)) || ""; }
// Collapse runs to a plain string when nothing is styled (compact data + markdown).
function normalizeCell(runs){
  const rs = (runs||[]).filter(r=> r && (r.t||"") !== "");
  if (!rs.length) return "";
  if (rs.some(r=> r.b || r.i || r.color)) return { runs: rs };
  return rs.map(r=>r.t||"").join("");
}
function cssColorToHex(c){
  c = c.trim();
  let m = /^#([0-9a-f]{6})$/i.exec(c); if (m) return m[1].toUpperCase();
  m = /^#([0-9a-f]{3})$/i.exec(c); if (m) return (m[1][0]+m[1][0]+m[1][1]+m[1][1]+m[1][2]+m[1][2]).toUpperCase();
  m = /rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i.exec(c);
  if (m){ return [m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,"0")).join("").toUpperCase(); }
  return null;
}
function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function imgUrl(file){ return file + "?dir=" + encodeURIComponent(App.dir||"") + "&_t=" + Date.now(); }

// Intent presets (full/half/small) that set block.width_cm; an Advanced toggle
// exposes the exact cm. The engine caps height automatically, so there is no
// height field. Reused by both image and image-grid blocks (width_cm is the
// grid's total width there).

  [["full","image.size.full","Full width"],["half","image.size.half","Half"],
   ["small","image.size.small","Small"]].forEach(([key,uik,fb])=>{
    const b = el("button",{class:"preset-btn", text:T(uik,fb), onclick:()=>{

    }});

  });
  const advBtn = el("button",{class:"preset-btn", text:T("image.size.custom","Custom"),

async function handleImagePaste(e, block, node, renderPrev){
  const items = (e.clipboardData||{}).items || [];
  for (const it of items){
    if (it.type && it.type.indexOf("image")===0){
      e.preventDefault();
      const file = it.getAsFile();
      const b64 = await fileToB64(file);
      const section = sectionOf(node.id);
      try{
        setStatus("saving", T("status.uploading","Uploading image…"));
        const r = await api("POST","/api/image",{query:{dir:App.dir, section},
          json:{ png_b64:b64, section }});
        block.file = r.file; markDirty(); renderPrev();
        setStatus("saved", T("status.image_added","Image added"));
        saveProject(true);
      }catch(err){ setStatus("err","image failed"); toast("Image upload failed: "+err.message, true); }
      return;
    }
  }
}
function fileToB64(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(",")[1]||"");
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

async function handleGridPaste(e, block, node, renderGrid){
  const items = (e.clipboardData||{}).items || [];
  for (const it of items){
    if (it.type && it.type.indexOf("image")===0){
      const file = it.getAsFile();
      if (!file) continue;
      e.preventDefault();
      const section = sectionOf(node.id);
      try{
        setStatus("saving", T("status.uploading","Uploading image..."));
        const b64 = await fileToB64(file);
        const r = await api("POST","/api/image",{query:{dir:App.dir, section},
          json:{ png_b64:b64, section }});
        block.items.push({ file:r.file }); markDirty(); renderGrid();
        setStatus("saved", T("status.image_added","Image added"));
        saveProject(true);
      }catch(err){ setStatus("err","image failed"); toast(T("toast.image_failed","Image upload failed: ")+err.message, true); }
      return;
    }
  }
}
// owning chapter number ("4") for image filename section
function sectionOf(id){
  const p = nodePath(id); return p ? p.split(".")[0] : "0";
}

   BLOCK EDITOR ④  FREE TABLE
============================================================================ */
function editTable(host, block){
  block.rows = block.rows && block.rows.length ? block.rows : [["",""],["",""]];
  block.header_rows = block.header_rows ?? 1;

  const tools = el("div",{class:"grid-tools"});
  const mkBtn=(t,fn)=>el("button",{class:"sm-btn",text:t,onclick:fn});
  const mkBtnT = (t,title,fn)=> el("button",{class:"sm-btn", text:t, title, onclick:fn});
  // Row/Col ops target the SELECTED cell's row/column (fall back to the last one
  // when nothing is selected). Grouped: rows together, then columns together.
  const curR = ()=> (ctx.focus ? ctx.focus.r : block.rows.length-1);
  const curC = ()=> (ctx.focus ? ctx.focus.c : colCount(block)-1);
  tools.appendChild(mkBtnT("+ "+T("table.row","Row"), T("table.add_row_ht","Insert a row below the selected row"),
    ()=>{ insertTableRow(block, curR()+1); markDirty(); rebuild(); }));
  tools.appendChild(mkBtnT("− "+T("table.row","Row"), T("table.del_row_ht","Delete the selected row"),
    ()=>{ if(deleteTableRow(block, curR())){ markDirty(); rebuild(); } }));
  tools.appendChild(el("span",{class:"mt-sep"}));
  tools.appendChild(mkBtnT("+ "+T("table.col","Col"), T("table.add_col_ht","Insert a column right of the selected column"),
    ()=>{ insertTableCol(block, curC()+1); markDirty(); rebuild(); }));
  tools.appendChild(mkBtnT("− "+T("table.col","Col"), T("table.del_col_ht","Delete the selected column"),
    ()=>{ if(deleteTableCol(block, curC())){ markDirty(); rebuild(); } }));
  tools.appendChild(el("span",{class:"mt-sep"}));
  tools.appendChild(el("label",{style:{color:"var(--muted)",fontSize:"13px"}, text:T("table.header_rows","Header rows:")}));
  const hdrInput = el("input",{class:"ti num", type:"number", min:"0", value:block.header_rows, style:{width:"64px"},
    oninput:(e)=>{ block.header_rows=Math.max(0,parseInt(e.target.value)||0); markDirty();
      restyleHeaderRows(ctx, block); }});
  tools.appendChild(hdrInput);

  const wrap = el("div",{class:"grid-wrap"});
  const capRow = el("div",{class:"field-row"});
  capRow.appendChild(el("label",{text:T("table.caption","Caption")}));
  capRow.appendChild(el("input",{class:"ti grow", value:block.caption||"", placeholder:T("table.caption_ph","Caption (number added automatically)"),
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));

  // Markdown editor: a textarea that live-renders into the grid below. Editing MD
  // is one-way (MD -> grid); "From table" pulls the current grid back into MD.
  const mdWrap = el("div",{class:"md-wrap", style:{display:"none"}});
  const mdArea = el("textarea",{class:"md-area", spellcheck:"false",
    placeholder:"| Header 1 | Header 2 |\n| --- | --- |\n| a | b |"});
  const applyMd = ()=>{
    const parsed = parseMarkdownTable(mdArea.value);
    if (!parsed || !parsed.rows.length) return;      // ignore incomplete/invalid input
    block.rows = parsed.rows; block.header_rows = parsed.header_rows;
    block.col_w = null;                              // column count may change -> equal widths
    // drop grid selection so the post-rebuild repaint doesn't steal focus from the textarea
    if (ctx){ ctx.focus=null; ctx.anchor=null; ctx.selected.clear(); ctx.editing=null; }
    markDirty(); rebuild();
  };
  mdArea.addEventListener("input", applyMd);
  mdArea.addEventListener("blur", ()=>saveProject(true));
  const mdBar = el("div",{class:"md-bar"});
  mdBar.appendChild(el("span",{class:"md-hint", text:T("table.md_hint","Edit the Markdown table — the grid below updates live.")}));
  mdBar.appendChild(el("button",{class:"sm-btn", text:"↻ "+T("table.md_from","From table"),
    onclick:()=>{ mdArea.value = tableToMarkdown(block); }}));
  mdWrap.appendChild(mdBar); mdWrap.appendChild(mdArea);
  let mdOpen = false;
  tools.appendChild(mkBtn("⇄ "+T("table.markdown","Markdown"), ()=>{
    mdOpen = !mdOpen; mdWrap.style.display = mdOpen ? "block" : "none";
    if (mdOpen) mdArea.value = tableToMarkdown(block);
  }));

  const rebuild = ()=>{
    wrap.innerHTML="";
    const tbl = el("table",{class:"grid free-grid"});     // fixed layout: typing never re-flows columns
    ctx.reg.clear();
    const nCols = colCount(block);
    // <colgroup> drives the fixed column widths (relative weights from col_w,
    // or equal when unset). Drag grips edit these weights (see startColResize).
    const weights = freeColWeights(block);
    const wsum = weights.reduce((a,b)=>a+(Number(b)||0),0) || 1;
    const cg = el("colgroup");
    for (let ci=0; ci<nCols; ci++)
      cg.appendChild(el("col",{style:{width:(100*(Number(weights[ci])||0)/wsum)+"%"}}));
    tbl.appendChild(cg);
    block.rows.forEach((row, ri)=>{
      const tr = el("tr",{class: ri<block.header_rows?"hdr":""});
      row.forEach((val, ci)=>{
        const cellDiv = el("div",{class:"cell", html: cellHtml(val)});   // rich: styled runs render as HTML
        const td = el("td",{},[cellDiv]);
        td.addEventListener("contextmenu",(e)=> openTableCellMenu(e, block, ri, ci, rebuild));
        if (ci < nCols-1){                                    // grip on every interior border (skip last col)
          const grip = el("div",{class:"col-grip", title:T("table.resize_col","Drag to resize column width")});
          grip.addEventListener("mousedown",(e)=> startColResize(e, ctx, block, ci));
          td.appendChild(grip);
        }
        regCell(ctx, {
          r:ri, c:ci, type:"text", el:cellDiv, rich:true,
          read: ()=> cellText(block.rows[ri][ci]),                 // plain text for copy / TSV / fill-down
          write:(s)=>{ block.rows[ri][ci] = s; cellDiv.innerHTML = cellHtml(s); },
          writeRich:(elm)=>{ const v = normalizeCell(htmlToRuns(elm)); block.rows[ri][ci] = v; cellDiv.innerHTML = cellHtml(v); },
          getRaw: ()=> block.rows[ri][ci],
          setRaw:(v)=>{ block.rows[ri][ci] = v; cellDiv.innerHTML = cellHtml(v); },
        });
        tr.appendChild(td);
      });
      tbl.appendChild(tr);
    });
    wrap.appendChild(tbl);
    ctx.table = tbl; tbl.classList.add("gi-grid");
    restoreFocusAfterRender(ctx);
  };

  const ctx = makeGridContext({
    block, host:wrap,
    rows:()=>block.rows.length, cols:()=>colCount(block),
    rerender:()=>rebuild(), kind:"free",
  });
  rebuild();
  host.appendChild(capRow);
  host.appendChild(tools);
  host.appendChild(wrap);
  host.appendChild(mdWrap);
}
function colCount(block){ return block.rows.reduce((m,r)=>Math.max(m,r.length),0); }
// toggle the .hdr class on existing rows without a full rebuild (preserves caret/selection)
function restyleHeaderRows(ctx, block){
  if (!ctx.table) return;
  ctx.table.querySelectorAll("tr").forEach((tr, i)=>{
    tr.classList.toggle("hdr", i < (block.header_rows||0));
  });
}

/* ---- free-table structural edits (shared by the +/- tools and the cell menu) --- */
function insertTableRow(block, at){
  const n = colCount(block);
  block.rows.splice(Math.max(0, Math.min(at, block.rows.length)), 0, new Array(n).fill(""));
}
function deleteTableRow(block, r){
  if (block.rows.length <= 1) return false;
  block.rows.splice(r, 1);
  if ((block.header_rows||0) > block.rows.length) block.header_rows = block.rows.length;
  return true;
}
function insertTableCol(block, at){
  block.rows.forEach(row => { const a = Math.max(0, Math.min(at, row.length)); row.splice(a, 0, ""); });
  if (Array.isArray(block.col_w)){
    const avg = block.col_w.reduce((a,b)=>a+(Number(b)||0),0) / (block.col_w.length||1)
              || (FREE_TBL_TOTAL_CM / (colCount(block)||1));
    block.col_w.splice(Math.min(at, block.col_w.length), 0, Math.round(avg*100)/100 || 2);
  }
}
function deleteTableCol(block, c){
  if (colCount(block) <= 1) return false;
  block.rows.forEach(row => { if (c < row.length) row.splice(c, 1); });
  if (Array.isArray(block.col_w)) block.col_w.splice(c, 1);
  return true;
}
// Right-click a free-table cell: insert / delete rows and columns relative to it.

/* ---- Markdown <-> free table (cells may be styled runs: **bold** *italic*) ---- */
function runsToInlineMd(runs){
  return (runs||[]).map(r=>{
    let t = String(r.t||"").replace(/\\/g,"\\\\").replace(/\|/g,"\\|").replace(/\*/g,"\\*").replace(/\n/g," ");
    if (!t) return "";
    if (r.i) t = "*"+t+"*";
    if (r.b) t = "**"+t+"**";
    return t;
  }).join("");
}
function inlineMdToRuns(s){
  const runs=[]; let buf="", b=false, it=false, i=0; const n=s.length;
  const flush=()=>{ if(buf){ const r={t:buf}; if(b)r.b=true; if(it)r.i=true; runs.push(r); buf=""; } };
  while(i<n){
    const ch=s[i];
    if(ch==="\\" && i+1<n){ buf+=s[i+1]; i+=2; continue; }     // unescape \*, \\, \|
    if(s.startsWith("***",i)){ flush(); b=!b; it=!it; i+=3; continue; }
    if(s.startsWith("**",i)){ flush(); b=!b; i+=2; continue; }
    if(ch==="*"){ flush(); it=!it; i+=1; continue; }
    buf+=ch; i++;
  }
  flush();
  return runs.length ? runs : [{t:""}];
}
function tableToMarkdown(block){
  const rows = block.rows || []; if (!rows.length) return "";
  const ncols = colCount(block);
  const cellMd = v => runsToInlineMd(cellRuns(v));
  const fmt = r => "| " + Array.from({length:ncols}, (_,c)=>cellMd((r||[])[c])).join(" | ") + " |";
  const hc = Math.min(Math.max(block.header_rows||0, 1), rows.length);   // a Markdown table needs >=1 header row
  const out = [];
  for (let i=0;i<hc;i++) out.push(fmt(rows[i]));
  out.push("| " + Array.from({length:ncols}, ()=>"---").join(" | ") + " |");
  for (let i=hc;i<rows.length;i++) out.push(fmt(rows[i]));
  return out.join("\n");
}
function parseMarkdownTable(md){
  const raw = (md||"").replace(/\r/g,"").split("\n").map(l=>l.trim()).filter(Boolean);
  const isSep = l => /^\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?$/.test(l);
  const splitRow = l => {
    let s = l.trim(); if (s.startsWith("|")) s = s.slice(1); if (s.endsWith("|")) s = s.slice(0,-1);
    const cells=[]; let cur="";
    for (let i=0;i<s.length;i++){ const ch=s[i];
      if (ch==="\\"){ const nx = s[i+1]||"";
        if (nx==="|"){ cur += "|"; i++; continue; }            // \| -> literal pipe (delimiter escaped)
        cur += "\\"+nx; i++; continue;                          // keep other escapes for the inline parser
      }
      if (ch==="|"){ cells.push(cur.trim()); cur=""; continue; }
      cur += ch;
    }
    cells.push(cur.trim()); return cells;
  };
  const dataLines=[]; let sepAt=-1;
  raw.forEach(l => { if (isSep(l)){ if (sepAt<0) sepAt = dataLines.length; return; } dataLines.push(l); });
  if (!dataLines.length) return null;
  const rows = dataLines.map(line => splitRow(line).map(cell => normalizeCell(inlineMdToRuns(cell))));
  const ncols = rows.reduce((m,r)=>Math.max(m,r.length),0);
  rows.forEach(r => { while (r.length < ncols) r.push(""); });
  const header_rows = sepAt>=0 ? Math.min(sepAt, rows.length) : (rows.length>1 ? 1 : 0);
  return { rows, header_rows };
}
// Free-table column widths. col_w is stored in cm (the engine reads it as Cm());
// preview + editor only use the ratios. When unset/mismatched, columns are equal
// and sum to FREE_TBL_TOTAL_CM so a first drag persists a sensible Word width.
const FREE_TBL_TOTAL_CM = 15.5;
function freeColWeights(block){
  const n = colCount(block);
  if (Array.isArray(block.col_w) && block.col_w.length === n)
    return block.col_w.map(w => { const x = Number(w); return isFinite(x) && x > 0 ? x : FREE_TBL_TOTAL_CM/(n||1); });
  return new Array(n).fill(FREE_TBL_TOTAL_CM/(n||1));
}
// Drag a column border: transfer width between column ci and ci+1 (sum kept
// constant, so the table stays put and only the two neighbors resize).
let _colResize = null;
function startColResize(e, ctx, block, ci){
  e.preventDefault(); e.stopPropagation();                 // not a .cell: never starts a cell selection
  const tbl = ctx.table; if(!tbl) return;
  const weights = freeColWeights(block).slice();
  _colResize = { ctx, block, ci, startX:e.clientX, weights, moved:false,
    sum: weights.reduce((a,b)=>a+b,0) || 1,
    tblW: tbl.getBoundingClientRect().width || 1,
    grip: e.currentTarget, cur: weights.slice() };
  if (_colResize.grip) _colResize.grip.classList.add("active");
  document.body.classList.add("col-resizing");
  document.addEventListener("mousemove", onColResizeMove);
  document.addEventListener("mouseup", endColResize);
}
function onColResizeMove(e){
  const s=_colResize; if(!s) return;
  s.moved = true;
  const dW = ((e.clientX - s.startX) / s.tblW) * s.sum;    // px delta -> weight delta
  const minW = s.sum * 0.05;                               // keep each column >= 5%
  let a = s.weights[s.ci] + dW, b = s.weights[s.ci+1] - dW;
  if (a < minW){ b -= (minW - a); a = minW; }
  if (b < minW){ a -= (minW - b); b = minW; }
  const cur = s.weights.slice(); cur[s.ci]=a; cur[s.ci+1]=b; s.cur=cur;
  const cols = s.ctx.table ? s.ctx.table.querySelectorAll("colgroup col") : [];
  const t = cur.reduce((x,y)=>x+y,0) || 1;
  cols.forEach((c,i)=>{ if(i<cur.length) c.style.width = (100*cur[i]/t)+"%"; });
}
function endColResize(){
  const s=_colResize; _colResize=null;
  document.removeEventListener("mousemove", onColResizeMove);
  document.removeEventListener("mouseup", endColResize);
  document.body.classList.remove("col-resizing");
  if(!s) return;
  if (s.grip) s.grip.classList.remove("active");
  if(!s.moved) return;                                     // a bare click leaves the model untouched
  s.block.col_w = s.cur.map(w => Math.round(w*100)/100);   // persist cm (2dp)
  markDirty(); saveProject(true);
}
function parseTSV(txt){
  return txt.replace(/\r/g,"").replace(/\n$/,"").split("\n").map(l=>l.split("\t"));
}

   BLOCK EDITOR ③  DATATABLE (compliance)
============================================================================ */
// fixed (non-axis) column count of the compliance grid:
// cat,item,unit,kind,limit,spec,spec_mtm[0..2]
const DT_FIXED_COLS = 9;
function editDatatable(host, block){
  block.data = block.data || blankComplianceData();

  // the whole block.data object (gridUndo -> ctx.block.data = snap.data).
  let data = block.data;
  const cfg = App.config.compliance || {};
  const defaultAxes = cfg.axis_labels || ["MIN","TYP","MAX","NTWC"];
  // stage presets are config-driven (neutral fallback); used for quick-add + the stage dropdown
  const stagePresets = (cfg.stages && cfg.stages.length) ? cfg.stages : ["S1","S2"];

  // caption + spec name

  top.appendChild(el("label",{text:T("table.caption","Caption")}));
  top.appendChild(el("input",{class:"ti grow", value:block.caption||"",
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  top.appendChild(el("label",{text:T("datatable.spec_name","Spec name")}));
  top.appendChild(el("input",{class:"ti", value:data.spec_name||"", style:{width:"160px"},
    oninput:(e)=>{ data.spec_name=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  host.appendChild(top);

  // import row
  const importRow = el("div",{class:"grid-tools"});
  const fileInput = el("input",{type:"file", accept:".xlsx", style:{display:"none"},
    onchange:(e)=>importXlsxCompliance(e.target.files[0], block)});
  importRow.appendChild(el("button",{class:"sm-btn", text:T("datatable.import_xlsx","Import xlsx"), onclick:()=>fileInput.click()}));
  importRow.appendChild(fileInput);
  importRow.appendChild(el("span",{style:{color:"var(--muted)",fontSize:"12px"}, text:T("datatable.paste_hint","Tip: select a metric cell and Ctrl+V an Excel region")}));
  host.appendChild(importRow);

  /* ----- groups / axes management ----- */
  const simSec = el("div",{class:"dt-section"});
  simSec.appendChild(el("div",{class:"dt-sh"},[ document.createTextNode(T("datatable.groups","Simulation groups / axes")) ]));
  const simBd = el("div",{class:"dt-bd"});
  // move an array element left/right (no-drag reorder fallback, decision 9)
  const moveInArr = (arr, i, dir)=>{ const j=i+dir; if(j<0||j>=arr.length) return false;
    const [m]=arr.splice(i,1); arr.splice(j,0,m); return true; };

  // ---- drag-reorder wirers (mirror wireBlockDrag; snapshot BEFORE the reorder) ----
  // Sim GROUP drag (reorders data.sims). Scoped to this block via the closure.
  let simGroupDragSrc=null;
  function wireSimGroupDrag(chip, si){
    chip.addEventListener("dragstart",(e)=>{ simGroupDragSrc=si; chip.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; });
    chip.addEventListener("dragend",()=>{ chip.classList.remove("dragging"); simGroupDragSrc=null;
      simBd.querySelectorAll(".sim-chip.dragover").forEach(c=>c.classList.remove("dragover")); });
    chip.addEventListener("dragover",(e)=>{ if(simGroupDragSrc!=null && simGroupDragSrc!==si){ e.preventDefault();
      chip.classList.add("dragover"); }});
    chip.addEventListener("dragleave",()=>chip.classList.remove("dragover"));
    chip.addEventListener("drop",(e)=>{
      e.preventDefault(); chip.classList.remove("dragover");
      if (simGroupDragSrc==null || simGroupDragSrc===si) return;
      snapshot(ctx);
      const [g]=data.sims.splice(simGroupDragSrc,1); data.sims.splice(si,0,g);
      markDirty(); redrawSims(); rebuildMetrics();
    });
  }
  // AXIS drag within a single group. stopPropagation keeps it from also firing the
  // enclosing group drag; constrained to the same group (axisDragSrc.si===si).
  let axisDragSrc=null; // {si, ai}
  function wireAxisDrag(aChip, si, ai){
    aChip.addEventListener("dragstart",(e)=>{ axisDragSrc={si,ai}; aChip.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; e.stopPropagation(); });
    aChip.addEventListener("dragend",()=>{ aChip.classList.remove("dragging"); axisDragSrc=null;
      simBd.querySelectorAll(".axis-chip.dragover").forEach(c=>c.classList.remove("dragover")); });
    aChip.addEventListener("dragover",(e)=>{ if(axisDragSrc && axisDragSrc.si===si && axisDragSrc.ai!==ai){
      e.preventDefault(); e.stopPropagation(); aChip.classList.add("dragover"); }});
    aChip.addEventListener("dragleave",()=>aChip.classList.remove("dragover"));
    aChip.addEventListener("drop",(e)=>{
      e.preventDefault(); e.stopPropagation(); aChip.classList.remove("dragover");
      if (!axisDragSrc || axisDragSrc.si!==si || axisDragSrc.ai===ai) return;
      snapshot(ctx);
      const ax=data.sims[si].axes; const [m]=ax.splice(axisDragSrc.ai,1); ax.splice(ai,0,m);
      markDirty(); redrawSims(); rebuildMetrics();
    });
  }
  // metric ROW drag (reorders data.rows). Called per-<tr> in rebuildMetrics.
  let metricDragSrc=null;
  function wireMetricRowDrag(tr, ri){
    tr.addEventListener("dragstart",(e)=>{ metricDragSrc=ri; tr.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; });
    tr.addEventListener("dragend",()=>{ tr.classList.remove("dragging"); metricDragSrc=null;
      metricWrap.querySelectorAll("tr.dragover").forEach(t=>t.classList.remove("dragover")); });
    tr.addEventListener("dragover",(e)=>{ if(metricDragSrc!=null && metricDragSrc!==ri){ e.preventDefault();
      tr.classList.add("dragover"); }});
    tr.addEventListener("dragleave",()=>tr.classList.remove("dragover"));
    tr.addEventListener("drop",(e)=>{
      e.preventDefault(); tr.classList.remove("dragover");
      if (metricDragSrc==null || metricDragSrc===ri) return;
      snapshot(ctx);
      const [m]=data.rows.splice(metricDragSrc,1); data.rows.splice(ri,0,m);
      markDirty(); rebuildMetrics(); validate(); focusCellAt(ctx, ri, 0);
    });
  }
  const addGroup = (stage)=>{

    // and export identical columns. Block creating one until the per-group model
    // migration lands (see simAxisCell TODO). Existing groups can still be deleted.
    if (data.sims.length >= 1){

      return;
    }

    markDirty(); redrawSims(); rebuildMetrics();
  };
  const redrawSims = ()=>{
    simBd.innerHTML="";
    const chips = el("div",{class:"chip-list"});
    data.sims.forEach((s, si)=>{
      const chip = el("div",{class:"sim-chip"});
      // drag handle toggles draggable only while the handle is grabbed (matches block-card pattern)
      const gHandle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
      gHandle.addEventListener("mousedown",()=>chip.setAttribute("draggable","true"));
      chip.addEventListener("dragend",()=>chip.setAttribute("draggable","false"));
      chip.appendChild(gHandle);
      wireSimGroupDrag(chip, si);
      // group reorder (left/right) — no-drag fallback; snapshot BEFORE reorder (decision 7)
      const gLeft = el("button",{class:"x-mini", title:T("grid.move_up","Move up"), text:"‹",
        onclick:()=>{ snapshot(ctx); if(moveInArr(data.sims,si,-1)){ markDirty(); redrawSims(); rebuildMetrics(); } }});
      const gRight = el("button",{class:"x-mini", title:T("grid.move_down","Move down"), text:"›",
        onclick:()=>{ snapshot(ctx); if(moveInArr(data.sims,si,1)){ markDirty(); redrawSims(); rebuildMetrics(); } }});
      if (si===0) gLeft.disabled=true;
      if (si===data.sims.length-1) gRight.disabled=true;
      chip.appendChild(gLeft); chip.appendChild(gRight);
      // stage select — key is assigned ONCE at creation and kept stable (decision 10)
      const stageSel = el("select",{class:"ti", style:{padding:"2px 4px"},
        onchange:(e)=>{ s.stage=e.target.value; markDirty(); }});
      const stageOpts = stagePresets.slice();
      if (s.stage && stageOpts.indexOf(s.stage)<0) stageOpts.unshift(s.stage); // keep custom value
      stageOpts.forEach(st=>{
        const o=el("option",{value:st,text:st}); if((s.stage||"")===st) o.selected=true; stageSel.appendChild(o);
      });
      chip.appendChild(stageSel);
      chip.appendChild(el("input",{class:"ti", value:s.title||"", placeholder:T("datatable.group_title","group title"),
        style:{width:"120px",padding:"2px 6px"}, oninput:(e)=>{ s.title=e.target.value; markDirty(); }}));
      // axes (reorderable via left/right buttons)

      (s.axes=s.axes||defaultAxes.slice()).forEach((ax, ai)=>{
        const aChip = el("span",{class:"axis-chip", draggable:"false"});
        const aHandle = el("span",{class:"drag-handle", style:{fontSize:"11px"}, text:"⠿",
          title:T("block.drag","Drag to reorder")});
        aHandle.addEventListener("mousedown",()=>aChip.setAttribute("draggable","true"));
        aChip.addEventListener("dragend",()=>aChip.setAttribute("draggable","false"));
        aChip.appendChild(aHandle);
        aChip.appendChild(el("button",{class:"x-mini", title:T("grid.move_up","Move up"), text:"‹",

        aChip.appendChild(document.createTextNode(ax));
        aChip.appendChild(el("button",{class:"x-mini", title:T("grid.move_down","Move down"), text:"›",

        wireAxisDrag(aChip, si, ai);

      chip.appendChild(el("button",{class:"x-mini", title:T("action.delete","Delete"), text:"🗑",

      chips.appendChild(chip);
    });
    simBd.appendChild(chips);
    const addG = el("div",{class:"grid-tools"});
    if (data.sims.length >= 1){
      // C1 stopgap: only one simulation group is safe today (see addGroup). Explain
      // why the add buttons are absent instead of silently dropping them.
      addG.appendChild(el("span",{style:{color:"var(--muted)",fontSize:"12px"},
        text:T("datatable.one_group_hint","One simulation group per table for now (multiple groups would share the same values).")}));

      });

  const addAxisTo = (s)=>{

          // coordinated with engine.py/tables.py; until then block to avoid data loss.
          toast(T("grid.one_extra_axis","Only one extra axis per group is supported"), true);
          return;
        }

  simSec.appendChild(simBd);
  host.appendChild(simSec);

  /* ----- metric grid ----- */
  const legend = el("div",{class:"legend"},[
    el("span",{html:'<span class="sw" style="background:#fef2f2;outline:2px solid #dc2626;outline-offset:-2px"></span>'+T("datatable.legend_flag","out-of-spec (auto red-flag)")}),
  ]);

  // rows() = metric row count; cols() = fixed cols + flat sim-axis count.
  const ctx = makeGridContext({
    block, host:metricWrap, kind:"compliance",
    rows:()=> data.rows.length,
    cols:()=> DT_FIXED_COLS + data.sims.reduce((n,s)=>n+(s.axes||[]).length,0),
    // re-sync `data` after an undo swaps block.data, then rebuild BOTH layers so the

    onclick:()=>{ snapshot(ctx); data.rows.push(newComplianceRow()); markDirty(); rebuildMetrics(); }}));
  host.appendChild(rowTools);

  let flags = {}; // rowIndex -> [axisIndex...] (flat index across sims)
  // Auto red-flag availability indicator: a badge appended once to the legend
  // (legend is built once, outside rebuildMetrics, so it survives grid rebuilds).
  // It MUST be impossible to confuse "validator could not run" with "all in spec".
  const valBadge = el("span",{class:"val-badge",
    title:T("datatable.validation_unavailable_hint","Auto red-flag could not run; verify out-of-spec values manually."),
    text:T("datatable.validation_unavailable","validation unavailable")});
  valBadge.style.display = "none";
  legend.appendChild(valBadge);
