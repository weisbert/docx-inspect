  return wrap;
}

/* ============================================================================
   NOTES / REVISION-REMARK CHANNEL
   A note lives inside project.json as an entry of an owner's `notes` array, where
   an owner is the report (App.project.meta), a section (outline node) or a block:
       { by:"user"|"claude", at:"YYYY-MM-DD", status:"open"|"done", text:"..." }
   Notes ride along with Copy text (whole project.json) and Apply update (patch by
   title), so the user leaves instructions for Claude and Claude leaves replies —
   both in the same channel. The engine renders only known block types/fields, so
   notes NEVER reach the Word body (guarded by test_render_golden). `by` marks the
   author: GUI-authored notes are "user"; Claude writes "claude" entries directly
   into the JSON when answering a Copy-text paste.
============================================================================ */
const NOTE_SELF = "user";   // notes written in this GUI are the user's
function noteStamp(){
  const d = new Date();
  const p = (x)=>String(x).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}
function noteList(owner){ return (owner && Array.isArray(owner.notes)) ? owner.notes : []; }
function openNotes(owner){ return noteList(owner).filter(n => n && n.status !== "done"); }
function addNoteTo(owner){
  if (!Array.isArray(owner.notes)) owner.notes = [];
  const n = { by:NOTE_SELF, at:noteStamp(), status:"open", text:"" };
  owner.notes.push(n); return n;
}
// Count every open note across the whole project (report + all sections + blocks).
function countAllOpenNotes(){
  if (!App.project) return 0;
  let n = openNotes(App.project.meta || {}).length;
  const walk = (node)=>{
    n += openNotes(node).length;
    (node.blocks || []).forEach(b => { if (b) n += openNotes(b).length; });
    (node.children || []).forEach(walk);
  };
  (App.project.outline || []).forEach(walk);
  return n;
}
function refreshNotesBadge(){
  const btn = $("#btn-notes"), cnt = $("#notes-count");
  if (!btn || !cnt) return;
  const has = !!App.project;
  btn.style.display = has ? "" : "none";
  if (!has) return;
  const n = countAllOpenNotes();
  cnt.textContent = String(n);
  btn.classList.toggle("has-open", n > 0);
}

// Build a collapsible notes panel bound to `owner` (mutated in place). `title`
// labels the section; `startOpen` forces the <details> open (used when the owner
// already has open notes so the user sees them without a click).
function buildNotesPanel(owner, title){
  const det = el("details",{class:"notes-panel"});
  const badge = el("span",{class:"notes-badge"});
  const sum = el("summary",{},[
    el("span",{text:"📝"}),
    el("span",{class:"notes-lbl", text: title || T("notes.title","Notes")}),
    badge,
  ]);
  det.appendChild(sum);
  const body = el("div",{class:"notes-body"});
  det.appendChild(body);

  const syncBadge = ()=>{
    const open = openNotes(owner).length, total = noteList(owner).length;
    badge.textContent = total ? (open ? String(open) : "✓") : "0";
    badge.classList.toggle("zero", open === 0);
    det.classList.toggle("has-open", open > 0);
  };
  const redraw = ()=>{
    body.innerHTML = "";
    const list = noteList(owner);
    list.forEach((note, i)=>{
      const isClaude = note.by === "claude";
      const done = note.status === "done";
      const row = el("div",{class:"note-row"+(done?" done":"")});
      row.appendChild(el("div",{class:"note-meta"},[
        el("span",{class:"note-by "+(isClaude?"claude":"user"),
          text: isClaude ? T("notes.by_claude","Claude") : T("notes.by_you","You")}),
        note.at ? el("span",{class:"note-at", text:note.at}) : null,
      ]));
      const main = el("div",{class:"note-main"});
      // Claude's replies are read-only here so authorship stays honest; the user
      // still toggles their status and can delete them.
      // NB: a <textarea>'s content is its .value property, NOT a "value" attribute
      // (el() would set the ignored attribute) -- so seed it via .value directly.
      const ta = el("textarea",{class:"note-text",
        placeholder:T("notes.placeholder","Write a note or instruction…")});
      ta.value = note.text || "";
      if (isClaude) ta.setAttribute("readonly","");
      else {
        ta.addEventListener("input",()=>{ note.text = ta.value; markDirty(); });
        ta.addEventListener("blur",()=>saveProject(true));
      }
      main.appendChild(ta);
      const acts = el("div",{class:"note-actions"});
      const tog = el("button",{class:"note-toggle "+(done?"done":"open"),
        text: done ? "✓ "+T("notes.done","Done") : "○ "+T("notes.open","Open"),
        onclick:()=>{ note.status = done ? "open" : "done"; markDirty();
          redraw(); syncBadge(); refreshNotesBadge(); }});
      acts.appendChild(tog);
      acts.appendChild(el("button",{class:"icon-btn danger", text:"✕", title:T("action.delete","Delete"),
        onclick:()=>{ list.splice(i,1); if(!list.length) delete owner.notes;
          markDirty(); redraw(); syncBadge(); refreshNotesBadge(); }}));
      main.appendChild(acts);
      row.appendChild(main);
      body.appendChild(row);
    });
    // add-note affordance
    const addWrap = el("div",{class:"note-add"});
    const nta = el("textarea",{placeholder:T("notes.add","Add a note or instruction…")});
    const commit = ()=>{ const v=nta.value.trim(); if(!v) return;
      const n = addNoteTo(owner); n.text = v; markDirty();
      redraw(); syncBadge(); refreshNotesBadge(); };
    nta.addEventListener("keydown",(e)=>{ if(e.key==="Enter" && (e.ctrlKey||e.metaKey)){ e.preventDefault(); commit(); }});
    // Auto-commit on blur so a note isn't lost when you click away without pressing
    // Add. commit() no-ops on empty text, so tabbing past an empty box adds nothing.
    nta.addEventListener("blur", commit);
    addWrap.appendChild(nta);
    addWrap.appendChild(el("button",{class:"sm-btn", text:"+ "+T("notes.add_btn","Add"), onclick:commit}));
    body.appendChild(addWrap);
  };
  redraw(); syncBadge();
  if (openNotes(owner).length) det.setAttribute("open","");
  return det;
}

/* ---- notes overview (scan every note before Copy text) -------------------- */
function openNotesOverview(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("notes.overview.title","All notes")}));
  m.appendChild(el("p",{text:T("notes.overview.sub","Every note in this report. Click one to jump to it. Notes travel with Copy text but are never printed into the Word body.")}));

  // gather {owner, loc, jump} entries that actually carry notes
  const entries = [];
  const meta = App.project.meta || {};
  if (noteList(meta).length) entries.push({owner:meta, loc:T("notes.loc.report","Report (cover)"), jump:()=>{ App.selId=COVER_ID; renderTree(); renderEditor(); }});
  const walk = (node)=>{
    if (noteList(node).length){
      const path = nodePath(node.id);
      entries.push({owner:node, loc:(path?path+" ":"")+(node.title||T("node.untitled","(untitled)")),
        jump:()=>{ App.selId=node.id; renderTree(); renderEditor(); }});
    }
    (node.blocks || []).forEach((b, bi)=>{ if (b && noteList(b).length){
      const path = nodePath(node.id);
      const kind = ({para:"Paragraph",image:"Image",imagegrid:"Image grid",datatable:"Data table",table:"Table"}[b.type]||b.type);
      entries.push({owner:b, loc:(path?path+" ":"")+(node.title||"")+" › "+kind+" #"+(bi+1),
        jump:()=>{ App.selId=node.id; renderTree(); renderEditor(); }});
    }});
    (node.children || []).forEach(walk);
  };
  (App.project.outline || []).forEach(walk);

  const box = el("div",{class:"notes-ov"});
  if (!entries.length){
    box.appendChild(el("div",{class:"notes-ov-empty", text:T("notes.overview.empty","No notes yet. Add one from any section, block, or the cover.")}));
  } else {
    entries.forEach(e=>{
      const item = el("div",{class:"notes-ov-item", onclick:()=>{ closeOverlay(); e.jump(); }});
      item.appendChild(el("div",{class:"notes-ov-loc", text:e.loc}));
      noteList(e.owner).forEach(note=>{
        const done = note.status === "done";
        item.appendChild(el("div",{class:"notes-ov-note"+(done?" done":""), style:done?{opacity:.55}:{}},[
          el("span",{class:"note-by "+(note.by==="claude"?"claude":"user"),
            text:note.by==="claude"?T("notes.by_claude","Claude"):T("notes.by_you","You")}),
          el("span",{text:(note.text||"").slice(0,160) + (done?"  ✓":"")}),
        ]));
      });
      box.appendChild(item);
    });
  }
  m.appendChild(box);
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"tb-btn primary", text:T("action.close","Close"), onclick:closeOverlay}),
  ]));
  showOverlay();
}

// D4: after inserting a block, focus + scroll its card so the user can type
// straight away (no extra click). insertAt sets App._focusBlock; the card
// builders record the matching element; renderNodeEditor triggers the focus.
let _pendingFocusEl = null;
function focusPendingBlock(){
  if (!App._focusBlock) return;
  const target = _pendingFocusEl;
  App._focusBlock = null; _pendingFocusEl = null;
  if (!target) return;
  requestAnimationFrame(()=>{
    try{ target.scrollIntoView({block:"center", behavior:"smooth"}); }
    catch(_){ try{ target.scrollIntoView(); }catch(__){} }
    const f = target.querySelector("input,textarea,[contenteditable='true'],.img-drop,select");
    if (f){ try{ f.focus(); }catch(_){} }
  });
}

/* ---- node (section) editor ------------------------------------------------ */
function renderNodeEditor(host, node){
  const path = nodePath(node.id);
  host.appendChild(el("div",{class:"ed-header"},[
    el("div",{},[
      el("h2",{class:"ed-title", text:(path?path+" ":"")+(node.title||T("node.untitled","(untitled)"))}),
      el("div",{class:"ed-sub", text: node.origin==="user"?T("editor.user_section","User-added section"):T("editor.template_section","Template section")})
    ]),
    el("div",{class:"ed-tools"},[
      el("button",{class:"sm-btn", text:T("ctx.rename","Rename"), onclick:()=>renameNode(node.id)})
    ])
  ]));

  // section-level notes (instructions/replies for this section as a whole)
  host.appendChild(buildNotesPanel(node, T("notes.section","Section notes")));

  // fixed-body (read-only with unlock affordance)
  if (node.fixed_body){
    host.appendChild(el("div",{class:"ro-note"},[
      el("span",{text:T("editor.fixed_note","This section uses standard fixed text from the template.")}),
      el("button",{class:"sm-btn", style:{marginLeft:"auto"}, text:T("ctx.unlock","Unlock / override"),
        onclick:()=>unlockNode(node.id)})
    ]));
    host.appendChild(el("div",{class:"fixed-preview", text:T("editor.fixed_preview","(Standard text rendered by the engine at export.)")}));
    return;
  }

  node.blocks = node.blocks || [];
  App._capNums = computeCaptionNumbers();   // live Figure/Table numbers for this render
  const listHost = el("div",{class:"block-list"});
  // Consecutive paragraphs render as ONE continuous rich-text editor; media
  // blocks (image/grid/table/datatable) stay standalone and split the prose
  // into separate editing regions.
  groupBlocks(node.blocks).forEach((seg, si)=>{
    listHost.appendChild(buildInsertBar(node, si));   // hover-to-insert a block before this card
    if (seg.kind==="prose") listHost.appendChild(renderProseCard(node, seg));
    else listHost.appendChild(renderBlockCard(node, seg.block, seg.idx));
  });
  host.appendChild(listHost);
  host.appendChild(buildAddBlock(node));
  focusPendingBlock();   // D4: focus a just-inserted block
}

function nodePath(id){
  // compute "1.2.3" numbering by position
  let result=null;
  const rec=(nodes, prefix)=>{
    nodes.forEach((n,i)=>{
      const num = prefix.concat(i+1);
      if (n.id===id){ result=num.join("."); return; }
      rec(n.children||[], num);
    });
  };
  rec(App.project.outline, []);
  return result;
}

/* ---- block grouping (paragraphs of ONE text card -> one prose region) ------ */
// A text card is a contiguous run of para blocks whose first block carries
// cardStart. A media block always breaks the run. A para WITHOUT cardStart
// continues the current card (the flowing multi-paragraph editor: Enter adds a
// paragraph to the same card); a para WITH cardStart begins a new card, so text
// blocks the user adds separately never auto-merge just because they are adjacent.
// Legacy paragraphs (no cardStart) still group by adjacency, so existing reports
// render unchanged until edited.
function groupBlocks(blocks){
  const segs = []; let cur = null;
  (blocks||[]).forEach((b, i)=>{
    if (b && b.type==="para"){
      if (!cur || b.cardStart){ cur = { kind:"prose", start:i, blocks:[] }; segs.push(cur); }
      cur.blocks.push(b);
    } else {
      cur = null;
      segs.push({ kind:"block", idx:i, block:b });
    }
  });
  return segs;
}

/* ---- prose region card (continuous multi-paragraph editor) --------------- */
function renderProseCard(node, seg){
  const card = el("div",{class:"card prose-card"});
  if (App._focusBlock && seg.blocks && seg.blocks.indexOf(App._focusBlock) >= 0) _pendingFocusEl = card;
  const target = ()=> seg.blocks[0];   // the segment's first block (live via serialize)
  // drop feedback: a seam in the gap above/below this prose card (not a whole-card
  // highlight) so it's clear whether the drop lands before or after it.
  card.addEventListener("dragover",(e)=>{ if(blockDragSrc&&blockDragSrc.node===node && blockDragSrc.blocks.indexOf(target())<0){ e.preventDefault(); markDropSeam(card, e); }});
  card.addEventListener("dragleave",()=>card.classList.remove("drop-before","drop-after"));
  card.addEventListener("drop",(e)=>{
    e.preventDefault();
    const after = card.classList.contains("drop-after");
    card.classList.remove("drop-before","drop-after");
    if (!blockDragSrc||blockDragSrc.node!==node) return;
    const tgt = after ? blockAfter(node, seg.blocks[seg.blocks.length-1]) : target();
    moveBlocksBefore(node, blockDragSrc.blocks, tgt);
  });

  const bar = el("div",{class:"card-bar"});
  // drag handle (moves the whole text segment); only the handle is draggable, so
  // selecting text inside the editor is unaffected
  const handle = el("span",{class:"drag-handle", draggable:"true", title:T("block.drag","Drag to reorder"), text:"⠿"});
  handle.addEventListener("dragstart",(e)=>{ blockDragSrc={node, blocks: seg.blocks.slice()};
    card.classList.add("dragging"); e.dataTransfer.effectAllowed="move";
    try{ e.dataTransfer.setDragImage(card, 12, 12); }catch(_){} });
  handle.addEventListener("dragend",()=>{ card.classList.remove("dragging"); blockDragSrc=null; clearDropMarks(); });
  bar.appendChild(handle);
  bar.appendChild(el("span",{class:"card-kind", text:T("block.prose","Text")}));
  const actions = el("div",{class:"card-actions"});
  actions.appendChild(el("button",{class:"icon-btn", title:T("action.copy_text","Copy this text (paste in any section or project)"), text:"⧉",
    onclick:()=>copyBlocks(seg.blocks, T("block.prose","Text"))}));
  actions.appendChild(el("button",{class:"icon-btn danger", title:T("action.delete","Delete"), text:"✕",
    onclick:()=>{
      const del=()=>{ seg.blocks.forEach(b=>{ const i=node.blocks.indexOf(b); if(i>=0) node.blocks.splice(i,1); });
        markDirty(); renderEditor(); toast(T("toast.deleted_undo","Deleted — Ctrl+Z to undo")); };
      const hasText = seg.blocks.some(b=>(b.runs||[]).some(r=>(r.t||"").trim()));
      if (hasText) modalConfirm(T("dialog.del_text.title","Delete this text?"),
        T("dialog.del_text.msg","Remove this text block and all its paragraphs? (Ctrl+Z undoes it.)"), del);
      else del();
    }}));
  bar.appendChild(actions);
  card.appendChild(bar);

  const body = el("div",{class:"card-body"});
  buildProseEditor(body, node, seg);
  card.appendChild(body);
  // notes for this text run attach to its first paragraph block (stable owner)
  if (seg.blocks && seg.blocks[0])
    card.appendChild(buildNotesPanel(seg.blocks[0], T("notes.block","Block notes")));
  return card;
}

/* ---- generic block card chrome ------------------------------------------- */
function renderBlockCard(node, block, idx){
  // Resolve the live index at action time: prose edits add/remove paragraphs and
  // shift this block's position, so a captured idx would go stale.
  const cur = ()=> node.blocks.indexOf(block);
  const card = el("div",{class:"card", draggable:"false"});
  if (App._focusBlock === block) _pendingFocusEl = card;
  const kindLabel = {
    para:T("block.add.para","Paragraph"), image:T("block.add.image","Image"),
    imagegrid:T("block.add.imagegrid","Image grid"),
    datatable:T("block.add.datatable","Data table"), table:T("block.add.table","Table")
  }[block.type] || block.type;

  const bar = el("div",{class:"card-bar"});
  const handle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
  handle.addEventListener("mousedown",()=>{ card.setAttribute("draggable","true"); });
  card.addEventListener("dragend",()=>{ card.setAttribute("draggable","false"); });
  bar.appendChild(handle);
  bar.appendChild(el("span",{class:"card-kind", text:kindLabel}));
  // Live caption number (auto, chapter-scoped) so the user knows exactly what
  // "Figure/Table N-M" this is when writing a cross-reference in the body text.
  const numInfo = capNum(block.id);
  if (numInfo) bar.appendChild(el("span",{class:"card-num",
    title:T("block.caption_num","Auto caption number — updates itself; reference it from body text via the Ref button"),
    text: numInfo.kind + " " + numInfo.num}));
  const actions = el("div",{class:"card-actions"});
  const up = el("button",{class:"icon-btn", title:T("action.up","Move up"), text:"↑", onclick:()=>moveBlock(node,cur(),-1)});
  const dn = el("button",{class:"icon-btn", title:T("action.down","Move down"), text:"↓", onclick:()=>moveBlock(node,cur(),1)});
  if (idx===0) up.disabled=true;
  if (idx===node.blocks.length-1) dn.disabled=true;
  actions.appendChild(up); actions.appendChild(dn);
  actions.appendChild(el("button",{class:"icon-btn", title:T("action.copy","Copy block (paste in any section or project)"), text:"⧉",
    onclick:()=>copyBlocks([block], kindLabel)}));
  if (block.type==="table" || block.type==="datatable")
    actions.appendChild(el("button",{class:"icon-btn", title:T("action.export_xlsx","Export this table to Excel (.xlsx) — mirrors the Word table"), text:"⬇",
      onclick:()=>exportBlockXlsx(block)}));
  actions.appendChild(el("button",{class:"icon-btn danger", title:T("action.delete","Delete"), text:"✕",
    onclick:()=>{
      const i=cur(); if(i<0) return;
      const del=()=>{ node.blocks.splice(i,1); markDirty(); renderEditor();
        toast(T("toast.deleted_undo","Deleted — Ctrl+Z to undo")); };
      // Project-level Ctrl+Z DOES restore a deleted block (pjRestore rebuilds the
      // whole project). Only the block's own grid-granular undo history is lost.
      // Still confirm the costly ones so a full data table isn't wiped by a misclick.
      const warn = deleteBlockWarning(block);
      if (warn) modalConfirm(T("dialog.del_block.title","Delete this block?"), warn, del);
      else del();
    }}));
  bar.appendChild(actions);
  card.appendChild(bar);

  const body = el("div",{class:"card-body"});
  if (block.type==="image") editImage(body, block, node);
  else if (block.type==="imagegrid") editImageGrid(body, block, node);
  else if (block.type==="table") editTable(body, block);
  else if (block.type==="datatable") editDatatable(body, block);
  card.appendChild(body);
  card.appendChild(buildNotesPanel(block, T("notes.block","Block notes")));

  wireBlockDrag(card, node, block);
  return card;
}
// Returns a confirmation message if deleting `block` would lose hard-to-recreate
// data, else null (delete silently). Images/empty blocks are cheap to re-add.
function deleteBlockWarning(block){
  if (!block) return null;
  if (block.type === "datatable"){
    const n = ((block.data && block.data.rows) || []).length;
    const base = T("dialog.del_datatable.msg","This deletes the whole compliance table. Ctrl+Z undoes it, but the table's own edit history is lost.");
    return n ? (base + " (" + n + (n===1?" metric row":" metric rows") + ")") : base;
  }
  if (block.type === "table"){
    const hasData = (block.rows || []).some(r => (r||[]).some(c => String(c==null?"":c).trim()));
    if (hasData) return T("dialog.del_table.msg","This deletes the table and its contents. Ctrl+Z undoes it.");
  }
  return null;
}
function moveBlock(node, idx, dir){
  const j=idx+dir; if (idx<0||j<0||j>=node.blocks.length) return;
  const [b]=node.blocks.splice(idx,1); node.blocks.splice(j,0,b); markDirty(); renderEditor();
}
// Move one-or-more blocks so they land BEFORE targetBlock (or at the end when
// targetBlock is null). Handles both a single media block and a whole prose
// segment (several para blocks moved together). Mutates node.blocks in place.
function moveBlocksBefore(node, movingBlocks, targetBlock){
  if (!node || !movingBlocks || !movingBlocks.length) return;
  const set = new Set(movingBlocks);
  if (targetBlock && set.has(targetBlock)) return;      // dropping onto itself
  const kept = node.blocks.filter(b=>!set.has(b));
  let to = targetBlock ? kept.indexOf(targetBlock) : kept.length;
  if (to < 0) to = kept.length;
  kept.splice(to, 0, ...movingBlocks);
  node.blocks.length = 0;
  for (const b of kept) node.blocks.push(b);
  markDirty(); renderEditor();
}
// The block just after `block` in node.blocks, or null at the end. Used to turn a
// "drop after this card" gesture into moveBlocksBefore(the next block).
function blockAfter(node, block){
  const i = node.blocks.indexOf(block);
  return (i>=0 && i+1 < node.blocks.length) ? node.blocks[i+1] : null;
}
// Clear every drag insertion seam (belt-and-suspenders on dragend / drop).
function clearDropMarks(){
  document.querySelectorAll(".card.drop-before,.card.drop-after")
    .forEach(c=>c.classList.remove("drop-before","drop-after"));
}
// Given a card element and the pointer event, mark the seam ABOVE (top half) or
// BELOW (bottom half) and return true when the drop should land AFTER the card.
function markDropSeam(card, e){
  const rect = card.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height/2;
  card.classList.toggle("drop-after", after);
  card.classList.toggle("drop-before", !after);
  return after;
}
let blockDragSrc=null;
function wireBlockDrag(card, node, block){
  card.addEventListener("dragstart",(e)=>{ blockDragSrc={node, blocks:[block]}; card.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
  card.addEventListener("dragend",()=>{ card.classList.remove("dragging"); blockDragSrc=null; clearDropMarks(); });
  // seam feedback in the gap above/below (top half -> before, bottom half -> after)
  card.addEventListener("dragover",(e)=>{ if(blockDragSrc&&blockDragSrc.node===node && blockDragSrc.blocks.indexOf(block)<0){ e.preventDefault(); markDropSeam(card, e); }});
  card.addEventListener("dragleave",()=>card.classList.remove("drop-before","drop-after"));
  card.addEventListener("drop",(e)=>{
    e.preventDefault();
    const after = card.classList.contains("drop-after");
    card.classList.remove("drop-before","drop-after");
    if (!blockDragSrc||blockDragSrc.node!==node) return;
    const tgt = after ? blockAfter(node, block) : block;   // before this block, or the next
    moveBlocksBefore(node, blockDragSrc.blocks, tgt);
  });
}

/* ---- add-block picker ----------------------------------------------------- */
/* ============================================================================
   BLOCK CLIPBOARD  (copy / paste blocks across sections AND projects)
   The clipboard lives in localStorage, so it survives switching projects and
   page reloads. A pasted media block gets a FRESH id (so its caption bookmark /
   cross-reference never collides with the source). When a block is pasted into a
   DIFFERENT project than it was copied from, its image bytes are re-uploaded into
   the target project in the background (best effort) so the picture comes along.
============================================================================ */
const BLOCK_CLIP_KEY = "docbuilder.blockclip.v1";
function setBlockClip(payload){
  App._blockClip = payload;                                   // in-memory mirror
  try{ localStorage.setItem(BLOCK_CLIP_KEY, JSON.stringify(payload)); }catch(_){}
}
function getBlockClip(){
  try{ const s = localStorage.getItem(BLOCK_CLIP_KEY); if (s) return JSON.parse(s); }catch(_){}
  return App._blockClip || null;                              // fallback if storage blocked
}
function blockWord(n){ return n===1 ? T("block.one","block") : T("block.many","blocks"); }

// Deep-copy the given blocks onto the clipboard. `label` is a short hint shown in
// the paste menu (e.g. "Table", "Text").
function copyBlocks(blocks, label){
  flushActiveGrid();                          // commit any in-flight grid cell first
  const clones = (blocks||[]).filter(Boolean).map(b => JSON.parse(JSON.stringify(b)));
  if (!clones.length) return;
  setBlockClip({ v:1, dir: App.dir||"", label: label||"", blocks: clones });
  renderEditor();                             // rebuild pickers so "Paste" shows up now
  toast(T("toast.block_copied","Copied")+" "+clones.length+" "+blockWord(clones.length));
}

// Clone for insertion: a new id keeps caption bookmarks / cross-refs unique.
function cloneBlockFresh(b){
  const c = JSON.parse(JSON.stringify(b));
  if (c.id) c.id = uid();
  return c;
}

function pasteBlocks(node, atIndex){
  const clip = getBlockClip();
  if (!clip || !Array.isArray(clip.blocks) || !clip.blocks.length){
    toast(T("toast.clip_empty","Nothing copied yet"), true); return;
  }
  const fresh = clip.blocks.map(cloneBlockFresh);
  // Pasted text lands as its OWN card (a leading paragraph starts a fresh card,
  // so it never merges into the text block above the paste point).
  if (fresh[0] && fresh[0].type==="para") fresh[0].cardStart = true;
  const at = Math.max(0, Math.min(atIndex==null ? node.blocks.length : atIndex, node.blocks.length));
  node.blocks.splice(at, 0, ...fresh);
  markDirty(); renderEditor(); saveProject(true);
  toast(T("toast.block_pasted","Pasted")+" "+fresh.length+" "+blockWord(fresh.length));
  // cross-project paste: bring the image bytes along (best effort, async)
  if (clip.dir && App.dir && clip.dir !== App.dir){
    const imgs = fresh.filter(b => b.type==="image" || b.type==="imagegrid");
    if (imgs.length) importPastedImages(imgs, clip.dir, node);
  }
}

// Re-upload images referenced by pasted blocks from their source project into the
// current one, so a cross-project paste shows the picture, not a placeholder.
async function importPastedImages(blocks, srcDir, node){
  let changed = false, failed = 0;
  for (const b of blocks){
    try{
      if (b.type==="image" && b.file){ b.file = await reuploadImage(b.file, srcDir, node); changed = true; }
      else if (b.type==="imagegrid"){
        for (const it of (b.items||[])){ if (it && it.file){ it.file = await reuploadImage(it.file, srcDir, node); changed = true; } }
      }
    }catch(_){ failed++; }
  }
  if (changed){ markDirty(); renderEditor(); saveProject(true); }
  if (failed) toast(T("toast.img_copy_partial","Some images could not be copied across projects; paste them again"), true);
}
async function reuploadImage(file, srcDir, node){
  const resp = await fetch(file + "?dir=" + encodeURIComponent(srcDir));
  if (!resp.ok) throw new Error("src "+resp.status);
  const b64 = await fileToB64(await resp.blob());
  const section = sectionOf(node.id);
  const r = await api("POST","/api/image",{query:{dir:App.dir, section}, json:{ png_b64:b64, section }});
  return r.file;
}

/* ============================================================================
   SECTION CLIPBOARD  (copy / paste / duplicate a whole outline node)
   Deep-copies a node (title + blocks + all descendants). Pasted nodes get FRESH
   ids for every node AND media block so selection and caption bookmarks never
   collide. Clipboard is in localStorage (survives project switching); a cross-
   project paste re-uploads the subtree's images. Mirrors the block clipboard.
============================================================================ */
const NODE_CLIP_KEY = "docbuilder.nodeclip.v1";
function setNodeClip(payload){
  App._nodeClip = payload;
  try{ localStorage.setItem(NODE_CLIP_KEY, JSON.stringify(payload)); }catch(_){}
}
function getNodeClip(){
  try{ const s = localStorage.getItem(NODE_CLIP_KEY); if (s) return JSON.parse(s); }catch(_){}
  return App._nodeClip || null;
}
// Deep clone a node subtree with fresh node + media-block ids.
function cloneNodeFresh(node){
  const c = JSON.parse(JSON.stringify(node));
  (function walk(n){
    n.id = uid();
    n.origin = "user";                       // a pasted section is a new, user-owned node
    n._collapsed = false;
    (n.blocks || []).forEach(b => { if (b && b.id) b.id = uid(); });
    (n.children || []).forEach(walk);
  })(c);
  return c;
}
function collectNodeImages(node, out){
  out = out || [];
  (node.blocks || []).forEach(b => { if (b && (b.type==="image" || b.type==="imagegrid")) out.push(b); });
  (node.children || []).forEach(c => collectNodeImages(c, out));
  return out;
}
function copySection(id){
  const r = findNode(id); if (!r) return;
  flushActiveGrid();
  setNodeClip({ v:1, dir: App.dir||"", node: JSON.parse(JSON.stringify(r.node)) });
  renderTree();                              // rebuild so "Paste section" becomes available
  toast(T("toast.section_copied","Section copied (paste in any section or project)"));
}
function pasteSection(id, where){            // where: "sibling" (after id) | "child"
  const clip = getNodeClip();
  if (!clip || !clip.node){ toast(T("toast.clip_empty_section","No section copied yet"), true); return; }
  const r = findNode(id); if (!r) return;
  const fresh = cloneNodeFresh(clip.node);
  if (where==="child"){ (r.node.children = r.node.children||[]).push(fresh); r.node._collapsed=false; }
  else { r.list.splice(r.idx+1, 0, fresh); }
  markDirty(); App.selId = fresh.id; renderTree(); renderEditor(); saveProject(true);
  toast(T("toast.section_pasted","Section pasted"));
  if (clip.dir && App.dir && clip.dir !== App.dir){          // cross-project: bring images along
    const imgs = collectNodeImages(fresh);
    if (imgs.length) importPastedImages(imgs, clip.dir, fresh);
  }
}
function duplicateSection(id){               // copy + paste-as-sibling in one step
  copySection(id); pasteSection(id, "sibling");
}

// Fill a `.picker` with the block-type choices (paragraph / image / grid / table
// presets / paste). `getAt()` returns the insert index and is called at CLICK
// time, so the position stays correct even after prose edits shift block indices.
function populateBlockPicker(picker, node, getAt){
  const insertAt = (block)=>{
    const at = Math.max(0, Math.min(getAt(), node.blocks.length));
    node.blocks.splice(at, 0, block); App._focusBlock = block;   // D4: focus it after render
    markDirty(); renderEditor();
  };
  const defs = [
    ["para","¶","block.add.para","Paragraph"],
    ["image","🖼","block.add.image","Image"],
    ["imagegrid","▤","block.add.imagegrid","Image grid"],
  ];
  defs.forEach(([type,ico,uik,fb])=>{
    picker.appendChild(el("button",{class:"pick", onclick:()=>insertAt(newBlock(type))},
      [ el("span",{class:"ico",text:ico}), el("span",{text:T(uik,fb)}) ]));
  });
  // "Table" template group -- presets over the base table / datatable types
  picker.appendChild(el("div",{class:"pick-group",
    style:{padding:"5px 10px 2px", fontSize:"11px", opacity:"0.55"},
    text:T("block.add.table_group","Table")}));
  const tplDefs = [
    ["plain","⊞","block.add.table.plain","Plain table"],
    ["compliance","▦","block.add.table.compliance","Compliance table"],
    ["compare","▥","block.add.table.compare","Comparison (no spec)"],
  ];
  // Append template-config presets (PN table, condition table, ...). Their
  // starter rows come with the condition rows built in, so a preset-built table
  // can never forget them -- the structural fix for the "AI made a table with no
  // condition rows" bug. [uik=null -> use the config label verbatim.]
  configTablePresets().forEach(p=> tplDefs.push([p.key, p.icon||"▦", null, p.label||p.key]));
  tplDefs.forEach(([tkey,ico,uik,fb])=>{
    picker.appendChild(el("button",{class:"pick", onclick:()=>insertAt(tableTemplate(tkey))},
      [ el("span",{class:"ico",text:ico}), el("span",{text: uik ? T(uik,fb) : fb}) ]));
  });
  // paste entry -- only when the clipboard holds something (works cross-project)
  const clip = getBlockClip();
  if (clip && Array.isArray(clip.blocks) && clip.blocks.length){
    const lbl = T("block.paste","Paste") + ": "
              + (clip.label || (clip.blocks.length + " " + blockWord(clip.blocks.length)));
    picker.appendChild(el("button",{class:"pick paste-pick",
      onclick:()=> pasteBlocks(node, Math.max(0, Math.min(getAt(), node.blocks.length)))},
      [ el("span",{class:"ico",text:"📋"}), el("span",{text: lbl}) ]));
  }
}

function buildAddBlock(node){
  const wrap = el("div",{class:"add-block"});
  const picker = el("div",{class:"picker hidden"});
  const trigger = el("button",{class:"add-trigger", html:"+ "+T("block.add","Add block"),
    onclick:()=>picker.classList.toggle("hidden")});
  populateBlockPicker(picker, node, ()=> node.blocks.length);   // always append at the end
  wrap.appendChild(trigger); wrap.appendChild(picker);
  return wrap;
}

// Live insert index for the gap BEFORE segment `si`. Segment count/order only
// change via block insert/delete/move (all of which re-render, keeping `si`
// valid); prose typing only shifts absolute indices, recomputed here from a
// fresh grouping.
function segStartIndex(node, si){
  const segs = groupBlocks(node.blocks);
  const s = segs[si];
  if (!s) return node.blocks.length;
  return s.kind === "prose" ? s.start : s.idx;
}

// A slim hover strip between two block cards: hovering reveals a "+"; clicking it
// opens the same block picker inline and inserts right there -- no more "add at
// the bottom, then drag it all the way up".
function buildInsertBar(node, si){
  const wrap = el("div",{class:"insert-wrap"});
  const picker = el("div",{class:"picker hidden insert-picker"});
  populateBlockPicker(picker, node, ()=> segStartIndex(node, si));
  const bar = el("div",{class:"insert-bar", title:T("block.insert_here","Insert a block here"),
    onclick:()=>{ const closed = picker.classList.toggle("hidden"); bar.classList.toggle("open", !closed); }});
  bar.appendChild(el("span",{class:"ins-plus", text:"+"}));
  wrap.appendChild(bar); wrap.appendChild(picker);
  return wrap;
}

/* ============================================================================
   BLOCK EDITOR ①  PARA
============================================================================ */
// First swatch is an explicit Black (clearer than a "remove color" swatch that
// also renders black). Applying black sets the run color without touching b/i.
const SPOT_COLORS = ["000000","FF0000","00B0F0","16A34A","D97706","7C3AED"];
const BODY_DEFAULT_COLOR = "000000";

// One contenteditable holding several <p> paragraphs. Enter -> a new <p> (a new
// para block, a real <w:p> on export); Shift+Enter -> <br> (soft line break).
// Both go through the browser so native Ctrl+Z undo keeps working. A single
// toolbar above reflects the formatting at the caret.
const BULLET_GLYPH = String.fromCharCode(0x2022);  // bullet dot; source stays ASCII
function makeProseP(b){
  const p = el("p",{class:"pp"});
  const html = runsToHtml(b.runs);
  p.innerHTML = html || "<br>";   // an empty <p> needs a <br> to stay focusable
  if (b.list){ p.dataset.list = b.list; p.classList.add(b.list==="bullet"?"li-bullet":"li-number"); }
  if (b.level){ p.dataset.level = String(Math.max(0, Math.min(b.level|0, 8))); }
  return p;
}
function elToBlock(pEl){
  const runs = htmlToRuns(pEl);
  // a lone browser-inserted "bogus" <br> in an empty paragraph -> empty run
  if (runs.length===1 && runs[0].t==="\n" && !(pEl.textContent||"").trim()) runs[0].t="";
  const list = (pEl.dataset && pEl.dataset.list) ? pEl.dataset.list : null;
  const block = { type:"para", runs, list };
  const lvl = list && pEl.dataset && pEl.dataset.level ? (parseInt(pEl.dataset.level)||0) : 0;
  if (lvl) block.level = lvl;   // only list items carry a nesting level
  return block;
}
function proseToBlocks(editor){
  const blocks = []; let buf = null;
  const flush = ()=>{ if (buf){ blocks.push(elToBlock(buf)); buf=null; } };
  editor.childNodes.forEach(ch=>{
    if (ch.nodeType===1 && (ch.tagName==="P"||ch.tagName==="DIV")){
      flush(); blocks.push(elToBlock(ch));
    } else {                       // stray top-level text/inline -> own paragraph
      if (!buf) buf = document.createElement("p");
      buf.appendChild(ch.cloneNode(true));
    }
  });
  flush();
  if (!blocks.length) blocks.push({ type:"para", runs:[{t:""}], list:null });
  return blocks;
}

/* ---- cross-references ----------------------------------------------------- */
// A reference run is { ref:<blockId> } (no text/formatting). It targets a
// captioned figure/table by its stable block id; the engine renders it as a live
// Word REF field. The editor shows it as an atomic [Figure: caption] chip.
function refKindLabel(type){
  return String(type||"").indexOf("image")===0
    ? T("ref.figure","Figure") : T("ref.table","Table");
}
// Chapter-scoped "<chap>-<seq>" numbers for every captioned figure/table, mirroring
// the engine's _collect_ref_targets EXACTLY so the editor shows the same numbers
// Word will render: chapter = 1-based top-level index; images (incl. imagegrid)
// ALWAYS consume a figure number; a table/datatable only consumes one when it has a
// caption; both counters reset per chapter; fixed-body sections carry no media.
// Returns { blockId: {kind, num} }. Recomputed per render into App._capNums.
function computeCaptionNumbers(){
  const map = {};
  if (!App.project) return map;
  const st = { chap:0, img:{}, tbl:{} };
  const walkN = (node, depth)=>{
    if (depth===0){ st.chap++; st.img[st.chap]=0; st.tbl[st.chap]=0; }
    const chap = st.chap;
    if (!node.fixed_body){
      (node.blocks||[]).forEach(b=>{
        const t = b && b.type;
        if (t==="image" || t==="imagegrid"){
          st.img[chap]++;
          if (b.id) map[b.id] = { kind:T("ref.figure","Figure"), num: chap+"-"+st.img[chap] };
        } else if ((t==="datatable" || t==="table") && (b.caption||"").trim()){
          st.tbl[chap]++;
          if (b.id) map[b.id] = { kind:T("ref.table","Table"), num: chap+"-"+st.tbl[chap] };
        }
      });
    }
    (node.children||[]).forEach(c=> walkN(c, depth+1));
  };
  (App.project.outline||[]).forEach(n=> walkN(n, 0));
  return map;
}
// The caption number for a block id, using the per-render map when available (set
// in renderNodeEditor) or recomputing on demand (e.g. from the ref picker).
function capNum(id){
  const m = App._capNums || computeCaptionNumbers();
  return id ? m[id] : null;
}
// All captioned, id-bearing media blocks across the project, in document order,
// each carrying its live "<chap>-<seq>" number for display.
function collectRefTargets(){
  const out = [];
  if (!App.project) return out;
  const nums = App._capNums || computeCaptionNumbers();
  walk(App.project.outline, (n)=>{
    (n.blocks||[]).forEach(b=>{
      if (isMediaBlock(b) && b.id && (b.caption||"").trim()){
        out.push({ id:b.id, kind:refKindLabel(b.type), caption:b.caption.trim(),
                   num: (nums[b.id]||{}).num || "" });
      }
    });
  });
  return out;
}
// Short display label for a reference chip: "[Figure 2-3: caption]" (live number)
// or, if the target is gone, a clearly-marked "[ref: missing]".
function refChipLabel(refId){
  const targets = collectRefTargets();
  for (const t of targets){
    if (t.id === refId){
      const lab = t.num ? (t.kind + " " + t.num) : t.kind;
      return "[" + lab + ": " + t.caption + "]";
    }
  }
  return "[" + T("ref.missing","ref: missing") + "]";
}
// Modal: list every captioned figure/table; `onPick(id)` inserts a reference.
function openRefPicker(onPick){
  const targets = collectRefTargets();
  if (!targets.length){
    toast(T("ref.none","No captioned figures or tables to reference yet"), true);
    return;
  }
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:T("ref.title","Insert reference")}));
  m.appendChild(el("p",{text:T("ref.msg","Pick a figure or table to reference.")}));
  const listBox = el("div",{class:"ref-picker-list",
    style:{maxHeight:"320px",overflowY:"auto",margin:"4px 0 8px"}});
  targets.forEach(t=>{
    listBox.appendChild(el("button",{class:"sm-btn",
      style:{display:"block",width:"100%",textAlign:"left",marginBottom:"6px"},
      text:t.kind + (t.num?(" "+t.num):"") + ": " + t.caption,
      onclick:()=>{ closeOverlay(); onPick(t.id); }}));
  });
  m.appendChild(listBox);
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"), onclick:closeOverlay}),
  ]));
  showOverlay();
}

// Structural deep-equality (order-independent for object keys). Used to skip
// no-op serialize()/markDirty() churn -- e.g. focusing a prose editor and
// blurring it without typing must not trigger an autosave + status flicker.
function deepEqual(a, b){
  if (a === b) return true;
  if (!a || !b || typeof a !== "object" || typeof b !== "object") return false;
  const aArr = Array.isArray(a), bArr = Array.isArray(b);
  if (aArr !== bArr) return false;
  if (aArr){
    if (a.length !== b.length) return false;
    for (let i=0; i<a.length; i++) if (!deepEqual(a[i], b[i])) return false;
    return true;
  }
  const ka = Object.keys(a), kb = Object.keys(b);
  if (ka.length !== kb.length) return false;
  for (const k of ka){ if (!(k in b) || !deepEqual(a[k], b[k])) return false; }
  return true;
}

function buildProseEditor(host, node, seg){
  const tb = el("div",{class:"mini-toolbar prose-toolbar"});
  const editor = el("div",{class:"rich multi", contenteditable:"true", spellcheck:"false"});
  seg.blocks.forEach(b=> editor.appendChild(makeProseP(b)));
  if (!editor.childNodes.length) editor.appendChild(makeProseP({runs:[{t:""}]}));

  // `owned` = the exact contiguous run of blocks this editor represents, so
  // serialize replaces just that slice of node.blocks (length may change).
  let owned = seg.blocks.slice();
  const serialize = ()=>{
    const blocks = proseToBlocks(editor);
    // This editor is exactly ONE card, so preserve its boundary through edits:
    // carry cardStart onto the (rebuilt) first block IFF this card had one. Never
    // ADD a boundary to a legacy card that lacked one -- that would flip an
    // unchanged card to "dirty" on a mere focus/blur.
    if (blocks.length && owned[0] && owned[0].cardStart) blocks[0].cardStart = true;
    if (deepEqual(blocks, owned)) return false;   // nothing actually changed -> no dirty, no splice
    let start = node.blocks.indexOf(owned[0]);
    if (start < 0) start = Math.min(seg.start, node.blocks.length);
    node.blocks.splice(start, owned.length, ...blocks);
    owned = blocks;
    seg.blocks = blocks;   // keep seg live so renderProseCard's drop target stays valid
    markDirty();
    return true;
  };

  const mk = (label, title, cmd) => el("button",{class:"mt-btn", title, html:label,
    onmousedown:(e)=>{ e.preventDefault(); document.execCommand(cmd,false,null); editor.focus(); serialize(); refresh(); }});
  const bBtn = mk("<b>B</b>", T("para.bold","Bold"), "bold");
  const iBtn = mk("<i>I</i>", T("para.italic","Italic"), "italic");
  tb.appendChild(bBtn); tb.appendChild(iBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  const bulletBtn = el("button",{class:"mt-btn", title:T("para.bullet","Bullet list"), html:BULLET_GLYPH,
    onmousedown:(e)=>{ e.preventDefault(); toggleList("bullet"); }});
  const numBtn = el("button",{class:"mt-btn", title:T("para.number","Numbered list"), html:"1.",
    onmousedown:(e)=>{ e.preventDefault(); toggleList("number"); }});
  tb.appendChild(bulletBtn); tb.appendChild(numBtn);
  tb.appendChild(el("span",{class:"mt-sep"}));
  SPOT_COLORS.forEach(c=>{
    const sw = el("span",{class:"swatch", title: c==="000000"?T("para.color_black","Black"):("#"+c),
      style:{background:"#"+c},
      onmousedown:(e)=>{ e.preventDefault();
        document.execCommand("foreColor", false, "#"+c);
        editor.focus(); serialize(); refresh(); }});
    tb.appendChild(sw);
  });
  tb.appendChild(el("span",{class:"mt-sep"}));

  // Remember the caret inside the editor so a reference can be dropped where the
  // user was typing -- opening the picker modal moves focus off the editor and
  // would otherwise collapse the live selection.
  let savedRange = null;
  const rememberRange = ()=>{
    if (!selInEditor()) return;
    const sel = window.getSelection();
    if (sel && sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
  };
  // Build an atomic, non-editable chip element for a reference run.
  const makeChip = (refId)=>{
    const span = el("span",{class:"ref-chip", contenteditable:"false",
      "data-ref":refId, text:refChipLabel(refId)});
    return span;
  };
  const insertRef = (refId)=>{
    editor.focus();
    let range = savedRange;
    if (!range){
      // no remembered caret -> append at the end of the last paragraph
      const last = editor.lastElementChild || editor;
      range = document.createRange();
      range.selectNodeContents(last);
      range.collapse(false);
    }
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    range.deleteContents();
    const chip = makeChip(refId);
    range.insertNode(chip);
    // place caret right after the chip and add a trailing space for typing
    const after = document.createTextNode(" ");
    if (chip.parentNode) chip.parentNode.insertBefore(after, chip.nextSibling);
    const r2 = document.createRange();
    r2.setStartAfter(after); r2.collapse(true);
    sel.removeAllRanges(); sel.addRange(r2);
    savedRange = r2.cloneRange();
    serialize();
  };
  const refBtn = el("button",{class:"mt-btn", title:T("para.insert_ref","Insert reference"),
    html:T("para.insert_ref_glyph","Ref"),
    onmousedown:(e)=>{ e.preventDefault(); rememberRange(); openRefPicker(insertRef); }});
  tb.appendChild(refBtn);

  // top-level <p>/<div> element containing the caret (for list state + toggling)
  const currentP = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return null;
    let n = sel.anchorNode;
    while (n && n!==editor){ if (n.parentNode===editor && n.nodeType===1) return n; n = n.parentNode; }
    return null;
  };
  const selInEditor = ()=>{
    const sel = window.getSelection(); if (!sel||!sel.rangeCount) return false;
    let n = sel.anchorNode; while (n){ if (n===editor) return true; n = n.parentNode; }
    return false;
  };
  // Guarantee the caret sits in a real <p>. contenteditable can collapse to an
  // empty root (or a bare text node) after everything is deleted -- that left
  // currentP() null, so list toggles silently no-op'd (the "can't re-add a bullet
  // after deleting it" bug). Re-wrap loose content / create a <p> and focus it.
  const ensureParagraph = ()=>{
    const p0 = currentP(); if (p0) return p0;
    let host = null;
    editor.childNodes.forEach(n=>{ if(!host && n.nodeType===1 && (n.tagName==="P"||n.tagName==="DIV")) host=n; });
    const putCaret = (elm)=>{ const sel=window.getSelection(), r=document.createRange();
      r.selectNodeContents(elm); r.collapse(false); if(sel){ sel.removeAllRanges(); sel.addRange(r); } };
    if (host){ putCaret(host); return host; }
    const p = document.createElement("p"); p.className="pp";
    while (editor.firstChild) p.appendChild(editor.firstChild);
    if (!p.childNodes.length) p.appendChild(document.createElement("br"));
    editor.appendChild(p); putCaret(p); return p;
  };
  const toggleList = (kind)=>{
    editor.focus();
    const p = currentP() || ensureParagraph(); if (!p) return;
    const next = p.dataset.list===kind ? "" : kind;
    p.dataset.list = next;
    p.classList.toggle("li-bullet", next==="bullet");
    p.classList.toggle("li-number", next==="number");
    if (!next) delete p.dataset.level;    // a plain paragraph carries no nesting level
    editor.focus(); serialize(); refresh();
  };
  // Tab / Shift+Tab nests a list item one level in/out (0..3 visualized in the editor)
  const changeLevel = (p, delta)=>{
    if (!p || !p.dataset.list) return false;
    const cur = parseInt(p.dataset.level)||0;
    const nxt = Math.max(0, Math.min(cur+delta, 8));
    if (nxt) p.dataset.level = String(nxt); else delete p.dataset.level;
    editor.focus(); serialize(); refresh();
    return true;
  };
  const refresh = ()=>{
    if (!selInEditor()) return;
    bBtn.classList.toggle("on", document.queryCommandState("bold"));
    iBtn.classList.toggle("on", document.queryCommandState("italic"));
    const lst = (currentP()||{dataset:{}}).dataset.list || "";
    bulletBtn.classList.toggle("on", lst==="bullet");
    numBtn.classList.toggle("on", lst==="number");
  };

  editor.addEventListener("keydown",(e)=>{
    if (e.key==="Tab"){
      const p = currentP();
      if (p && p.dataset.list){ e.preventDefault(); changeLevel(p, e.shiftKey ? -1 : 1); }
    }
  });
  editor.addEventListener("input", serialize);
  editor.addEventListener("keyup", ()=>{ refresh(); rememberRange(); });
  editor.addEventListener("mouseup", ()=>{ refresh(); rememberRange(); });
  editor.addEventListener("focus", ()=>{
    try{ document.execCommand("defaultParagraphSeparator", false, "p"); }catch(_){}
    refresh();
  });
  editor.addEventListener("blur", ()=>{ if (serialize()) saveProject(true); });
  // sanitize paste -> plain text (strip foreign styles/structure)
  editor.addEventListener("paste",(e)=>{
    e.preventDefault();
    const txt = (e.clipboardData||window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, txt);
    serialize();
  });

  host.appendChild(tb); host.appendChild(editor);
}

// runs[] -> plain text (concatenate run text; drops marks). Tolerates a legacy
// `text` block by accepting either shape via blockPlainText().
function runsToPlain(runs){ return (runs||[]).map(r=>r&&r.t||"").join(""); }
function blockPlainText(b){
  if (!b) return "";
  if (Array.isArray(b.runs)) return runsToPlain(b.runs);
  return b.text!=null ? String(b.text) : "";
}
// runs[] -> HTML (b/i/color marks). A soft break (\n) inside a run renders as
// <br> so it survives the contenteditable round-trip (a bare \n would collapse).
function runsToHtml(runs){
  if (!runs || !runs.length) return "";
  return runs.map(r=>{
    if (r && r.ref){
      // atomic, non-editable cross-reference chip
      return `<span class="ref-chip" contenteditable="false" data-ref="${escapeHtml(r.ref)}">`
        + escapeHtml(refChipLabel(r.ref)) + `</span>`;
    }
    let t = escapeHtml(r.t||"");
    if (!t) return "";
    t = t.replace(/\n/g,"<br>");
    if (r.color) t = `<span style="color:#${r.color}">${t}</span>`;
    if (r.i) t = `<i>${t}</i>`;
    if (r.b) t = `<b>${t}</b>`;
    return t;
  }).join("") || "";
}
// contenteditable HTML -> runs[] (walk text nodes, track b/i/color)
function htmlToRuns(rich){
  const runs = [];
  const push = (text, st)=>{
    if (!text) return;
    const last = runs[runs.length-1];
    const r = { t:text };
    if (st.b) r.b=true; if (st.i) r.i=true; if (st.color) r.color=st.color;
    // never merge a text run into a reference run (a ref run carries no text)
    if (last && !last.ref && !!last.b===!!r.b && !!last.i===!!r.i && (last.color||null)===(r.color||null)){
      last.t += text;
    } else runs.push(r);
  };
  const walkNode = (node, st)=>{
    node.childNodes.forEach(ch=>{
      if (ch.nodeType===3){ push(ch.nodeValue.replace(/ /g," "), st); return; }
      if (ch.nodeType!==1) return;
      // a cross-reference chip is atomic: emit a ref run, never descend into it
      if (ch.getAttribute && ch.getAttribute("data-ref")){
        runs.push({ ref: ch.getAttribute("data-ref") });
        return;
      }
      const tag = ch.tagName.toLowerCase();
      const ns = { b:st.b, i:st.i, color:st.color };
      if (tag==="b"||tag==="strong") ns.b=true;
      if (tag==="i"||tag==="em") ns.i=true;
      const col = colorFromStyle(ch.getAttribute("style")||"") || colorFromAttr(ch);
      if (col) ns.color=col;
      if (tag==="br"){ push("\n", st); return; }
      if (tag==="div"||tag==="p"){ if (runs.length) push("\n", st); }
      walkNode(ch, ns);
    });
  };
  walkNode(rich, {b:false,i:false,color:null});
  // collapse to at least one run
  const cleaned = runs.filter(r=>r.t!=="");
  return cleaned.length ? cleaned : [{t:""}];
}
function colorFromStyle(style){
  const m = /color:\s*([^;]+)/i.exec(style); if(!m) return null;
  return cssColorToHex(m[1].trim());
}
function colorFromAttr(node){ const c = node.getAttribute && node.getAttribute("color"); return c?cssColorToHex(c):null; }

/* ---- free-table cell value: plain string (simple) OR {runs:[...]} (styled) ---- */
function cellRuns(v){
  if (v && typeof v === "object" && Array.isArray(v.runs)) return v.runs.length ? v.runs : [{t:""}];
  return [{ t: v==null ? "" : String(v) }];
}
function cellText(v){ return cellRuns(v).map(r=>r.t||"").join(""); }
function cellHtml(v){ return runsToHtml(cellRuns(v)) || ""; }
// Collapse runs to a plain string when nothing is styled (compact data + markdown).
function normalizeCell(runs){
  const rs = (runs||[]).filter(r=> r && (r.t||"") !== "");
  if (!rs.length) return "";
  if (rs.some(r=> r.b || r.i || r.color)) return { runs: rs };
  return rs.map(r=>r.t||"").join("");
}
function cssColorToHex(c){
  c = c.trim();
  let m = /^#([0-9a-f]{6})$/i.exec(c); if (m) return m[1].toUpperCase();
  m = /^#([0-9a-f]{3})$/i.exec(c); if (m) return (m[1][0]+m[1][0]+m[1][1]+m[1][1]+m[1][2]+m[1][2]).toUpperCase();
  m = /rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i.exec(c);
  if (m){ return [m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,"0")).join("").toUpperCase(); }
  return null;
}
function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

   BLOCK EDITOR ②  IMAGE
============================================================================ */
function editImage(host, block, node){
  const drop = el("div",{class:"img-drop", tabindex:"0"});
  const renderPrev = ()=>{
    drop.innerHTML="";
    if (block.file){
      const wrap = el("div",{class:"img-prevwrap"});
      const img = el("img",{class:"img-prev", src: imgUrl(block.file), alt:block.caption||""});
      img.onerror = ()=>{ wrap.innerHTML=""; wrap.appendChild(el("div",{text:block.file})); };
      wrap.appendChild(img);
      // × clears just the image (keeps the block, ready for a new paste)
      wrap.appendChild(el("button",{class:"icon-btn danger rm", text:"✕", title:T("image.remove","Remove image"),
        onclick:(e)=>{ e.stopPropagation(); block.file=""; markDirty(); renderPrev(); drop.focus(); saveProject(true); }}));
      drop.appendChild(wrap);
      drop.appendChild(el("div",{class:"img-hint", text:T("image.replace_hint","Click the image, then Ctrl+V to replace")}));
    } else {
      drop.appendChild(el("div",{text:T("image.placeholder","Click to focus, then Ctrl+V a screenshot")}));
      drop.appendChild(el("div",{style:{fontSize:"12px",marginTop:"6px"}, text:T("image.or_paste","or paste an image from the clipboard")}));
    }
  };
  drop.addEventListener("focus",()=>drop.classList.add("focused"));
  drop.addEventListener("blur",()=>drop.classList.remove("focused"));
  drop.addEventListener("click",()=>drop.focus());
  drop.addEventListener("paste",(e)=>handleImagePaste(e, block, node, renderPrev));
  // D5: accept a dropped image file (the class was "img-drop" but only paste
  // worked). Reuses the same upload path as paste.
  drop.addEventListener("dragover",(e)=>{ e.preventDefault(); drop.classList.add("dragover"); });
  drop.addEventListener("dragleave",()=>drop.classList.remove("dragover"));
  drop.addEventListener("drop",(e)=>{
    e.preventDefault(); drop.classList.remove("dragover");
    const files = (e.dataTransfer && e.dataTransfer.files) || [];
    const img = Array.from(files).find(f=> f.type && f.type.indexOf("image")===0);
    if (img) uploadImageFile(img, block, node, renderPrev);
    else toast(T("toast.drop_not_image","Drop an image file (png/jpg)"), true);
  });
  renderPrev();
  host.appendChild(drop);

  const row = el("div",{class:"field-row"});
  row.appendChild(el("label",{text:T("image.caption","Caption")}));
  row.appendChild(el("input",{class:"ti grow", value:block.caption||"", placeholder:T("image.caption_ph","Caption (number added automatically)"),
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  host.appendChild(row);
  host.appendChild(buildSizePresets(block));
}
// Stable image URL: a per-file version query (bumped only when the image is
// actually replaced) instead of Date.now() on every call -- so a structural
// re-render or opening Preview no longer cache-busts every <img> and reloads the
// whole page's images with a visible flicker. (D2 / C4)
function imgUrl(file){
  const v = (App._imgVer && App._imgVer[file]) || 0;
  return file + "?dir=" + encodeURIComponent(App.dir||"") + (v ? ("&v="+v) : "");
}
function bumpImgVer(file){
  if (!file) return;
  App._imgVer = App._imgVer || {};
  App._imgVer[file] = (App._imgVer[file]||0) + 1;
}

// Intent presets (full/half/small) that set block.width_cm; an Advanced toggle
// exposes the exact cm. The engine caps height automatically, so there is no
// height field. Reused by both image and image-grid blocks (width_cm is the
// grid's total width there).
function buildSizePresets(block){
  const outer = el("div",{});
  const row = el("div",{class:"field-row"});
  row.appendChild(el("label",{text:T("image.size","Size")}));
  const group = el("div",{class:"img-presets"});

  [["full","image.size.full","Full width"],["half","image.size.half","Half"],
   ["small","image.size.small","Small"]].forEach(([key,uik,fb])=>{
    const b = el("button",{class:"preset-btn", text:T(uik,fb), onclick:()=>{
      block.width_cm = IMG_PRESETS[key]; block.size = key;
      setActive(key); advInput.value = block.width_cm; adv.style.display="none";
      markDirty(); saveProject(true);
    }});
    btns[key] = b; group.appendChild(b);
  });
  const advBtn = el("button",{class:"preset-btn", text:T("image.size.custom","Custom"),
    onclick:()=>{ adv.style.display = adv.style.display==="none"?"flex":"none"; }});
  group.appendChild(advBtn);
  row.appendChild(group);

  const advInput = el("input",{class:"ti num", type:"number", step:"0.5", min:"1",
    value: block.width_cm!=null?block.width_cm:IMG_PRESETS.full,
    oninput:(e)=>{ block.width_cm = parseFloat(e.target.value)||IMG_PRESETS.full; block.size="custom"; setActive(null); markDirty(); },
    onblur:()=>saveProject(true)});
  adv.appendChild(el("label",{text:T("image.width","Width (cm)")}));
  adv.appendChild(advInput);

  outer.appendChild(row); outer.appendChild(adv);
  const cur = imgPresetOf(block.width_cm);
  if (cur==="custom"){ setActive(null); adv.style.display="flex"; } else setActive(cur);
  return outer;
}

// Pull an image blob straight off a paste event (screenshots, drag-drop, and any
// source that exposes an image/* item or file). Returns a Blob/File or null.
function imageFromClipboardEvent(e){
  const cd = e.clipboardData || {};
  for (const it of (cd.items || [])){
    if (it.type && it.type.indexOf("image")===0){
      const f = it.getAsFile();
      if (f) return f;
    }
  }
  for (const f of (cd.files || [])){
    if (f.type && f.type.indexOf("image")===0) return f;
  }
  return null;
}

async function handleImagePaste(e, block, node, renderPrev){
  // 1) Fast path: an image directly on the paste event (screenshots / files).
  let file = imageFromClipboardEvent(e);
  // 2) Fallback: PowerPoint & other Office apps often put the picture on the
  //    clipboard as a DIB/EMF that Chrome does NOT surface as an image item in the
  //    sync paste event (it only exposes text/html pointing at a file:// temp).
  //    The async Clipboard API can still read it back as image/png.
  if (!file && navigator.clipboard && navigator.clipboard.read){
    e.preventDefault();
    try{
      for (const ci of await navigator.clipboard.read()){
        const t = (ci.types || []).find(x => x.indexOf("image/")===0);
        if (t){ file = await ci.getType(t); break; }
      }
    }catch(_){ /* permission denied / nothing readable -> fall through to the hint */ }
  }
  if (!file){
    toast(T("toast.no_clip_image",
      "No pasteable image on the clipboard. From PowerPoint: right-click the picture -> Save as Picture, or paste a screenshot instead."), true);
    return;
  }
  e.preventDefault();
  await uploadImageFile(file, block, node, renderPrev);
}
// Shared image-upload path: POST the file to /api/image and point the block at
// the saved images/<name>. Used by both paste (handleImagePaste) and drag-drop
// (editImage's drop handler).
async function uploadImageFile(file, block, node, renderPrev){
  const b64 = await fileToB64(file);
  const section = sectionOf(node.id);
  try{
    setStatus("saving", T("status.uploading","Uploading image…"));
    const r = await api("POST","/api/image",{query:{dir:App.dir, section},
      json:{ png_b64:b64, section }});
    block.file = r.file; bumpImgVer(r.file); markDirty(); renderPrev();
    setStatus("saved", T("status.image_added","Image added"));
    saveProject(true);
  }catch(err){ setStatus("err","image failed"); toast("Image upload failed: "+err.message, true); }
}
function fileToB64(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(",")[1]||"");
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

// Office-style up-to-3x3 layout picker. Hover to preview an R×C region, click to
// set it. Sets block.cols (columns) + block.rows (rows). The engine + preview
// honor block.rows as a MINIMUM row count: a taller pick pads blank trailing
// cells, adding more images than the pick grows extra rows (nothing dropped).
const GRID_LAYOUT_MAX = 3;
function buildGridLayoutPicker(block, renderGrid){
  const wrap = el("div",{class:"gl-wrap"});
  const grid = el("div",{class:"gl-picker"});
  const lbl  = el("span",{class:"gl-lbl"});
  const cells = [];
  const clamp = (v,d)=> Math.min(Math.max(parseInt(v)||d, 1), GRID_LAYOUT_MAX);
  const curR = ()=> clamp(block.rows, 1);
  const curC = ()=> clamp(block.cols, 2);
  const paint = (hr, hc)=>{ cells.forEach(rc=> rc.el.classList.toggle("on", rc.r < hr && rc.c < hc)); lbl.textContent = hr + " × " + hc; };
  for (let r=0; r<GRID_LAYOUT_MAX; r++) for (let c=0; c<GRID_LAYOUT_MAX; c++){
    const ce = el("div",{class:"gl-cell", title:(r+1)+" × "+(c+1)});
    ce.addEventListener("mouseenter",()=> paint(r+1, c+1));
    ce.addEventListener("click",()=>{ block.rows = r+1; block.cols = c+1;
      markDirty(); renderGrid(); paint(r+1, c+1); saveProject(true); });
    cells.push({el:ce, r, c}); grid.appendChild(ce);
  }
  grid.addEventListener("mouseleave",()=> paint(curR(), curC()));
  paint(curR(), curC());
  wrap.appendChild(grid); wrap.appendChild(lbl);
  return wrap;
}

// replaceIdx == null -> append a new cell; otherwise replace that cell's image
// in place (keeps the item's other props, e.g. a per-cell sub-caption).
async function handleGridPaste(e, block, node, renderGrid, replaceIdx){
  const items = (e.clipboardData||{}).items || [];
  for (const it of items){
    if (it.type && it.type.indexOf("image")===0){
      const file = it.getAsFile();
      if (!file) continue;
      e.preventDefault();
      const section = sectionOf(node.id);
      try{
        setStatus("saving", T("status.uploading","Uploading image..."));
        const b64 = await fileToB64(file);
        const r = await api("POST","/api/image",{query:{dir:App.dir, section},
          json:{ png_b64:b64, section }});
        if (replaceIdx!=null && block.items[replaceIdx]) block.items[replaceIdx].file = r.file;
        else block.items.push({ file:r.file });
        markDirty(); renderGrid();
        setStatus("saved", replaceIdx!=null ? T("status.image_replaced","Image replaced") : T("status.image_added","Image added"));
        saveProject(true);
      }catch(err){ setStatus("err","image failed"); toast(T("toast.image_failed","Image upload failed: ")+err.message, true); }
      return;
    }
  }
}
// owning chapter number ("4") for image filename section
function sectionOf(id){
  const p = nodePath(id); return p ? p.split(".")[0] : "0";
}

function editTable(host, block){

  { const nc = Math.max(colCount(block), Array.isArray(block.col_w) ? block.col_w.length : 0);

    ()=>{ if(deleteTableCol(block, curC())){ markDirty(); rebuild(); } }));

  const ctx = makeGridContext({

function colCount(block){ return block.rows.reduce((m,r)=>Math.max(m,r.length),0); }
// toggle the .hdr class on existing rows without a full rebuild (preserves caret/selection)
function restyleHeaderRows(ctx, block){
  if (!ctx.table) return;
  ctx.table.querySelectorAll("tr").forEach((tr, i)=>{
    tr.classList.toggle("hdr", i < (block.header_rows||0));
  });

/* ---- free-table structural edits (shared by the +/- tools and the cell menu) --- */
// Rebuild block.row_fills (keyed by absolute row index) after a structural row edit.
// `map` returns the new index for an old index, or null to drop that band.
function remapRowFills(block, map){
  if (!block.row_fills) return;
  const next = {};
  for (const k in block.row_fills){
    const ni = map(parseInt(k, 10));
    if (ni != null) next[ni] = block.row_fills[k];
  }
  if (Object.keys(next).length) block.row_fills = next; else delete block.row_fills;
}
function insertTableRow(block, at){
  const n = colCount(block);
  const a = Math.max(0, Math.min(at, block.rows.length));
  block.rows.splice(a, 0, new Array(n).fill(""));
  remapRowFills(block, (i)=> i >= a ? i + 1 : i);
}
function deleteTableRow(block, r){
  if (block.rows.length <= 1) return false;
  block.rows.splice(r, 1);
  if ((block.header_rows||0) > block.rows.length) block.header_rows = block.rows.length;
  remapRowFills(block, (i)=> i === r ? null : (i > r ? i - 1 : i));
  return true;
}
// Set (hex without '#') or clear (null) the band fill on a whole row.
function setRowFill(block, r, hex){
  if (hex){ block.row_fills = block.row_fills || {}; block.row_fills[r] = hex; }
  else if (block.row_fills){ delete block.row_fills[r]; if (!Object.keys(block.row_fills).length) delete block.row_fills; }
}
function insertTableCol(block, at){
  block.rows.forEach(row => { const a = Math.max(0, Math.min(at, row.length)); row.splice(a, 0, ""); });
  if (Array.isArray(block.col_w)){
    const avg = block.col_w.reduce((a,b)=>a+(Number(b)||0),0) / (block.col_w.length||1)
              || (FREE_TBL_TOTAL_CM / (colCount(block)||1));
    block.col_w.splice(Math.min(at, block.col_w.length), 0, Math.round(avg*100)/100 || 2);
  }
}
function deleteTableCol(block, c){
  if (colCount(block) <= 1) return false;
  block.rows.forEach(row => { if (c < row.length) row.splice(c, 1); });
  if (Array.isArray(block.col_w)) block.col_w.splice(c, 1);
  return true;
}
// Right-click a free-table cell: insert / delete rows and columns relative to it.
function openTableCellMenu(e, block, r, c, rebuild){
  e.preventDefault(); e.stopPropagation();
  const menu = $("#ctx"); menu.innerHTML = "";
  const item = (label, fn, danger)=> menu.appendChild(

  item(T("tbl.ins_row_above","Insert row above"), ()=>{ insertTableRow(block, r);   done(); });
  item(T("tbl.ins_row_below","Insert row below"), ()=>{ insertTableRow(block, r+1); done(); });
  menu.appendChild(el("div",{class:"ctx-sep"}));
  item(T("tbl.ins_col_left","Insert column left"),  ()=>{ insertTableCol(block, c);   done(); });
  item(T("tbl.ins_col_right","Insert column right"), ()=>{ insertTableCol(block, c+1); done(); });
  menu.appendChild(el("div",{class:"ctx-sep"}));

/* ---- Markdown <-> free table (cells may be styled runs: **bold** *italic*) ---- */
function runsToInlineMd(runs){
  return (runs||[]).map(r=>{
    let t = String(r.t||"").replace(/\\/g,"\\\\").replace(/\|/g,"\\|").replace(/\*/g,"\\*").replace(/\n/g," ");
    if (!t) return "";
    if (r.i) t = "*"+t+"*";
    if (r.b) t = "**"+t+"**";
    return t;
  }).join("");
}
function inlineMdToRuns(s){
  const runs=[]; let buf="", b=false, it=false, i=0; const n=s.length;
  const flush=()=>{ if(buf){ const r={t:buf}; if(b)r.b=true; if(it)r.i=true; runs.push(r); buf=""; } };
  while(i<n){
    const ch=s[i];
    if(ch==="\\" && i+1<n){ buf+=s[i+1]; i+=2; continue; }     // unescape \*, \\, \|
    if(s.startsWith("***",i)){ flush(); b=!b; it=!it; i+=3; continue; }
    if(s.startsWith("**",i)){ flush(); b=!b; i+=2; continue; }
    if(ch==="*"){ flush(); it=!it; i+=1; continue; }
    buf+=ch; i++;
  }
  flush();
  return runs.length ? runs : [{t:""}];
}
function tableToMarkdown(block){
  const rows = block.rows || []; if (!rows.length) return "";
  const ncols = colCount(block);
  const cellMd = v => runsToInlineMd(cellRuns(v));
  const fmt = r => "| " + Array.from({length:ncols}, (_,c)=>cellMd((r||[])[c])).join(" | ") + " |";
  const hc = Math.min(Math.max(block.header_rows||0, 1), rows.length);   // a Markdown table needs >=1 header row
  const out = [];
  for (let i=0;i<hc;i++) out.push(fmt(rows[i]));
  out.push("| " + Array.from({length:ncols}, ()=>"---").join(" | ") + " |");
  for (let i=hc;i<rows.length;i++) out.push(fmt(rows[i]));
  return out.join("\n");
}
function parseMarkdownTable(md){
  const raw = (md||"").replace(/\r/g,"").split("\n").map(l=>l.trim()).filter(Boolean);
  const isSep = l => /^\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?$/.test(l);
  const splitRow = l => {
    let s = l.trim(); if (s.startsWith("|")) s = s.slice(1); if (s.endsWith("|")) s = s.slice(0,-1);
    const cells=[]; let cur="";
    for (let i=0;i<s.length;i++){ const ch=s[i];
      if (ch==="\\"){ const nx = s[i+1]||"";
        if (nx==="|"){ cur += "|"; i++; continue; }            // \| -> literal pipe (delimiter escaped)
        cur += "\\"+nx; i++; continue;                          // keep other escapes for the inline parser
      }
      if (ch==="|"){ cells.push(cur.trim()); cur=""; continue; }
      cur += ch;
    }
    cells.push(cur.trim()); return cells;
  };
  const dataLines=[]; let sepAt=-1;
  raw.forEach(l => { if (isSep(l)){ if (sepAt<0) sepAt = dataLines.length; return; } dataLines.push(l); });
  if (!dataLines.length) return null;
  const rows = dataLines.map(line => splitRow(line).map(cell => normalizeCell(inlineMdToRuns(cell))));
  const ncols = rows.reduce((m,r)=>Math.max(m,r.length),0);
  rows.forEach(r => { while (r.length < ncols) r.push(""); });
  const header_rows = sepAt>=0 ? Math.min(sepAt, rows.length) : (rows.length>1 ? 1 : 0);
  return { rows, header_rows };
}
// Free-table column widths. col_w is stored in cm (the engine reads it as Cm());
// preview + editor only use the ratios. When unset/mismatched, columns are equal
// and sum to FREE_TBL_TOTAL_CM so a first drag persists a sensible Word width.
const FREE_TBL_TOTAL_CM = 15.5;
function freeColWeights(block){
  const n = colCount(block);
  if (Array.isArray(block.col_w) && block.col_w.length === n)
    return block.col_w.map(w => { const x = Number(w); return isFinite(x) && x > 0 ? x : FREE_TBL_TOTAL_CM/(n||1); });
  return new Array(n).fill(FREE_TBL_TOTAL_CM/(n||1));
}
// Drag a column border: transfer width between column ci and ci+1 (sum kept
// constant, so the table stays put and only the two neighbors resize).
let _colResize = null;
function startColResize(e, ctx, block, ci){
  e.preventDefault(); e.stopPropagation();                 // not a .cell: never starts a cell selection
  const tbl = ctx.table; if(!tbl) return;
  const weights = freeColWeights(block).slice();
  _colResize = { ctx, block, ci, startX:e.clientX, weights, moved:false,
    sum: weights.reduce((a,b)=>a+b,0) || 1,
    tblW: tbl.getBoundingClientRect().width || 1,
    grip: e.currentTarget, cur: weights.slice() };
  if (_colResize.grip) _colResize.grip.classList.add("active");
  document.body.classList.add("col-resizing");
  document.addEventListener("mousemove", onColResizeMove);
  document.addEventListener("mouseup", endColResize);
}
function onColResizeMove(e){
  const s=_colResize; if(!s) return;
  s.moved = true;
  const dW = ((e.clientX - s.startX) / s.tblW) * s.sum;    // px delta -> weight delta
  const minW = s.sum * 0.05;                               // keep each column >= 5%
  let a = s.weights[s.ci] + dW, b = s.weights[s.ci+1] - dW;
  if (a < minW){ b -= (minW - a); a = minW; }
  if (b < minW){ a -= (minW - b); b = minW; }
  const cur = s.weights.slice(); cur[s.ci]=a; cur[s.ci+1]=b; s.cur=cur;
  const cols = s.ctx.table ? s.ctx.table.querySelectorAll("colgroup col") : [];
  const t = cur.reduce((x,y)=>x+y,0) || 1;
  cols.forEach((c,i)=>{ if(i<cur.length) c.style.width = (100*cur[i]/t)+"%"; });
}
function endColResize(){
  const s=_colResize; _colResize=null;
  document.removeEventListener("mousemove", onColResizeMove);
  document.removeEventListener("mouseup", endColResize);
  document.body.classList.remove("col-resizing");
  if(!s) return;
  if (s.grip) s.grip.classList.remove("active");
  if(!s.moved) return;                                     // a bare click leaves the model untouched
  s.block.col_w = s.cur.map(w => Math.round(w*100)/100);   // persist cm (2dp)
  markDirty(); saveProject(true);
}
function parseTSV(txt){
  return txt.replace(/\r/g,"").replace(/\n$/,"").split("\n").map(l=>l.split("\t"));
}

/* ============================================================================
   BLOCK EDITOR ③  DATATABLE (compliance)
============================================================================ */
function editDatatable(host, block){
  block.data = block.data || blankComplianceData();
  // `data` is re-synced from block.data on every rebuild because undo replaces
  // the whole block.data object (gridUndo -> ctx.block.data = snap.data).
  let data = block.data;
  const cfg = App.config.compliance || {};
  const defaultAxes = cfg.axis_labels || ["MIN","TYP","MAX","NTWC"];
  // setting rows get the same beige band as the exported table (config-driven color)
  const settingKinds = new Set(cfg.setting_kinds || ["common_setting","module_setting","tb"]);
  const settingBand = "#" + ((cfg.fills && cfg.fills.setting) || "EEECE1");
  // stage presets are config-driven (neutral fallback); used for quick-add + the stage dropdown
  const stagePresets = (cfg.stages && cfg.stages.length) ? cfg.stages : ["S1","S2"];
  // Spec column is hideable (comparison tables). Mirrors data.show_spec used by the
  // engine/preview; the editor drops the Spec + Spec-MTM columns and shifts the sim
  // axis column indices so the select/paste layer stays gap-free.
  const specShown = ()=> data.show_spec !== false;
  // Column model (running-counter based; no hardcoded indices). Visual + grid-c
  // order: cat, item, kind, limit, [scalar Spec?], spec axes, sim axes, Unit LAST
  // (P2.1: Unit last matches the exported table). The scalar Spec column is dropped
  // when no row uses it (P2.3), and the spec axes follow axis_labels so a 4th (NTWC)
  // spec column is editable when configured (P2.3/F9).
  const specAxisLabels = ()=> defaultAxes;
  const scalarSpecShown = ()=> specShown() && data.rows.some(r => r.spec != null);
  const simAxisTotal = ()=> data.sims.reduce((n,s)=>n+(s.axes||[]).length,0);
  const gridCols = ()=> {
    const specCols = specShown() ? ((scalarSpecShown()?1:0) + specAxisLabels().length) : 0;
    return 4 + specCols + simAxisTotal() + 1;   // cat,item,kind,limit + spec + sims + unit
  };

  // caption + spec name
  const top = el("div",{class:"field-row"});
  top.appendChild(el("label",{text:T("table.caption","Caption")}));
  top.appendChild(el("input",{class:"ti grow", value:block.caption||"",
    oninput:(e)=>{ block.caption=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  top.appendChild(el("label",{text:T("datatable.spec_name","Spec name")}));
  top.appendChild(el("input",{class:"ti", value:data.spec_name||"", style:{width:"160px"},
    oninput:(e)=>{ data.spec_name=e.target.value; markDirty(); }, onblur:()=>saveProject(true)}));
  const specToggle = el("input",{type:"checkbox",
    onchange:(e)=>{ data.show_spec=e.target.checked; markDirty(); rebuildMetrics(); validate(); saveProject(true); }});
  specToggle.checked = specShown();
  top.appendChild(el("label",{text:T("datatable.show_spec","Show Spec"), style:{marginLeft:"10px"}}));
  top.appendChild(specToggle);
  // P1.2: fold the Import-xlsx control into the caption row (was its own ~30px row).
  // The paste tip moves to the button's tooltip to keep the row compact.
  const fileInput = el("input",{type:"file", accept:".xlsx", style:{display:"none"},
    onchange:(e)=>importXlsxCompliance(e.target.files[0], block)});
  top.appendChild(el("button",{class:"sm-btn", style:{marginLeft:"10px"},
    title:T("datatable.paste_hint","Tip: select a metric cell and Ctrl+V an Excel region"),
    text:T("datatable.import_xlsx","Import xlsx"), onclick:()=>fileInput.click()}));
  top.appendChild(fileInput);
  host.appendChild(top);

  /* ----- groups / axes management ----- */
  const simSec = el("div",{class:"dt-section"});
  // P1.2: the groups/axes strip is set-once configuration, not per-row workflow, so
  // it collapses by default when groups already exist -- reclaiming ~100px above the
  // grid. Collapsed, the header shows a one-line summary of the groups + axes.
  const simHead = el("div",{class:"dt-sh dt-sh-toggle"});
  const simCaret = el("span",{class:"dt-caret", text:"▾"});
  const simSummary = el("span",{class:"dt-sh-summary"});
  simHead.appendChild(simCaret);
  simHead.appendChild(document.createTextNode(T("datatable.groups","Simulation groups / axes")));
  simHead.appendChild(simSummary);
  simSec.appendChild(simHead);
  const simBd = el("div",{class:"dt-bd"});
  let simCollapsed = !!(data.sims && data.sims.length);
  const updateSimSummary = ()=>{
    simSummary.textContent = (data.sims||[]).map(s=>{
      const nm = s.title || s.stage || s.key || "sim";
      const ax = (s.axes||[]).join("/");
      return (s.stage && s.stage!==nm) ? (nm+" ("+s.stage+") "+ax) : (nm+" "+ax);
    }).join("   ·   ");
  };
  const applySimCollapse = ()=>{
    simBd.style.display = simCollapsed ? "none" : "";
    simCaret.textContent = simCollapsed ? "▸" : "▾";
    simSummary.style.display = simCollapsed ? "" : "none";
  };
  simHead.addEventListener("click", ()=>{ simCollapsed = !simCollapsed; applySimCollapse(); });
  // move an array element left/right (no-drag reorder fallback, decision 9)

    const [m]=arr.splice(i,1); arr.splice(j,0,m); return true; };

  // ---- drag-reorder wirers (mirror wireBlockDrag; snapshot BEFORE the reorder) ----
  // Sim GROUP drag (reorders data.sims). Scoped to this block via the closure.
  let simGroupDragSrc=null;
  function wireSimGroupDrag(chip, si){
    chip.addEventListener("dragstart",(e)=>{ simGroupDragSrc=si; chip.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; });
