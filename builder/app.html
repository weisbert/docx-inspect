  ["comp_font",   "tpl.f.comp_font",   "Compliance font size pt",  "compliance.font_pt",                 "num",   "number"],
  ["comp_rowh",   "tpl.f.comp_rowh",   "Compliance row height pt", "compliance.row_h_pt.data",           "num",   "number"],
  ["axis_labels", "tpl.f.axis_labels", "Axis labels",              "compliance.axis_labels",             "csv",   "text"],
  ["cap_table",   "tpl.f.cap_table",   "Table caption prefix",     "caption_prefix.table",               "text",  "text"],
  ["cap_fig",     "tpl.f.cap_fig",     "Figure caption prefix",    "caption_prefix.image",               "text",  "text"],
  ["body_ascii",  "tpl.f.body_ascii",  "Body font (ascii)",        "styles.normal.ascii",                "text",  "text"],
  ["body_ea",     "tpl.f.body_ea",     "Body font (East Asian)",   "styles.normal.eastAsia",             "text",  "text"],
  ["body_size",   "tpl.f.body_size",   "Body size pt",             "styles.normal.size_pt",              "num",   "number"],
  ["h1_size",     "tpl.f.h1_size",     "Heading 1 size pt",        "styles.headings.levels.\"1\".size_pt","num",  "number"],
  ["h2_size",     "tpl.f.h2_size",     "Heading 2 size pt",        "styles.headings.levels.\"2\".size_pt","num",  "number"],
  ["secrecy",     "tpl.f.secrecy",     "Default secrecy",          "cover.secrecy_default",              "text",  "text"],
  ["toc_title",   "tpl.f.toc_title",   "TOC title",                "toc.title",                          "text",  "text"],
];

/* ---- top-level render ----------------------------------------------------- */
function renderTemplate(){
  renderSkeletonTree();
  renderTemplateRight();
}

function renderTemplateRight(){
  const host = $("#editor-inner"); host.innerHTML="";
  host.appendChild(buildTemplateToolbar());
  host.appendChild(buildSettingsPane());
  host.appendChild(buildNodeBodyPane());
}

function buildTemplateToolbar(){
  const bar = el("div",{class:"ed-header"});
  bar.appendChild(el("div",{},[
    el("h2",{class:"ed-title", text: T("template.editor","Template editor")}),
    el("div",{class:"ed-sub", text: App.tplView.id}),
  ]));
  const tools = el("div",{class:"ed-tools"});
  if (App.tplView.dirty)
    tools.appendChild(el("span",{class:"ed-sub", text:T("status.unsaved","Unsaved changes")}));
  tools.appendChild(el("button",{class:"tb-btn primary", text:T("template.save","Save"), onclick:saveTemplate}));
  tools.appendChild(el("button",{class:"tb-btn", text:T("home.back","Back to home"), onclick:tplBack}));
  bar.appendChild(tools);
  return bar;
}

/* ---- settings form -------------------------------------------------------- */
function buildSettingsPane(){
  const wrap = el("div",{class:"card"});
  const bar  = el("div",{class:"card-bar", style:{cursor:"pointer"},
    onclick:()=>{ App.tplView.settingsOpen=!App.tplView.settingsOpen; renderTemplateRight(); }});
  bar.appendChild(el("span",{class:"twisty", text: App.tplView.settingsOpen?TW_OPEN:TW_CLOSED}));
  bar.appendChild(el("span",{class:"card-kind", text:T("template.settings","Template settings")}));
  wrap.appendChild(bar);
  if (!App.tplView.settingsOpen) return wrap;

  const body = el("div",{class:"card-body"});
  const grid = el("div",{class:"form-grid"});
  TPL_FIELDS.forEach(f=> grid.appendChild(buildTplField(f)));
  body.appendChild(grid);
  wrap.appendChild(body);
  return wrap;
}

function buildTplField(f){
  const key=f[0], labelKey=f[1], fb=f[2], path=f[3], kind=f[4], inputType=f[5];
  const conv = cv[kind];
  const cur  = (path==="@name") ? App.tplView.name : getPath(App.tplView.config, path);
  const wrap = el("div",{class:"ffield"});
  wrap.appendChild(el("label",{text:T(labelKey, fb)}));
  const input = el("input",{class:"ti", type:inputType, value: conv.get(cur)});
  input.addEventListener("input",(e)=>{
    const v = conv.set(e.target.value);
    if (path==="@name"){ App.tplView.name = (v==null?"":v); }
    else if (v===undefined && kind==="num"){ /* leave existing; never write NaN */ }
    else setPath(App.tplView.config, path, v);
    tplMarkDirty();
  });
  wrap.appendChild(input);
  return wrap;
}

/* ---- skeleton outline tree ------------------------------------------------ */
function renderSkeletonTree(){
  $("#outline-head").textContent = T("template.skeleton","Skeleton");
  const root = $("#tree"); root.innerHTML="";
  if (!App.tplView.skeleton.length){
    root.appendChild(el("div",{class:"empty", text:T("template.skeleton_empty","No chapters. Add one below.")}));
  }
  const frag = document.createDocumentFragment();
  buildSkelNodes(App.tplView.skeleton, frag, [], 0);
  root.appendChild(frag);
  root.appendChild(el("button",{class:"sm-btn", style:{margin:"8px"},
    text:"+ "+T("template.add_chapter","Add chapter"), onclick:()=>tplAddNode(null,"root")}));
}

function buildSkelNodes(nodes, parentEl, numPath, depth){
  nodes.forEach((n,i)=>{
    const num = numPath.concat(i+1).join(".");
    const hasKids = (n.children && n.children.length);
    if (n._collapsed===undefined) n._collapsed=false;
    const row = el("div",{ class:"node-row"+(App.tplView.sel===n._id?" sel":""), draggable:"true",
      "data-id":n._id,
      onclick:(e)=>{ e.stopPropagation(); tplSelect(n._id); },
      oncontextmenu:(e)=>{ e.preventDefault(); tplSelect(n._id); openSkelCtx(e, n._id); } });
    const tw = el("span",{class:"twisty"+(hasKids?"":" leaf"),
      text: hasKids ? (n._collapsed?TW_CLOSED:TW_OPEN) : TW_LEAF,
      onclick:(e)=>{ if(hasKids){ e.stopPropagation(); n._collapsed=!n._collapsed; renderSkeletonTree(); } }});
    row.appendChild(tw);
    row.appendChild(el("span",{class:"node-num", text:num}));
    row.appendChild(el("span",{class:"node-title", text:n.title||T("node.untitled","(untitled)")}));
    row.appendChild(el("span",{class:"badge "+(n.fixed?"fixed":"user"),
      text: n.fixed?T("template.fixed","fixed"):T("template.fillable","fillable")}));
    wireSkelDrag(row, n._id);
    parentEl.appendChild(row);
    if (hasKids && !n._collapsed){
      const kids = el("div",{class:"children"});
      buildSkelNodes(n.children, kids, numPath.concat(i+1), depth+1);
      parentEl.appendChild(kids);
    }
  });
}

function tplFind(id, nodes, parent){
  nodes = nodes || App.tplView.skeleton; parent = parent || null;
  for (let i=0;i<nodes.length;i++){
    const n=nodes[i];
    if (n._id===id) return {node:n, list:nodes, idx:i, parent};
    const r=tplFind(id, n.children||[], n); if(r) return r;
  }
  return null;
}
function tplSelect(id){ App.tplView.sel=id; renderSkeletonTree(); renderTemplateRight(); }

function tplAddNode(id, where){
  const fresh = { _id:uid(), title:T("template.new_chapter","New chapter"), fixed:false, blocks:[], children:[] };
  if (where==="root"){ App.tplView.skeleton.push(fresh); }
  else {
    const r=tplFind(id); if(!r) return;
    if (where==="child"){ (r.node.children=r.node.children||[]).push(fresh); r.node._collapsed=false; }
    else r.list.splice(r.idx+1,0,fresh);
  }
  tplMarkDirty(); App.tplView.sel=fresh._id; renderSkeletonTree(); renderTemplateRight();
}
function tplRenameNode(id){
  const r=tplFind(id); if(!r) return;
  modalPrompt(T("ctx.rename","Rename"), T("dialog.rename.msg","Section title"), r.node.title||"", (v)=>{
    if (v==null) return; r.node.title=v; tplMarkDirty(); renderSkeletonTree();
    if (App.tplView.sel===id) renderTemplateRight();
  });
}
function tplMoveNode(id, dir){
  const r=tplFind(id); if(!r) return;
  const j=r.idx+dir; if(j<0||j>=r.list.length) return;
  const [m]=r.list.splice(r.idx,1); r.list.splice(j,0,m);
  tplMarkDirty(); renderSkeletonTree();
}
function tplDeleteNode(id){
  const r=tplFind(id); if(!r) return;
  modalConfirm(T("template.del.title","Delete chapter?"),
    T("template.del.msg","This removes the chapter and its children from the template skeleton."), ()=>{
      r.list.splice(r.idx,1);
      if (App.tplView.sel===id) App.tplView.sel = App.tplView.skeleton.length?App.tplView.skeleton[0]._id:null;
      tplMarkDirty(); renderSkeletonTree(); renderTemplateRight();
  });
}
function tplToggleFixed(id){
  const r=tplFind(id); if(!r) return;
  r.node.fixed = !r.node.fixed;
  if (r.node.fixed && !Array.isArray(r.node.blocks)) r.node.blocks=[];
  tplMarkDirty(); renderSkeletonTree(); renderTemplateRight();
}

/* drag-reorder (siblings only, mirrors the project outline) */
let tplDragSrc=null;
function wireSkelDrag(row, id){
  row.addEventListener("dragstart",(e)=>{ tplDragSrc=id; e.dataTransfer.effectAllowed="move"; row.style.opacity=".4"; });
  row.addEventListener("dragend",()=>{ row.style.opacity=""; tplDragSrc=null; });
  row.addEventListener("dragover",(e)=>{ if(tplDragSrc&&tplDragSrc!==id){ e.preventDefault(); row.style.boxShadow="inset 0 -2px 0 var(--accent)"; }});
  row.addEventListener("dragleave",()=>{ row.style.boxShadow=""; });
  row.addEventListener("drop",(e)=>{
    e.preventDefault(); row.style.boxShadow="";
    if (!tplDragSrc||tplDragSrc===id) return;
    const src=tplFind(tplDragSrc), dst=tplFind(id);
    if (!src||!dst||src.list!==dst.list) return;     // same-parent reorder only
    src.list.splice(src.idx,1);
    const ni=dst.list.indexOf(dst.node);
    dst.list.splice(ni+(src.idx<ni?0:1),0,src.node);
    tplMarkDirty(); renderSkeletonTree();
  });
}

/* context menu (reuses #ctx + closeCtx + the global click-to-close handler) */
function openSkelCtx(e, id){
  const r=tplFind(id); if(!r) return;
  const ctx=$("#ctx"); ctx.innerHTML="";
  const item=(label,fn,danger)=>el("button",{class:danger?"danger":"", onclick:()=>{ closeCtx(); fn(); }}, label);
  const canUp=r.idx>0, canDown=r.idx<r.list.length-1;
  ctx.appendChild(item(T("ctx.add_child","Add child"), ()=>tplAddNode(id,"child")));
  ctx.appendChild(item(T("ctx.add_sibling","Add sibling"), ()=>tplAddNode(id,"sibling")));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.rename","Rename"), ()=>tplRenameNode(id)));
  ctx.appendChild(item(r.node.fixed?T("template.make_fillable","Make fillable"):T("template.make_fixed","Make fixed"),
    ()=>tplToggleFixed(id)));
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  const up=item(T("ctx.move_up","Move up"), ()=>tplMoveNode(id,-1)); if(!canUp) up.disabled=true;
  const dn=item(T("ctx.move_down","Move down"), ()=>tplMoveNode(id,1)); if(!canDown) dn.disabled=true;
  ctx.appendChild(up); ctx.appendChild(dn);
  ctx.appendChild(el("div",{class:"ctx-sep"}));
  ctx.appendChild(item(T("ctx.delete","Delete"), ()=>tplDeleteNode(id), true));
  ctx.style.display="block";
  const vw=window.innerWidth, vh=window.innerHeight, w=ctx.offsetWidth, h=ctx.offsetHeight;
  ctx.style.left=Math.min(e.clientX, vw-w-6)+"px";
  ctx.style.top =Math.min(e.clientY, vh-h-6)+"px";
}

/* ---- selected-node body editor -------------------------------------------- */
function buildNodeBodyPane(){
  const card = el("div",{class:"card"});
  const sel = App.tplView.sel ? tplFind(App.tplView.sel) : null;
  if (!sel){
    card.appendChild(el("div",{class:"card-body"},[
      el("div",{class:"empty", text:T("template.pick_node","Select a chapter to edit its body.")})]));
    return card;
  }
  const node = sel.node;

  const bar = el("div",{class:"card-bar"});
  bar.appendChild(el("span",{class:"card-kind", text: node.title || T("node.untitled","(untitled)")}));
  const tog = el("div",{class:"card-actions", style:{opacity:1}});
  tog.appendChild(el("button",{class:"sm-btn", text:T("ctx.rename","Rename"), onclick:()=>tplRenameNode(node._id)}));
  tog.appendChild(el("button",{class:"sm-btn",
    text: node.fixed?T("template.make_fillable","Make fillable"):T("template.make_fixed","Make fixed"),
    onclick:()=>tplToggleFixed(node._id)}));
  bar.appendChild(tog);
  card.appendChild(bar);

  const body = el("div",{class:"card-body"});
  if (node.fixed) buildFixedBodyEditor(body, node);
  else body.appendChild(el("div",{class:"ro-note"},[
        el("span",{text:T("template.fillable_note","Filled per project")})]));
  card.appendChild(body);
  return card;
}

function buildFixedBodyEditor(host, node){
  node.blocks = Array.isArray(node.blocks) ? node.blocks : [];
  node.blocks.forEach((b, i)=>{
    if (b && b.type==="para"){
      const wrap = el("div",{class:"ffield", style:{marginBottom:"8px"}});
      const ta = el("textarea",{class:"ti", style:{width:"100%",minHeight:"60px"}});
      // Canonical block model is runs[]; show their plain text, tolerate legacy
      // `text`. Editing flattens to a single unformatted run (b/i/color on an
      // edited paragraph is intentionally not preserved by this plain editor).
      ta.value = blockPlainText(b);
      ta.addEventListener("input",(e)=>{ b.runs=[{t:e.target.value}]; delete b.text; tplMarkDirty(); });
      const rm = el("button",{class:"sm-btn", style:{color:"var(--danger)",marginTop:"4px"},
        text:T("template.remove_para","Remove paragraph"),
        onclick:()=>{ node.blocks.splice(i,1); tplMarkDirty(); renderTemplateRight(); }});
      wrap.appendChild(ta); wrap.appendChild(rm);
      host.appendChild(wrap);
    } else {
      host.appendChild(el("div",{class:"ro-note"},[
        el("span",{text:T("template.readonly_block","This block type is not editable here: ")+((b&&b.type)||"?")})]));
    }
  });
  host.appendChild(el("button",{class:"add-trigger", text:"+ "+T("template.add_para","Add paragraph"),
    onclick:()=>{ node.blocks.push({type:"para", runs:[]}); tplMarkDirty(); renderTemplateRight(); }}));
}

/* ---- save / back ---------------------------------------------------------- */
function tplBack(){
  const go = ()=>{ App.tplView=null; App.view="home"; render(); refreshHome(); };
  if (App.tplView && App.tplView.dirty){
    modalConfirm(T("template.discard.title","Discard changes?"),
      T("template.discard.msg","You have unsaved template changes. Leave without saving?"), go);
  } else go();
}

// Strip editor-local keys (_id/_collapsed) and re-emit any unmodeled keys.
function serializeSkeleton(nodes){
  return (nodes||[]).map(n=>{
    const out = { title:n.title||"", fixed:!!n.fixed,
                  blocks: Array.isArray(n.blocks)?n.blocks:[],
                  children: serializeSkeleton(n.children||[]) };
    if (n.level!=null) out.level = n.level;
    if (n._passthru) Object.assign(out, n._passthru);
    return out;
  });
}

function scheduleTplAutosave(){
  clearTimeout(App.tplAutosaveTimer);
  App.tplAutosaveTimer = setTimeout(()=>persistTemplate({silent:true, stay:true}), 1500);
}
// Persist the active template via the atomic PUT /api/template, WITHOUT navigating.
// opts.silent: suppress "saving" status + failure toast (used by autosave).
// Returns true on success; callers that want the navigate-home UX do that after.
async function persistTemplate(opts){
  opts = opts || {};
  const tv = App.tplView; if (!tv) return false;
  if (App.tplSaving){ if (!opts.silent) scheduleTplAutosave(); return false; }
  App.tplSaving = true;
  if (!opts.silent) setStatus("saving", T("status.saving","Saving..."));
  try{
    const body = {
      name: tv.name,
      config: tv.config,                       // full object, unknown keys untouched
      skeleton: serializeSkeleton(tv.skeleton),
    };
    await api("PUT","/api/template",{query:{id:tv.id}, json:body});
    tv.dirty = false;
    setStatus("saved", T("status.template_saved","Template saved"));
    return true;
  }catch(e){
    setStatus("err","save failed");
    if (!opts.silent) toast(T("toast.template_save_failed","Save failed: ")+e.message, true);
    return false;
  }finally{
    App.tplSaving = false;
  }
}
async function saveTemplate(){
  if (!App.tplView) return;
  const ok = await persistTemplate({stay:true});
  if (!ok) return;
  toast(T("toast.template_saved","Template saved"));
  App.tplView=null; App.view="home"; render(); await refreshHome();
}

// options: [{id,name}]; allowBlank adds a leading "auto-derive" choice (value="").
// cb receives the chosen id, "" for auto-derive, or null on cancel.
function modalSelect(title, msg, options, allowBlank, blankLabel, cb){
  const m = $("#modal"); m.innerHTML="";
  const sel = el("select",{class:"ti", style:{width:"100%"}});
  if (allowBlank) sel.appendChild(el("option",{value:"", text:blankLabel}));
  (options||[]).forEach(o=> sel.appendChild(el("option",{value:o.id, text:o.name||o.id})));
  const ok = ()=>{ closeOverlay(); cb(sel.value); };
  m.appendChild(el("h3",{text:title}));
  m.appendChild(el("p",{text:msg}));
  m.appendChild(sel);
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"),
      onclick:()=>{ closeOverlay(); cb(null); }}),
    el("button",{class:"tb-btn primary", text:T("action.ok","OK"), onclick:ok}),
  ]));
  showOverlay(); setTimeout(()=>sel.focus(),30);
}

// Open a native file picker for one accept type; resolve the chosen File (or null).
function pickFile(accept){
  return new Promise(res=>{
    const inp = el("input",{type:"file", accept, style:{display:"none"},
      onchange:(e)=>{ const f=e.target.files[0]||null; inp.remove(); res(f); }});
    document.body.appendChild(inp); inp.click();
  });
}

/* ---- flow: import master -------------------------------------------------- */
async function importMaster(){
  const file = await pickFile(".docx"); if (!file) return;
  const b64 = await fileToB64(file);
  const def = file.name.replace(/\.docx$/i,"");
  modalPrompt(T("dialog.tpl_name.title","Template name"),
    T("dialog.tpl_name.msg","Enter a name for this template."), def, async (name)=>{
      if (name==null) return; name=name.trim(); if(!name) return;
      setStatus("saving", T("status.importing","Importing..."));
      try{
        await api("POST","/api/import-docx",{json:{docx_b64:b64, mode:"template", name}});
        toast(T("toast.template_created","Template created"));
        await refreshHome();
        setStatus("", T("status.no_project","No project open"));
      }catch(e){
        setStatus("err", T("status.import_failed","import failed"));
        toast(T("toast.import_failed","Import failed: ")+e.message, true);
      }
  });
}

/* ---- flow: apply an update bundle (.zip from Claude) ---------------------- */
async function applyUpdate(){
  const file = await pickFile(".zip"); if (!file) return;
  const b64 = await fileToB64(file);
  setStatus("saving", T("status.applying","Applying update..."));
  try{
    const r = await api("POST","/api/apply-update",{json:{name:file.name, zip_b64:b64}});
    const acts = r.actions || [];
    const warned = acts.filter(a=>a.warn).length;
    let msg = T("toast.update_applied","Update applied: ")+acts.length+T("toast.update_files"," file(s)");
    if (warned) msg += " ("+warned+T("toast.update_warned"," had local edits - backed up)");
    toast(msg);
    await refreshHome();
    setStatus("", T("status.no_project","No project open"));
  }catch(e){
    setStatus("err", T("status.apply_failed","apply failed"));
    toast(T("toast.apply_failed","Apply failed: ")+e.message, true);
  }
}

/* ---- flow: delete template ------------------------------------------------ */
function deleteTemplate(tpl){
  modalConfirm(T("dialog.del_tpl.title","Delete template?"),
    T("dialog.del_tpl.msg","This removes the template permanently. Existing projects are not affected."),
    async ()=>{
      try{
        await api("DELETE","/api/template",{query:{id:tpl.id}});
        toast(T("toast.template_deleted","Template deleted"));
        await refreshHome();
      }catch(e){
        toast(T("toast.delete_failed","Delete failed: ")+e.message, true);
      }
  });
}

/* ---- flow: new from template ---------------------------------------------- */
function newFromTemplate(){
  if (!App.templates.length){
    toast(T("toast.import_master_first","Import a master document first"), true); return;
  }
  const askDir = (tplId)=>{
    modalPrompt(T("dialog.new.title","New project"),
      T("dialog.new.msg","Enter the project folder path (absolute or under reports root)."),
      "", async (dir)=>{
        if (!dir) return; dir=dir.trim(); if(!dir) return;
        const create = async (force)=>{
          try{
            await api("POST","/api/new-from-template",{json:{dir, template:tplId, force:!!force}});
            await openProject(dir);
          }catch(e){
            toast(T("toast.create_failed","Create failed: ")+e.message, true);
          }
        };
        if (await projectExistsAt(dir)){
          modalConfirm(T("dialog.overwrite.title","Folder already has a project"),
            T("dialog.overwrite.msg","A project already exists in this folder. Creating a new one overwrites it and cannot be undone."),
            ()=>create(true));
        } else { create(false); }
    });
  };
  if (App.templates.length === 1){ askDir(App.templates[0].id); return; }
  modalSelect(T("dialog.pick_tpl.title","Choose a template"),
    T("dialog.pick_tpl.msg","Select the template to base this project on."),
    App.templates, false, "", (tplId)=>{ if(tplId==null) return; askDir(tplId); });
}

/* ---- flow: import Word (report) ------------------------------------------- */
async function importWord(){
  const file = await pickFile(".docx"); if (!file) return;
  const b64 = await fileToB64(file);
  const def = file.name.replace(/\.docx$/i,"");
  modalPrompt(T("dialog.import_word.title","Import Word report"),
    T("dialog.import_word.msg","Enter the project folder path for the imported report."),
    def, (dir)=>{
      if (!dir) return; dir=dir.trim(); if(!dir) return;
      const doImport = async (tplId)=>{
        setStatus("saving", T("status.importing","Importing..."));
        try{
          const body = {docx_b64:b64, mode:"report", dir};
          if (tplId) body.template = tplId;
          const resp = await api("POST","/api/import-docx",{json:body});
          const seed = (resp && resp.project) ? resp.project : resp;
          await api("PUT","/api/project",{query:{dir}, json:seed});
          toast(T("toast.imported","Imported"));
          await openProject(dir);
        }catch(e){
          setStatus("err", T("status.import_failed","import failed"));
          toast(T("toast.import_failed","Import failed: ")+e.message, true);
        }
      };
      if (App.templates.length){
        modalSelect(T("dialog.bind_tpl.title","Bind a template"),
          T("dialog.bind_tpl.msg","Choose a template for styling, or auto-derive one from this document."),
          App.templates, true, T("dialog.bind_tpl.auto","Auto-derive from document"),
          (tplId)=>{ if(tplId==null) return; doImport(tplId||null); });
      } else {
        doImport(null);
      }
  });
}

/* ---- flow: open ----------------------------------------------------------- */
function openFromHome(dir){ openProject(dir); }

/* ============================================================================
   MODALS
============================================================================ */
function modalPrompt(title, msg, value, cb){
  const m = $("#modal"); m.innerHTML="";
  const input = el("input",{class:"ti", value:value||"", onkeydown:(e)=>{ if(e.key==="Enter") ok(); if(e.key==="Escape") closeOverlay(); }});
  const ok = ()=>{ closeOverlay(); cb(input.value); };
  m.appendChild(el("h3",{text:title}));
  m.appendChild(el("p",{text:msg}));
  m.appendChild(input);
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"), onclick:()=>{ closeOverlay(); cb(null); }}),
    el("button",{class:"tb-btn primary", text:T("action.ok","OK"), onclick:ok}),
  ]));
  showOverlay(); setTimeout(()=>input.focus(),30);
}
function modalConfirm(title, msg, cb){
  const m = $("#modal"); m.innerHTML="";
  m.appendChild(el("h3",{text:title}));
  m.appendChild(el("p",{text:msg}));
  m.appendChild(el("div",{class:"modal-actions"},[
    el("button",{class:"sm-btn", text:T("action.cancel","Cancel"), onclick:closeOverlay}),
    el("button",{class:"tb-btn primary", style:{background:"var(--danger)",borderColor:"var(--danger)"},
      text:T("action.confirm","Confirm"), onclick:()=>{ closeOverlay(); cb(); }}),
  ]));
  showOverlay();
}
function showOverlay(){ $("#overlay").classList.add("show"); }
function closeOverlay(){ $("#overlay").classList.remove("show"); }

/* ============================================================================
   WIRING
============================================================================ */
function wireToolbar(){
  $("#btn-home").onclick = goHome;
  $("#app-home").onclick = goHome;
  $("#btn-open").onclick = ()=>openProject(null);
  $("#btn-new").onclick  = newProject;
  // route Save by current view: project editor -> saveProject, template editor -> persistTemplate (save in place)
  $("#btn-save").onclick = ()=>{ flushActiveGrid(); if (App.view === "template") persistTemplate({stay:true}); else saveProject(false); };
  $("#btn-undo").onclick = projectUndo;
  $("#btn-redo").onclick = projectRedo;
  $("#btn-docx").onclick = ()=>exportProject("docx");
  $("#btn-pdf").onclick   = ()=>exportProject("pdf");
  $("#btn-preview").onclick = enterPreview;
  $("#btn-checklist").onclick = enterChecklist;
  $("#btn-copytext").onclick = copyProjectText;
}

/* ============================================================================
   ONE-CLICK TEXT EXPORT
   Copy the entire project (text + structure) to the clipboard as compact JSON,
   so it can be pasted back over a text-only channel (no file upload needed).
   Images are path references, not embedded bytes, so the payload stays small.
============================================================================ */
function copyProjectText(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  flushActiveGrid();   // commit any in-flight grid cell so the copy is current
  const text = JSON.stringify(App.project);
  const ok = ()=>toast(T("toast.copied_text","Copied report as text")+" ("+text.length+" chars)");
  try{
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(ok, ()=>fallbackCopyText(text, ok));
    } else {
      fallbackCopyText(text, ok);
    }
  }catch(_){ fallbackCopyText(text, ok); }
}
function fallbackCopyText(text, ok){
  try{
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.left = "-9999px"; ta.style.top = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const done = document.execCommand("copy");
    document.body.removeChild(ta);
    if (done){ return ok && ok(); }
  }catch(_){}
  toast(T("toast.copy_failed","Copy failed -- open project.json and copy it manually"), true);
}

function wireGlobal(){
  document.addEventListener("click",(e)=>{ if(!$("#ctx").contains(e.target)) closeCtx(); });
  document.addEventListener("scroll",closeCtx,true);
  $("#overlay").addEventListener("click",(e)=>{ if(e.target.id==="overlay") closeOverlay(); });
  // Ctrl+S manual save; Ctrl+Z routes to the focused grid's undo (grids also bind it
  // on their own host; this global guard keeps native browser undo from firing when a
  // grid cell is the active element but its host keydown did not consume the event).
  window.addEventListener("keydown",(e)=>{
    if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="s"){
      e.preventDefault();
      flushActiveGrid();   // commit any in-flight grid cell so a manual save persists it
      if (App.view === "template") persistTemplate({stay:true}); else saveProject(false);
    }
    const kz = (e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z";
    const kredo = (e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==="y" || (e.shiftKey && e.key.toLowerCase()==="z"));
    if (kredo){
      if (!isTextEditing(document.activeElement)){ e.preventDefault(); projectRedo(); }
      return;
    }
    if (kz && !e.shiftKey){
      const ae = document.activeElement;
      const giCtx = (ae && ae.__giCtx) || (ae && ae.closest && (()=>{ const h=ae.closest("[tabindex]"); return h && h.__giCtx; })());
      if (giCtx && !giCtx.editing){ e.preventDefault(); gridUndo(giCtx); return; }   // grid-granular undo
      if (!isTextEditing(ae)){ e.preventDefault(); projectUndo(); }                    // else project-level
    }
  });
  // warn on unload if dirty
  window.addEventListener("beforeunload",(e)=>{ if(App.dirty || (App.tplView && App.tplView.dirty)){ e.preventDefault(); e.returnValue=""; } });
}

boot();
</script>
