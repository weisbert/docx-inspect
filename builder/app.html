    valBadge.style.display = ok ? "none" : "";
    if (ok) valToastShown = false;   // re-arm the one-shot toast for the next outage
  };
  const validate = debounce(async ()=>{
    try{
      const r = await api("POST","/api/validate-compliance",{json:{data}});
      flags = r.flags || {}; paintFlags();
      setValAvailable(true);
    }catch(err){
      // Failure modes all mean the same thing: the auto red-flag did NOT run
      // (server unreachable / 503 'engine not available' / 500). Never swallow:
      // clear flags so no stale red boxes mislead, and surface the outage loudly.
      flags = {}; paintFlags();
      setValAvailable(false);
      setStatus("err", T("status.validation_unavailable","auto red-flag unavailable"));
      if (!valToastShown){
        valToastShown = true;   // debounce fires per keystroke; toast only once per outage
        toast(T("toast.validation_unavailable","Auto red-flag unavailable; verify out-of-spec values manually."), true);
      }
    }
  }, 400);

  function paintFlags(){
    metricWrap.querySelectorAll(".axis-val").forEach(td=>td.classList.remove("flagcell"));
    Object.keys(flags).forEach(ri=>{
      (flags[ri]||[]).forEach(ai=>{
        // `ai` is a semantic MTM slot (0/1/2), NOT a flat column position. Match by
        // data-mtm so the right column lights up regardless of axis order; any group
        // showing that slot is painted (groups share one stored value today).
        metricWrap.querySelectorAll(`[data-r="${ri}"][data-mtm="${ai}"]`)
          .forEach(cell=>cell.classList.add("flagcell"));
      });
    });
  }

  // structural ops on metric rows (mirror block-card actions). Each snapshots
  // BEFORE mutating so a mis-op is undoable, then rebuilds + restores focus.
  function rowStruct(ri, op){
    snapshot(ctx);
    if (op==="delete"){ data.rows.splice(ri,1); }
    else if (op==="above"){ data.rows.splice(ri,0,newComplianceRow()); }
    else if (op==="below"){ data.rows.splice(ri+1,0,newComplianceRow()); }
    else if (op==="up"){ if(ri<=0) return; const [m]=data.rows.splice(ri,1); data.rows.splice(ri-1,0,m); }
    else if (op==="down"){ if(ri>=data.rows.length-1) return; const [m]=data.rows.splice(ri,1); data.rows.splice(ri+1,0,m); }
    markDirty(); rebuildMetrics(); validate();
  }

  function rebuildMetrics(){
    data = block.data;                       // re-sync after a possible undo swap
    metricWrap.innerHTML="";
    ctx.reg.clear();
    const tbl = el("table",{class:"grid"});
    // header rows: group titles, then axis labels
    const flatAxes = []; // {si, ai, label}
    data.sims.forEach((s, si)=> (s.axes||[]).forEach((ax, ai)=> flatAxes.push({si, ai, label:ax})));

    const thead = el("thead");
    const hr1 = el("tr",{class:"hdr"});
    hr1.appendChild(el("th",{}));                                  // row-actions column
    hr1.appendChild(el("th",{html:T("datatable.col.cat","Category")}));
    hr1.appendChild(el("th",{html:T("datatable.col.item","Item")}));
    hr1.appendChild(el("th",{html:T("datatable.col.unit","Unit")}));
    hr1.appendChild(el("th",{html:T("datatable.col.kind","Kind")}));
    hr1.appendChild(el("th",{html:T("datatable.col.limit","Limit")}));
    hr1.appendChild(el("th",{html:T("datatable.col.spec","Spec")}));
    hr1.appendChild(el("th",{html:T("datatable.col.spec_mtm","Spec MIN/TYP/MAX"), colspan:3}));
    data.sims.forEach(s=> hr1.appendChild(el("th",{text:(s.title||s.stage||s.key||"sim"), colspan:(s.axes||[]).length})));
    thead.appendChild(hr1);

    const hr2 = el("tr",{class:"hdr"});
    ["","","","","","",""].forEach(()=>hr2.appendChild(el("th",{})));   // actions + 6 fixed
    ["MIN","TYP","MAX"].forEach(x=>hr2.appendChild(el("th",{text:x})));
    flatAxes.forEach(fa=> hr2.appendChild(el("th",{text:fa.label})));
    thead.appendChild(hr2);
    tbl.appendChild(thead);

    const tbody = el("tbody");
    data.rows.forEach((row, ri)=>{
      const tr = el("tr",{});
      const actTd = rowActionsCell(ri, data.rows.length, rowStruct);     // not a grid cell
      // row drag handle (toggles draggable only while grabbed; mirrors block-card)
      const rowHandle = el("span",{class:"drag-handle", title:T("block.drag","Drag to reorder"), text:"⠿"});
      rowHandle.addEventListener("mousedown",()=>tr.setAttribute("draggable","true"));
      tr.addEventListener("dragend",()=>tr.setAttribute("draggable","false"));
      actTd.insertBefore(rowHandle, actTd.firstChild);
      tr.appendChild(actTd);
      wireMetricRowDrag(tr, ri);
      // fixed columns 0..8 (column index = factory arg `c`)
      tr.appendChild(textCell(ctx, row,"cat",  ri, 0));
      tr.appendChild(textCell(ctx, row,"item", ri, 1));
      tr.appendChild(textCell(ctx, row,"unit", ri, 2));
      tr.appendChild(selectCell(ctx, row, ri, 3, "kind", false,
        ["common_setting","module_setting","tb","result"], "result", ()=>validate()));
      tr.appendChild(selectCell(ctx, row, ri, 4, "limit", true,
        ["le","ge","range"], null, ()=>validate()));
      tr.appendChild(numCell(ctx, row,"spec", ri, 5, ()=>validate()));
      [0,1,2].forEach(k=> tr.appendChild(numArrCell(ctx, row,"spec_mtm", k, ri, DT_FIXED_COLS-3+k, ()=>validate())));
      // sim axes (flat) — map axis label to sim_mtm[0..2] or sim_ntwc
      let flat=0;
      data.sims.forEach((s, si)=>{
        (s.axes||[]).forEach((ax, ai)=>{
          tr.appendChild(simAxisCell(ctx, row, ax, ri, flat, DT_FIXED_COLS+flat, ()=>validate()));
          flat++;
        });
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    metricWrap.appendChild(tbl);
    ctx.table = tbl; tbl.classList.add("gi-grid");
    freezeLeadCols(tbl);                    // pin actions/Category/Item after layout
    paintFlags();
    restoreFocusAfterRender(ctx);
  }

  redrawSims();
  rebuildMetrics();
  validate();
}

// per-row structural actions (delete / insert above-below / move up-down).
// This is a chrome column, NOT a grid cell — no adapter is registered for it.
function rowActionsCell(ri, total, rowStruct){
  const td = el("td",{class:"row-actions", style:{padding:"2px"}});
  const b = (txt, key, k, disabled)=> el("button",{class:"icon-btn"+(key==="delete"?" danger":""),
    title:T(k, txt), text:txt, disabled:disabled?"":null, onclick:()=>rowStruct(ri,key)});
  td.appendChild(b("↑","up","grid.move_up", ri===0));
  td.appendChild(b("↓","down","grid.move_down", ri===total-1));
  td.appendChild(b("⊕","below","grid.insert_row_below", false));
  td.appendChild(b("⊝","above","grid.insert_row_above", false));
  td.appendChild(b("✕","delete","grid.delete_row", false));
  return td;
}

// Freeze the leading identity columns (row-actions / Category / Item) so a row
// stays identifiable when scrolled right to far sim values. Auto table layout
// makes column widths content-driven, so CSS can't know each column's offset —
// measure them from the (per-column) second header row and pin sticky `left`.
const GI_FREEZE_N = 3;
// re-pin on resize so the measured offsets don't go stale (registered once)
let GI_FREEZE_RESIZE = false;
function ensureFreezeResizeHandler(){
  if (GI_FREEZE_RESIZE) return; GI_FREEZE_RESIZE = true;
  window.addEventListener("resize", debounce(()=>{
    document.querySelectorAll(".grid-wrap.dt-grid table.grid").forEach(freezeLeadCols);
  }, 150));
}
function freezeLeadCols(tbl){
  ensureFreezeResizeHandler();
  const head = tbl.tHead; if(!head || !head.rows.length) return;
  const ref = head.rows[head.rows.length-1];          // hr2: exactly one cell per leaf column
  const lefts=[]; let acc=0;
  for(let i=0;i<GI_FREEZE_N;i++){
    if(!ref.cells[i]) return;                          // fewer columns than the freeze count: skip
    lefts.push(acc); acc += ref.cells[i].getBoundingClientRect().width;
  }
  if(acc<=0) return;                                   // not laid out / hidden: don't pin to 0
  for(const tr of tbl.rows){
    for(let i=0;i<GI_FREEZE_N;i++){
      const c = tr.cells[i]; if(!c) continue;
      c.classList.add("gi-freeze");
      c.style.left = lefts[i] + "px";
      if(i===GI_FREEZE_N-1) c.classList.add("gi-freeze-edge");
    }
  }
}

/* ---- compliance typed cell factories (register shared-layer adapters) ------ */
// Each returns a <td> and registers a {r,c,type,el,read,write} adapter so the
// shared select/copy/paste/fill layer can drive it via read()/write(str).

// plain text cell bound to row[key]
function textCell(ctx, row, key, ri, c){
  const cell = el("div",{class:"cell", text:row[key]||""});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"text", el:cell,
    read:()=> row[key] || "",
    write:(s)=>{ row[key]=s; cell.textContent=s; markDirty(); } });
  return td;
}
// numeric cell bound to row[key]; flags non-numeric input but keeps the raw text
function numCell(ctx, row, key, ri, c, after){
  const cell = el("div",{class:"cell", text:fmtNum(row[key])});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"number", el:cell,
    read:()=> fmtNum(row[key]),
    write:(s)=>{ const v=parseNum(s); row[key]=v; cell.textContent = s==="" ? "" : s; flagNumber(cell, v); markDirty(); after&&after(); } });
  return td;
}
// numeric cell bound to row[key][idx] (e.g. spec_mtm)
function numArrCell(ctx, row, key, idx, ri, c, after){
  row[key] = row[key] || [null,null,null];
  const cell = el("div",{class:"cell", text:fmtNum(row[key][idx])});
  const td = el("td",{},[cell]);
  regCell(ctx, { r:ri, c, type:"number", el:cell,
    read:()=> fmtNum(row[key][idx]),
    write:(s)=>{ row[key]=row[key]||[null,null,null]; const v=parseNum(s); row[key][idx]=v; cell.textContent = s==="" ? "" : s; flagNumber(cell, v); markDirty(); after&&after(); } });
  return td;
}
// a sim axis cell: MIN/TYP/MAX -> sim_mtm[0..2]; every OTHER axis -> sim_ntwc.
// TODO: sim_ntwc is a single scalar, so 2+ non-MTM axes would overwrite each
// other. Real fix is a model migration (sim_ntwc -> per-axis scalar map) in
// engine.py/tables.py; until then addAxisTo()/paste block a 2nd non-MTM axis.
function simAxisCell(ctx, row, axisLabel, ri, flatIdx, c, after){
  const mtmIdx = MTM_AXES[String(axisLabel).toUpperCase()];
  const get = ()=> (mtmIdx!=null) ? (row.sim_mtm||[])[mtmIdx] : row.sim_ntwc;
  const set = (v)=>{ if (mtmIdx!=null){ row.sim_mtm=row.sim_mtm||[null,null,null]; row.sim_mtm[mtmIdx]=v; } else row.sim_ntwc=v; };
  const cell = el("div",{class:"cell", text:fmtAxis(get())});
  // data-mtm = semantic [MIN,TYP,MAX] slot (0/1/2); blank for non-MTM axes. The
  // validator returns flags by MTM slot, so paintFlags locates cells by this, not
  // by column order -- correct even after axes are reordered. (See paintFlags.)
  const td = el("td",{class:"axis-val", "data-r":ri, "data-flatax":flatIdx,
    "data-mtm": (mtmIdx!=null ? mtmIdx : "")},[cell]);
  regCell(ctx, { r:ri, c, type:"axis", el:cell,
    read:()=> fmtAxis(get()),
    write:(s)=>{ const v=parseAxis(s); set(v); cell.textContent = s==="" ? "" : s;
      // an axis value is valid if empty, a number, or a value(CORNER) tuple
      cell.classList.toggle("cell-invalid", !(v===null || typeof v==="number" || Array.isArray(v)));
      if (typeof v==="string") cell.title=T("cell.invalid_number","Not a valid number"); else cell.removeAttribute("title");
      markDirty(); after&&after(); } });
  return td;
}
// select cell bound to row[key]; the typed write() matches the pasted string
// against the allowed option values and refuses to store garbage (decision 5).
function selectCell(ctx, row, ri, c, key, allowEmpty, options, fallback, after){
  const sel = el("select",{class:"cell", style:{border:"0",width:"100%"},
    onchange:(e)=>{ row[key] = e.target.value || (allowEmpty?null:fallback); markDirty(); after&&after(); }});
  if (allowEmpty) sel.appendChild(el("option",{value:"",text:"—"}));
  options.forEach(v=>{ const o=el("option",{value:v,text:v}); if((row[key]||"")===v) o.selected=true; sel.appendChild(o); });
  const td = el("td",{},[sel]);
  regCell(ctx, { r:ri, c, type:"select", el:sel,
    read:()=> row[key]==null ? "" : String(row[key]),
    write:(s)=>{
      const t=(s||"").trim();
      if (t==="" && allowEmpty){ row[key]=null; sel.value=""; cell_flag(sel,false); }
      else if (options.indexOf(t)>=0){ row[key]=t; sel.value=t; cell_flag(sel,false); }
      else { cell_flag(sel,true); return; }      // no match: leave unchanged, flag
      markDirty(); after&&after();
    } });
  return td;
}
function cell_flag(elm, bad){
  elm.classList.toggle("cell-invalid", bad);
  if (bad) elm.title=T("cell.invalid_number","Value not allowed"); else elm.removeAttribute("title");
}
// flag a numeric cell whose parsed value is non-numeric (kept raw so user can fix)
function flagNumber(cell, v){
  const bad = (typeof v==="string");   // parseNum returns the raw string on failure
  cell.classList.toggle("cell-invalid", bad);
  if (bad) cell.title=T("cell.invalid_number","Not a valid number"); else cell.removeAttribute("title");
}
function fmtNum(v){ return (v===null||v===undefined||v==="") ? "" : String(v); }
function parseNum(t){ t=(t||"").trim(); if(t==="") return null; const n=Number(t); return isNaN(n)?t:n; }
function fmtAxis(v){
  if (v===null||v===undefined) return "";
  if (Array.isArray(v)) return v[0] + "(" + v[1] + ")";
  return String(v);
}
// parse "value(CORNER)" -> [value,"CORNER"]; plain -> scalar
function parseAxis(t){
  t=(t||"").trim(); if(t==="") return null;
  const m = /^(.*?)\s*\(\s*([^)]+?)\s*\)\s*$/.exec(t);
  if (m){ const num=Number(m[1]); return [ isNaN(num)?m[1].trim():num, m[2].trim() ]; }
  const n=Number(t); return isNaN(n)?t:n;
}

async function importXlsxCompliance(file, block){
  if (!file) return;
  try{
    const b64 = await fileToB64(file);
    const r = await api("POST","/api/import-xlsx",{json:{xlsx_b64:b64, mode:"compliance"}});
    if (r && r.recognized === false){
      // No compliance header band found: do NOT clobber a table the user already
      // filled. Keep current data and tell them why nothing happened.
      toast(T("toast.xlsx_unrecognized","No compliance table recognized in that file — existing data kept."), true);
      return;
    }
    if (r.data){
      block.data = r.data;
      // GUARD: the model stores a single scalar (sim_ntwc) per row for non-MTM axes,
      // so a group with >1 non-MTM axis would silently clobber. Trim extras on import.
      // TODO: real fix is a model migration (sim_ntwc -> per-axis) in engine.py/tables.py.
      let trimmed=false;
      (block.data.sims||[]).forEach(s=>{
        let seenExtra=false;
        s.axes=(s.axes||[]).filter(a=>{
          if (isMtmAxis(a)) return true;
          if (seenExtra){ trimmed=true; return false; }
          seenExtra=true; return true;
        });
      });
      if (trimmed) toast(T("grid.one_extra_axis","Only one extra axis per group is supported"), true);
      markDirty(); renderEditor(); toast(T("toast.imported","Imported"));
    }
  }catch(e){ toast("Import failed: "+e.message, true); }
}

/* ============================================================================
   GRID INTERACTION LAYER (shared)
   A generic select-vs-edit / copy-paste-fill / undo layer that both grids opt
   into via a small per-grid registry of typed cell adapters. The layer touches
   the data model ONLY through adapter.read()/adapter.write(str); this is what
   lets the SAME code serve the free table (string cells) and (later) the
   compliance grid (typed number/axis/select cells).
============================================================================ */
const RC = (r,c)=> r+","+c;
const GI_MAX_ROWS = 2000, GI_MAX_COLS = 64;
// drag-select state shared via the active ctx so ONE global mouseup serves every
// grid (grids are rebuilt on each editor render; a per-grid window listener would leak).
let GI_ACTIVE_CTX = null;
window.addEventListener("mouseup",()=>{ if(GI_ACTIVE_CTX){ GI_ACTIVE_CTX._mouseDown=false; GI_ACTIVE_CTX=null; } });

// Live grid contexts, so a teardown can flush an in-flight cell edit no matter
// which view-switch path is destroying the editor DOM. Grids commit only on their
// own mousedown/Enter/Tab; clearing #editor-inner (selectNode, goHome, block ops)
// would otherwise drop the typed text before commitEdit runs.
const GI_LIVE = new Set();
function flushActiveGrid(){
  if (!GI_LIVE.size) return;
  GI_LIVE.forEach(ctx=>{
    if (!ctx.host || !document.contains(ctx.host)){ GI_LIVE.delete(ctx); return; } // detached: prune
    if (ctx.editing) commitEdit(ctx);                                            // write + markDirty + save
  });
}

function makeGridContext({block, host, rows, cols, rerender, kind}){
  // kind: "free" | "compliance"  (drives paste column behavior)
  const ctx = {
    block, kind,
    host,                       // stable element events are delegated to (not replaced on render)
    table:null,                 // the <table class="grid"> element (reset each render)
    rows, cols,                 // () => integer current dimensions
    rerender,                   // () => void  (existing rebuild / rebuildMetrics)
    reg:new Map(),              // "r,c" -> adapter
    anchor:null, focus:null,    // {r,c}
    selected:new Set(),         // "r,c"
    editing:null,               // adapter currently in edit mode, or null
    _undo:[],                   // stack of snapshots (small N)
    _clip:"",                   // local clipboard fallback (TSV)
  };
  host.__giCtx = ctx;            // lets a global key handler resolve the ctx from the focused host
  GI_LIVE.add(ctx);             // track for flushActiveGrid() on editor teardown
  wireGridEvents(ctx);
  return ctx;
}
function regCell(ctx, adapter){
  ctx.reg.set(RC(adapter.r,adapter.c), adapter);
  adapter.el.__gi = ctx; adapter.el.__rc = [adapter.r,adapter.c];
}
function adapterAt(ctx, r, c){ return ctx.reg.get(RC(r,c)) || null; }

/* ---- event wiring (one delegated set per grid) ---------------------------- */
function wireGridEvents(ctx){
  const host = ctx.host;
  ctx._mouseDown = false;

  host.addEventListener("mousedown",(e)=>{
    if (e.button===2) return;                              // right-click: leave selection alone (cell menu handles it)
    const cell = e.target.closest(".cell"); if(!cell || cell.__gi!==ctx) return;
    const [r,c]=cell.__rc;
    const ad = adapterAt(ctx,r,c); if(!ad) return;
    if (ctx.editing && ctx.editing!==ad) commitEdit(ctx);   // leaving an edited cell commits
    if (ad.type==="select"){ setFocus(ctx,r,c,false); return; } // let native dropdown work
    if (ctx.editing===ad) return;                           // already editing this cell: native caret
    e.preventDefault();                                     // select mode: suppress native caret/drag
    ctx._mouseDown=true; GI_ACTIVE_CTX=ctx;
    if (e.shiftKey){ extendTo(ctx,r,c); }                   // shift-click extends from anchor
    else { setAnchor(ctx,r,c); }                            // new anchor + collapse
  });
  host.addEventListener("mouseover",(e)=>{
    if(!ctx._mouseDown) return;
    const cell=e.target.closest(".cell"); if(!cell||cell.__gi!==ctx) return;
    const [r,c]=cell.__rc; extendTo(ctx,r,c);               // drag-select extends focus
  });

  host.addEventListener("dblclick",(e)=>{
    const cell=e.target.closest(".cell"); if(!cell||cell.__gi!==ctx) return;
    const ad=adapterAt(ctx, cell.__rc[0], cell.__rc[1]);
    if (ad && ad.type!=="select") enterEdit(ctx, ad, /*keepText*/true);
  });

  host.addEventListener("paste",(e)=>{
    if (ctx.editing) return;                  // editing a single cell: cell-level handler does plain text
    e.preventDefault();
    const txt=(e.clipboardData||window.clipboardData).getData("text/plain") || ctx._clip || "";
    gridPasteTSV(ctx, txt);
  });

  host.tabIndex = -1;                          // focusable so it receives keys in select mode
  host.addEventListener("keydown",(e)=> onGridKey(ctx,e));
}

/* ---- focus / anchor / selection primitives -------------------------------- */
function clampRC(ctx,r,c){
  return [Math.max(0,Math.min(r,ctx.rows()-1)), Math.max(0,Math.min(c,ctx.cols()-1))];
}
function setAnchor(ctx,r,c){ [r,c]=clampRC(ctx,r,c); ctx.anchor={r,c}; ctx.focus={r,c}; recomputeSelection(ctx); }
function setFocus(ctx,r,c,keepAnchor){ [r,c]=clampRC(ctx,r,c); ctx.focus={r,c}; if(!keepAnchor) ctx.anchor={r,c}; recomputeSelection(ctx); }
function extendTo(ctx,r,c){ [r,c]=clampRC(ctx,r,c); if(!ctx.anchor) ctx.anchor={r,c}; ctx.focus={r,c}; recomputeSelection(ctx); }

function selRect(ctx){
  const a=ctx.anchor, f=ctx.focus; if(!a||!f) return null;
  return { r0:Math.min(a.r,f.r), r1:Math.max(a.r,f.r), c0:Math.min(a.c,f.c), c1:Math.max(a.c,f.c) };
}
function recomputeSelection(ctx){
  ctx.selected.clear();
  const R=selRect(ctx);
  if(R){ for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++) ctx.selected.add(RC(r,c)); }
  paintSelection(ctx);
}
function paintSelection(ctx){
  ctx.reg.forEach((ad,key)=>{
    ad.el.classList.toggle("cell-selected", ctx.selected.has(key) && ctx.selected.size>1);
    ad.el.classList.toggle("cell-focus", !!ctx.focus && ad.r===ctx.focus.r && ad.c===ctx.focus.c);
  });
  // keep host focused so keystrokes route here while in select mode — but never
  // STEAL focus on the initial render (no selection yet), while editing a cell,
  // or when the focused cell is a native <select> (let its dropdown keep focus).
  if (!ctx.editing && ctx.focus){
    const fad = adapterAt(ctx, ctx.focus.r, ctx.focus.c);
    if (!(fad && fad.type==="select")) ctx.host.focus({preventScroll:true});
  }
}
function selectAll(ctx){ setAnchor(ctx,0,0); ctx.focus={r:ctx.rows()-1,c:ctx.cols()-1}; recomputeSelection(ctx); }

/* ---- edit-mode transitions ------------------------------------------------ */
function enterEdit(ctx, ad, keepText){
  if (ad.type==="select") return;
  ctx.editing = ad;
  ad._pre = ad.read();                                   // for Esc revert (plain)
  if (ad.getRaw) ad._preRaw = ad.getRaw();               // rich cells revert to the exact value
  ad.el.setAttribute("contenteditable","true");
  ad.el.classList.add("gi-editing");
  if (!keepText) ad.el.textContent="";                   // "type to replace"
  if (ad.rich) showCellFmt(ctx, ad);                     // B / I / color toolbar for styled cells
  // plain-text paste interceptor while editing this cell (decision 14)
  if (!ad.el.__giPaste){
    ad.el.addEventListener("paste",(e)=>{
      if (!ad.el.classList.contains("gi-editing")) return;
      e.preventDefault();
      const t=(e.clipboardData||window.clipboardData).getData("text/plain");
      if (t.indexOf("\t")>=0 || t.indexOf("\n")>=0){     // multi-cell paste while editing: route to grid
        commitEdit(ctx); gridPasteTSV(ctx, t); return;
      }
      document.execCommand("insertText", false, t);
    });
    ad.el.__giPaste = true;
  }
  ad.el.focus();
  const sel=getSelection(), rng=document.createRange();
  rng.selectNodeContents(ad.el); rng.collapse(false); sel.removeAllRanges(); sel.addRange(rng);
}
function commitEdit(ctx){
  const ad=ctx.editing; if(!ad) return;
  if (ad.rich && ad.writeRich) ad.writeRich(ad.el);      // serialize styled HTML -> runs
  else ad.write(ad.el.textContent);                      // canonical typed write (re-validates)
  markDirty();
  ad.el.removeAttribute("contenteditable");
  ad.el.classList.remove("gi-editing");
  hideCellFmt();
  ctx.editing=null; saveProject(true);
}
function cancelEdit(ctx){
  const ad=ctx.editing; if(!ad) return;
  if (ad.rich && ad.setRaw) ad.setRaw(ad._preRaw);       // REVERT to pre-edit value (rich)
  else ad.write(ad._pre);                                // REVERT to pre-edit value (decision 1)
  ad.el.removeAttribute("contenteditable");
  ad.el.classList.remove("gi-editing");
  hideCellFmt();
  ctx.editing=null;
}
/* ---- floating B/I/color toolbar for a styled cell being edited -------------- */
let _cellFmtEl = null, _cellFmtCtx = null;
function ensureCellFmt(){
  if (_cellFmtEl) return _cellFmtEl;
  const bar = el("div",{class:"cell-fmt", id:"cellfmt"});
  const btn = (html,title,cmd)=> el("button",{class:"cf-btn", html, title,
    onmousedown:(e)=>{ e.preventDefault(); document.execCommand(cmd); }});
  bar.appendChild(btn("<b>B</b>", T("para.bold","Bold"), "bold"));
  bar.appendChild(btn("<i>I</i>", T("para.italic","Italic"), "italic"));
  bar.appendChild(el("span",{class:"mt-sep"}));
  SPOT_COLORS.forEach(c=>{
    bar.appendChild(el("span",{class:"swatch", title:c==="000000"?T("para.color_black","Black"):("#"+c),
      style:{background:"#"+c},
      onmousedown:(e)=>{ e.preventDefault(); document.execCommand("foreColor", false, "#"+c); }}));
  });
  document.body.appendChild(bar);
  // clicking outside the cell + toolbar commits the edit (and hides the bar)
  document.addEventListener("mousedown",(e)=>{
    if (!_cellFmtEl || _cellFmtEl.style.display==="none") return;
    if (_cellFmtEl.contains(e.target)) return;
    if (_cellFmtCtx && _cellFmtCtx.editing && _cellFmtCtx.editing.el.contains(e.target)) return;
    if (_cellFmtCtx && _cellFmtCtx.editing) commitEdit(_cellFmtCtx); else hideCellFmt();
  });
  _cellFmtEl = bar; return bar;
}
function showCellFmt(ctx, ad){
  const bar = ensureCellFmt(); _cellFmtCtx = ctx;
  bar.style.display = "flex";
  const r = ad.el.getBoundingClientRect(), h = bar.offsetHeight || 30;
  let top = r.top - h - 6; if (top < 4) top = r.bottom + 6;   // flip below when no room above
  bar.style.left = Math.max(4, Math.round(r.left)) + "px";
  bar.style.top  = Math.round(top) + "px";
}
function hideCellFmt(){ if (_cellFmtEl) _cellFmtEl.style.display="none"; }

// M15: persist an in-flight cell before a structural rebuild (no-op when not editing).
function flushGridEdit(ctx){
  if (ctx && ctx.editing) commitEdit(ctx);
}
// M15: discard an in-flight cell WITHOUT writing it back. Used only by undo, which
// replaces ctx.block.data wholesale -- committing here would write a stray value
// and re-dirty the model that is about to be swapped out.
function dropGridEdit(ctx){
  const ad = ctx && ctx.editing; if(!ad) return;
  ad.el.removeAttribute("contenteditable");
  ad.el.classList.remove("gi-editing");
  ctx.editing = null;
}

/* ---- keyboard handler ----------------------------------------------------- */
function onGridKey(ctx, e){
  // EDIT MODE keys
  if (ctx.editing){
    if (e.key==="Escape"){ e.preventDefault(); cancelEdit(ctx); paintSelection(ctx); ctx.host.focus(); }
    else if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); commitEdit(ctx);
      const f=ctx.focus; setAnchor(ctx,f.r+1,f.c); ctx.host.focus(); }
    else if (e.key==="Tab"){ e.preventDefault(); commitEdit(ctx);
      const f=ctx.focus; setAnchor(ctx,f.r,f.c+(e.shiftKey?-1:1)); ctx.host.focus(); }
    return; // let other keys reach the contenteditable
  }
  // SELECT MODE keys
  const f=ctx.focus || {r:0,c:0};
  const move=(dr,dc,extend)=>{ e.preventDefault();
    if(extend) extendTo(ctx,f.r+dr,f.c+dc); else setAnchor(ctx,f.r+dr,f.c+dc); };
  const ctrl = e.ctrlKey||e.metaKey;

  if (ctrl && e.key.toLowerCase()==="a"){ e.preventDefault(); selectAll(ctx); return; }
  if (ctrl && e.key.toLowerCase()==="c"){ e.preventDefault(); gridCopy(ctx,false); return; }
  if (ctrl && e.key.toLowerCase()==="x"){ e.preventDefault(); gridCopy(ctx,true); return; }
  if (ctrl && e.key.toLowerCase()==="v"){ /* paste handled by paste event */ return; }
  if (ctrl && e.key.toLowerCase()==="d"){ e.preventDefault(); gridFillDown(ctx); return; }
  if (ctrl && e.key.toLowerCase()==="z"){ e.preventDefault(); e.stopPropagation(); gridUndo(ctx); return; }

  switch(e.key){
    case "ArrowUp":    return move(-1,0,e.shiftKey);
    case "ArrowDown":  return move(1,0,e.shiftKey);
    case "ArrowLeft":  return move(0,-1,e.shiftKey);
    case "ArrowRight": return move(0,1,e.shiftKey);
    case "Enter":      e.preventDefault(); return setAnchor(ctx,f.r+1,f.c);
    case "Tab":        e.preventDefault(); return setAnchor(ctx,f.r,f.c+(e.shiftKey?-1:1));
    case "F2":{ e.preventDefault(); const ad=adapterAt(ctx,f.r,f.c); if(ad) enterEdit(ctx,ad,true); return; }
    case "Delete":
    case "Backspace": e.preventDefault(); return clearSelection(ctx);
    case "Escape":    ctx.selected.clear(); paintSelection(ctx); return;
    default:
      // "type a character" -> enter edit, replacing content (decision 1)
      if (e.key.length===1 && !ctrl && !e.altKey){
        const ad=adapterAt(ctx,f.r,f.c);
        if (ad && ad.type!=="select"){
          e.preventDefault();
          enterEdit(ctx,ad,/*keepText*/false);
          ad.el.textContent=e.key;                          // seed the char deterministically
          const sel=getSelection(), rng=document.createRange();
          rng.selectNodeContents(ad.el); rng.collapse(false); sel.removeAllRanges(); sel.addRange(rng);
        }
      }
  }
}

/* ---- copy / cut ----------------------------------------------------------- */
function gridCopy(ctx, isCut){
  const R=selRect(ctx); if(!R) return;
  const lines=[];
  for(let r=R.r0;r<=R.r1;r++){
    const cells=[];
    for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); cells.push(ad?ad.read():""); }
    lines.push(cells.join("\t"));
  }
  const tsv=lines.join("\n");
  ctx._clip = tsv;                                         // local fallback (paste event prefers system clipboard)
  try{ navigator.clipboard && navigator.clipboard.writeText(tsv).catch(()=>{}); }catch(_){}
  if (isCut){
    snapshot(ctx);                                         // undo BEFORE destructive op
    for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(""); }
    markDirty(); saveProject(true);
  }
}

/* ---- paste ---------------------------------------------------------------- */
function gridPasteTSV(ctx, txt){
  if (!txt) return;
  const f = ctx.focus || {r:0,c:0};
  const matrix = parseTSV(txt);                            // reuse parseTSV
  const isSingle = matrix.length===1 && matrix[0].length===1;

  if (isSingle){                                           // single value -> write focus cell (plain text)
    snapshot(ctx);
    const ad=adapterAt(ctx,f.r,f.c); if(ad) ad.write(matrix[0][0]);
    markDirty(); saveProject(true); return;
  }

  if (ctx.kind==="free") pasteFree(ctx, f, matrix);
  else                   pasteCompliance(ctx, f, matrix);
}

function pasteFree(ctx, f, matrix){
  const block=ctx.block;
  const needRows = f.r + matrix.length;
  const maxLen = matrix.reduce((m,r)=>Math.max(m,r.length),0);
  const needCols = f.c + maxLen;
  const addRows = Math.max(0, needRows - block.rows.length);

  const apply=()=>{
    snapshot(ctx);
    // grow rows (clamped)
    while(block.rows.length < Math.min(needRows, GI_MAX_ROWS))
      block.rows.push(new Array(colCount(block)).fill(""));
    // grow cols (clamped)
    const targetCols = Math.min(needCols, GI_MAX_COLS);
    block.rows.forEach(r=>{ while(r.length<targetCols) r.push(""); });
    if (block.col_w) while(block.col_w.length<targetCols) block.col_w.push(2);
    // write
    matrix.forEach((rowVals,dr)=>{ const r=f.r+dr; if(r>=GI_MAX_ROWS) return;
      rowVals.forEach((v,dc)=>{ const c=f.c+dc; if(c>=GI_MAX_COLS) return; block.rows[r][c]=v; }); });
    markDirty(); ctx.rerender(); saveProject(true);
    if (needRows>GI_MAX_ROWS || needCols>GI_MAX_COLS)
      toast(T("grid.paste_too_large","Paste was clamped to the maximum size"), true);
  };

  if (addRows > 20)
    modalConfirm(T("grid.paste_too_large","Large paste"),
      T("grid.paste_too_large","This will add many rows. Continue?"), apply);
  else apply();
}

function pasteCompliance(ctx, f, matrix){
  // map pasted columns onto fixed typed columns (no col auto-grow); append rows only.
  const data=ctx.block.data;
  const totalCols = ctx.cols();
  let overflow=false;
  const apply=()=>{
    snapshot(ctx);
    const needRows = f.r + matrix.length;
    while(data.rows.length < needRows) data.rows.push(newComplianceRow());  // append-only
    ctx.rerender();                       // rebuild so new rows have adapters registered
    matrix.forEach((rowVals,dr)=>{
      const r=f.r+dr;
      rowVals.forEach((v,dc)=>{
        const c=f.c+dc;
        if (c>=totalCols){ overflow=true; return; }      // drop overflow columns
        const ad=adapterAt(ctx,r,c);
        if (ad) ad.write(v);                              // typed write; select/number/axis validate internally
      });
    });
    markDirty(); ctx.rerender(); saveProject(true);
    if (overflow) toast(T("grid.paste_too_large","Some pasted columns did not fit and were dropped"), true);
  };
  const addRows = (f.r + matrix.length) - data.rows.length;
  if (addRows > 20)
    modalConfirm(T("grid.paste_too_large","Large paste"),
      T("grid.paste_too_large","This will add many rows. Continue?"), apply);
  else apply();
}

/* ---- fill-down / clear ---------------------------------------------------- */
function gridFillDown(ctx){
  const R=selRect(ctx); if(!R || R.r1===R.r0) return;
  snapshot(ctx);
  for(let c=R.c0;c<=R.c1;c++){
    const src=adapterAt(ctx,R.r0,c); if(!src) continue;
    const v=src.read();
    for(let r=R.r0+1;r<=R.r1;r++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(v); }
  }
  markDirty(); ctx.rerender(); saveProject(true);
}
function clearSelection(ctx){               // Delete/Backspace
  const R=selRect(ctx); if(!R) return;
  snapshot(ctx);
  for(let r=R.r0;r<=R.r1;r++) for(let c=R.c0;c<=R.c1;c++){ const ad=adapterAt(ctx,r,c); if(ad) ad.write(""); }
  markDirty(); saveProject(true);
}

/* ---- undo (per-block, small N ring) --------------------------------------- */
function snapshotPayload(ctx){
  return ctx.kind==="free"
    ? { rows: JSON.parse(JSON.stringify(ctx.block.rows)) }
    : { data: JSON.parse(JSON.stringify(ctx.block.data)) };
}
function snapshot(ctx){
  // M15: commit any in-flight cell BEFORE serializing, so the just-typed value is not
  // dropped by the structural rebuild that follows. Because the flush happens first, the
  // snapshot's pre-state already contains that value: one Ctrl+Z reverts the structural
  // change but KEEPS the typed value (the opposite order -- structural op, then type, then
  // undo -- is handled by dropGridEdit in gridUndo, which discards the in-flight edit).
  flushGridEdit(ctx);
  ctx._undo.push(snapshotPayload(ctx));
  if (ctx._undo.length>20) ctx._undo.shift();
}
function gridUndo(ctx){
  dropGridEdit(ctx);                        // M15: discard (do NOT commit) an in-flight edit;
                                           // the model is about to be replaced by the snapshot.
  const snap = ctx._undo.pop();
  if (!snap){ toast(T("action.undo","Undo")); return; }
  if (ctx.kind==="free") ctx.block.rows = snap.rows;
  else                   ctx.block.data = snap.data;
  markDirty();
  ctx.rerender();                          // re-resolves adapters; repaints via restoreFocusAfterRender
  toast(T("action.undo","Undo"));
  saveProject(true);
}

/* ---- focus re-resolution after structural rebuild ------------------------- */
function focusCellAt(ctx, r, c){
  [r,c]=clampRC(ctx,r,c);
  ctx.anchor={r,c}; ctx.focus={r,c};
  recomputeSelection(ctx);
  const ad=adapterAt(ctx,r,c);
  if (ad){ ctx.host.focus({preventScroll:true}); ad.el.scrollIntoView({block:"nearest",inline:"nearest"}); }
}
function restoreFocusAfterRender(ctx){
  // registry was just rebuilt; clamp stale focus/anchor into new bounds and repaint
  if (ctx.rows()<=0 || ctx.cols()<=0){ ctx.focus=null; ctx.anchor=null; ctx.selected.clear(); ctx.editing=null; return; }
  if (ctx.focus){ const [r,c]=clampRC(ctx,ctx.focus.r,ctx.focus.c); ctx.focus={r,c}; }
  if (ctx.anchor){ const [r,c]=clampRC(ctx,ctx.anchor.r,ctx.anchor.c); ctx.anchor={r,c}; }
  recomputeSelection(ctx);                 // rebuilds ctx.selected from the (clamped) rect, repaints
  ctx.editing=null;                        // any in-flight edit is dropped on structural rebuild
}

/* ============================================================================
   HOME VIEW + create/import/open flows
============================================================================ */
function render(){
  flushActiveGrid();   // M39: commit any in-flight grid edit before a view switch destroys the editor DOM
  syncChrome();
  if (App.view === "home"){ renderHome(); return; }
  if (App.view === "template"){ renderTemplate(); return; }
  if (App.view === "checklist"){ renderChecklist(); return; }
  if (App.view === "preview"){ renderPreview(); return; }
  renderAll();
}

function syncChrome(){
  const inEditor    = App.view === "editor";
  const inTemplate  = App.view === "template";
  const inChecklist = App.view === "checklist";
  const inPreview   = App.view === "preview";
  // a project is loaded in any of the project-scoped views (editor/checklist/preview)
  const inProject   = inEditor || inChecklist || inPreview;
  // export buttons are project-only; allow exporting straight from the preview too
  ["#btn-docx","#btn-pdf"].forEach(s=>{ $(s).disabled = !(inEditor || inPreview); });
  $("#btn-save").disabled = !(inEditor || inTemplate || inChecklist);
  // undo/redo live in the editor only; enabled state reflects the stacks
  ["#btn-undo","#btn-redo"].forEach(s=>{ const b=$(s); if(b) b.classList.toggle("hidden", !inEditor); });
  updateUndoButtons();
  $("#btn-open").disabled = inTemplate;
  $("#btn-new").disabled  = inTemplate;
  // preview makes #editor a non-scrolling full-bleed host so .pv-wrap scrolls and
  // its top bar can stay frozen (see #editor.pv-mode CSS)
  $("#editor").classList.toggle("pv-mode", inPreview);
  // left pane hosts the project outline OR the skeleton tree (checklist/preview are full-width)
  $("#outline").classList.toggle("hidden", !(inEditor || inTemplate));
  $("#btn-home").classList.toggle("hidden", App.view === "home");
  // the project-scoped toolbar buttons (preview/checklist/copytext) need a loaded project
  const bp = $("#btn-preview");
  if (bp) bp.classList.toggle("hidden", !inProject);
  const bc = $("#btn-checklist");
  if (bc) bc.classList.toggle("hidden", !inProject);
  const bt = $("#btn-copytext");
  if (bt) bt.classList.toggle("hidden", !inProject);
  if (App.view === "home") setStatus("", T("status.no_project","No project open"));
  if (inTemplate) setStatus("", T("status.template_mode","Editing template"));
  if (inChecklist) setStatus("", T("status.checklist_mode","Simulation checklist"));
  if (inPreview) setStatus("", T("status.preview_mode","Preview (read-only)"));
}

async function goHome(){
  // preserve an unsaved template before leaving via the toolbar Home button
  if (App.view === "template" && App.tplView && App.tplView.dirty){ return tplBack(); }
  if (App.dirty) await saveProject(false);
  App.view = "home";
  App.tplView = null;
  render();
  await refreshHome();
}

async function refreshHome(){
  try{
    const [t, p] = await Promise.all([
      api("GET","/api/templates"),
      api("GET","/api/projects"),
    ]);
    App.templates = (t && t.templates) || [];
    App.projects  = (p && p.projects)  || [];
  }catch(e){
    App.templates = App.templates||[]; App.projects = App.projects||[];
    toast(T("toast.home_load_failed","Could not load home lists: ")+e.message, true);
  }
  if (App.view === "home") renderHome();
}

function renderHome(){
  const host = $("#editor-inner"); host.innerHTML = "";
  const root = el("div",{class:"home"});
  root.appendChild(renderTemplatesSection());
  root.appendChild(renderProjectsSection());
  host.appendChild(root);
}

/* ============================================================================
   SIM CHECKLIST VIEW
   Per-project tracker stored in project.json -> sim_checklist {version, runs[]}.
   Each run advances todo -> doing -> done by clicking its status chip. Edits go
   straight into App.project and ride the existing autosave / snapshot / bundle
   path -- no extra server endpoint, no extra bundle file.
============================================================================ */
const CKL_STATES = ["todo","doing","done"];
function cklStateLabel(s){
  return T("checklist.status."+s,
           s==="doing" ? "Doing" : s==="done" ? "Done" : "To-do");
}
function getChecklist(){ return (App.project && App.project.sim_checklist) || null; }
function enterChecklist(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  App.view = "checklist";
  render();
}
function cklCycle(run){
  const i = CKL_STATES.indexOf(run.status);
  run.status = CKL_STATES[(i + 1) % CKL_STATES.length] || "todo";
  markDirty();
  renderChecklist();   // refresh chip color + progress line
}
function renderChecklist(){
  const host = $("#editor-inner"); host.innerHTML = "";
  const ckl = getChecklist();
  const runs = (ckl && Array.isArray(ckl.runs)) ? ckl.runs : [];
  const root = el("div",{class:"ckl"});

  const counts = {todo:0, doing:0, done:0};
  runs.forEach(r=>{ if (counts[r.status]==null) counts[r.status]=0; counts[r.status]++; });
  root.appendChild(el("div",{class:"ckl-head"},[
    el("button",{class:"tb-btn", text:T("checklist.back","< Report"),
      onclick:()=>{ App.view="editor"; render(); }}),
    el("div",{class:"ckl-title", text:T("checklist.title","Simulation Checklist")}),
    el("div",{class:"ckl-prog", text:
      counts.done+"/"+runs.length+" "+cklStateLabel("done")
      +"  -  "+counts.doing+" "+cklStateLabel("doing")
      +"  -  "+counts.todo+" "+cklStateLabel("todo")}),
  ]));

  if (!runs.length){
    root.appendChild(el("div",{class:"empty",
      text:T("checklist.empty","No simulation checklist in this project.")}));
    host.appendChild(root);
    return;
  }

  const tbl = el("table",{class:"ckl-table"});
  tbl.appendChild(el("thead",{},[ el("tr",{},[
    el("th",{text:"#"}),
    el("th",{text:"TB"}),
    el("th",{text:T("checklist.col.analysis","Analysis")}),
    el("th",{text:T("checklist.col.corner","Corner")}),
    el("th",{text:"N"}),
    el("th",{text:T("checklist.col.collects","Collects")}),
    el("th",{text:T("checklist.col.maps","Report target")}),
    el("th",{text:T("checklist.col.status","Status")}),
    el("th",{text:T("checklist.col.note","Note")}),
  ]) ]));
  const tb = el("tbody");
  runs.forEach(run=>{
    const chip = el("button",{class:"ckl-chip s-"+run.status,
      text:cklStateLabel(run.status), onclick:()=>cklCycle(run)});
    const note = el("input",{class:"ckl-note", type:"text", value:run.note||""});
    note.addEventListener("input",()=>{ run.note = note.value; markDirty(); });
    tb.appendChild(el("tr",{class:"s-"+run.status},[
      el("td",{class:"ckl-id", text:run.id||""}),
      el("td",{text:run.tb||""}),
      el("td",{text:run.analysis||""}),
      el("td",{text:run.corner||""}),
      el("td",{text:run.n||""}),
      el("td",{class:"ckl-wrap", text:run.collects||""}),
      el("td",{class:"ckl-wrap", text:run.maps_to||""}),
      el("td",{}, chip),
      el("td",{}, note),
    ]));
  });
  tbl.appendChild(tb);
  root.appendChild(tbl);
  host.appendChild(root);
}

/* ============================================================================
   LIVE REPORT PREVIEW  (read-only, in-browser)
   Walks App.project the same way engine.py does -- chapter-scoped Figure/Table
   numbering, captions, compliance over-spec flagging -- and lays the result out
   like a document, so there is no export-then-open-in-Word round trip. It is an
   APPROXIMATE rendering: content + numbering + flagging are faithful, page
   geometry/fonts are not. Always reads the live (possibly unsaved) App.project.
============================================================================ */
function enterPreview(){
  if (!App.project){ toast(T("toast.need_project","Open a project first"), true); return; }
  flushActiveGrid();   // commit any in-flight grid cell so the preview is current
  App._pvJump = true;  // one-shot: scroll to the node being edited (cleared by renderPreview)
  App.view = "preview";
  render();
}

function renderPreview(){
  const host = $("#editor-inner"); host.innerHTML = "";
  const wrap = el("div",{class:"pv-wrap"});

  const bar = el("div",{class:"pv-bar"});
  bar.appendChild(el("button",{class:"tb-btn", text:T("preview.back","< Report"),
    onclick:()=>{ App.view = "editor"; render(); }}));
  bar.appendChild(el("button",{class:"tb-btn", text:T("preview.refresh","Refresh"),
    onclick:()=>{ flushActiveGrid(); renderPreview(); }}));
  bar.appendChild(el("span",{class:"pv-bar-t", text:T("preview.title","Live preview")}));
  bar.appendChild(el("span",{class:"spacer"}));
  bar.appendChild(el("span",{class:"pv-hint",
    text:T("preview.hint","Approximate layout; content, numbering and flags match the export.")}));
  bar.appendChild(el("button",{class:"tb-btn", text:T("preview.print","Print / PDF"),
    onclick:()=>window.print()}));
  wrap.appendChild(bar);

  const state = { chap:0, img:0, tbl:0, selEl:null };
  wrap.appendChild(buildPreviewDoc(state));
  host.appendChild(wrap);

  // jump to the currently-edited node once, when the user clicks Preview
  if (App._pvJump){
    App._pvJump = false;
    if (state.selEl && state.selEl.scrollIntoView)
      requestAnimationFrame(()=> state.selEl.scrollIntoView({block:"start"}));
  }
}

function buildPreviewDoc(state){
  const doc = el("div",{class:"pv-doc"});
  doc.appendChild(previewTitle());
  state = state || { chap:0, img:0, tbl:0 };
  (App.project.outline || []).forEach(n => previewNode(doc, n, 0, state));
  return doc;
}

function previewTitle(){
  const meta = App.project.meta || {};
  const fields = (App.config && App.config.cover && App.config.cover.fields) || [];
  const box = el("div",{class:"pv-title"});
  // pick the most title-like cover field that has a value; fall back gracefully
  const titleField = fields.find(f => /title|name/i.test(f.key) && meta[f.key]);
  const titleVal = (titleField && meta[titleField.key]) || meta.title || meta.name
                   || T("preview.untitled","(untitled report)");
  box.appendChild(el("div",{class:"pv-title-main", text:String(titleVal)}));
  // a few info-table fields under the title (label: value), correctness over guessing keys
  const meta_lines = el("div",{class:"pv-title-meta"});
  fields.filter(f => f.table === "info" && f !== titleField && meta[f.key]
                     && typeof meta[f.key] !== "object")
        .forEach(f => meta_lines.appendChild(el("div",{},[
          el("span",{class:"pv-ml-k", text:(f.label || f.key) + ": "}),
          document.createTextNode(String(meta[f.key])),
        ])));
  box.appendChild(meta_lines);
  return box;
}

// Mirrors engine.walk: level-1 nodes open a chapter (reset Figure/Table counters);
// blocks of a chapter (incl. all its subsections, in document order) share them.
function previewNode(host, node, depth, state){
  const level = depth + 1;
  if (level === 1){ state.chap++; state.img = 0; state.tbl = 0; }
  const chap = state.chap;

  const num = nodePath(node.id);
  const h = el("div",{class:"pv-h pv-h" + Math.min(level, 6)});
  if (node.id != null) h.setAttribute("data-nid", node.id);
  if (num) h.appendChild(el("span",{class:"pv-hnum", text:num + "  "}));
  h.appendChild(document.createTextNode(node.title || ""));
  host.appendChild(h);
  if (state && node.id != null && node.id === App.selId) state.selEl = h;   // auto-scroll target

  if (state) state.numSeq = [];   // numbered lists restart per section (mirror engine.new_section)
  if (node.fixed_body){
    host.appendChild(el("div",{class:"pv-fixed",
      text:T("preview.fixed","[ Standard template text — generated by the engine on export. ]")}));
  } else {
    (node.blocks || []).forEach(b => previewBlock(host, b, chap, state));
  }
  (node.children || []).forEach(c => previewNode(host, c, depth + 1, state));
}

function previewBlock(host, block, chap, state){
  if (!block) return;
  switch (block.type){
    case "para":      host.appendChild(previewPara(block, state)); break;
    case "image":     state.img++; host.appendChild(previewImage(block, chap, state.img)); break;
    case "imagegrid": state.img++; host.appendChild(previewImageGrid(block, chap, state.img)); break;
    case "table": {
      const cap = (block.caption || "").trim();
      if (cap) state.tbl++;
      host.appendChild(previewFreeTable(block, chap, cap ? state.tbl : null));
      break;
    }
    case "datatable": {
      const cap = (block.caption || "").trim();
      if (cap) state.tbl++;
      host.appendChild(previewDatatable(block, chap, cap ? state.tbl : null));
      break;
    }
  }
}

function capPrefix(kind){
  const tpl = (App.config && (App.config.template || App.config)) || {};
  const cp = tpl.caption_prefix || {};
  return cp[kind] || (kind === "image" ? "Figure" : "Table");
}
function figLabel(chap, seq){ return capPrefix("image") + " " + chap + "-" + seq; }
function tblLabel(chap, seq){ return capPrefix("table") + " " + chap + "-" + seq; }

// per-level list markers mirror the engine: ● □ ▪ – for bullets; 1. a) i. for numbers
const PV_BULLET_GLYPHS = ["●","□","▪","–"];
function pvBulletGlyph(level){ return PV_BULLET_GLYPHS[Math.min(level, PV_BULLET_GLYPHS.length-1)]; }
function pvRoman(n){
  const map=[[10,"x"],[9,"ix"],[5,"v"],[4,"iv"],[1,"i"]]; let s="";
  for(const [v,r] of map){ while(n>=v){ s+=r; n-=v; } } return s || "i";
}
function pvNumberStep(state, level){
  const seq = state.numSeq = state.numSeq || [];
  seq[level] = (seq[level]||0) + 1;
  seq.length = level + 1;                     // deeper counters restart under a new parent
  const n = seq[level];
  if (level === 0) return n + ".";
  if (level === 1) return String.fromCharCode(96 + ((n-1)%26) + 1) + ")";   // a) b) ...
  return pvRoman(n) + ".";
}
function previewPara(block, state){
  const html = runsToHtml(block.runs || []);   // reuse the editor's exact run->HTML
  const lvl = Math.max(0, Math.min(block.level|0, 8));
  if (block.list === "bullet" || block.list === "number"){
    const marker = block.list === "bullet"
      ? pvBulletGlyph(lvl)
      : (state ? pvNumberStep(state, lvl) : (lvl===0 ? "1." : "a)"));
    const d = el("div",{class:"pv-li", html: escapeHtml(marker) + "  " + (html || "")});
    if (lvl) d.style.marginLeft = (lvl * 1.7) + "em";
    return d;
  }
  return el("p",{class:"pv-p", html: html || "&nbsp;"});
}

function previewMissingImg(name){
  return el("div",{class:"pv-missing"},[
    el("div",{class:"pv-missing-ic", text:"\u{1F5BC}"}),
    el("div",{text: name ? name : T("preview.no_image","Image placeholder (paste a screenshot)")}),
  ]);
}

function previewImage(block, chap, seq){
  const fig = el("figure",{class:"pv-fig"});
  if (block.file){
    const img = el("img",{class:"pv-img", src: imgUrl(block.file), alt: block.caption || ""});
    if (block.width_cm) img.style.width = Math.round(block.width_cm * 37.8) + "px";
    img.onerror = ()=>{ const m = previewMissingImg(block.file); if (img.parentNode) img.parentNode.replaceChild(m, img); };
    fig.appendChild(img);
  } else {
    fig.appendChild(previewMissingImg(""));
  }
  fig.appendChild(previewCaption(figLabel(chap, seq), block.caption));
  return fig;
}

function previewImageGrid(block, chap, seq){
  const fig = el("figure",{class:"pv-fig"});
  const grid = el("div",{class:"pv-imgrid"});
  grid.style.gridTemplateColumns = "repeat(" + (block.cols || 2) + ",1fr)";
  (block.items || []).forEach((it, i)=>{
    const cell = el("div",{class:"pv-gcell"});
    const imgBox = el("div",{class:"pv-gimg"});           // grows + bottom-aligns so sub-labels share a baseline
    if (it && it.file){
      const img = el("img",{class:"pv-img", src: imgUrl(it.file), alt:""});
      img.onerror = ()=>{ const m = previewMissingImg(it.file); if (img.parentNode) img.parentNode.replaceChild(m, img); };
      imgBox.appendChild(img);
    } else {
      imgBox.appendChild(previewMissingImg(""));
    }
    cell.appendChild(imgBox);
    if (block.sub_captions) cell.appendChild(el("div",{class:"pv-sub", text:"(" + String.fromCharCode(97 + i) + ")"}));
    grid.appendChild(cell);
  });
  fig.appendChild(grid);
  fig.appendChild(previewCaption(figLabel(chap, seq), block.caption));
  return fig;
}

function previewCaption(numLabel, text){
  return el("figcaption",{class:"pv-cap"},[
    el("span",{class:"pv-capnum", text: numLabel + "  "}),
    document.createTextNode(text || ""),
  ]);
}

function previewFreeTable(block, chap, seq){
  const wrap = el("div",{class:"pv-tblwrap"});
  if (seq != null) wrap.appendChild(el("div",{class:"pv-cap pv-tcap"},[
    el("span",{class:"pv-capnum", text: tblLabel(chap, seq) + "  "}),
    document.createTextNode(block.caption || ""),
  ]));
  const tbl = el("table",{class:"pv-table"});
  tbl.style.tableLayout = "fixed";                          // match the editor: widths come from the colgroup
  const hr = (block.header_rows != null) ? block.header_rows : 1;
  const ncols = (block.rows || []).reduce((m,r)=>Math.max(m,(r||[]).length), 0);
  const colw = (Array.isArray(block.col_w) && block.col_w.length === ncols) ? block.col_w : null;
  if (ncols){
    const cg = el("colgroup");
    if (colw){
      const tot = colw.reduce((a,b)=>a + (Number(b) || 0), 0) || 1;
      colw.forEach(w => cg.appendChild(el("col",{style:{width:(100 * (Number(w) || 0) / tot) + "%"}})));
    } else {
      for (let i=0;i<ncols;i++) cg.appendChild(el("col",{style:{width:(100/ncols) + "%"}}));
    }
    tbl.appendChild(cg);
  }
  (block.rows || []).forEach((row, ri)=>{
    const tr = el("tr",{class: ri < hr ? "pv-hdr" : ""});
    (row || []).forEach(cell=>{
      const td = el(ri < hr ? "th" : "td", {class:"pv-td"});
      td.innerHTML = cellHtml(cell);                 // styled runs render as HTML
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });
  wrap.appendChild(tbl);
  return wrap;
}

/* ---- compliance datatable: JS port of tables.py group/axis/limit logic ----- */
function dtNumv(v){
  if (Array.isArray(v) && v.length === 2) v = v[0];
  const n = parseFloat(v);
  return isFinite(n) ? n : null;
}
function dtFmt(v){
  if (v == null || v === "") return "";
  if (Array.isArray(v) && v.length === 2) return v[0] + "(" + v[1] + ")";
  return String(v);
}
function dtViolates(limit, nv, smin, smax, en, styp){
  if (nv == null) return false;
  if (limit === "le"){ const thr = smax != null ? smax : (en != null ? en : styp); return thr != null && nv > thr; }
  if (limit === "ge"){ const thr = smin != null ? smin : (smax != null ? smax : en); return thr != null && nv < thr; }
  if (limit === "range"){ return (smin != null && nv < smin) || (smax != null && nv > smax); }
  return false;
}
function dtFlagPositions(row){
  const flags = new Set();
  const limit = row.limit;
  if (!limit) return flags;
  const sm = row.spec_mtm || [null, null, null];
  const sim = row.sim_mtm || [null, null, null];
  const smin = dtNumv(sm[0]), styp = dtNumv(sm[1]), smax = dtNumv(sm[2]);
  const en = dtNumv(row.spec);
  sim.forEach((v, i)=>{ if (dtViolates(limit, dtNumv(v), smin, smax, en, styp)) flags.add(i); });
  const nt = dtNumv(row.sim_ntwc);
  if (nt != null){
    const nspec = dtNumv(row.spec_ntwc);
    const n_smin = nspec != null ? nspec : smin;
    const n_smax = nspec != null ? nspec : smax;
    const n_en   = nspec != null ? nspec : en;
    if (dtViolates(limit, nt, n_smin, n_smax, n_en, styp)) flags.add(3);
  }
  return flags;
}
function dtAxisValue(row, gkey, ai){
  const arr = (gkey === "spec")
    ? (row.spec_mtm || [null, null, null]).concat([row.spec_ntwc])
    : (row.sim_mtm  || [null, null, null]).concat([row.sim_ntwc]);
  return ai < arr.length ? arr[ai] : null;
}

// Column plan -- mirrors tables.py _plan_columns (cat,item,[spec], per group:
// spacer + axes, trailing spacer + unit). Each entry carries its width (cm).
function dtPlan(groups, showSpec, w){
  const plan = [{kind:"cat", w:w.cat}, {kind:"item", w:w.item}];
  if (showSpec) plan.push({kind:"spec", w:w.spec});
  groups.forEach(g=>{
    plan.push({kind:"spacer", w:w.spacer});
    g.axes.forEach((ax, ai)=> plan.push({kind:"axis", group:g.key, role:g.role, axis:ai, label:ax, w:w.axis, g:g}));
  });
  plan.push({kind:"spacer", w:w.spacer});
  plan.push({kind:"unit", w:w.unit});
  return plan;
}

function previewDatatable(block, chap, seq){
  const data = block.data || {};
  const comp = (App.config && App.config.compliance) || {};
  const fl = comp.fills || {};
  const F = { header:"#"+(fl.header||"FFFF00"), setting:"#"+(fl.setting||"EEECE1"), result:"#"+(fl.result||"FFFFFF") };
  const flagColor   = "#"+(comp.flag_color || "FF0000");
  const settingKinds = new Set(comp.setting_kinds || ["common_setting","module_setting","tb"]);
  const w = comp.col_w_cm || {cat:1.7, item:4.0, spec:1.0, axis:0.88, spacer:0.2, unit:1.0};
  const axesDefault = comp.axis_labels || ["MIN","TYP","MAX","NTWC"];

  const wrap = el("div",{class:"pv-tblwrap"});
  if (seq != null) wrap.appendChild(el("div",{class:"pv-cap pv-tcap"},[
    el("span",{class:"pv-capnum", text: tblLabel(chap, seq) + "  "}),
    document.createTextNode(block.caption || ""),
  ]));

  // spec group first, then one group per simulation (matches make_groups)
  const groups = [{ key:"spec", title: data.spec_name || "Spec", role:"spec", stage:null, axes: axesDefault.slice() }];
  (data.sims || []).forEach(s => groups.push({
    key: s.key, title: s.title || s.key, role:"sim", stage: s.stage || null, axes:(s.axes || axesDefault).slice() }));
  const showSpec = !groups.some(g => g.role === "spec");   // spec group always present -> false
  const firstSim = groups.find(g => g.role === "sim");      // sim_span merges this group's first 3 axes
  const plan = dtPlan(groups, showSpec, w);

  // one cell builder for header + data: fill, bold, color, span are all explicit
  const cell = (tag, o)=>{
    const c = el(tag,{class: "pv-td" + (o.cls ? " "+o.cls : "")});
    if (o.colspan) c.setAttribute("colspan", String(o.colspan));
    if (o.rowspan) c.setAttribute("rowspan", String(o.rowspan));
    if (o.fill)  c.style.background = o.fill;
    if (o.bold)  c.style.fontWeight = "700";
    if (o.color) c.style.color = o.color;
    c.textContent = (o.text != null) ? o.text : "";
    return c;
  };

  const tbl = el("table",{class:"pv-table pv-dt"});
  const tot = plan.reduce((a,p)=>a + (Number(p.w)||0), 0) || 1;
  const cg = el("colgroup");
  plan.forEach(p => cg.appendChild(el("col",{style:{width:(100*(Number(p.w)||0)/tot)+"%"}})));
  tbl.appendChild(cg);

  // ---- header band: 3 rows, all shaded fills.header ----
  const r0 = el("tr",{class:"pv-hdr"});
  plan.forEach(p=>{
    if (p.kind === "cat")  r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Category"}));
    else if (p.kind === "item") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Item"}));
    else if (p.kind === "spec") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Spec"}));
    else if (p.kind === "unit") r0.appendChild(cell("th",{rowspan:3, fill:F.header, bold:true, text:"Unit"}));
    else if (p.kind === "spacer") r0.appendChild(cell("th",{rowspan:3, fill:F.header, cls:"pv-spacer"}));
    else if (p.kind === "axis" && p.axis === 0)
      r0.appendChild(cell("th",{colspan:p.g.axes.length, fill:F.header, bold:true, text:p.g.title}));
  });
  tbl.appendChild(r0);

  const r1 = el("tr",{class:"pv-hdr"});           // stage row (only axis area; rest covered by rowspan)
  plan.forEach(p=>{
    if (p.kind !== "axis") return;
    if (p.g.stage){ if (p.axis === 0) r1.appendChild(cell("th",{colspan:p.g.axes.length, fill:F.header, bold:true, text:p.g.stage})); }
    else r1.appendChild(cell("th",{fill:F.header}));
  });
  tbl.appendChild(r1);

  const r2 = el("tr",{class:"pv-hdr"});           // axis labels
  plan.forEach(p=>{ if (p.kind === "axis") r2.appendChild(cell("th",{fill:F.header, bold:true, cls:"pv-axis", text:String(p.label)})); });
  tbl.appendChild(r2);

  // ---- data rows ----
  const rows = data.rows || [];
  if (!rows.length){
    wrap.appendChild(tbl);
    wrap.appendChild(el("div",{class:"pv-fixed",
      text:T("preview.empty_dt","(Compliance table has no metric rows yet.)")}));
    return wrap;
  }
  // consecutive same-category runs -> the category column vertical merge
  const catFirst = new Set(), catSpan = {};
  for (let i = 0; i < rows.length;){
    let j = i; while (j+1 < rows.length && rows[j+1].cat === rows[i].cat) j++;
    catFirst.add(i); catSpan[i] = j - i + 1; i = j + 1;
  }

  rows.forEach((row, ri)=>{
    const band  = settingKinds.has(row.kind) ? F.setting : F.result;
    const flags = dtFlagPositions(row);
    const tr = el("tr",{});
    let skip = 0;   // sim_span: skip the merged-away axis cells
    plan.forEach(p=>{
      if (p.kind === "cat"){
        if (catFirst.has(ri)) tr.appendChild(cell("td",{rowspan:catSpan[ri], fill:band, bold:true, text:row.cat||""}));
        return;   // non-first rows: covered by the rowspan above
      }
      if (skip > 0){ skip--; return; }
      if (p.kind === "item")   return void tr.appendChild(cell("td",{fill:band, text:row.item||""}));
      if (p.kind === "unit")   return void tr.appendChild(cell("td",{fill:band, text:row.unit||""}));
      if (p.kind === "spec")   return void tr.appendChild(cell("td",{fill:band, text:dtFmt(row.spec)}));
      if (p.kind === "spacer") return void tr.appendChild(cell("td",{fill:band, cls:"pv-spacer"}));
      if (p.kind === "axis"){
        // sim_span row: the first sim group's first 3 axes merge into one wide cell
        if (row.sim_span && firstSim && p.group === firstSim.key && p.axis === 0){
          const red = flags.has(0);
          tr.appendChild(cell("td",{colspan:3, fill:band, cls:"pv-num",
            text:dtFmt(dtAxisValue(row, p.group, 0)), color:red?flagColor:null, bold:red}));
          skip = Math.min(2, firstSim.axes.length - 1);
          return;
        }
        const red = (p.role === "sim" && flags.has(p.axis));
        tr.appendChild(cell("td",{fill:band, cls:"pv-num",
          text:dtFmt(dtAxisValue(row, p.group, p.axis)), color:red?flagColor:null, bold:red}));
        return;
      }
    });
    tbl.appendChild(tr);
  });

  wrap.appendChild(tbl);
  return wrap;
}

function relTime(mtime){
  if (mtime==null) return "";
  let ms = (typeof mtime==="number") ? (mtime>2e10?mtime:mtime*1000) : Date.parse(mtime);
  if (isNaN(ms)) return String(mtime);
  const s = Math.max(0,(Date.now()-ms)/1000);
  if (s<60)      return T("time.just_now","just now");
  if (s<3600)    return Math.floor(s/60)+T("time.m","m ago");
  if (s<86400)   return Math.floor(s/3600)+T("time.h","h ago");
  if (s<2592000) return Math.floor(s/86400)+T("time.d","d ago");
  try{ return new Date(ms).toLocaleDateString(); }catch(_){ return String(mtime); }
}

/* ============================================================================
   TEMPLATE EDITOR (Phase 3b)
   Left: skeleton outline tree. Right: collapsible settings form + the selected
   node's body editor. Loads GET /api/template, saves PUT /api/template. The
   loaded full config is mutated in place via setPath so unknown keys round-trip
   untouched; only the curated paths below are exposed as a form.
============================================================================ */

/* ---- load flow ------------------------------------------------------------ */
async function openTemplate(tpl){
  setStatus("saving", T("status.loading","Loading..."));
  try{
    const r = await api("GET","/api/template",{query:{id: tpl.id}});
    App.view = "template";
    App.tplView = {
      id: r.id || tpl.id,
      name: r.name || tpl.name || tpl.id,
      config: r.config || {},
      skeleton: normalizeSkeleton(r.skeleton || []),
      sel: null,
      dirty: false,
      settingsOpen: true,
    };
    if (App.tplView.skeleton.length) App.tplView.sel = App.tplView.skeleton[0]._id;
    render();
    setStatus("", T("status.template_mode","Editing template"));
  }catch(e){
    setStatus("err","load failed");
    toast(T("toast.template_load_failed","Could not load template: ")+e.message, true);
  }
}

// Stamp template-local ids and normalize node shape. Unmodeled node keys are
// stashed on _passthru so a config-derived template round-trips losslessly.
function normalizeSkeleton(nodes){
  return (nodes||[]).map(n=>{
    const node = {
      _id: uid(),
      title: n.title || "",
      fixed: !!n.fixed,
      blocks: Array.isArray(n.blocks) ? n.blocks : [],
      children: normalizeSkeleton(n.children || []),
    };
    if (n.level != null) node.level = n.level;
    const passthru = {};
    Object.keys(n).forEach(k=>{
      if (!["title","fixed","blocks","children","level"].includes(k)) passthru[k]=n[k];
    });
    if (Object.keys(passthru).length) node._passthru = passthru;
    return node;
  });
}

/* ---- template-local dirty (does NOT call the project markDirty) ----------- */
function tplMarkDirty(){
  if (!App.tplView) return;
  App.tplView.dirty = true;
  setStatus("dirty", T("status.unsaved","Unsaved changes"));
  scheduleTplAutosave();
  // do NOT re-render here: that would blur the input being typed in.
}

/* ---- path get/set on the config object ------------------------------------ */
// supports dotted segments and quoted keys: styles.headings.levels."1".size_pt
function splitPath(path){
  const out=[]; const re=/"([^"]+)"|([^.]+)/g; let m;
  while((m=re.exec(path))) out.push(m[1]!=null?m[1]:m[2]);
  return out;
}
function getPath(obj, path){
  const parts = splitPath(path);
  let cur = obj;
  for (const p of parts){
    if (cur==null || typeof cur!=="object") return undefined;
    cur = cur[p];
  }
  return cur;
}
function setPath(obj, path, val){
  const parts = splitPath(path);
  let cur = obj;
  for (let i=0;i<parts.length-1;i++){
    const p = parts[i];
    if (cur[p]==null || typeof cur[p]!=="object") cur[p] = {};
    cur = cur[p];
  }
  cur[parts[parts.length-1]] = val;
}

/* ---- field coercion adapters ---------------------------------------------- */
const cv = {
  text:  { get:v=> v==null?"":String(v),                          set:s=> s },
  num:   { get:v=> v==null||v===""?"":String(v),
           set:s=>{ const t=String(s).trim(); if(t==="") return undefined;
                    const n=Number(t); return isNaN(n)?undefined:n; } },
  // config stores 6-hex WITHOUT '#'; <input type=color> needs '#RRGGBB'
  color: { get:v=> v?("#"+String(v).replace(/^#/,"")):"#000000",
           set:s=> String(s).replace(/^#/,"").toUpperCase() },
  csv:   { get:v=> Array.isArray(v)?v.join(", "):(v==null?"":String(v)),
           set:s=> String(s).split(",").map(x=>x.trim()).filter(x=>x.length>0) },
};

// key, labelKey, fallback label, config path (@name = tplView.name), kind, input type.
// NOTE: compliance.row_h_pt is an OBJECT {header,data} in the real config, so we
